<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d12;--card:#16161e;--card2:#1e1e2a;--border:#2a2a3a;--text:#e0e0e0;--dim:#888;--accent:#d4a44a;--accent2:#a07030;--blue:#4a8ed4;--green:#4ad46a;--red:#d44a4a;--purple:#a04ad4}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
.container{max-width:960px;margin:0 auto;padding:12px}
header{text-align:center;padding:16px 0 8px}
header h1{font-size:1.4rem;color:var(--accent)}
header p{font-size:.85rem;color:var(--dim);margin-top:4px}

/* Filters */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;padding:12px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px}
.filter-group label{font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.filter-group select,.filter-group input{background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:.85rem;outline:none}
.filter-group select:focus,.filter-group input:focus{border-color:var(--accent)}
.level-range{display:flex;align-items:center;gap:6px}
.level-range input{width:60px;text-align:center}
.level-range span{color:var(--dim);font-size:.85rem}

/* Rune selector */
.rune-section{margin:12px 0}
.rune-section h3{font-size:.9rem;color:var(--accent);margin-bottom:8px}
.rune-grid{display:flex;flex-wrap:wrap;gap:4px}
.rune-btn{width:52px;height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;font-size:.65rem;color:var(--dim)}
.rune-btn:hover{border-color:var(--accent);background:var(--card2)}
.rune-btn.selected{border-color:var(--accent);background:var(--accent2);color:#fff}
.rune-btn .rune-num{font-size:1.1rem;font-weight:700;color:var(--text);line-height:1}
.rune-btn.selected .rune-num{color:#fff}
.selected-runes{display:flex;gap:6px;align-items:center;margin:10px 0;min-height:36px;flex-wrap:wrap}
.selected-rune-tag{display:flex;align-items:center;gap:4px;background:var(--accent2);color:#fff;padding:4px 10px;border-radius:16px;font-size:.8rem;font-weight:600}
.selected-rune-tag .remove{cursor:pointer;opacity:.7;font-size:.9rem}
.selected-rune-tag .remove:hover{opacity:1}
.clear-btn{font-size:.75rem;color:var(--dim);cursor:pointer;padding:4px 8px;border:1px solid var(--border);border-radius:12px;background:transparent}
.clear-btn:hover{color:var(--red);border-color:var(--red)}

/* Results */
.results-header{display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px}
.results-header h3{font-size:.9rem;color:var(--dim)}
.results-count{font-size:.8rem;color:var(--accent)}
.rw-list{display:flex;flex-direction:column;gap:8px;padding-bottom:40px}
.rw-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s}
.rw-card:hover{border-color:var(--accent)}
.rw-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;gap:8px}
.rw-name{font-size:1rem;font-weight:700;color:var(--accent)}
.rw-name-en{font-size:.8rem;color:var(--dim);margin-left:6px;font-weight:400}
.rw-meta{display:flex;gap:8px;align-items:center;flex-shrink:0}
.rw-lvl{font-size:.75rem;color:var(--blue);background:rgba(74,142,212,.15);padding:2px 8px;border-radius:10px}
.rw-type{font-size:.75rem;color:var(--green);background:rgba(74,212,106,.12);padding:2px 8px;border-radius:10px}
.rw-body{display:none;padding:0 14px 12px;border-top:1px solid var(--border)}
.rw-card.open .rw-body{display:block}
.rw-runes{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap}
.rw-rune{display:flex;flex-direction:column;align-items:center;background:var(--card2);padding:6px 10px;border-radius:8px;border:1px solid var(--border);min-width:48px}
.rw-rune .num{font-size:1rem;font-weight:700;color:var(--accent)}
.rw-rune .name{font-size:.7rem;color:var(--dim)}
.rw-rune .order{font-size:.6rem;color:var(--accent);margin-bottom:2px}
.rw-props{margin-top:8px}
.rw-props li{font-size:.82rem;color:var(--text);padding:2px 0;list-style:none}
.rw-props li::before{content:'• ';color:var(--accent)}
.rw-classes{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.rw-class-tag{font-size:.7rem;padding:2px 8px;border-radius:10px;background:rgba(160,74,212,.15);color:var(--purple)}
.rw-sockets{font-size:.75rem;color:var(--dim);margin-left:4px}
.no-results{text-align:center;padding:40px;color:var(--dim);font-size:.9rem}
.arrow{transition:transform .2s;color:var(--dim);font-size:.8rem}
.rw-card.open .arrow{transform:rotate(90deg)}

/* Back link */
.back-link{display:inline-block;margin-bottom:8px;font-size:.85rem;color:var(--dim)}
.back-link:hover{color:var(--accent)}

@media(max-width:600px){
  .rune-btn{width:44px;height:44px}
  .rune-btn .rune-num{font-size:.95rem}
  .rune-btn{font-size:.6rem}
  .filter-group{min-width:100px}
}
</style>

// State
let selectedRunes=[];
let openCards=new Set();

// Init
function init(){
  renderRuneGrid();
  populateFilters();
  document.getElementById('filterType').addEventListener('change',renderResults);
  document.getElementById('filterClass').addEventListener('change',renderResults);
  document.getElementById('filterSockets').addEventListener('change',renderResults);
  document.getElementById('lvlMin').addEventListener('input',renderResults);
  document.getElementById('lvlMax').addEventListener('input',renderResults);
  renderResults();
}

function renderRuneGrid(){
  const grid=document.getElementById('runeGrid');
  grid.innerHTML=RUNES.map(r=>`<div class="rune-btn" data-id="${r.id}" onclick="toggleRune(${r.id})"><span class="rune-num">${r.id}</span>${r.name}<br><span style="font-size:.55rem">${r.kr}</span></div>`).join('');
}

function populateFilters(){
  const types=new Set();
  const classes=new Set();
  RUNEWORDS.forEach(rw=>{rw.types.forEach(t=>types.add(t));rw.classes.forEach(c=>classes.add(c))});
  const typeEl=document.getElementById('filterType');
  [...types].sort().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;typeEl.appendChild(o)});
  const classEl=document.getElementById('filterClass');
  [...classes].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;classEl.appendChild(o)});
}

function toggleRune(id){
  const idx=selectedRunes.indexOf(id);
  if(idx>=0) selectedRunes.splice(idx,1);
  else selectedRunes.push(id);
  updateRuneUI();
  renderResults();
}

function removeRune(idx){
  selectedRunes.splice(idx,1);
  updateRuneUI();
  renderResults();
}

function clearRunes(){
  selectedRunes=[];
  updateRuneUI();
  renderResults();
}

function updateRuneUI(){
  document.querySelectorAll('.rune-btn').forEach(el=>{
    const id=parseInt(el.dataset.id);
    el.classList.toggle('selected',selectedRunes.includes(id));
  });
  const container=document.getElementById('selectedRunes');
  if(selectedRunes.length===0){
    container.innerHTML='<span style="color:var(--dim);font-size:.8rem">룬을 클릭하면 여기에 추가됩니다</span>';
  } else {
    container.innerHTML=selectedRunes.map((id,i)=>{
      const r=RUNES.find(x=>x.id===id);
      return `<span class="selected-rune-tag">${r.name} <span class="remove" onclick="removeRune(${i})">✕</span></span>`;
    }).join('')+` <span class="clear-btn" onclick="clearRunes()">초기화</span>`;
  }
}

function renderResults(){
  const filterType=document.getElementById('filterType').value;
  const filterClass=document.getElementById('filterClass').value;
  const filterSockets=document.getElementById('filterSockets').value;
  const lvlMin=parseInt(document.getElementById('lvlMin').value)||1;
  const lvlMax=parseInt(document.getElementById('lvlMax').value)||99;

  let results=RUNEWORDS.filter(rw=>{
    // Type filter
    if(filterType && !rw.types.includes(filterType)) return false;
    // Class filter
    if(filterClass && !rw.classes.includes(filterClass) && !rw.classes.includes('전체')) return false;
    // Socket filter
    if(filterSockets && rw.sockets!==parseInt(filterSockets)) return false;
    // Level filter
    if(rw.lvl<lvlMin || rw.lvl>lvlMax) return false;
    // Rune sequence filter
    if(selectedRunes.length>0){
      const rwRuneIds=rw.runes.map(name=>RUNES.find(r=>r.name===name)?.id);
      // Check if selected runes match the start of the runeword sequence
      // Or if the runeword contains all selected runes in order
      if(selectedRunes.length<=rwRuneIds.length){
        // Check subsequence match
        let ri=0;
        for(let wi=0;wi<rwRuneIds.length&&ri<selectedRunes.length;wi++){
          if(rwRuneIds[wi]===selectedRunes[ri]) ri++;
        }
        if(ri<selectedRunes.length) return false;
      } else return false;
    }
    return true;
  });

  // Sort by level
  results.sort((a,b)=>a.lvl-b.lvl);

  const list=document.getElementById('rwList');
  document.getElementById('resultsCount').textContent=`${results.length}개`;

  if(results.length===0){
    list.innerHTML='<div class="no-results">조건에 맞는 룬워드가 없습니다</div>';
    return;
  }

  list.innerHTML=results.map(rw=>{
    const id=rw.name.replace(/[^a-zA-Z]/g,'');
    const isOpen=openCards.has(id);
    return `<div class="rw-card ${isOpen?'open':''}" id="card-${id}">
      <div class="rw-head" onclick="toggleCard('${id}')">
        <div><span class="rw-name">${rw.kr}</span><span class="rw-name-en">${rw.name}</span><span class="rw-sockets">(${rw.sockets}소켓)</span></div>
        <div class="rw-meta">
          <span class="rw-lvl">Lv ${rw.lvl}</span>
          <span class="rw-type">${rw.types.join('/')}</span>
          <span class="arrow">▶</span>
        </div>
      </div>
      <div class="rw-body">
        <div class="rw-runes">${rw.runes.map((name,i)=>{
          const r=RUNES.find(x=>x.name===name);
          return `<div class="rw-rune"><span class="order">${i+1}</span><span class="num">${r?r.id:'?'}</span><span class="name">${name} (${r?r.kr:'?'})</span></div>`;
        }).join('')}</div>
        <div class="rw-classes">${rw.classes.map(c=>`<span class="rw-class-tag">${c}</span>`).join('')}</div>
        <ul class="rw-props">${rw.props.map(p=>`<li>${p}</li>`).join('')}</ul>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id){
  if(openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  const card=document.getElementById('card-'+id);
  if(card) card.classList.toggle('open');
}

init();
</script>
