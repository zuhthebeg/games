    <style>
        :root {
            --primary: #ec4899;
            --secondary: #8b5cf6;
            --accent: #f59e0b;
            --bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --card-hover: #252540;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #2a2a4a;
            --gold: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 1.1rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px 12px;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .auth-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            min-width: 0;
        }

        .gold-display {
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .auth-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 14px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .auth-btn:hover { background: rgba(255,255,255,0.3); }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 1rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .tab:hover { border-color: var(--primary); color: var(--text); }
        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            background: var(--card-hover);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 8px;
            object-fit: contain;
            filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.35));
            animation: logoFloat 3.2s ease-in-out infinite;
            will-change: transform;
        }
        .card:hover .card-icon { animation-duration: 1.6s; }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-7px) rotate(4deg); }
        }
        @media (prefers-reduced-motion: reduce) {
            .card-icon { animation: none; }
        }

        .card-title {
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .card-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: 600;
        }

        .badge-new { background: var(--primary); }
        .badge-hot { background: var(--accent); }

        /* 호버 시 게임플레이 프리뷰 영상 (video 필드 있는 앱만, 데스크톱 전용) */
        .card-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }
        .card.video-playing .card-video { opacity: 1; }
        .card.video-playing .card-title,
        .card.video-playing .card-badge {
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 6px rgba(0,0,0,0.9);
        }
        .card.video-playing .card-icon, .card.video-playing .card-desc { visibility: hidden; }

        .card-desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .footer a { color: var(--primary); text-decoration: none; }

        .empty { 
            text-align: center; 
            padding: 3rem; 
            color: var(--text-secondary); 
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV8KQGJF" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <header class="header">
        <h1>🎮 Game Portal</h1>
        <div class="auth-area">
            <div class="gold-display" id="goldDisplay" style="display:none;">💰 <span id="goldAmt">0</span></div>
            <button class="auth-btn" id="langBtn" onclick="toggleLang()" title="언어 / 語言">🌐 繁中</button>
            <button class="auth-btn" id="authBtn" onclick="handleAuth()">로그인</button>
        </div>
    </header>

    <div class="tabs">
        <button class="tab active" data-filter="all">전체</button>
        <button class="tab" data-filter="hot">🔥 인기</button>
        <button class="tab" data-filter="new">🆕 신규</button>
        <button class="tab" data-filter="multi">👥 멀티</button>
        <button class="tab" data-filter="board">♟️ 보드</button>
        <button class="tab" data-filter="card">🃏 카드</button>
        <button class="tab" data-filter="puzzle">🧩 퍼즐</button>
        <button class="tab" data-filter="arcade">🕹️ 아케이드</button>
        <button class="tab" data-filter="tool">🛠️ 도구</button>
    </div>

    <div class="container">
        <div class="grid" id="appGrid"></div>
        <div class="empty" id="emptyState" style="display:none;">표시할 게임이 없습니다</div>
    </div>

    <footer class="footer">
        <p>© 2025 <a href="https://cocy.io">COCY.IO</a> | <a href="https://tool.cocy.io">🔧 Tools</a></p>
    </footer>

    <script>
        let apps = [];
        let currentFilter = 'all';
        let currentUser = null;

        // ── i18n (한국어 / 繁體中文 / English) ──
        let LANG = (function(){ try{ const s=localStorage.getItem('portal_lang'); if(s) return s; }catch(_){}
            const l=(navigator.language||'').toLowerCase();
            if(l.startsWith('zh')) return 'zh-TW';
            if(l.startsWith('ko')) return 'ko';
            return 'en'; })();
        const PORTAL_I18N = {
            ko: { login:'로그인', logout:'로그아웃', logoutConfirm:'로그아웃 하시겠습니까?', empty:'표시할 게임이 없습니다',
                  langBtn:'🌐 繁中', tabs:{ all:'전체', hot:'🔥 인기', new:'🆕 신규', multi:'👥 멀티', board:'♟️ 보드', card:'🃏 카드', puzzle:'🧩 퍼즐', arcade:'🕹️ 아케이드', tool:'🛠️ 도구' } },
            'zh-TW': { login:'登入', logout:'登出', logoutConfirm:'確定要登出嗎？', empty:'沒有可顯示的遊戲',
                  langBtn:'🌐 EN', tabs:{ all:'全部', hot:'🔥 熱門', new:'🆕 新作', multi:'👥 多人', board:'♟️ 棋盤', card:'🃏 紙牌', puzzle:'🧩 益智', arcade:'🕹️ 街機', tool:'🛠️ 工具' } },
            en: { login:'Log in', logout:'Log out', logoutConfirm:'Log out?', empty:'No games to show',
                  langBtn:'🌐 한국어', tabs:{ all:'All', hot:'🔥 Hot', new:'🆕 New', multi:'👥 Multi', board:'♟️ Board', card:'🃏 Card', puzzle:'🧩 Puzzle', arcade:'🕹️ Arcade', tool:'🛠️ Tools' } }
        };
        function tt(k){ return (PORTAL_I18N[LANG]||PORTAL_I18N.ko)[k]; }
        // 게임 카드 번체중국어 번역(gameId 기준). 없으면 apps.json 한국어 폴백.
        const GAME_TW = {
            match3:{title:'啵啵消',desc:'消消樂式 Match-3！60秒限時·連擊爆發·金幣獎勵·排行榜，支援 한국어/繁體中文/English'},
            sudoku:{title:'數獨',desc:'數獨 (Sudoku) - 簡單·普通·困難，金幣獎勵·排行榜，支援 한국어/繁體中文/English'},
            worldcup:{title:'2026 世界盃韓國代表隊',desc:'A組(墨西哥·南非·捷克)賽程·KST時間·晉級16強情境計算機。孫興慜·洪明甫教練。'},
            mahjong:{title:'台灣麻將',desc:'台灣麻將 - 16張手牌，4人遊戲，台 ×10萬G獎勵'},
            gostop:{title:'韓國花牌 (Go-Stop)',desc:'花牌雙人對戰 - 光·帶·十·皮·五鳥·Go-Stop·皮霸，電腦對戰'},
            blackjack:{title:'21點',desc:'與莊家1:1對戰21點！金幣下注，3:2賠率，連勝獎勵'},
            'd2r-runewords':{title:'D2R 符文之語組合器',desc:'選擇符文順序 → 搜尋符文之語。裝備/職業/等級篩選'},
            jokerrun:{title:'小丑跑',desc:'撲克 Roguelike！組合牌型，用小丑讓分數爆發'},
            enhance:{title:'武器強化 & 對戰',desc:'暗黑風格等級系統！強化武器對戰賺金幣'},
            pingtan:{title:'拼蛋',desc:'3-4人策略桌遊 - 資源、建設、交易'},
            ppingpae:{title:'拼牌',desc:'理牌桌遊 - 順子/刻子/鬼牌運用'},
            connect4:{title:'三人四子棋',desc:'3人即時四子棋對決'},
            gomoku:{title:'五子棋',desc:'即時1:1五子棋對決'},
            tileslider:{title:'滑動拼圖',desc:'滑動數字/圖片拼圖'},
            blockpuzzle:{title:'方塊拼圖',desc:'方塊組合拼圖'},
            pikmin:{title:'皮克敏追蹤器',desc:'皮克敏收集管理'},
            snake:{title:'🐍 貪食蛇',desc:'每顆食物 +100G！登入累積金幣'},
            minesweeper:{title:'💣 踩地雷',desc:'各難度金幣獎勵！通關獎金 + 時間獎金'},
            breakout:{title:'打磚塊',desc:'經典打磚塊遊戲'},
            billiards3d:{title:'3D 三顆星撞球',desc:'3D 三顆星撞球 - 撞點·厚度·英式旋轉物理、鑽石系統'},
            d2r:{title:'D2R 攻略 (Diablo 2)',desc:'暗黑破壞神2 重製版 升級攻略 & 死靈法師build'},
            linerush:{title:'圈地衝刺 / Line Rush',desc:'畫線圈地、解放背景的觸控街機'},
            ladder:{title:'抽籤梯子',desc:'鬼腳圖抽籤遊戲'},
            blockblast:{title:'方塊爆破 Block Blast',desc:'8x8 方塊拼圖！連擊爆破'}
        };
        // 게임 카드 영어 번역(gameId 기준). 없으면 apps.json 한국어 폴백.
        const GAME_EN = {
            match3:{title:'Pop Match',desc:'Anipang-style Match-3! 60-sec timer, combo blasts, gold rewards, ranking'},
            sudoku:{title:'Sudoku',desc:'Sudoku - Easy/Normal/Hard, gold rewards & ranking'},
            worldcup:{title:'2026 World Cup: Team Korea',desc:'Group A (Mexico·South Africa·Czechia) schedule, KST times, Round-of-16 scenario calculator. Son Heung-min · coach Hong Myung-bo.'},
            mahjong:{title:'Taiwanese Mahjong',desc:'Taiwanese Mahjong - 16-tile hands, 4 players, tai ×100,000G rewards'},
            gostop:{title:'Go-Stop (Hwatu)',desc:'2-player Hwatu Go-Stop - gwang·tti·kkeut·pi·godori·go-stop·pibak, vs CPU'},
            blackjack:{title:'Blackjack',desc:'1:1 Blackjack vs the dealer! Gold betting, 3:2 payout, win-streak bonus'},
            'd2r-runewords':{title:'D2R Runeword Builder',desc:'Pick rune order → search runewords. Filter by gear/class/level'},
            jokerrun:{title:'Joker Run',desc:'Poker roguelike! Build hands and blow up your score with jokers'},
            enhance:{title:'Weapon Enhance & Battle',desc:'Diablo-style tier system! Enhance weapons, battle, and earn gold'},
            pingtan:{title:'Pingtan',desc:'3-4 player strategy board game - resources, building, trading'},
            ppingpae:{title:'Ppingpae',desc:'Tile-melding board game - runs/groups/joker play'},
            connect4:{title:'3-Player Connect Four',desc:'Real-time 3-player Connect Four'},
            gomoku:{title:'Gomoku',desc:'Real-time 1:1 Gomoku (Five in a Row)'},
            tileslider:{title:'Tile Slider',desc:'Sliding number/image puzzle'},
            blockpuzzle:{title:'Block Puzzle',desc:'Block-combining puzzle'},
            pikmin:{title:'Pikmin Tracker',desc:'Pikmin collection manager'},
            snake:{title:'🐍 Snake',desc:'+100G per food! Log in to stack up gold'},
            minesweeper:{title:'💣 Minesweeper',desc:'Gold rewards by difficulty! Clear bonus + time bonus'},
            breakout:{title:'Breakout',desc:'Classic brick-breaker game'},
            billiards3d:{title:'3D Billiards · 3-Cushion',desc:'3D three-cushion billiards - tip/thickness/English spin physics, Five-and-Half diamond system, stun/follow strokes'},
            d2r:{title:'D2R Guide (Diablo 2)',desc:'Diablo 2 Resurrected leveling guide & Necromancer builds'},
            linerush:{title:'Line Rush',desc:'Draw lines to claim territory and reveal the background - touch arcade'},
            ladder:{title:'Ladder Game',desc:'Ghost-leg ladder lottery game'},
            blockblast:{title:'Block Blast',desc:'8x8 block puzzle! Chain combos to blast them away'}
        };
        function appText(app){
            const gid=getGameId(app.url);
            if(LANG==='zh-TW'){ const tw=GAME_TW[gid]; if(tw) return tw; }
            if(LANG==='en'){ const en=GAME_EN[gid]; if(en) return en; }
            return { title:app.title, desc:app.desc };
        }
        function applyLang(){
            document.documentElement.lang = (LANG==='zh-TW') ? 'zh-Hant' : (LANG==='en' ? 'en' : 'ko');
            document.querySelectorAll('.tab').forEach(tab=>{ const lbl=tt('tabs')[tab.dataset.filter]; if(lbl) tab.textContent=lbl; });
            const empty=document.getElementById('emptyState'); if(empty) empty.textContent=tt('empty');
            const lb=document.getElementById('langBtn'); if(lb) lb.textContent=tt('langBtn');
            if(typeof updateAuthUI==='function') updateAuthUI();
            renderApps();
        }
        function toggleLang(){ const order=['ko','zh-TW','en']; LANG = order[(order.indexOf(LANG)+1+order.length)%order.length] || 'ko'; try{ localStorage.setItem('portal_lang',LANG); }catch(_){}; applyLang(); }

        // 카테고리 매핑 (URL 기반)
        const categories = {
            multi: ['pingtan', 'blackjack', 'connect4', 'gomoku', 'gostop', 'mahjong', 'ppingpae'],
            board: ['pingtan', 'connect4', 'gomoku', 'ppingpae'],
            card: ['blackjack', 'jokerrun', 'gostop', 'mahjong'],
            puzzle: ['match3', 'sudoku', 'tileslider', 'blockpuzzle', 'minesweeper', 'blockblast'],
            arcade: ['snake', 'breakout', 'billiards3d', 'enhance', 'linerush', 'ladder', 'worldcup'],
            tool: ['d2r', 'd2r-runewords', 'pikmin']
        };

        function getGameId(url) {
            const match = url.match(/game\.cocy\.io\/([^\/]+)/);
            return match ? match[1] : '';
        }

        function matchCategory(app, filter) {
            if (filter === 'all') return true;
            if (filter === 'hot') return app.badge === 'HOT';
            if (filter === 'new') return app.badge === 'NEW';
            const gameId = getGameId(app.url);
            return categories[filter]?.includes(gameId) || false;
        }

        fetch('apps.json?' + Date.now())
            .then(r => r.json())
            .then(data => {
                apps = data;
                renderApps();
            });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderApps();
            });
        });

        applyLang();  // 초기 언어 적용(탭/버튼/빈상태 라벨)

        function renderApps() {
            const grid = document.getElementById('appGrid');
            const empty = document.getElementById('emptyState');
            
            const filtered = apps.filter(app => matchCategory(app, currentFilter));

            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            grid.innerHTML = filtered.map((app, i) => {
                const txt = appText(app);
                const delay = (-(i * 0.37) % 3.2).toFixed(2);
                return `
                <a href="${app.url}" class="card">
                    ${app.video ? `<video class="card-video" src="${app.video}" muted loop playsinline preload="none"></video>` : ''}
                    ${app.badge ? `<span class="card-badge badge-${app.badge.toLowerCase()}">${app.badge}</span>` : ''}
                    <img class="card-icon" style="animation-delay:${delay}s" src="${app.icon}" alt="" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🎮</text></svg>'">
                    <div class="card-title">${txt.title}</div>
                    <div class="card-desc">${txt.desc}</div>
                </a>`;
            }).join('');
            bindVideoPreviews(grid);
        }

        // 호버 프리뷰: hover 가능한 기기에서만, 마우스 올리면 재생/벗어나면 리셋
        function bindVideoPreviews(grid) {
            if (!window.matchMedia('(hover: hover)').matches) return;
            grid.querySelectorAll('.card').forEach(card => {
                const v = card.querySelector('.card-video');
                if (!v) return;
                card.addEventListener('mouseenter', () => {
                    card.classList.add('video-playing');
                    const p = v.play();
                    if (p && p.catch) p.catch(() => card.classList.remove('video-playing'));
                });
                card.addEventListener('mouseleave', () => {
                    card.classList.remove('video-playing');
                    v.pause();
                    v.currentTime = 0;
                });
            });
        }

        // SharedWallet 연동 인증
        async function initAuth() {
            await SharedWallet.init({ showUI: false });
            updateAuthUI();
            SharedWallet._listeners.push(() => updateAuthUI());
        }
        
        function updateAuthUI() {
            const btn = document.getElementById('authBtn');
            const gd = document.getElementById('goldDisplay');
            if (SharedWallet.isLoggedIn && SharedWallet.user) {
                currentUser = { name: SharedWallet.user.nickname };
                btn.textContent = SharedWallet.user.nickname;
                if (gd) { gd.style.display = 'flex'; document.getElementById('goldAmt').textContent = Number(SharedWallet.gold || 0).toLocaleString() + 'G'; }
            } else {
                currentUser = null;
                btn.textContent = tt('login');
                if (gd) gd.style.display = 'none';
            }
        }

        function handleAuth() {
            if (SharedWallet.isLoggedIn) {
                if (confirm(tt('logoutConfirm'))) {
                    SharedWallet.logout();
                    location.reload();
                }
            } else {
                SharedWallet.showLogin();
            }
        }

        initAuth();
    </script>
    <script src="/lib/site-meta.js"></script>
    <script>
      SiteMeta.init({
        title: 'Game Portal - game.cocy.io',
        description: '브라우저에서 바로 즐기는 게임 포털',
        url: 'https://game.cocy.io/'
      });
    </script>
</body>
</html>
