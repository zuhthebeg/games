<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Beat Drop — AI K-pop Rhythm Game</title>
<meta name="description" content="AI가 만든 케이팝 20곡으로 즐기는 리듬게임. AI-generated K-pop rhythm game with 20 original tracks.">
<script src="/lib/shared-wallet.js?v=20260705b2a"></script>
<script src="/lib/game-rankings.js?v=20260712bd"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root { --wallet-bar-h:56px; --top:calc(var(--wallet-bar-h) + env(safe-area-inset-top)); }
  html, body { height:100%; overflow:hidden; background:#0a0a1a; color:#eee;
    font-family:'Segoe UI', system-ui, sans-serif; touch-action:none; }
  body { padding-top:var(--top); }
  #wrap { position:relative; height:100%; max-width:520px; margin:0 auto; }
  canvas { display:block; width:100%; height:100%; }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column;
    background:linear-gradient(180deg,#0d0d24 0%,#0a0a1a 55%,#11091f 100%);
    z-index:10; padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    overflow:hidden; }
  .overlay.hidden { display:none; }
  h1 { font-size:26px; letter-spacing:1px;
    background:linear-gradient(90deg,#ff5fa2,#7f7fff,#5fd4ff);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { color:#8888aa; font-size:12.5px; line-height:1.5; }

  /* ── 로비 ── */
  #lobbyHead { display:flex; align-items:center; justify-content:space-between; padding:2px 2px 8px; }
  .hbtn { background:#1a1a38; border:1px solid #2e2e5a; border-radius:20px;
    color:#aab; font-size:13px; padding:7px 12px; cursor:pointer; font-weight:700; }
  #diffs { display:flex; gap:6px; padding:10px 0 12px; }
  #diffs button { flex:1; padding:10px 4px; font-size:13px; font-weight:800; border:none;
    border-radius:10px; background:#191936; color:#9a9ac0; cursor:pointer; }
  #diffs button small { display:block; font-weight:500; font-size:10px; opacity:.75; }
  #diffs button.on { background:linear-gradient(90deg,#ff5fa2,#7f7fff); color:#fff; }
  #songList { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    display:flex; flex-direction:column; gap:8px; padding:2px 2px 8px;
    touch-action:pan-y; overscroll-behavior:contain; }
  .song { display:flex; align-items:center; gap:12px; padding:11px 12px;
    background:#14142e; border:1px solid #23234a; border-radius:14px; cursor:pointer;
    transition:transform .08s; }
  .song:active { transform:scale(.98); }
  .song .emo { width:44px; height:44px; border-radius:11px; display:flex; align-items:center;
    justify-content:center; font-size:23px; background:#1d1d40; flex-shrink:0; }
  .song .info { flex:1; min-width:0; }
  .song .name { font-weight:800; font-size:15px; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; }
  .song .meta { font-size:11px; color:#7d7da5; margin-top:2px; }
  .song .badge { flex-shrink:0; min-width:38px; text-align:center; font-weight:900;
    font-size:16px; padding:5px 7px; border-radius:9px; background:#1d1d40; color:#5fd4ff; }
  .song .badge.none { color:#44446a; font-weight:600; font-size:12px; }
  .song.soon { opacity:.42; }
  .song.soon .badge { font-size:10.5px; color:#8a8ab0; font-weight:700; }
  .hint { color:#66668f; font-size:11px; text-align:center; padding-top:8px; line-height:1.5; }

  /* ── 게임 HUD ── */
  #hud { position:absolute; top:0; left:0; right:0; display:flex;
    justify-content:space-between; padding:10px 14px; font-weight:700;
    font-size:14px; z-index:5; pointer-events:none; text-shadow:0 1px 4px #000; }
  #judge { position:absolute; top:38%; left:0; right:0; text-align:center;
    font-size:30px; font-weight:900; z-index:5; pointer-events:none;
    opacity:0; transition:opacity .1s; text-shadow:0 2px 10px #000; }
  #judge.hit { animation:jpop .16s ease-out; }
  @keyframes jpop { 0%{transform:scale(1.55)} 60%{transform:scale(.94)} 100%{transform:scale(1)} }
  #combo { position:absolute; top:28%; left:0; right:0; text-align:center;
    font-size:20px; font-weight:700; color:#ffd75f; z-index:5; pointer-events:none;
    text-shadow:0 1px 6px #000; }
  #combo.pop { animation:cpop .18s ease-out; }
  @keyframes cpop { 0%{transform:scale(1.45)} 100%{transform:scale(1)} }
  #count { position:absolute; top:32%; left:0; right:0; text-align:center;
    font-size:64px; font-weight:900; z-index:6; pointer-events:none;
    text-shadow:0 3px 16px #000; color:#fff; }
  #count.go { background:linear-gradient(90deg,#ff5fa2,#7f7fff,#5fd4ff);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  #pauseBtn { position:absolute; top:8px; right:10px; z-index:7; display:none;
    background:rgba(20,20,46,.72); border:1px solid #2e2e5a; color:#eee;
    border-radius:10px; padding:6px 13px; font-size:16px; cursor:pointer; }
  #pause { align-items:center; justify-content:center; gap:16px; text-align:center;
    background:rgba(10,10,26,.9); }
  /* ── 설정 ── */
  #settings { align-items:center; justify-content:center; gap:14px; }
  .srow { display:flex; align-items:center; justify-content:space-between; gap:14px;
    width:100%; max-width:340px; background:#14142e; border:1px solid #23234a;
    border-radius:12px; padding:12px 14px; font-size:14px; font-weight:700; }
  .srow .sctl { display:flex; align-items:center; gap:8px; }
  .tgl { min-width:64px; padding:8px 0; border:none; border-radius:9px; font-weight:800;
    background:#22224a; color:#777aa0; cursor:pointer; font-size:13px; }
  .tgl.on { background:linear-gradient(90deg,#ff5fa2,#7f7fff); color:#fff; }
  .srow input[type=range] { width:130px; accent-color:#7f7fff; }
  .sval { min-width:52px; text-align:right; color:#5fd4ff; font-size:13px; }
  .sbtn { padding:8px 14px; border:none; border-radius:9px; background:#22224a;
    color:#eee; font-weight:700; font-size:13px; cursor:pointer; }
  #calib { align-items:center; justify-content:center; gap:18px; text-align:center;
    background:rgba(10,10,26,.96); }
  #calibCount { font-size:48px; font-weight:900; color:#5fd4ff; }

  /* ── 결과 ── */
  #result { align-items:center; justify-content:center; gap:16px; text-align:center; }
  #result h1 { font-size:44px; }
  #rSong { color:#9a9ac0; font-size:14px; font-weight:700; }
  #rNew { color:#ffd75f; font-weight:900; font-size:15px; }
  #rGold { color:#ffd75f; font-size:14px; font-weight:700; }
  .stat { font-size:15px; line-height:2; }
  .stat b { color:#5fd4ff; }
  .btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .btns button { padding:14px 26px; font-size:16px; border:none; border-radius:12px;
    background:#22224a; color:#eee; cursor:pointer; font-weight:700; }
  .btns button.primary { background:linear-gradient(90deg,#ff5fa2,#7f7fff); }
  .btns button:active { transform:scale(.96); }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="hud"><span id="score">0</span><span id="acc"></span></div>
  <div id="combo"></div>
  <div id="judge"></div>
  <div id="count"></div>
  <button id="pauseBtn">⏸</button>

  <div class="overlay" id="lobby">
    <div id="lobbyHead">
      <h1>BEAT DROP</h1>
      <div style="display:flex;gap:6px">
        <button id="rankBtn" class="hbtn">🏆</button>
        <button id="setBtn" class="hbtn">⚙️</button>
        <button id="langBtn" class="hbtn">🌐 한국어</button>
      </div>
    </div>
    <div class="sub" data-i18n="tagline"></div>
    <div id="diffs">
      <button data-lv="easy">EASY</button>
      <button data-lv="normal" class="on">NORMAL</button>
      <button data-lv="hard">HARD</button>
      <button data-lv="expert">EXPERT<small data-i18n="sixkeys"></small></button>
    </div>
    <div id="songList"></div>
    <div class="hint"><span data-i18n="hint"></span><br>PC · 4K: D F J K / 6K: S D F J K L</div>
  </div>

  <div class="overlay hidden" id="settings">
    <h1 data-i18n="settings">설정</h1>
    <div class="srow"><span data-i18n="vib">진동</span>
      <div class="sctl"><button class="tgl" id="tglVib">ON</button></div></div>
    <div class="srow"><span data-i18n="hitSound">히트음</span>
      <div class="sctl"><button class="tgl" id="tglSfx">ON</button></div></div>
    <div class="srow"><span data-i18n="speed">노트 속도</span>
      <div class="sctl"><input type="range" id="rngSpeed" min="0.9" max="2.4" step="0.1">
      <span class="sval" id="valSpeed"></span></div></div>
    <div class="srow"><span data-i18n="offset">판정 오프셋</span>
      <div class="sctl"><input type="range" id="rngOffset" min="-150" max="150" step="5">
      <span class="sval" id="valOffset"></span></div></div>
    <div class="srow"><span data-i18n="calibrate">자동 보정</span>
      <div class="sctl"><button class="sbtn" id="btnCalib">🎯 GO</button></div></div>
    <div class="btns">
      <button id="btnSetReset" data-i18n="reset">↺ 기본값</button>
      <button class="primary" id="btnSetClose" data-i18n="close">닫기</button>
    </div>
  </div>

  <div class="overlay hidden" id="calib">
    <h1 data-i18n="calibrate">자동 보정</h1>
    <div class="sub" data-i18n="calibDesc">비트에 맞춰 화면을 탭하세요</div>
    <div id="calibCount">8</div>
    <div class="btns" id="calibBtns">
      <button class="primary" id="btnCalibStart" data-i18n="start">▶ 시작</button>
      <button id="btnCalibClose" data-i18n="close">닫기</button>
    </div>
  </div>

  <div class="overlay hidden" id="pause">
    <h1 data-i18n="paused">일시정지</h1>
    <div class="btns">
      <button class="primary" id="btnResume" data-i18n="resume">▶ 계속</button>
      <button id="btnPRetry" data-i18n="retry">🔄 다시하기</button>
      <button id="btnPLobby" data-i18n="lobby">🏠 로비로</button>
    </div>
  </div>

  <div class="overlay hidden" id="result">
    <div id="rSong"></div>
    <h1 id="rGrade">A</h1>
    <div id="rNew"></div>
    <div class="stat" id="rStats"></div>
    <div id="rGold"></div>
    <div class="btns">
      <button class="primary" id="btnRetry" data-i18n="retry">🔄 다시하기</button>
      <button id="btnLobby" data-i18n="lobby">🏠 로비로</button>
    </div>
  </div>
</div>

<script>
/* ════ i18n ════ */
const I18N = {
  ko: { tagline:'AI가 만든 케이팝 20곡 리듬게임 — 곡을 탭하면 시작!',
    sixkeys:'6키', hint:'긴 노트는 꾹 눌러서 유지 · 난이도를 고르고 곡을 탭',
    retry:'🔄 다시하기', lobby:'🏠 로비로', soon:'준비중', newBest:'🏆 신기록!',
    gold:'골드', langName:'한국어', paused:'일시정지', resume:'▶ 계속',
    start:'▶ 시작', reset:'↺ 기본값',
    settings:'설정', vib:'진동', hitSound:'히트음', speed:'노트 속도',
    offset:'판정 오프셋', calibrate:'자동 보정', close:'닫기',
    calibDesc:'비트에 맞춰 화면을 탭하세요 (8회)' },
  en: { tagline:'AI-generated K-pop rhythm game, 20 tracks — tap a song to play!',
    sixkeys:'6 keys', hint:'Hold long notes · pick a difficulty, tap a song',
    retry:'🔄 Retry', lobby:'🏠 Lobby', soon:'Soon', newBest:'🏆 NEW BEST!',
    gold:'Gold', langName:'English', paused:'PAUSED', resume:'▶ Resume',
    start:'▶ Start', reset:'↺ Defaults',
    settings:'Settings', vib:'Vibration', hitSound:'Hit sound', speed:'Note speed',
    offset:'Judge offset', calibrate:'Auto calibrate', close:'Close',
    calibDesc:'Tap the screen on each beat (8 taps)' },
  'zh-TW': { tagline:'AI 打造的 K-POP 節奏遊戲，共 20 首 — 點擊歌曲開始！',
    sixkeys:'6鍵', hint:'長按長音符 · 選擇難度後點擊歌曲',
    retry:'🔄 再來一次', lobby:'🏠 返回大廳', soon:'即將推出', newBest:'🏆 新紀錄！',
    gold:'金幣', langName:'繁體中文', paused:'暫停', resume:'▶ 繼續',
    start:'▶ 開始', reset:'↺ 預設值',
    settings:'設定', vib:'震動', hitSound:'打擊音', speed:'音符速度',
    offset:'判定偏移', calibrate:'自動校正', close:'關閉',
    calibDesc:'跟著節拍點擊螢幕（8次）' },
  ja: { tagline:'AIが作ったK-POPリズムゲーム全20曲 — 曲をタップしてスタート！',
    sixkeys:'6キー', hint:'ロングノーツは長押し · 難易度を選んで曲をタップ',
    retry:'🔄 もう一度', lobby:'🏠 ロビーへ', soon:'準備中', newBest:'🏆 新記録！',
    gold:'ゴールド', langName:'日本語', paused:'一時停止', resume:'▶ 再開',
    start:'▶ スタート', reset:'↺ デフォルト',
    settings:'設定', vib:'バイブ', hitSound:'ヒット音', speed:'ノーツ速度',
    offset:'判定オフセット', calibrate:'自動調整', close:'閉じる',
    calibDesc:'ビートに合わせて画面をタップ（8回）' },
};
const LANGS = ['ko','en','zh-TW','ja'];
let lang = localStorage.getItem('rp_lang');
if (!LANGS.includes(lang)) {
  const nav = (navigator.language||'en').toLowerCase();
  lang = nav.startsWith('ko')?'ko' : nav.startsWith('ja')?'ja'
    : (nav==='zh-tw'||nav==='zh-hant'||nav.startsWith('zh'))?'zh-TW' : 'en';
}
function t(k){ return (I18N[lang]&&I18N[lang][k]) || I18N.en[k] || k; }
function applyI18n(){
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent = t(el.dataset.i18n); });
  document.getElementById('langBtn').textContent = '🌐 ' + t('langName');
  renderSongs();
}
document.getElementById('langBtn').onclick = ()=>{
  lang = LANGS[(LANGS.indexOf(lang)+1)%LANGS.length];
  localStorage.setItem('rp_lang', lang);
  applyI18n();
};
document.getElementById('rankBtn').onclick = ()=>{
  if(typeof GameRankings!=='undefined') GameRankings.showModal('beatdrop');
};

/* ════ 설정 모달 ════ */
function syncSettingsUI(){
  document.getElementById('tglVib').classList.toggle('on', settings.vib);
  document.getElementById('tglVib').textContent = settings.vib?'ON':'OFF';
  document.getElementById('tglSfx').classList.toggle('on', settings.sfx);
  document.getElementById('tglSfx').textContent = settings.sfx?'ON':'OFF';
  document.getElementById('rngSpeed').value = settings.speed;
  document.getElementById('valSpeed').textContent = settings.speed.toFixed(1)+'s';
  document.getElementById('rngOffset').value = settings.offset;
  document.getElementById('valOffset').textContent = (settings.offset>0?'+':'')+settings.offset+'ms';
}
document.getElementById('setBtn').onclick = ()=>{
  syncSettingsUI();
  document.getElementById('settings').classList.remove('hidden');
};
document.getElementById('btnSetClose').onclick = ()=>{
  document.getElementById('settings').classList.add('hidden');
};
document.getElementById('tglVib').onclick = ()=>{
  settings.vib=!settings.vib; saveSettings(); syncSettingsUI();
  if(settings.vib) buzz(20);
};
document.getElementById('tglSfx').onclick = ()=>{
  settings.sfx=!settings.sfx; saveSettings(); syncSettingsUI();
  if(settings.sfx) sfx('perfect');
};
document.getElementById('rngSpeed').oninput = e=>{
  settings.speed=parseFloat(e.target.value); saveSettings(); syncSettingsUI();
};
document.getElementById('rngOffset').oninput = e=>{
  settings.offset=parseInt(e.target.value); saveSettings(); syncSettingsUI();
};

/* 기본값 복원 */
document.getElementById('btnSetReset').onclick = ()=>{
  settings.vib=true; settings.sfx=true; settings.speed=1.8; settings.offset=0;
  saveSettings(); syncSettingsUI(); buzz(15);
};

/* 자동 보정: [시작] 누르면 메트로놈 8틱 → 탭 중앙값으로 오프셋 */
const calibEl=document.getElementById('calib');
const calibBackToSettings=()=>{
  calibEl.classList.add('hidden');
  syncSettingsUI();
  document.getElementById('settings').classList.remove('hidden');
};
document.getElementById('btnCalib').onclick = ()=>{
  document.getElementById('settings').classList.add('hidden');
  document.getElementById('calibCount').textContent='8';
  document.getElementById('calibBtns').style.display='flex';
  calibEl.classList.remove('hidden');
};
document.getElementById('btnCalibClose').onclick = calibBackToSettings;
document.getElementById('btnCalibStart').onclick = (e)=>{
  e.stopPropagation();
  document.getElementById('calibBtns').style.display='none';
  const c=ac();
  const cnt=document.getElementById('calibCount');
  const INTERVAL=0.6, N=8, t0=c.currentTime+1.2;
  const ticks=[];
  for(let i=0;i<N;i++){ const tt=t0+i*INTERVAL; ticks.push(tt); tone(1200,0.05,0.25,'square',tt); }
  const deltas=[];
  cnt.textContent=N;
  const onTap=()=>{
    const tp=c.currentTime;
    let best=null, bd=9;
    for(const tt of ticks){ const d=tp-tt; if(Math.abs(d)<Math.abs(bd)){ bd=d; best=tt; } }
    if(best!==null && Math.abs(bd)<INTERVAL/2){ deltas.push(bd); buzz(6); }
    cnt.textContent=Math.max(0, N-deltas.length);
    if(deltas.length>=N) done();
  };
  const done=()=>{
    calibEl.removeEventListener('pointerdown', onTap);
    clearTimeout(guard);
    if(deltas.length>=4){
      deltas.sort((a,b)=>a-b);
      const med=deltas[Math.floor(deltas.length/2)];
      settings.offset=Math.max(-150, Math.min(150, Math.round(med*1000/5)*5));
      saveSettings();
    }
    calibBackToSettings();
  };
  calibEl.addEventListener('pointerdown', onTap);
  const guard=setTimeout(done, (N*INTERVAL+4)*1000); // 방치 시 자동 종료
};

/* ════ 곡 목록 ════ */
const SONGS = [
  { id:'01', title:'We Ignite',        emoji:'🔥', genre:'Dance Pop',    bpm:118 },
  { id:'02', title:'Go Harder',        emoji:'🌃', genre:'Hip-hop',      bpm:112 },
  { id:'03', title:'날아올라 Higher',   emoji:'☀️', genre:'Anime Pop',    bpm:108 },
  { id:'04', title:'Lemon Soda Kiss',  emoji:'🍋', genre:'Hyperpop',     bpm:118 },
  { id:'05', title:'다시 만난 여름',    emoji:'🌅', genre:'Retro Synth',  bpm:112 },
  { id:'06', title:'Break the Frame',  emoji:'🧱', genre:'Alt Hip-hop',  bpm:123 },
  { id:'07', title:'Skyline',          emoji:'🌌', genre:'Drum & Bass',  bpm:118 },
  { id:'08', title:'Funky Alarm',      emoji:'🪩', genre:'Funk Disco',   bpm:108 },
  { id:'09', title:'Gravity Zero',     emoji:'🚀', genre:'EDM Anthem',   bpm:123 },
  { id:'10', title:'Midnight Drive',   emoji:'🌙', genre:'City Pop',     bpm:123 },
  { id:'11', title:'Cherry Pop!',      emoji:'🍒', genre:'Bubblegum',    bpm:129 },
  { id:'12', title:'Move Like That',   emoji:'🕺', genre:'New Jack Swing', bpm:99 },
  { id:'13', title:'바람의 정원',       emoji:'🌿', genre:'Acoustic Pop', bpm:112 },
  { id:'14', title:'VENOM',            emoji:'🐍', genre:'Girl Crush',   bpm:108 },
  { id:'15', title:'청춘 로켓',         emoji:'🎸', genre:'Pop Rock',     bpm:129 },
  { id:'16', title:'Rise Again',       emoji:'🌟', genre:'Epic Anthem',  bpm:118 },
  { id:'17', title:'Crown of Thorns',  emoji:'👑', genre:'Dark R&B',     bpm:136 },
  { id:'18', title:'Fizzy Love',       emoji:'🥤', genre:'Boy Band',     bpm:118 },
  { id:'19', title:'Knockout',         emoji:'⚔️', genre:'Battle Pop',   bpm:92 },
  { id:'20', title:'Level Up',         emoji:'💎', genre:'Swagger',      bpm:108 },
];

let curLv = localStorage.getItem('rp_lv') || 'normal';
if (!['easy','normal','hard','expert'].includes(curLv)) curLv = 'normal';
const BEST_KEY = 'rp_best';
function loadBest(){ try { return JSON.parse(localStorage.getItem(BEST_KEY))||{}; } catch(e){ return {}; } }
function saveBest(b){ localStorage.setItem(BEST_KEY, JSON.stringify(b)); }

function renderSongs(){
  const best = loadBest();
  const list = document.getElementById('songList');
  list.innerHTML = '';
  for (const s of SONGS) {
    const div = document.createElement('div');
    div.className = 'song' + (s.soon?' soon':'');
    const b = best[s.id] && best[s.id][curLv];
    const badge = s.soon ? `<div class="badge">${t('soon')}</div>`
      : b ? `<div class="badge">${b.grade}</div>`
          : `<div class="badge none">—</div>`;
    div.innerHTML = `<div class="emo">${s.emoji}</div>
      <div class="info"><div class="name">${s.title}</div>
      <div class="meta">${s.genre} · ${s.bpm}bpm</div></div>${badge}`;
    if (!s.soon) div.onclick = ()=>pickSong(s);
    list.appendChild(div);
  }
}
document.querySelectorAll('#diffs button').forEach(b=>{
  b.classList.toggle('on', b.dataset.lv===curLv);
  b.onclick = ()=>{
    curLv = b.dataset.lv;
    localStorage.setItem('rp_lv', curLv);
    document.querySelectorAll('#diffs button').forEach(x=>
      x.classList.toggle('on', x===b));
    renderSongs();
  };
});

/* ════ 설정 (진동·히트음·속도·오프셋) ════ */
const settings = {
  vib: localStorage.getItem('rp_vib') !== '0',
  sfx: localStorage.getItem('rp_sfx') !== '0',
  speed: parseFloat(localStorage.getItem('rp_speed')) || 1.8,
  offset: parseInt(localStorage.getItem('rp_offset')) || 0, // ms, +면 늦게 치는 편
};
function saveSettings(){
  localStorage.setItem('rp_vib', settings.vib?'1':'0');
  localStorage.setItem('rp_sfx', settings.sfx?'1':'0');
  localStorage.setItem('rp_speed', settings.speed);
  localStorage.setItem('rp_offset', settings.offset);
}
function buzz(p){ if(settings.vib && navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }

/* Web Audio 히트음 — 파일 없이 합성 (지연 최소) */
let AC=null, noiseBuf=null;
function ac(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    noiseBuf=AC.createBuffer(1, AC.sampleRate*0.05, AC.sampleRate);
    const d=noiseBuf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  }
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function tone(freq, dur, vol, type, when){
  const c=ac(), t0=when||c.currentTime;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||'triangle'; o.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(vol,t0);
  g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
  o.connect(g); g.connect(c.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}
function noise(vol){
  const c=ac(), s=c.createBufferSource(), g=c.createGain();
  s.buffer=noiseBuf; g.gain.value=vol;
  s.connect(g); g.connect(c.destination); s.start();
}
function sfx(kind){
  if(!settings.sfx) return;
  try {
    if(kind==='perfect'){ tone(1560,0.07,0.14); tone(2340,0.05,0.05); noise(0.05); }
    else if(kind==='good'){ tone(980,0.06,0.11); noise(0.04); }
    else if(kind==='hold'){ tone(880,0.05,0.08); tone(1320,0.09,0.08); }
    else if(kind==='milestone'){ tone(1046,0.09,0.12); tone(1568,0.14,0.1); }
    else if(kind==='tick'){ tone(1200,0.05,0.2,'square'); }
  } catch(e){}
}

const chartCache = {};
let curSong = null;
function pickSong(s){
  curSong = s;
  if (chartCache[s.id]) { chart = chartCache[s.id]; loadBgs(chart); start(curLv); return; }
  fetch(`chart-${s.id}.json?v=6`).then(r=>r.json()).then(c=>{
    chartCache[s.id] = c;
    if (curSong===s) { chart = c; loadBgs(c); start(curLv); }
  });
}

/* ════ 게임 엔진 ════ */
let LANES = 4, APPROACH = 1.8; // 노트 낙하 시간(초) — EXPERT에서 6키/1.45초
const PERFECT = 0.10, GOOD = 0.19;
const LANE_COLORS = ['#ff5fa2','#ffd75f','#5fd4ff','#7f7fff','#5fff9f','#ff8f5f'];
const KEYMAPS = {
  4: { KeyD:0, KeyF:1, KeyJ:2, KeyK:3 },
  6: { KeyS:0, KeyD:1, KeyF:2, KeyJ:3, KeyK:4, KeyL:5 }
};
let KEYS = KEYMAPS[4];

let chart=null, notes=[], audio=null, playing=false;
let score=0, combo=0, maxCombo=0, counts={perfect:0,good:0,miss:0};
let endedAt=0, lastNoteT=0;     // 오디오 종료 후에도 남은 노트 판정용
const PREROLL=3;                // 곡 시작 전 카운트다운(초)
let preStart=0, audioStarted=false, audioPending=false;
let paused=false, pausedAt=0;
let cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,hitY=0;
let flashes=[];          // 레인 탭 이펙트
let particles=[];        // 타격 파티클
let rings=[];            // 타격 링
let lineGlow=0;          // 판정선 펄스
let laneHeld=[0,0,0,0];         // 레인별 눌림 카운트 (멀티터치)
const pointerLane=new Map();    // pointerId → lane

// 배경: chart.bgs가 있으면 로드, 곡 구조(sections) 경계에서 크로스페이드
let bgImgs=[], bgIdx=0, bgPrev=0, bgFade=0, bgLast=0, curSec=-1;
const BG_SWITCH=25; // sections 없을 때 폴백 주기(초)
let pops=[];        // 노트 폭발 잔상
let missFx=0;       // 미스 데새추레이션 타이머
let fever=false;    // 20콤보+ 필버스트
let beatPtr=0, lastBeatT=-9; // 비트 동기 펄스

function resize(){
  const r=cv.parentElement.getBoundingClientRect();
  cv.width=W=r.width*devicePixelRatio; cv.height=H=r.height*devicePixelRatio;
  hitY=H*0.82;
}
window.addEventListener('resize',resize); resize();

function loadBgs(c){
  bgImgs=[]; bgIdx=0; bgPrev=0; bgFade=0; bgLast=0; curSec=-1;
  if(Array.isArray(c.bgs)) c.bgs.forEach((src,i)=>{
    const im=new Image(); im.src=src+'?v=1';
    im.onload=()=>{ bgImgs[i]=im; }; // 순서 고정 (로드 완료 순서와 무관)
  });
}

let lastLv='normal';
function start(lv){
  if(!chart) return;
  lastLv=lv;
  // 라운드 상태 리셋 (로비/다시하기 재진입 대응)
  if(audio){ audio.onended=null; audio.pause(); }
  score=0; combo=0; maxCombo=0; counts={perfect:0,good:0,miss:0};
  particles=[]; rings=[]; flashes=[]; lineGlow=0;
  document.getElementById('score').textContent='0';
  document.getElementById('acc').textContent='';
  document.getElementById('combo').textContent='';
  const expert=lv==='expert';
  LANES=expert?6:4; APPROACH=expert?settings.speed*0.8:settings.speed; KEYS=KEYMAPS[LANES];
  laneHeld=new Array(LANES).fill(0);
  const cut=expert?0:chart.levels[lv];
  notes=chart.notes.filter(n=>n.s>=cut).map(n=>({
    t:n.t+0.5, lane:expert?(n.l6??n.lane):n.lane, d:n.d||0,
    hit:false, missed:false, holding:false, holdDone:false, holdBroke:false}));
  lastNoteT=notes.reduce((m,n)=>Math.max(m,n.t+n.d),0);
  endedAt=0; curSec=-1;
  pops=[]; missFx=0; fever=false; beatPtr=0; lastBeatT=-9;
  ac(); // 제스처 컨텍스트에서 오디오 컨텍스트 활성화
  audioStarted=false; audioPending=false; paused=false;
  document.getElementById('pause').classList.add('hidden');
  audio=new Audio(chart.audio+'?v=1');
  audio.preload='auto';
  // 사용자 제스처 컨텍스트에서 재생 권한 언락 (실제 재생은 카운트다운 후)
  audio.play().then(()=>{ audio.pause(); audio.currentTime=0; }).catch(()=>{});
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('pauseBtn').style.display='block';
  playing=true;
  preStart=performance.now();
  requestAnimationFrame(loop);
}

function now(){
  if(!audioStarted) return (performance.now()-preStart)/1000 - PREROLL;
  if(endedAt) return (audio.duration||0)+(performance.now()-endedAt)/1000;
  return audio.currentTime;
}

function startAudio(){
  audioPending=true;
  audio.play().then(()=>{
    audioStarted=true;
    // 곡이 끝나도 낙하 중인 마지막 노트 판정이 남아 있을 수 있어 클럭을 이어간다
    audio.onended=()=>{ endedAt=performance.now(); };
  }).catch(()=>{ exitToLobby(); }); // 재생 차단 시 로비 복귀
}

function updateCountdown(t){
  const cd=document.getElementById('count');
  if(t<0){ cd.classList.remove('go'); cd.textContent=Math.ceil(-t); }
  else if(t<0.7){ cd.classList.add('go'); cd.textContent='START!'; }
  else if(cd.textContent) cd.textContent='';
}

function setPause(on){
  if(!playing) return;
  if(on && !paused){
    paused=true; pausedAt=performance.now();
    if(audioStarted && !endedAt) audio.pause();
    document.getElementById('pause').classList.remove('hidden');
  } else if(!on && paused){
    const dt=performance.now()-pausedAt;
    if(!audioStarted) preStart+=dt;
    else if(endedAt) endedAt+=dt;
    paused=false;
    document.getElementById('pause').classList.add('hidden');
    if(audioStarted && !endedAt) audio.play();
    requestAnimationFrame(loop);
  }
}

function exitToLobby(){
  playing=false; paused=false;
  if(audio){ audio.onended=null; audio.pause(); }
  document.getElementById('pause').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('count').textContent='';
  document.getElementById('lobby').classList.remove('hidden');
  renderSongs();
}

function laneX(lane){ return (lane+0.5)*(W/LANES); }

function burst(lane, y, color, big){
  const x=laneX(lane);
  const n=big?16:9;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=(1.5+Math.random()*3.5)*(big?1.4:1)*devicePixelRatio;
    particles.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-1.2*devicePixelRatio,
      life:1, decay:0.03+Math.random()*0.03, r:(2+Math.random()*2.5)*devicePixelRatio, color});
  }
  rings.push({x, y, r:8*devicePixelRatio, life:1, color, big});
  lineGlow=1;
}

function judge(lane){
  if(!playing || paused) return;
  flashes.push({lane, at:performance.now()});
  const t=now()-settings.offset/1000;
  let best=null, bd=GOOD;
  for(const n of notes){
    if(n.hit||n.missed||n.lane!==lane) continue;
    const d=Math.abs(n.t-t);
    if(d<=bd){ bd=d; best=n; }
    if(n.t-t>GOOD) break;
  }
  if(!best) return;
  best.hit=true;
  const perfect=bd<=PERFECT;
  if(perfect){ counts.perfect++; score+=100; combo++; showJudge('PERFECT','#5fd4ff'); sfx('perfect'); buzz(8); }
  else { counts.good++; score+=60; combo++; showJudge('GOOD','#ffd75f'); sfx('good'); buzz(4); }
  burst(lane, hitY, perfect?'#aef3ff':LANE_COLORS[lane], perfect);
  pops.push({lane, at:performance.now(), color:LANE_COLORS[lane], perfect});
  if(combo>0 && combo%50===0){ sfx('milestone'); buzz([10,40,14]); }
  if(combo>=20) fever=true;
  if(best.d>0) best.holding=true;
  maxCombo=Math.max(maxCombo,combo);
  updateHud();
}

function release(lane){
  if(!playing || paused) return;
  const t=now()-settings.offset/1000;
  for(const n of notes){
    if(n.holding && !n.holdDone && n.lane===lane){
      if(n.t+n.d-t > 0.18){ // 너무 일찍 뗌 → 홀드 실패
        n.holding=false; n.holdBroke=true; combo=0; fever=false;
        showJudge('BREAK','#ff9f5f'); updateHud();
      } else {
        n.holding=false; n.holdDone=true; score+=50;
        burst(lane, hitY, LANE_COLORS[lane], false);
        sfx('hold'); buzz([6,30,6]);
        updateHud();
      }
    }
  }
}

function showJudge(txt,color){
  const j=document.getElementById('judge');
  j.textContent=txt; j.style.color=color; j.style.opacity=1;
  j.classList.remove('hit'); void j.offsetWidth; j.classList.add('hit');
  clearTimeout(j._t); j._t=setTimeout(()=>j.style.opacity=0,220);
  const c=document.getElementById('combo');
  c.textContent=combo>=5? combo+' COMBO':'';
  c.classList.remove('pop'); void c.offsetWidth; c.classList.add('pop');
}

function updateHud(){
  document.getElementById('score').textContent=score;
  const total=counts.perfect+counts.good+counts.miss;
  if(total) document.getElementById('acc').textContent=
    Math.round((counts.perfect+counts.good*0.6)/total*100)+'%';
}

function drawBg(t){
  if(!bgImgs.length){ return; }
  // 곡 구조 경계에서 전환, sections 없으면 주기 로테이션
  let want=bgIdx;
  if(Array.isArray(chart.sections) && chart.sections.length){
    let si=0;
    for(const s of chart.sections){ if(t>=s+0.5) si++; }
    if(si!==curSec){ curSec=si; want=si%bgImgs.length; }
  } else if(t-bgLast>BG_SWITCH && bgImgs.length>1){
    bgLast=t; want=(bgIdx+1)%bgImgs.length;
  }
  if(want!==bgIdx){ bgPrev=bgIdx; bgIdx=want; bgFade=1; }
  if(bgFade>0) bgFade=Math.max(0,bgFade-0.016);
  const draw=(im,alpha)=>{
    if(!im) return;
    const s=Math.max(W/im.width,H/im.height);
    ctx.globalAlpha=alpha;
    ctx.drawImage(im,(W-im.width*s)/2,(H-im.height*s)/2,im.width*s,im.height*s);
    ctx.globalAlpha=1;
  };
  draw(bgImgs[bgIdx],1);
  if(bgFade>0) draw(bgImgs[bgPrev],bgFade);
  // 노트 가독성용 다크 오버레이 — 비트에 맞춰 살짝 밝아짐
  const pulse=Math.max(0, 1-(t-lastBeatT)*5);
  ctx.fillStyle=`rgba(8,8,22,${(0.62-pulse*0.07).toFixed(3)})`;
  ctx.fillRect(0,0,W,H);
}

function loop(){
  if(!playing || paused) return;
  const t=now();
  if(!audioStarted && !audioPending && t>=-0.08) startAudio();
  updateCountdown(t);
  // 비트 트래킹 (배경 펄스 + 레인 펄스)
  while(beatPtr<chart.beats.length && chart.beats[beatPtr]+0.5<=t){
    lastBeatT=chart.beats[beatPtr]+0.5; beatPtr++;
  }
  const beatPulse=Math.max(0, 1-(t-lastBeatT)*5);
  ctx.clearRect(0,0,W,H);
  drawBg(Math.max(0,t));
  const lw=W/LANES;
  // 레인 (비트에 맞춰 미세 펄스)
  const la=0.015+beatPulse*0.018;
  for(let i=0;i<LANES;i++){
    ctx.fillStyle=`rgba(255,255,255,${(i%2? la*2:la).toFixed(3)})`;
    ctx.fillRect(i*lw,0,lw,H);
  }
  // 탭 플래시
  const pn=performance.now();
  flashes=flashes.filter(f=>pn-f.at<150);
  for(const f of flashes){
    const a=1-(pn-f.at)/150;
    ctx.fillStyle=LANE_COLORS[f.lane]+Math.floor(a*40).toString(16).padStart(2,'0');
    ctx.fillRect(f.lane*lw,0,lw,H);
  }
  // 판정선 (타격 시 펄스, 필버스트 시 네온 그라디언트)
  lineGlow=Math.max(0,lineGlow-0.06);
  if(fever){
    const grad=ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,'#ff5fa2'); grad.addColorStop(.5,'#7f7fff'); grad.addColorStop(1,'#5fd4ff');
    ctx.strokeStyle=grad;
    ctx.shadowColor='#7f7fff'; ctx.shadowBlur=(8+lineGlow*14)*devicePixelRatio;
  } else {
    ctx.strokeStyle=`rgba(255,255,255,${0.5+lineGlow*0.5})`;
    if(lineGlow>0){ ctx.shadowColor='#fff'; ctx.shadowBlur=lineGlow*18*devicePixelRatio; }
  }
  ctx.lineWidth=(3+lineGlow*4)*devicePixelRatio;
  ctx.beginPath(); ctx.moveTo(0,hitY); ctx.lineTo(W,hitY); ctx.stroke();
  ctx.shadowBlur=0;
  // 비트 가이드라인
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1*devicePixelRatio;
  for(const b of chart.beats){
    const bt=b+0.5;
    if(bt<t||bt>t+APPROACH) continue;
    const y=hitY*(1-(bt-t)/APPROACH);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  // 노트
  const nh=14*devicePixelRatio;
  const yOf=tt=>hitY*(1-(tt-t)/APPROACH);
  for(const n of notes){
    // 홀드 완주 체크 (누른 채 끝까지)
    if(n.holding && !n.holdDone && t>=n.t+n.d){
      if(laneHeld[n.lane]>0){
        n.holding=false; n.holdDone=true; score+=50;
        sfx('hold'); buzz([6,30,6]);
        burst(n.lane, hitY, LANE_COLORS[n.lane], false); updateHud();
      } else { n.holding=false; n.holdBroke=true; combo=0; fever=false; updateHud(); }
    }
    if(n.hit && (!n.d || n.holdDone || n.holdBroke) && !n.holding) continue;
    if(!n.hit && !n.missed && n.t-t < -GOOD){
      n.missed=true; counts.miss++; combo=0; fever=false; missFx=1;
      showJudge('MISS','#ff5f5f'); updateHud();
    }
    const tail=n.t+(n.d||0);
    if(tail<t-0.3||n.t>t+APPROACH) continue;
    const col=LANE_COLORS[n.lane];
    // 홀드 몸통
    if(n.d>0){
      const hy=n.holding? hitY : yOf(n.t);
      const ty=Math.max(0,yOf(tail));
      ctx.fillStyle=n.holdBroke? 'rgba(255,95,95,.15)'
        : n.holding? col+'88' : col+'44';
      const bw=lw*0.5;
      ctx.beginPath();
      ctx.roundRect(n.lane*lw+(lw-bw)/2, ty, bw, Math.max(0,hy-ty), 8*devicePixelRatio);
      ctx.fill();
      if(n.holding){ // 유지 중 글로우 + 파티클
        ctx.shadowColor=col; ctx.shadowBlur=14*devicePixelRatio;
        ctx.fill(); ctx.shadowBlur=0;
        if(Math.random()<0.35) particles.push({x:laneX(n.lane)+(Math.random()-.5)*bw, y:hitY,
          vx:(Math.random()-.5)*devicePixelRatio, vy:-(1+Math.random()*2)*devicePixelRatio,
          life:0.8, decay:0.04, r:2*devicePixelRatio, color:col});
      }
    }
    // 헤드
    if(!n.hit || n.holding){
      const y=n.holding? hitY : yOf(n.t);
      ctx.fillStyle=n.missed? 'rgba(255,95,95,.3)':col;
      ctx.beginPath();
      ctx.roundRect(n.lane*lw+lw*0.08, y-nh/2, lw*0.84, nh, 7*devicePixelRatio);
      ctx.fill();
    }
  }
  // 파티클 & 링
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15*devicePixelRatio; p.life-=p.decay;
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.01,p.r*p.life),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  rings=rings.filter(r=>r.life>0);
  for(const r of rings){
    r.r+=(r.big?4:2.6)*devicePixelRatio; r.life-=0.07;
    ctx.globalAlpha=Math.max(0,r.life)*0.8;
    ctx.strokeStyle=r.color; ctx.lineWidth=(r.big?4:2.5)*devicePixelRatio*r.life;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha=1;
  // 노트 폭발 잔상 (화이트 플래시 → 팽창 소멸)
  pops=pops.filter(p=>pn-p.at<180);
  for(const p of pops){
    const k=(pn-p.at)/180, ex=1+k*(p.perfect?0.9:0.5);
    const bw=lw*0.84*ex, bh=14*devicePixelRatio*ex;
    ctx.globalAlpha=(1-k)*0.85;
    ctx.fillStyle=k<0.25? '#ffffff' : p.color;
    ctx.beginPath();
    ctx.roundRect(laneX(p.lane)-bw/2, hitY-bh/2, bw, bh, 7*devicePixelRatio);
    ctx.fill();
  }
  ctx.globalAlpha=1;
  // 미스 데새추레이션 — 광자극 우려로 은은하게 (저채도 0.35, 완만한 감쇠)
  if(missFx>0){
    ctx.globalCompositeOperation='saturation';
    ctx.fillStyle=`rgba(128,128,128,${(missFx*0.35).toFixed(2)})`;
    ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='source-over';
    missFx=Math.max(0,missFx-0.06);
  }
  if(endedAt && t>lastNoteT+0.6){ finish(); return; }
  requestAnimationFrame(loop);
}

const GOLD_BY_GRADE = { S:40, A:25, B:15, C:8, D:3 };
function finish(){
  playing=false;
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('count').textContent='';
  const total=counts.perfect+counts.good+counts.miss;
  const acc=total? (counts.perfect+counts.good*0.6)/total*100:0;
  const grade=acc>=95?'S':acc>=85?'A':acc>=70?'B':acc>=50?'C':'D';
  document.getElementById('rSong').textContent=
    curSong? `${curSong.emoji} ${curSong.title} · ${lastLv.toUpperCase()}`:'';
  document.getElementById('rGrade').textContent=grade+' · '+Math.round(acc)+'%';
  document.getElementById('rStats').innerHTML=
    `SCORE <b>${score}</b><br>PERFECT <b>${counts.perfect}</b> · GOOD <b>${counts.good}</b> · MISS <b>${counts.miss}</b><br>MAX COMBO <b>${maxCombo}</b>`;
  // 신기록 저장
  let isNew=false;
  if(curSong){
    const best=loadBest();
    const prev=(best[curSong.id]||{})[lastLv];
    if(!prev || score>prev.score){
      isNew=!!prev || acc>0;
      best[curSong.id]=best[curSong.id]||{};
      best[curSong.id][lastLv]={score, grade, acc:Math.round(acc)};
      saveBest(best);
    }
  }
  document.getElementById('rNew').textContent=isNew? t('newBest'):'';
  // 골드 지급 (글로벌 지갑)
  let goldTxt='';
  try {
    if(typeof SharedWallet!=='undefined'){
      const g=GOLD_BY_GRADE[grade]||0;
      if(g>0){ SharedWallet.addGold(g); goldTxt=`+${g} ${t('gold')} 💰`; }
    }
  } catch(e){}
  document.getElementById('rGold').textContent=goldTxt;
  // 랭킹 제출 (서버가 최고점만 갱신)
  try {
    if(typeof GameRankings!=='undefined' && score>0) GameRankings.submit('beatdrop',{score});
  } catch(e){}
  document.getElementById('result').classList.remove('hidden');
}

// 입력 (홀드 지원: down=judge, up=release)
window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  if(e.code in KEYS){ laneHeld[KEYS[e.code]]++; judge(KEYS[e.code]); }
});
window.addEventListener('keyup',e=>{
  if(e.code in KEYS){ const l=KEYS[e.code]; laneHeld[l]=Math.max(0,laneHeld[l]-1); release(l); }
});
cv.addEventListener('pointerdown',e=>{
  const r=cv.getBoundingClientRect();
  const lane=Math.min(LANES-1, Math.floor((e.clientX-r.left)/r.width*LANES));
  pointerLane.set(e.pointerId,lane); laneHeld[lane]++;
  judge(lane);
});
function pointerEnd(e){
  const lane=pointerLane.get(e.pointerId);
  if(lane===undefined) return;
  pointerLane.delete(e.pointerId);
  laneHeld[lane]=Math.max(0,laneHeld[lane]-1);
  release(lane);
}
cv.addEventListener('pointerup',pointerEnd);
cv.addEventListener('pointercancel',pointerEnd);

// 결과 화면 → 다시하기 / 로비
document.getElementById('btnRetry').onclick=()=>{
  document.getElementById('result').classList.add('hidden');
  start(lastLv);
};
document.getElementById('btnLobby').onclick=exitToLobby;

// 일시정지: ⏸ 버튼 / ESC 토글
document.getElementById('pauseBtn').onclick=()=>setPause(true);
document.getElementById('btnResume').onclick=()=>setPause(false);
document.getElementById('btnPRetry').onclick=()=>{ paused=false;
  document.getElementById('pause').classList.add('hidden'); start(lastLv); };
document.getElementById('btnPLobby').onclick=exitToLobby;
window.addEventListener('keydown',e=>{
  if(e.code==='Escape' && playing) setPause(!paused);
});

applyI18n();
</script>
