<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<title>Rhythm Proto — AI 생성곡 리듬게임 프로토타입</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:#0a0a1a; color:#eee;
    font-family:'Segoe UI', system-ui, sans-serif; touch-action:none; }
  #wrap { position:relative; height:100%; max-width:520px; margin:0 auto; }
  canvas { display:block; width:100%; height:100%; }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; background:rgba(10,10,26,.92);
    z-index:10; text-align:center; padding:24px; }
  .overlay.hidden { display:none; }
  h1 { font-size:26px; background:linear-gradient(90deg,#ff5fa2,#7f7fff,#5fd4ff);
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { color:#8888aa; font-size:13px; line-height:1.6; }
  .btns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  button { padding:14px 26px; font-size:16px; border:none; border-radius:12px;
    background:#22224a; color:#eee; cursor:pointer; font-weight:700; }
  button.primary { background:linear-gradient(90deg,#ff5fa2,#7f7fff); }
  button:active { transform:scale(.96); }
  #hud { position:absolute; top:0; left:0; right:0; display:flex;
    justify-content:space-between; padding:10px 14px; font-weight:700;
    font-size:14px; z-index:5; pointer-events:none; text-shadow:0 1px 4px #000; }
  #judge { position:absolute; top:38%; left:0; right:0; text-align:center;
    font-size:30px; font-weight:900; z-index:5; pointer-events:none;
    opacity:0; transition:opacity .1s; text-shadow:0 2px 10px #000; }
  #combo { position:absolute; top:28%; left:0; right:0; text-align:center;
    font-size:20px; font-weight:700; color:#ffd75f; z-index:5; pointer-events:none;
    text-shadow:0 1px 6px #000; }
  .stat { font-size:15px; line-height:2; }
  .stat b { color:#5fd4ff; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv"></canvas>
  <div id="hud"><span id="score">0</span><span id="acc"></span></div>
  <div id="combo"></div>
  <div id="judge"></div>

  <div class="overlay" id="intro">
    <h1>🎵 Rhythm Proto</h1>
    <div class="sub">AI 생성곡(HeartMuLa 3B) + 자동 채보 파이프라인 검증용 프로토타입<br>
      곡: 애니송 오프닝풍 · 119초 · 채보 자동생성(온셋 분석)</div>
    <div class="btns">
      <button data-lv="easy">EASY</button>
      <button data-lv="normal" class="primary">NORMAL</button>
      <button data-lv="hard">HARD</button>
    </div>
    <div class="sub">레인을 탭 (PC: D F J K)</div>
  </div>

  <div class="overlay hidden" id="result">
    <h1 id="rGrade">A</h1>
    <div class="stat" id="rStats"></div>
    <div class="btns">
      <button class="primary" onclick="location.reload()">다시하기</button>
    </div>
  </div>
</div>

<script>
const LANES = 4, APPROACH = 1.8; // 노트 낙하 시간(초)
const PERFECT = 0.10, GOOD = 0.19;
const LANE_COLORS = ['#ff5fa2','#ffd75f','#5fd4ff','#7f7fff'];
const KEYS = { KeyD:0, KeyF:1, KeyJ:2, KeyK:3 };

let chart=null, notes=[], audio=null, playing=false;
let score=0, combo=0, maxCombo=0, counts={perfect:0,good:0,miss:0};
let cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,hitY=0;
let flashes=[]; // 레인 탭 이펙트

function resize(){
  const r=cv.parentElement.getBoundingClientRect();
  cv.width=W=r.width*devicePixelRatio; cv.height=H=r.height*devicePixelRatio;
  hitY=H*0.82;
}
window.addEventListener('resize',resize); resize();

fetch('chart-03.json?v=1').then(r=>r.json()).then(c=>{ chart=c; });

document.querySelectorAll('#intro button').forEach(b=>{
  b.onclick=()=>start(b.dataset.lv);
});

function start(lv){
  if(!chart) return;
  const cut=chart.levels[lv];
  notes=chart.notes.filter(n=>n.s>=cut).map(n=>({t:n.t+0.5, lane:n.lane, hit:false, missed:false}));
  audio=new Audio(chart.audio+'?v=1');
  audio.play().then(()=>{
    document.getElementById('intro').classList.add('hidden');
    playing=true;
    audio.onended=finish;
    requestAnimationFrame(loop);
  });
}

function now(){ return audio? audio.currentTime : 0; }

function judge(lane){
  if(!playing) return;
  flashes.push({lane, at:performance.now()});
  const t=now();
  let best=null, bd=GOOD;
  for(const n of notes){
    if(n.hit||n.missed||n.lane!==lane) continue;
    const d=Math.abs(n.t-t);
    if(d<=bd){ bd=d; best=n; }
    if(n.t-t>GOOD) break;
  }
  if(!best) return;
  best.hit=true;
  if(bd<=PERFECT){ counts.perfect++; score+=100; combo++; showJudge('PERFECT','#5fd4ff'); }
  else { counts.good++; score+=60; combo++; showJudge('GOOD','#ffd75f'); }
  maxCombo=Math.max(maxCombo,combo);
  updateHud();
}

function showJudge(txt,color){
  const j=document.getElementById('judge');
  j.textContent=txt; j.style.color=color; j.style.opacity=1;
  clearTimeout(j._t); j._t=setTimeout(()=>j.style.opacity=0,220);
  document.getElementById('combo').textContent=combo>=5? combo+' COMBO':'';
}

function updateHud(){
  document.getElementById('score').textContent=score;
  const total=counts.perfect+counts.good+counts.miss;
  if(total) document.getElementById('acc').textContent=
    Math.round((counts.perfect+counts.good*0.6)/total*100)+'%';
}

function loop(){
  if(!playing) return;
  const t=now();
  ctx.clearRect(0,0,W,H);
  const lw=W/LANES;
  // 레인 & 판정선
  for(let i=0;i<LANES;i++){
    ctx.fillStyle=i%2? 'rgba(255,255,255,.03)':'rgba(255,255,255,.015)';
    ctx.fillRect(i*lw,0,lw,H);
  }
  // 탭 플래시
  const pn=performance.now();
  flashes=flashes.filter(f=>pn-f.at<150);
  for(const f of flashes){
    const a=1-(pn-f.at)/150;
    ctx.fillStyle=LANE_COLORS[f.lane]+Math.floor(a*40).toString(16).padStart(2,'0');
    ctx.fillRect(f.lane*lw,0,lw,H);
  }
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=3*devicePixelRatio;
  ctx.beginPath(); ctx.moveTo(0,hitY); ctx.lineTo(W,hitY); ctx.stroke();
  // 비트 가이드라인 (얇게)
  ctx.strokeStyle='rgba(255,255,255,.06)'; ctx.lineWidth=1*devicePixelRatio;
  for(const b of chart.beats){
    const bt=b+0.5;
    if(bt<t||bt>t+APPROACH) continue;
    const y=hitY*(1-(bt-t)/APPROACH);
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }
  // 노트
  const nh=14*devicePixelRatio;
  for(const n of notes){
    if(n.hit) continue;
    if(!n.missed && n.t-t < -GOOD){
      n.missed=true; counts.miss++; combo=0;
      showJudge('MISS','#ff5f5f'); updateHud();
    }
    if(n.t<t-0.3||n.t>t+APPROACH) continue;
    const y=hitY*(1-(n.t-t)/APPROACH);
    ctx.fillStyle=n.missed? 'rgba(255,95,95,.3)':LANE_COLORS[n.lane];
    ctx.beginPath();
    ctx.roundRect(n.lane*lw+lw*0.08, y-nh/2, lw*0.84, nh, 7*devicePixelRatio);
    ctx.fill();
  }
  requestAnimationFrame(loop);
}

function finish(){
  playing=false;
  const total=counts.perfect+counts.good+counts.miss;
  const acc=total? (counts.perfect+counts.good*0.6)/total*100:0;
  const grade=acc>=95?'S':acc>=85?'A':acc>=70?'B':acc>=50?'C':'D';
  document.getElementById('rGrade').textContent=grade+' · '+Math.round(acc)+'%';
  document.getElementById('rStats').innerHTML=
    `SCORE <b>${score}</b><br>PERFECT <b>${counts.perfect}</b> · GOOD <b>${counts.good}</b> · MISS <b>${counts.miss}</b><br>MAX COMBO <b>${maxCombo}</b>`;
  document.getElementById('result').classList.remove('hidden');
}

// 입력
window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  if(e.code in KEYS) judge(KEYS[e.code]);
});
cv.addEventListener('pointerdown',e=>{
  const r=cv.getBoundingClientRect();
  judge(Math.min(LANES-1, Math.floor((e.clientX-r.left)/r.width*LANES)));
});
</script>
</body>
</html>
