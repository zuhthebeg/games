  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --text: #10203a;
      --muted: #5d6b84;
      --border: #ccd5e4;
      --accent: #0f6cff;
      --accent-soft: #e8f0ff;
      --danger: #e53935;
      --cell: #d8dfeb;
      --cell-open: #f7f9fd;
      --cell-border: #bcc7da;
      --shadow: 0 12px 32px rgba(16, 32, 58, 0.12);
      --cols: 9;
      --zoom: 1;
      --cell-size: calc(clamp(10px, calc((100vw - 28px) / var(--cols)), 34px) * var(--zoom));
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1524;
        --panel: #182235;
        --text: #e9f0ff;
        --muted: #a9b9d8;
        --border: #31415f;
        --accent: #66a3ff;
        --accent-soft: #213453;
        --danger: #ff6a66;
        --cell: #2d3e5e;
        --cell-open: #1f2c45;
        --cell-border: #41557d;
        --shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
      }
    }

    [data-theme="light"] {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --text: #10203a;
      --muted: #5d6b84;
      --border: #ccd5e4;
      --accent: #0f6cff;
      --accent-soft: #e8f0ff;
      --danger: #e53935;
      --cell: #d8dfeb;
      --cell-open: #f7f9fd;
      --cell-border: #bcc7da;
      --shadow: 0 12px 32px rgba(16, 32, 58, 0.12);
    }

    [data-theme="dark"] {
      --bg: #0f1524;
      --panel: #182235;
      --text: #e9f0ff;
      --muted: #a9b9d8;
      --border: #31415f;
      --accent: #66a3ff;
      --accent-soft: #213453;
      --danger: #ff6a66;
      --cell: #2d3e5e;
      --cell-open: #1f2c45;
      --cell-border: #41557d;
      --shadow: 0 16px 36px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 12%, rgba(15, 108, 255, 0.14), transparent 34%),
        radial-gradient(circle at 86% 88%, rgba(229, 57, 53, 0.11), transparent 32%),
        var(--bg);
      min-height: 100vh;
      padding: 14px;
      display: grid;
      place-items: center;
    }

    .app {
      width: min(1120px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .top {
      display: grid;
      gap: 10px;
      align-items: center;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.1rem, 2.8vw, 1.7rem);
      letter-spacing: -0.02em;
    }

    .theme-btn,
    .restart,
    .modal button {
      border: 1px solid var(--border);
      background: var(--accent-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.92rem;
      cursor: pointer;
      font-weight: 700;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .difficulty {
      width: 100%;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px 10px;
      background: color-mix(in srgb, var(--panel), var(--bg) 24%);
    }

    .label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .value {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .board-wrap {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px;
      background: color-mix(in srgb, var(--panel), var(--bg) 18%);
      overflow: auto;
      max-width: 100%;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--cell-size));
      grid-auto-rows: var(--cell-size);
      width: max-content;
      gap: 2px;
      margin: 0 auto;
      touch-action: manipulation;
      user-select: none;
    }

    .cell {
      border: 1px solid var(--cell-border);
      background: var(--cell);
      border-radius: 5px;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: calc(var(--cell-size) * 0.58);
      color: var(--text);
      cursor: pointer;
      line-height: 1;
      padding: 0;
      transition: transform 0.06s ease, background 0.12s ease;
    }

    .cell:active { transform: scale(0.96); }

    .cell.revealed {
      background: var(--cell-open);
      cursor: default;
    }

    .cell.mine {
      background: color-mix(in srgb, var(--danger), transparent 72%);
      color: var(--danger);
    }

    .n1 { color: #2473ff; }
    .n2 { color: #2e9f4a; }
    .n3 { color: #db2f2f; }
    .n4 { color: #5b38d9; }
    .n5 { color: #9d2a2a; }
    .n6 { color: #1c8ca5; }
    .n7 { color: #18222f; }
    .n8 { color: #59667f; }

    .hint {
      color: var(--muted);
      font-size: 0.84rem;
      margin: 0;
      text-align: center;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(5, 9, 17, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }

    .modal {
      width: min(420px, 100%);
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
      text-align: center;
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 1.26rem;
    }

    .modal p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    @media (min-width: 768px) {
      body { padding: 18px; }
      .app { padding: 18px; gap: 14px; }
      .top { grid-template-columns: 1fr auto; }
      .status { min-width: 420px; }
    }

    @media (min-width: 1100px) {
      .app { padding: 22px; }
      .controls { max-width: 420px; }
    }

  <script>
    const DIFFICULTIES = {
      easy: { key: "easy", rows: 9, cols: 9, mines: 10, label: "쉬움" },
      large: { key: "large", rows: 12, cols: 12, mines: 30, label: "12×12" },
      medium: { key: "medium", rows: 16, cols: 16, mines: 40, label: "보통" },
      hard: { key: "hard", rows: 16, cols: 30, mines: 99, label: "어려움" }
    };

    const LONG_PRESS_MS = 550;
    const BEST_KEY = "minesweeper-best-times-v1";
    const THEME_KEY = "minesweeper-theme";

    const boardEl = document.getElementById("board");
    const timerEl = document.getElementById("timer");
    const mineCounterEl = document.getElementById("mineCounter");
    const flagModeBtn = document.getElementById("flagModeBtn");
    let FLAG_MODE = false;
    const bestTimeEl = document.getElementById("bestTime");
    const difficultyEl = document.getElementById("difficulty");
    const modalBg = document.getElementById("modalBg");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const modalBtn = document.getElementById("modalBtn");
    const restartBtn = document.getElementById("restart");
    const themeBtn = document.getElementById("themeBtn");

    let grid = [];
    let config = DIFFICULTIES.easy;
    let gameOver = false;
    let firstRevealDone = false;
    let revealedCount = 0;
    let flaggedCount = 0;
    let timer = 0;
    let timerId = null;
    let pointerState = null;
    let lastPointerType = 'mouse';

    function loadBestTimes() {
      try {
        return JSON.parse(localStorage.getItem(BEST_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveBestTime(key, seconds) {
      const current = loadBestTimes();
      if (!current[key] || seconds < current[key]) {
        current[key] = seconds;
        localStorage.setItem(BEST_KEY, JSON.stringify(current));
      }
    }

    function updateBestTimeText() {
      const current = loadBestTimes();
      const value = current[config.key];
      bestTimeEl.textContent = Number.isInteger(value) ? `${value}초` : "-";
    }

    function applyTheme(theme) {
      if (theme === "light" || theme === "dark") {
        document.documentElement.setAttribute("data-theme", theme);
      } else {
        document.documentElement.removeAttribute("data-theme");
      }
      localStorage.setItem(THEME_KEY, theme);
      themeBtn.textContent = `테마: ${theme === "light" ? "밝게" : theme === "dark" ? "어둡게" : "자동"}`;
    }

    function rotateTheme() {
      const current = localStorage.getItem(THEME_KEY) || "auto";
      const next = current === "auto" ? "light" : current === "light" ? "dark" : "auto";
      applyTheme(next);
    }

    function createEmptyGrid() {
      return Array.from({ length: config.rows }, (_, r) =>
        Array.from({ length: config.cols }, (_, c) => ({
          r,
          c,
          mine: false,
          revealed: false,
          flagged: false,
          adjacent: 0,
          el: null
        }))
      );
    }

    function neighbors(r, c) {
      const result = [];
      for (let dr = -1; dr <= 1; dr += 1) {
        for (let dc = -1; dc <= 1; dc += 1) {
          if (!dr && !dc) continue;
          const nr = r + dr;
          const nc = c + dc;
          if (nr < 0 || nc < 0 || nr >= config.rows || nc >= config.cols) continue;
          result.push(grid[nr][nc]);
        }
      }
      return result;
    }

    function placeMines() {
      let placed = 0;
      const total = config.rows * config.cols;
      while (placed < config.mines) {
        const idx = Math.floor(Math.random() * total);
        const r = Math.floor(idx / config.cols);
        const c = idx % config.cols;
        const cell = grid[r][c];
        if (cell.mine) continue;
        cell.mine = true;
        placed += 1;
      }
    }

    function computeAdjacency() {
      for (let r = 0; r < config.rows; r += 1) {
        for (let c = 0; c < config.cols; c += 1) {
          const cell = grid[r][c];
          if (cell.mine) {
            cell.adjacent = 0;
            continue;
          }
          cell.adjacent = neighbors(r, c).filter((n) => n.mine).length;
        }
      }
    }

    function relocateMine(r, c) {
      const source = grid[r][c];
      if (!source.mine) return;
      for (let rr = 0; rr < config.rows; rr += 1) {
        for (let cc = 0; cc < config.cols; cc += 1) {
          if (rr === r && cc === c) continue;
          const target = grid[rr][cc];
          if (!target.mine) {
            target.mine = true;
            source.mine = false;
            computeAdjacency();
            return;
          }
        }
      }
    }

    function cellText(cell) {
      if (cell.flagged && !cell.revealed) return "🚩";
      if (!cell.revealed) return "";
      if (cell.mine) return "💣";
      return cell.adjacent ? String(cell.adjacent) : "";
    }

    function renderCell(cell) {
      const el = cell.el;
      el.textContent = cellText(cell);
      el.className = "cell";
      if (cell.revealed) el.classList.add("revealed");
      if (cell.revealed && cell.mine) el.classList.add("mine");
      if (cell.revealed && !cell.mine && cell.adjacent) el.classList.add(`n${cell.adjacent}`);
      el.setAttribute("aria-label", `행 ${cell.r + 1}, 열 ${cell.c + 1}`);
    }

    function renderAll() {
      for (let r = 0; r < config.rows; r += 1) {
        for (let c = 0; c < config.cols; c += 1) {
          renderCell(grid[r][c]);
        }
      }
    }

    function updateCounters() {
      mineCounterEl.textContent = String(config.mines - flaggedCount);
      timerEl.textContent = `${timer}초`;
    }

    function startTimerIfNeeded() {
      if (timerId || gameOver) return;
      timerId = setInterval(() => {
        timer += 1;
        updateCounters();
      }, 1000);
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function showModal(title, text) {
      modalTitle.textContent = title;
      modalText.textContent = text;
      modalBg.style.display = "flex";
    }

    function hideModal() {
      modalBg.style.display = "none";
    }

    function revealAllMines() {
      for (let r = 0; r < config.rows; r += 1) {
        for (let c = 0; c < config.cols; c += 1) {
          if (grid[r][c].mine) {
            grid[r][c].revealed = true;
          }
        }
      }
      renderAll();
    }

    function checkWin() {
      const safeCells = config.rows * config.cols - config.mines;
      if (revealedCount !== safeCells) return;
      gameOver = true;
      stopTimer();
      saveBestTime(config.key, timer);
      updateBestTimeText();
      const rewardMult = { easy: 1, large: 3, medium: 5, hard: 10 }[config.key] || 1;
      const reward = rewardMult * 1000000;
      awardWinGold(reward);
      // 🏆 랭킹: 난이도 베이스 + 속도 보너스(빠를수록↑) → 어려움>보통>쉬움, 동난이도는 빠른 쪽
      try {
        if (typeof GameRankings !== 'undefined') {
          const base = { easy: 10000, large: 30000, medium: 50000, hard: 100000 }[config.key] || 0;
          const rankScore = base + Math.max(0, 3000 - timer);
          GameRankings.submit('minesweeper', { score: rankScore });
        }
      } catch (e) {}
      showModal("승리!", `${config.label} 난이도 클리어: ${timer}초\n💰 ${reward.toLocaleString()}G 획득!`);
    }

    function floodReveal(r, c) {
      const stack = [grid[r][c]];
      while (stack.length) {
        const cell = stack.pop();
        if (cell.revealed || cell.flagged) continue;
        cell.revealed = true;
        revealedCount += 1;
        renderCell(cell);
        if (cell.adjacent !== 0) continue;
        neighbors(cell.r, cell.c).forEach((n) => {
          if (!n.revealed && !n.mine && !n.flagged) stack.push(n);
        });
      }
    }

    function reveal(r, c) {
      if (gameOver) return;
      const cell = grid[r][c];
      if (cell.revealed || cell.flagged) return;

      if (!firstRevealDone) {
        firstRevealDone = true;
        relocateMine(r, c);
      }

      startTimerIfNeeded();

      if (cell.mine) {
        cell.revealed = true;
        renderCell(cell);
        gameOver = true;
        stopTimer();
        revealAllMines();
        showModal("게임 오버", "지뢰를 밟았습니다. 다시 도전해 보세요.");
        return;
      }

      floodReveal(r, c);
      checkWin();
    }

    function toggleFlag(r, c) {
      if (gameOver) return;
      const cell = grid[r][c];
      if (cell.revealed) return;
      cell.flagged = !cell.flagged;
      flaggedCount += cell.flagged ? 1 : -1;
      renderCell(cell);
      updateCounters();
    }

    function onPointerDown(event, r, c) {
      if (event.button !== undefined && event.button !== 0) return;
      lastPointerType = event.pointerType || 'mouse';
      if (pointerState && pointerState.timer) {
        clearTimeout(pointerState.timer);
      }
      pointerState = { longPressed: false, timer: null };
      pointerState.timer = setTimeout(() => {
        pointerState.longPressed = true;
        toggleFlag(r, c);
        updateCounters();
        try { if (navigator.vibrate) navigator.vibrate(45); } catch (e) {}
      }, LONG_PRESS_MS);
    }

    function onPointerUp(event, r, c) {
      if (!pointerState) return;
      clearTimeout(pointerState.timer);
      const longPressed = pointerState.longPressed;
      pointerState = null;
      if (longPressed) {
        event.preventDefault();
        return;
      }
      if (FLAG_MODE) { toggleFlag(r, c); } else { reveal(r, c); }
      updateCounters();
    }

    function buildBoard() {
      document.documentElement.style.setProperty("--cols", String(config.cols));
      boardEl.innerHTML = "";
      grid = createEmptyGrid();
      placeMines();
      computeAdjacency();

      for (let r = 0; r < config.rows; r += 1) {
        for (let c = 0; c < config.cols; c += 1) {
          const cell = grid[r][c];
          const button = document.createElement("button");
          button.className = "cell";
          button.type = "button";
          button.setAttribute("role", "gridcell");

          button.addEventListener("pointerdown", (e) => onPointerDown(e, r, c));
          button.addEventListener("pointerup", (e) => onPointerUp(e, r, c));
          button.addEventListener("pointerleave", () => {
            if (pointerState?.timer) clearTimeout(pointerState.timer);
          });

          button.addEventListener("contextmenu", (e) => {
            e.preventDefault();
            // 마우스 우클릭만 여기서 깃발 처리. 터치 롱프레스는 타이머가 처리(중복 토글로 상쇄되던 버그 방지)
            if (lastPointerType === 'mouse') { toggleFlag(r, c); updateCounters(); }
          });
          button.addEventListener("pointercancel", () => {
            if (pointerState?.timer) clearTimeout(pointerState.timer);
          });

          cell.el = button;
          boardEl.appendChild(button);
          renderCell(cell);
        }
      }
    }

    function awardWinGold(amount) {
      try { if (typeof SharedWallet !== 'undefined' && SharedWallet._initialized) SharedWallet.addGold(amount); } catch (e) {}
      let fx = document.getElementById('goldFx');
      if (!fx) { fx = document.createElement('div'); fx.id = 'goldFx'; document.body.appendChild(fx); }
      fx.textContent = '💰 +' + amount.toLocaleString() + 'G';
      fx.style.left = (innerWidth / 2) + 'px';
      fx.style.top = (innerHeight / 2) + 'px';
      fx.classList.remove('on'); void fx.offsetWidth; fx.classList.add('on');
    }
    if (flagModeBtn) flagModeBtn.addEventListener('click', () => {
      FLAG_MODE = !FLAG_MODE;
      flagModeBtn.classList.toggle('on', FLAG_MODE);
      flagModeBtn.textContent = FLAG_MODE ? '🚩 깃발모드 ON' : '🚩 깃발';
    });
    function newGame() {
      hideModal();
      stopTimer();
      gameOver = false;
      firstRevealDone = false;
      revealedCount = 0;
      flaggedCount = 0;
      timer = 0;
      pointerState = null;
      buildBoard();
      updateBestTimeText();
      updateCounters();
    }

    difficultyEl.addEventListener("change", () => {
      config = DIFFICULTIES[difficultyEl.value];
      newGame();
    });

    restartBtn.addEventListener("click", newGame);
    modalBtn.addEventListener("click", newGame);
    modalBg.addEventListener("click", (e) => {
      if (e.target === modalBg) hideModal();
    });
    themeBtn.addEventListener("click", rotateTheme);

    window.addEventListener("blur", () => {
      if (pointerState?.timer) clearTimeout(pointerState.timer);
    });

    // 큰 맵: 핀치(두 손가락)/휠로 확대·축소. 확대 후엔 스크롤로 이동(삥패식)
    function bindBoardZoom() {
      const wrap = document.querySelector('.board-wrap');
      if (!wrap) return;
      const root = document.documentElement;
      let zoom = 1, pinchDist = 0, pinchStart = 1;
      const clamp = z => Math.max(0.6, Math.min(3, z));
      const apply = () => root.style.setProperty('--zoom', zoom.toFixed(3));
      wrap.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
          pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          pinchStart = zoom; e.preventDefault();
        }
      }, { passive: false });
      wrap.addEventListener('touchmove', e => {
        if (e.touches.length === 2 && pinchDist > 0) {
          const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          zoom = clamp(pinchStart * d / pinchDist); apply(); e.preventDefault();
        }
      }, { passive: false });
      wrap.addEventListener('touchend', () => { pinchDist = 0; }, { passive: true });
      wrap.addEventListener('wheel', e => { e.preventDefault(); zoom = clamp(zoom + (e.deltaY < 0 ? 0.12 : -0.12)); apply(); }, { passive: false });
    }
    bindBoardZoom();
    try { if (typeof GameRankings !== 'undefined') GameRankings.injectNavButton('minesweeper'); } catch (e) {}

    applyTheme(localStorage.getItem(THEME_KEY) || "auto");
    config = DIFFICULTIES[difficultyEl.value];
    newGame();
  </script>

      SiteMeta.init({
        title: 'Minesweeper - game.cocy.io',
        description: '클래식 지뢰찾기 게임',
        url: 'https://game.cocy.io/minesweeper/'
      });
    </script>
    <script>
    /* 배경음악(자급식, 게임 사운드와 독립) */
    (function(){ var KEY='ms-bgm', audio=null;
      function on(){ return localStorage.getItem(KEY)!=='0'; }
      window.BGM={ on:on,
        start:function(){ if(!on())return; if(!audio){ audio=new Audio('/minesweeper/bgm.mp3?v=1'); audio.loop=true; audio.volume=.3; } var p=audio.play(); if(p&&p.catch)p.catch(function(){}); },
        stop:function(){ if(audio)audio.pause(); },
        toggle:function(){ var n=on()?'0':'1'; try{localStorage.setItem(KEY,n);}catch(e){} if(n==='1')this.start(); else this.stop(); return n==='1'; } };
      window.toggleBgm=function(){ var o=window.BGM.toggle(); var b=document.getElementById('bgmBtn'); if(b)b.textContent=o?'🎵':'🔇'; };
      var b=document.getElementById('bgmBtn'); if(b)b.textContent=on()?'🎵':'🔇';
      window.addEventListener('pointerdown',function u(){ if(on())window.BGM.start(); window.removeEventListener('pointerdown',u); });
    })();
    </script>
