            const have = Number(tradeMeta.resources[r] || 0);
            const give = Number(want[r] || 0);
            const get = Number(offer[r] || 0);
            const after = have - give + get;
            const insufficient = give > have;
            const cellBg = insufficient
              ? "rgba(239,68,68,0.18)"
              : (give > 0 ? "rgba(239,68,68,0.08)" : (get > 0 ? "rgba(78,204,163,0.12)" : "rgba(255,255,255,0.04)"));
            const haveColor = insufficient ? "#ef4444" : "#fff";
            let deltaLine = "";
            if (give > 0) deltaLine = `<div style="font-size:10px;color:#ef4444;font-weight:700;">−${give}</div>`;
            else if (get > 0) deltaLine = `<div style="font-size:10px;color:#4ecca3;font-weight:700;">+${get}</div>`;
            const afterLine = (give > 0 || get > 0)
              ? `<div style="font-size:10px;color:${insufficient ? "#ef4444" : "#9ca3af"};">→ ${after}</div>`
              : `<div style="font-size:10px;color:transparent;">→</div>`;
            return `<div style="flex:1;background:${cellBg};border-radius:6px;padding:6px 2px;text-align:center;min-width:0;">
              <div style="font-size:16px;line-height:1;">${RESOURCE_ICONS[r]}</div>
              <div style="font-size:10px;color:#9ca3af;margin-top:2px;">${RESOURCE_NAMES[r]}</div>
              <div style="font-size:16px;font-weight:800;color:${haveColor};margin-top:2px;">${have}</div>
              ${deltaLine || `<div style="font-size:10px;color:transparent;">·</div>`}
              ${afterLine}
            </div>`;
          }).join("");
          resourceBlock = `<div style="margin-bottom:10px;">
            <div style="font-size:10px;color:#9ca3af;margin-bottom:4px;text-align:left;">내 자원 (수락 시 증감)</div>
            <div style="display:flex;gap:3px;">${cells}</div>
          </div>`;
        } else if (myResStr) {
          resourceBlock = `<div style="font-size:11px;color:#9ca3af;margin-bottom:10px;padding:4px 8px;background:rgba(255,255,255,0.05);border-radius:6px;">내 자원: ${myResStr}</div>`;
        }

        overlay.innerHTML = `
          <div style="background:#16213e;border:2px solid #4ecca3;border-radius:16px;padding:20px;max-width:380px;width:92%;text-align:center;">
            <div style="font-size:14px;color:#9ca3af;margin-bottom:6px;">💱 거래 제안</div>
            <div style="font-size:18px;font-weight:700;margin-bottom:12px;">${playerName}</div>
            <div style="display:flex;justify-content:center;gap:16px;margin-bottom:12px;">
              <div style="text-align:center;">
                <div style="font-size:11px;color:#9ca3af;margin-bottom:4px;">줄게</div>
                <div style="font-size:16px;font-weight:600;">${giveStr}</div>
              </div>
              <div style="font-size:24px;color:#4ecca3;">⇄</div>
              <div style="text-align:center;">
                <div style="font-size:11px;color:#9ca3af;margin-bottom:4px;">받을래</div>
                <div style="font-size:16px;font-weight:600;">${wantStr}</div>
              </div>
            </div>
            ${dialogue ? `<div style="font-size:13px;color:#ffd700;margin-bottom:8px;font-style:italic;">"${dialogue}"</div>` : ""}
            ${resourceBlock}
            ${!canAccept ? `<div style="font-size:11px;color:#ef4444;margin-bottom:8px;">⚠️ 자원이 부족합니다</div>` : ""}
            <div style="display:flex;gap:8px;">
              <button id="tradeRejectBtn" style="flex:1;padding:10px;border-radius:10px;border:1px solid #ef4444;background:rgba(239,68,68,0.15);color:#ef4444;font-weight:700;cursor:pointer;font-size:14px;">❌ 거절</button>
              ${canAccept ? `<button id="tradeAcceptBtn" style="flex:1;padding:10px;border-radius:10px;border:none;background:#4ecca3;color:#000;font-weight:700;cursor:pointer;font-size:14px;">✅ 수락</button>` : ""}
            </div>
          </div>`;
        document.body.appendChild(overlay);
        let settled = false;
        const finish = (val) => {
          if (settled) return;
          settled = true;
          if (overlay.parentNode) overlay.remove();
          resolve(val);
        };
        const acceptBtn = overlay.querySelector("#tradeAcceptBtn");
        if (acceptBtn) acceptBtn.onclick = () => finish(true);
        overlay.querySelector("#tradeRejectBtn").onclick = () => finish(false);
        if (dismissBox) {
          dismissBox.dismiss = () => finish(false);
        }
      });
    }

    function toggleSoundPanel() {
      let panel = document.getElementById("soundPanel");
      if (panel) { panel.remove(); return; }
      panel = document.createElement("div");
      panel.id = "soundPanel";
      panel.style.cssText = "position:fixed;bottom:60px;right:8px;background:#16213e;border:1px solid #334155;border-radius:12px;padding:12px;z-index:9990;width:220px;font-size:12px;";
      panel.innerHTML = `
        <div style="font-weight:700;margin-bottom:8px;">⚙️ 설정</div>
        <div style="font-size:10px;color:#9ca3af;margin-bottom:4px;">🔊 사운드</div>
        <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:pointer;">
          <input type="checkbox" ${soundSettings.sfx?"checked":""} onchange="soundSettings.sfx=this.checked;soundSettings.save()"> 효과음
          <input type="range" min="0" max="1" step="0.1" value="${soundSettings.sfxVol}" style="flex:1;height:4px;" oninput="soundSettings.sfxVol=+this.value;soundSettings.save()">
        </label>
        <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:pointer;">
          <input type="checkbox" ${soundSettings.voice?"checked":""} onchange="soundSettings.voice=this.checked;soundSettings.save()"> 보이스
          <input type="range" min="0" max="1" step="0.1" value="${soundSettings.voiceVol}" style="flex:1;height:4px;" oninput="soundSettings.voiceVol=+this.value;soundSettings.save()">
        </label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" ${soundSettings.bgm?"checked":""} onchange="soundSettings.bgm=this.checked;soundSettings.save();if(this.checked)BGM.start();else BGM.stop();"> BGM
          <input type="range" min="0" max="1" step="0.1" value="${soundSettings.bgmVol}" style="flex:1;height:4px;" oninput="soundSettings.bgmVol=+this.value;soundSettings.save();BGM.setVolume(+this.value)">
        </label>
        <hr style="border:none;border-top:1px solid #334155;margin:8px 0;">
        <button onclick="showManual();document.getElementById('soundPanel')?.remove();" style="width:100%;padding:6px;border-radius:6px;border:1px solid #4ecca3;background:rgba(78,204,163,0.1);color:#4ecca3;cursor:pointer;font-size:11px;margin-bottom:6px;">📖 게임 설명서</button>
        <button onclick="if(confirm('게임을 나가시겠습니까?')){leaveRoom();document.getElementById('soundPanel')?.remove();}" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ef4444;background:rgba(239,68,68,0.15);color:#ef4444;cursor:pointer;font-size:11px;">🚪 게임 나가기</button>
      `;
      document.body.appendChild(panel);
      panel.addEventListener("click", e => e.stopPropagation());
      setTimeout(() => {
        document.addEventListener("click", function close() { panel.remove(); document.removeEventListener("click", close); }, { once: true });
      }, 100);
    }

    function showManual() {
      const overlay = document.createElement("div");
      overlay.style.cssText = "position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);padding:16px;";
      overlay.innerHTML = `
        <div style="background:#16213e;border-radius:16px;padding:16px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;font-size:12px;line-height:1.6;color:#ccc;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
            <span style="font-size:16px;font-weight:700;">📖 카탄 가이드</span>
            <button onclick="this.closest('div[style]').parentElement.remove()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;">✕</button>
          </div>
          <b>🎯 목표</b>: 10점 먼저 달성!<br><br>
          <b>📦 자원</b><br>
          🧱벽돌 🪵나무 🐑양 🌾밀 ⛏️광석<br><br>
          <b>🏗️ 건설 비용</b><br>
          • 도로: 🧱+🪵<br>
          • 마을(1점): 🧱+🪵+🐑+🌾<br>
          • 도시(2점): 🌾🌾+⛏️⛏️⛏️<br>
          • 발전카드: 🐑+🌾+⛏️<br><br>
          <b>🎲 진행</b><br>
          1. 주사위 굴리기 → 해당 숫자 타일에서 자원 획득<br>
          2. 거래/건설/카드 사용<br>
          3. 턴 종료<br><br>
          <b>🦹 도둑 (7)</b><br>
          • 8장 초과 보유 → 절반 버림<br>
          • 도둑을 다른 타일로 이동<br>
          • 인접 플레이어 카드 1장 훔치기<br><br>
          <b>🃏 발전카드</b><br>
          • 🐴기사: 도둑 이동 (3명↑ 사용 → ⚔️최대기사단 +2점)<br>
          • 🛣️도로건설: 무료 도로 2개<br>
          • 🌾풍년: 아무 자원 2개 획득<br>
          • 💰독점: 자원 1종 모두 가져오기<br>
          • ⭐VP: +1점<br><br>
          <b>💱 거래</b><br>
          • 자원 터치 → 거래 모달<br>
          • 🏦은행: 4:1 (항구 3:1 또는 2:1)<br>
          • 🤝제안: AI/플레이어에게 N:N 거래<br><br>
          <b>🏆 특수 점수</b><br>
          • 👑최장도로 (5개↑): +2점<br>
          • ⚔️최대기사단 (3명↑): +2점
        </div>`;
      document.body.appendChild(overlay);
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    }

    function showBigOverlay(main, sub, extraClass = "", duration = 1200) {
      const el = document.createElement("div");
      el.className = `big-overlay ${extraClass}`;
      el.innerHTML = `<div class="big-overlay-content"><div class="big-number">${main}</div>${sub ? `<div class="big-sub">${sub}</div>` : ""}</div>`;
      document.body.appendChild(el);
      setTimeout(() => {
        el.style.animation = "big-overlay-out 0.3s ease-in forwards";
        setTimeout(() => el.remove(), 300);
      }, duration);
    }

    // ── Mobile Debug Panel ──
    const debugLog = [];
    function dbg(msg) {
      debugLog.push(`${new Date().toLocaleTimeString().slice(0,8)} ${msg}`);
      if (debugLog.length > 30) debugLog.shift();
      const el = document.getElementById("debugPanel");
      if (el) el.textContent = debugLog.join("\n");
      console.log("[DBG]", msg);
    }
    // URL에 ?debug 있으면 패널 표시
    if (location.search.includes("debug")) {
      const dp = document.createElement("div");
      dp.id = "debugPanel";
      dp.style.cssText = "position:fixed;top:50px;right:4px;width:180px;max-height:200px;overflow-y:auto;background:rgba(0,0,0,0.9);color:#0f0;font-family:monospace;font-size:9px;padding:4px;z-index:99999;white-space:pre;border-radius:8px;border:1px solid #0f0;pointer-events:none;";
      document.body.appendChild(dp);
    }

    function showToast(msg, duration = 2500, options = {}) {
      let el = document.getElementById("catan-toast");
      if (!el) {
        el = document.createElement("div");
        el.id = "catan-toast";
        el.className = "toast";
        document.body.appendChild(el);
      }
      const bottom = Number(options.bottom || 0);
      el.style.cssText = `position:fixed;left:50%;transform:translateX(-50%);${bottom > 0 ? `bottom:${bottom}px;` : 'top:50%;transform:translate(-50%,-50%);'}width:max-content;max-width:calc(100vw - 32px);background:rgba(0,0,0,0.95);color:#ffd700;padding:12px 24px;border-radius:14px;font-size:16px;font-weight:700;z-index:9999;pointer-events:none;transition:opacity 0.3s;border:2px solid rgba(255,215,0,0.4);text-shadow:0 1px 4px rgba(0,0,0,0.8);white-space:pre-line;text-align:center;`;
      el.textContent = msg;
      el.style.opacity = "1";
      if (window.anime) {
        anime({ targets: ".toast", translateY: [bottom > 0 ? 24 : -40, 0], opacity: [0, 1], duration: 300 });
      }
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.style.opacity = "0"; }, duration);
    }

    function launchConfetti() {
      const colors = ["#e94560", "#4ecca3", "#ffd700", "#9b59b6", "#fff", "#ff6b6b"];
      for (let i = 0; i < 60; i += 1) {
        const el = document.createElement("div");
        const size = 6 + Math.random() * 8;
        el.style.cssText = `position:fixed;top:-10px;left:${Math.random() * 100}vw;width:${size}px;height:${size}px;background:${colors[i % colors.length]};border-radius:${Math.random() > 0.5 ? "50%" : "2px"};z-index:9998;pointer-events:none;animation:confetti-fall ${1.5 + Math.random() * 2}s ease-in forwards;animation-delay:${Math.random() * 0.5}s;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }
    }

    function zoomInMap() {
      setMapZoom((state.mapView.zoom || 1) + 0.1);
    }

    function zoomOutMap() {
      setMapZoom((state.mapView.zoom || 1) - 0.1);
    }

    window.startSingle = startSingle;
    window.toggleSoundPanel = toggleSoundPanel;
    window.showMultiOptions = showMultiOptions;
    window.backToMode = backToMode;
    window.createRoom = createRoom;
    window.joinRoom = joinRoom;
    window.leaveRoom = leaveRoom;
    window.setReady = setReady;
    window.fillAIPlayers = fillAIPlayers;
    window.startGame = startGame;
    window.rollDice = rollDice;
    window.endTurn = endTurn;
    window.humanBuildRoad = humanBuildRoad;
    window.humanBuildSettlement = humanBuildSettlement;
    window.humanBuildCity = humanBuildCity;
    window.humanBuyDevCard = humanBuyDevCard;
    window.humanUseKnight = humanUseKnight;
    window.humanUseMonopoly = humanUseMonopoly;
    window.humanUseRoadBuilding = humanUseRoadBuilding;
    window.humanUseYearOfPlenty = humanUseYearOfPlenty;
    window.humanTrade = humanTrade;
    window.onResourceTap = onResourceTap;
    window.showManual = showManual;
    window.tradeAdjust = tradeAdjust;
    window.confirmBankTrade = confirmBankTrade;
    window.proposeTrade = proposeTrade;
    window.cancelTradeDialog = cancelTradeDialog;
    window.onVertexClick = onVertexClick;
    window.onEdgeClick = onEdgeClick;
    window.onHexClick = onHexClick;
    window.onRoomCodeInput = onRoomCodeInput;
    window.onMaxPlayersChange = onMaxPlayersChange;
    window.onAiDifficultyChange = onAiDifficultyChange;
    window.zoomInMap = zoomInMap;
    window.zoomOutMap = zoomOutMap;

    window.addEventListener('resize', () => {
      if (!state.mapView.userMoved) {
        applyResponsiveDefaults(false);
        state.mapView.initialized = false;
        centerMapViewport(true);
      }
    });

    function updateTurnBanner() {
      let banner = document.getElementById("turn-banner");
      if (!banner) {
        banner = document.createElement("div");
        banner.id = "turn-banner";
        document.body.prepend(banner);
      }
      if (state.screen !== "game" && state.screen !== undefined) {
        banner.style.display = "none";
        return;
      }
      banner.style.display = "flex";
      const cp = state.players[state.currentPlayer] || {};
      const color = cp.color || "#fff";
      const isMyTurn = state.currentPlayer === localPlayerIndex();
      const isWaiting = !isMyTurn;
      // Action text
      let action = state.hint || "";
      if (isMyTurn) {
        if (state.phase === "roll") action = "🎲 주사위를 굴리세요";
        else if (state.phase === "robber" || state.phase === "knight-robber") action = "🦹 강도를 이동하세요";
        else if (state.phase === "main") action = state.buildMode ? `🏗️ ${state.buildMode} 위치를 선택하세요` : "🔨 건설하거나 턴 종료";
        else if (state.phase === "setup1" || state.phase === "setup2") action = state.setupStep === "settlement" ? "🏠 마을을 놓으세요" : "🛤️ 도로를 놓으세요";
      } else {
        action = isMultiMode() ? `⏳ ${cp.name}의 차례...` : `🤔 AI 생각 중...`;
      }
      banner.classList.toggle("ai-thinking", isWaiting && !state.winner);

      const myIdx = localPlayerIndex();
      const vpChips = state.players.map((p, i) => {
        const active = i === state.currentPlayer;
        const rl = longestRoadLength(i);
        const lr = getLongestRoadBadge(state.longestRoad === i);
        const la = state.largestArmy === i ? "⚔" : "";
        const label = i === myIdx ? "나" : p.name;
        return `<span class="vp-chip${active ? " active" : ""}" style="color:${p.color};"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color};"></span>${label} ${p.vp}${lr}${la}</span>`;
      }).join("");

      banner.innerHTML = `
        <span class="banner-action">${action}</span>
        <div class="banner-vps">${vpChips}<span class="vp-chip" onclick="toggleSoundPanel()" style="cursor:pointer;">⚙️</span></div>
      `;
    }

    function costLabel(cost, playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return "";
      const ICONS = { brick: "🧱", lumber: "🪵", wool: "🐑", grain: "🌾", ore: "⛏️" };
      const parts = Object.entries(cost).map(([r, n]) => {
        const have = p.resources[r] || 0;
        return have >= n ? `${ICONS[r]}${n}` : `<span style="color:#e95b5b">${ICONS[r]}${n}</span>`;
      });
      return `<span class="cost-hint">${parts.join(" ")}</span>`;
    }

    function humanTryBuild(type) {
      const idx = localPlayerIndex();
      const p = state.players[idx];
      if (!p) return;
      if (!isHumanTurn() || state.phase !== "main" || state.winner) return;
      const ICONS = { brick: "🧱", lumber: "🪵", wool: "🐑", grain: "🌾", ore: "⛏️" };
      const cost = COST[type];
      const missing = Object.entries(cost)
        .filter(([r, n]) => (p.resources[r] || 0) < n)
        .map(([r, n]) => `${ICONS[r]}×${n - (p.resources[r] || 0)}`);
      if (missing.length) {
        showToast(`${type === "road" ? "도로" : type === "settlement" ? "마을" : type === "city" ? "도시" : "발전카드"} 부족: ${missing.join(" ")} 더 필요`);
      }
    }
    window.humanTryBuild = humanTryBuild;

    (async function boot() {
      if (window.SharedWallet) {
        try { await SharedWallet.init(); } catch (_) {}
      }
      applyResponsiveDefaults(true);
      setSinglePlayers();
      ensureTurnTimer();
      render();
    })();
  </script>
