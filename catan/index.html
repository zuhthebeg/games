<!doctype html>
<html lang="ko">
<head>
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({"gtm.start":new Date().getTime(),event:"gtm.js"});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!="dataLayer"?"&l="+l:"";j.async=true;j.src="https://www.googletagmanager.com/gtm.js?id="+i+dl;f.parentNode.insertBefore(j,f)})(window,document,"script","dataLayer","GTM-MV8KQGJF");</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>카탄</title>
  <link rel="icon" href="icon.svg" />
  <script src="/lib/shared-wallet.js?v=20260312a"></script>
  <script src="/lib/multiplayer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/animejs@4.3.6/lib/anime.min.js"></script>
  <style>
    :root {
      --bg: #12324a;
      --panel: #0e2434;
      --panel-2: #152f43;
      --line: #2a4f6d;
      --text: #f4f7fb;
      --muted: #a7bdcf;
      --accent: #4fc27f;
      --danger: #e95b5b;
      --brick: #b46544;
      --lumber: #2f8a4a;
      --wool: #80be6a;
      --grain: #dcbf4d;
      --ore: #6d7382;
      --desert: #cdb687;
      --lake: #1a6b9e;
      --sea: #0d4a72;
      --volcano: #7a2020;
      --gold: #a87200;
      --strait: #0d4a72;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 0%, #1c4d71 0%, var(--bg) 50%, #0b2232 100%);
      color: var(--text);
      min-height: 100vh;
      padding-top: calc(48px + env(safe-area-inset-top));
      overflow: hidden;
    }

    .hidden { display: none !important; }

    #app {
      height: calc(100dvh - 48px - 34px - env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 2px;
      padding-top: calc(2px + 34px);
      padding-bottom: calc(2px + env(safe-area-inset-bottom));
      overflow: hidden;
    }

    .players-bar {
      display: flex;
      flex-direction: row;
      gap: 4px;
    }

    .player-card {
      flex: 1;
      min-width: 0;
      background: rgba(7, 18, 27, 0.85);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 11px;
    }

    .player-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .status {
      border: 1px solid var(--line);
      background: rgba(5, 16, 24, 0.7);
      border-radius: 10px;
      padding: 6px;
      font-size: 12px;
      text-align: center;
    }

    .map-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(7, 24, 37, 0.65), rgba(8, 20, 31, 0.9));
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: none;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      cursor: grab;
    }

    .map-wrap.dragging {
      cursor: grabbing;
    }

    .board {
      position: relative;
      width: 900px;
      height: 620px;
      flex: 0 0 auto;
      margin: auto;
    }

    .port-label {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(7, 18, 27, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      padding: 2px 5px;
      font-size: 9px;
      pointer-events: none;
      z-index: 5;
      white-space: nowrap;
      color: var(--text);
    }

    .map-zoom-controls {
      position: sticky;
      top: 8px;
      right: 8px;
      margin-left: auto;
      z-index: 20;
      display: flex;
      gap: 6px;
      pointer-events: auto;
    }

    .map-zoom-controls button {
      width: 32px;
      height: 32px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
      background: rgba(7, 18, 27, 0.92);
    }
    .cost-hint {
      font-size: 9px;
      opacity: 0.7;
      display: block;
      line-height: 1.2;
      margin-top: 1px;
    }
    .missing-res {
      color: #e95b5b;
      font-size: 9px;
      display: block;
      margin-top: 1px;
    }
    button:disabled .cost-hint { opacity: 0.45; }

    .hex {
      position: absolute;
      width: calc(78px * var(--zoom, 1));
      height: calc(88px * var(--zoom, 1));
      transform: translate(-50%, -50%);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: calc(4px * var(--zoom, 1));
      user-select: none;
    }

    .hex.brick { background: var(--brick); }
    .hex.lumber { background: var(--lumber); }
    .hex.wool { background: var(--wool); color: #14240f; }
    .hex.grain { background: var(--grain); color: #2c2408; }
    .hex.ore { background: var(--ore); }
    .hex.desert { background: var(--desert); color: #2a2417; }
    .hex.lake    { background: var(--lake); }
    .hex.sea     { background: var(--sea); }
    .hex.volcano { background: var(--volcano); }
    .hex.gold    { background: var(--gold); }
    .hex.strait  { background: var(--strait); }

    .number {
      width: calc(28px * var(--zoom, 1));
      height: calc(28px * var(--zoom, 1));
      border-radius: 999px;
      background: #f4e8c8;
      color: #272727;
      font-size: calc(14px * var(--zoom, 1));
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0, 0, 0, 0.35);
    }

    .number.hot { color: #b71616; }
    /* ── Active Player Banner ── */
    #turn-banner {
      position: fixed;
      top: calc(48px + env(safe-area-inset-top)); left: 0; right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      z-index: 200;
      background: rgba(10, 22, 35, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
      gap: 8px;
      transition: background 0.3s;
    }
    #turn-banner .player-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }
    #turn-banner .banner-name {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }
    #turn-banner .banner-action {
      color: var(--muted);
      font-size: 12px;
      flex: 1;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #turn-banner .banner-vps {
      display: flex;
      gap: 4px;
      font-size: 10px;
      flex-shrink: 0;
      flex-wrap: nowrap;
      align-items: center;
    }
    #turn-banner .vp-chip {
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      white-space: nowrap;
    }
    #turn-banner .vp-chip.active {
      background: rgba(255,255,255,0.18);
      font-weight: 700;
    }
    /* AI thinking pulse */
    @keyframes ai-think {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    #turn-banner.ai-thinking .banner-action {
      animation: ai-think 0.8s ease-in-out infinite;
    }
    /* banner offset handled with shared-wallet safe area */

    @keyframes dice-roll {
      0% { transform: scale(0.5) rotate(0deg); opacity: 0.3; }
      15% { transform: scale(1.4) rotate(90deg); opacity: 1; }
      30% { transform: scale(0.8) rotate(200deg); }
      45% { transform: scale(1.3) rotate(300deg); }
      60% { transform: scale(0.9) rotate(380deg); }
      75% { transform: scale(1.15) rotate(350deg); }
      100% { transform: scale(1) rotate(360deg); opacity: 1; }
    }

    .dice-animate {
      animation: dice-roll 0.7s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    @keyframes dice-bounce {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-12px); }
      60% { transform: translateY(-5px); }
    }

    @keyframes robber-appear {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-180deg); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.5) rotate(10deg); opacity: 1; }
      70% { transform: translate(-50%, -50%) scale(0.9) rotate(-5deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    }

    .robber-animate {
      animation: robber-appear 0.6s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    .big-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      pointer-events: none;
      animation: big-overlay-in 0.3s ease-out;
    }
    @keyframes big-overlay-in {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes big-overlay-out {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(1.5); }
    }
    .big-overlay-content {
      text-align: center;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }
    .big-overlay .big-number {
      font-size: 72px;
      font-weight: 900;
      color: #fff;
    }
    .big-overlay .big-sub {
      font-size: 18px;
      color: rgba(255,255,255,0.8);
      margin-top: 4px;
    }
    .big-overlay.seven .big-number { color: #ef4444; }
    .big-overlay.robber-alert .big-number { font-size: 56px; }

    .gold-picker-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .gold-picker-card {
      background: var(--panel); border: 1px solid rgba(255,215,0,0.4);
      border-radius: 16px; padding: 20px; width: min(340px, 92vw);
      box-shadow: 0 0 24px rgba(200,140,0,0.25);
    }
    .gold-picker-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; text-align: center; }
    .gold-picker-remaining { font-size: 13px; color: #fbbf24; text-align: center; margin-bottom: 14px; }
    .gold-picker-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .gold-picker-row:last-of-type { border-bottom: none; }
    .gold-picker-label { font-size: 15px; display: flex; gap: 6px; align-items: center; }
    .gold-picker-controls { display: flex; align-items: center; gap: 8px; }
    .gold-picker-controls button {
      width: 28px; height: 28px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08); color: #fff; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .gold-picker-controls button:disabled { opacity: 0.3; cursor: default; }
    .gold-picker-count { min-width: 20px; text-align: center; font-weight: 700; }

    @keyframes place-building {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      60% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(0.9); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    .vertex.settlement.just-placed,
    .vertex.city.just-placed {
      animation: place-building 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes robber-pulse {
      0%, 100% { box-shadow: inset 0 0 0 3px rgba(220,50,50,0); }
      50% { box-shadow: inset 0 0 0 3px rgba(220,50,50,0.9), 0 0 20px rgba(220,50,50,0.6); }
    }

    .hex.has-robber {
      animation: robber-pulse 1.2s ease-in-out infinite;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .robber {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      filter: drop-shadow(0 0 6px rgba(255,0,0,0.7));
      z-index: 5;
      pointer-events: none;
    }
    .robber.entering {
      animation: robber-appear 0.6s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    @keyframes robber-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(255,0,0,0.5)); transform: translate(-50%, -50%) scale(1); }
      50% { filter: drop-shadow(0 0 10px rgba(255,0,0,0.9)); transform: translate(-50%, -50%) scale(1.1); }
    }
    .has-robber .robber {
      animation: robber-pulse 2s ease-in-out infinite;
    }

    .hex-hit {
      filter: drop-shadow(0 0 6px rgba(255,215,0,0.9)) drop-shadow(0 0 12px rgba(255,215,0,0.5)) brightness(1.3);
      z-index: 3 !important;
      animation: hex-hit-glow 1.5s ease-in-out infinite;
    }
    @keyframes hex-hit-glow {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(255,215,0,0.9)) brightness(1.3); }
      50% { filter: drop-shadow(0 0 14px rgba(255,215,0,1)) brightness(1.5); }
    }
    .hex-blocked {
      filter: drop-shadow(0 0 6px rgba(255,50,50,0.8)) brightness(0.7);
      z-index: 3 !important;
      animation: hex-blocked-pulse 1.5s ease-in-out infinite;
    }
    @keyframes hex-blocked-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(255,50,50,0.6)) brightness(0.7); }
      50% { filter: drop-shadow(0 0 10px rgba(255,50,50,0.9)) brightness(0.6); }
    }

    .vertex {
      position: absolute;
      width: calc(16px * var(--zoom, 1));
      height: calc(16px * var(--zoom, 1));
      border-radius: 999px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      z-index: 4;
    }

    .vertex.buildable {
      box-shadow: 0 0 0 6px rgba(79, 194, 127, 0.22);
      background: rgba(79, 194, 127, 0.4);
    }

    .vertex.settlement,
    .vertex.city {
      border: none;
      width: calc(20px * var(--zoom, 1));
      height: calc(20px * var(--zoom, 1));
      border-radius: 50%;
      cursor: default;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(11px * var(--zoom, 1));
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.85), 0 2px 6px rgba(0,0,0,0.4);
      z-index: 5;
      position: absolute;
    }

    .vertex.city {
      width: calc(30px * var(--zoom, 1));
      height: calc(30px * var(--zoom, 1));
      border-radius: 6px;
      font-size: calc(13px * var(--zoom, 1));
      border: 2px solid rgba(255, 255, 255, 0.95);
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.95),
        0 0 0 5px rgba(9, 18, 28, 0.8),
        0 0 14px 3px var(--owner-color, rgba(255,255,255,0.4)),
        0 3px 10px rgba(0,0,0,0.55);
    }

    .vertex.settlement.player-0,
    .vertex.city.player-0 {
      box-shadow: 0 0 0 2.5px #fff, 0 0 10px 3px currentColor, 0 2px 8px rgba(0,0,0,0.4);
      animation: pulse-building 2.5s ease-in-out infinite;
    }

    @keyframes pulse-building {
      0%, 100% { box-shadow: 0 0 0 2.5px #fff, 0 0 10px 3px currentColor, 0 2px 8px rgba(0,0,0,0.4); }
      50% { box-shadow: 0 0 0 2.5px #fff, 0 0 16px 5px currentColor, 0 2px 8px rgba(0,0,0,0.4); }
    }

    .vertex.settlement.city-target::after {
      content: "";
      position: absolute;
      inset: -7px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      animation: city-target-ring 1.05s ease-in-out infinite;
    }

    @keyframes city-target-ring {
      0% { opacity: 0.9; transform: scale(0.86); }
      65% { opacity: 0.15; transform: scale(1.14); }
      100% { opacity: 0.8; transform: scale(0.94); }
    }

    .edge {
      position: absolute;
      height: calc(8px * var(--zoom, 1));
      transform-origin: left center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.35);
      cursor: pointer;
      z-index: 3;
    }

    .edge.buildable {
      background: rgba(79, 194, 127, 0.42);
      border-color: rgba(79, 194, 127, 0.8);
    }

    .edge.road {
      height: calc(10px * var(--zoom, 1));
      border: 1px solid rgba(0, 0, 0, 0.35);
    }

    .my-panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 4px 6px;
      background: rgba(8, 20, 30, 0.86);
      display: grid;
      gap: 3px;
      flex: 0 0 auto;
    }

    .resources {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      text-align: center;
    }

    .res {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 2px;
      font-size: 12px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 9px;
      padding: 8px 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    button.primary { background: #1d5c3d; border-color: #46a975; }
    button.danger { background: #632b2b; border-color: #b24a4a; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .hint {
      font-size: 12px;
      text-align: center;
      color: var(--muted);
      min-height: 16px;
    }

    .vp-panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.04);
      display: grid;
      gap: 6px;
    }

    .vp-label {
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    .vp-progress {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .vp-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #7de1a5);
      transition: width 0.2s ease;
    }

    .turn-timer {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.035);
      display: grid;
      gap: 5px;
    }

    .turn-timer-label {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      font-weight: 700;
    }

    .turn-timer-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      overflow: hidden;
    }

    .turn-timer-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffca66 0%, #ff8f57 50%, #e95b5b 100%);
      transition: width 0.18s linear;
    }

    .trade-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 14, 22, 0.7);
      backdrop-filter: blur(3px);
      z-index: 1200;
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .trade-modal {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(13, 33, 48, 0.98), rgba(10, 24, 36, 0.98));
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: 0 14px 36px rgba(0,0,0,0.44);
    }

    .trade-modal h3 {
      margin: 0;
      font-size: 16px;
      text-align: center;
      color: var(--accent);
    }

    .trade-section {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      display: grid;
      gap: 8px;
    }

    .trade-section-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .trade-options {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .trade-option {
      padding: 6px 9px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .trade-option.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent) inset;
      color: var(--accent);
    }

    .trade-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .turn-toast {

        a[i] = a[j];
        a[j] = t;

    // ────────────────────────────────────────────────────────────────────

    function resolveMapPreset(mapId = "standard") {
      return MAP_PRESETS[mapId] || MAP_PRESETS.standard;
    }

    function assignBalancedNumbers(axial, hexTypes, numberConfig) {
      const numbers = numberConfig.pool || [];
      const noAdjacentHot = new Set(numberConfig.noAdjacentHot || []);
      const NON_PROD = new Set(["desert","sea","lake","volcano","strait"]);
      const nonDesert = hexTypes.map((t,i) => ({t,i})).filter(x => !NON_PROD.has(x.t)).map(x => x.i);

      function hexNeighbors(idx) {
        const h = axial[idx];
        const dirs = [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];
        return dirs.map(([dq,dr]) => axial.findIndex(a => a.q === h.q + dq && a.r === h.r + dr)).filter(i => i !== -1);
      }

      for (let attempt = 0; attempt < 50; attempt++) {
        const pool = shuffle([...numbers]);
        const assigned = new Array(hexTypes.length).fill(null);
        for (let j = 0; j < nonDesert.length; j++) assigned[nonDesert[j]] = pool[j];

        let valid = true;
        for (let i = 0; i < axial.length && valid; i++) {
          if (assigned[i] === null) continue;
          for (const ni of hexNeighbors(i)) {
            if (assigned[ni] === null) continue;
            if (numberConfig.noAdjacentSame && assigned[i] === assigned[ni]) { valid = false; break; }
            if (noAdjacentHot.has(assigned[i]) && noAdjacentHot.has(assigned[ni])) { valid = false; break; }
          }
        }
        if (valid) return assigned;
      }

      const pool = shuffle([...numbers]);
      const assigned = new Array(hexTypes.length).fill(null);
      for (let j = 0; j < nonDesert.length; j++) assigned[nonDesert[j]] = pool[j];
      return assigned;
    }

    function resolveProducedResources(tileType, amount, preferredResource = null) {
      if (tileType !== "gold") return { [tileType]: amount };
      const chosen = RESOURCES.includes(preferredResource) ? preferredResource : "brick";
      return { [chosen]: amount };
    }

    function buildHexesFromPreset(mapId = "standard") {
      const preset = resolveMapPreset(mapId);
      const axial = preset.layout.axial.slice().sort((a, b) => (a.r - b.r) || (a.q - b.q));

      // coord.type이 설정된 칸은 고정 타일, 나머지만 pool에서 셔플 배치
      const fixedMap = new Map(axial.filter(c => c.type).map(c => [`${c.q},${c.r}`, c.type]));
      const resourcePool = preset.resources.fixed ? preset.resources.pool.slice() : shuffle(preset.resources.pool.slice());
      let pi = 0;
      const types = axial.map(c => { const ft = fixedMap.get(`${c.q},${c.r}`); return ft !== undefined ? ft : resourcePool[pi++]; });

      const balancedNumbers = preset.numbers?.pool?.length === types.filter(t => !["desert","sea","lake","volcano","strait"].includes(t)).length
        ? preset.numbers.pool.slice()
        : assignBalancedNumbers(axial, types, preset.numbers);
      return axial.map((coord, i) => ({
        index: i,
        q: coord.q,
        r: coord.r,
        type: types[i],
        number: balancedNumbers[i],
        robber: false,
        vertices: [],
        edges: []
      }));
    }

    function generateBoard(forcedHexes = null, mapId = "standard") {
      if (forcedHexes) {
        state.hexes = forcedHexes.map(h => ({ ...h, robber: !!h.robber, vertices: [], edges: [] }));
      } else {
        state.hexes = buildHexesFromPreset(mapId);
      }

      const { vertices, edges, centers, bounds, size } = buildGraph(state.hexes);
      state.vertices = vertices;
      state.edges = edges;
      state.geometry = { centers, minX: bounds.minX, minY: bounds.minY, maxX: bounds.maxX, maxY: bounds.maxY, size };
      state.robber = state.hexes.findIndex(h => h.type === "desert");
      state.hexes.forEach(h => { h.robber = false; });
      if (state.robber >= 0 && state.hexes[state.robber]) state.hexes[state.robber].robber = true;
      state.ports = generatePorts(mapId);
    }

    function generatePorts(mapId = "standard") {
      const preset = resolveMapPreset(mapId);
      // Find perimeter vertices (touching ≤ 2 hexes) sorted by angle from center
      const perim = state.vertices
        .filter(v => v.hexes.length <= 2)
        .map(v => ({ idx: v.index, angle: Math.atan2(v.y, v.x) }))
        .sort((a, b) => a.angle - b.angle);

      const portCount = preset.ports.pool.length;
      const selectedVertexCount = portCount * 2;
      const step = Math.floor(perim.length / selectedVertexCount);
      const selected = [];
      for (let i = 0; i < selectedVertexCount; i++) {
        const vi = perim[(i * step) % perim.length];
        selected.push(vi.idx);
      }

      const portTypes = shuffle(preset.ports.pool);

      return portTypes.map((pt, i) => ({
        ...pt,
        vertices: [selected[i * 2], selected[i * 2 + 1]]
      }));
    }

    function buildGraph(hexes) {
      const size = 42;
      const sqrt3 = Math.sqrt(3);
      const centers = [];
      const vertices = [];
      const edges = [];
      const vertexKeyMap = new Map();
      const edgeKeyMap = new Map();

      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      function centerFor(q, r) {
        return { x: size * sqrt3 * (q + r / 2), y: size * 1.5 * r };
      }

      function corner(center, i) {
        const angle = (Math.PI / 180) * (60 * i - 30);
        return { x: center.x + size * Math.cos(angle), y: center.y + size * Math.sin(angle) };
      }

      function addVertex(point) {
        const key = `${Math.round(point.x * 1000)}_${Math.round(point.y * 1000)}`;
        if (vertexKeyMap.has(key)) return vertexKeyMap.get(key);
        const idx = vertices.length;
        vertices.push({ index: idx, x: point.x, y: point.y, building: null, owner: null, hexes: [], edges: [] });
        vertexKeyMap.set(key, idx);
        return idx;
      }

      for (const hex of hexes) {
        const c = centerFor(hex.q, hex.r);
        centers.push(c);
        minX = Math.min(minX, c.x - size);
        minY = Math.min(minY, c.y - size);
        maxX = Math.max(maxX, c.x + size);
        maxY = Math.max(maxY, c.y + size);
        const v = [];
        for (let i = 0; i < 6; i += 1) {
          const vi = addVertex(corner(c, i));
          v.push(vi);
          vertices[vi].hexes.push(hex.index);
        }
        hex.vertices = v;
      }

      for (const hex of hexes) {
        for (let i = 0; i < 6; i += 1) {
          const a = hex.vertices[i];
          const b = hex.vertices[(i + 1) % 6];
          const key = a < b ? `${a}_${b}` : `${b}_${a}`;
          let ei = edgeKeyMap.get(key);
          if (ei === undefined) {
            ei = edges.length;
            edges.push({ index: ei, a, b, owner: null, hexes: [] });
            edgeKeyMap.set(key, ei);
            vertices[a].edges.push(ei);
            vertices[b].edges.push(ei);
          }
          edges[ei].hexes.push(hex.index);
          hex.edges.push(ei);
        }
      }
      return { vertices, edges, centers, bounds: { minX, minY, maxX, maxY }, size };
    }

    function getCurrentPlayer() {
      return state.players[state.currentPlayer];
    }

    function totalResourceCount(player) {
      return RESOURCES.reduce((n, r) => n + player.resources[r], 0);
    }

    function canAfford(player, cost) {
      for (const [k, v] of Object.entries(cost)) {
        if ((player.resources[k] || 0) < v) return false;
      }
      return true;
    }

    function spend(player, cost) {
      for (const [k, v] of Object.entries(cost)) player.resources[k] -= v;
    }

    function applyBankTrade(playerIdx, give, get) {
      const p = state.players[playerIdx];
      if (!p) return false;
      if (!RESOURCES.includes(give) || !RESOURCES.includes(get)) return false;
      if (give === get) return false;
      if ((p.resources[give] || 0) < 4) return false;
      p.resources[give] -= 4;
      p.resources[get] += 1;
      return true;
    }

    function adjacentVertices(vIdx) {
      const out = new Set();
      for (const eIdx of state.vertices[vIdx].edges) {
        const e = state.edges[eIdx];
        out.add(e.a === vIdx ? e.b : e.a);
      }
      return [...out];
    }

    function canPlaceSettlement(playerIdx, vIdx, setup = false) {
      const v = state.vertices[vIdx];
      if (v.building) return false;
      for (const n of adjacentVertices(vIdx)) {
        if (state.vertices[n].building) return false;
      }
      if (setup) return true;
      return v.edges.some(eIdx => state.edges[eIdx].owner === playerIdx);
    }

    function canPlaceRoad(playerIdx, eIdx, setup = false) {
      const e = state.edges[eIdx];
      if (e.owner !== null) return false;
      if (setup) {
        if (state.lastSetupVertex === null) return false;
        return e.a === state.lastSetupVertex || e.b === state.lastSetupVertex;
      }
      function endpointConnects(vIdx) {
        const v = state.vertices[vIdx];
        if (v.owner === playerIdx) return true;
        if (v.owner !== null && v.owner !== playerIdx) return false;
        return v.edges.some(x => x !== eIdx && state.edges[x].owner === playerIdx);
      }
      return endpointConnects(e.a) || endpointConnects(e.b);
    }

    function canUpgradeCity(playerIdx, vIdx) {
      const v = state.vertices[vIdx];
      return v.building === "settlement" && v.owner === playerIdx;
    }

    function placeSettlement(playerIdx, vIdx, free = false) {
      const player = state.players[playerIdx];
      if (!free && !canAfford(player, COST.settlement)) return false;
      if (!canPlaceSettlement(playerIdx, vIdx, free && (state.phase === "setup1" || state.phase === "setup2"))) return false;
      if (!free) spend(player, COST.settlement);
      state.vertices[vIdx].building = "settlement";
      state.vertices[vIdx].owner = playerIdx;
      state.lastPlacedVertex = vIdx;
      player.buildings.push({ type: "settlement", vertex: vIdx });
      recalcAllVP();
      return true;
    }

    function placeRoad(playerIdx, eIdx, free = false) {
      const player = state.players[playerIdx];
      if (!free && !canAfford(player, COST.road)) return false;
      if (!canPlaceRoad(playerIdx, eIdx, free && (state.phase === "setup1" || state.phase === "setup2"))) return false;
      if (!free) spend(player, COST.road);
      state.edges[eIdx].owner = playerIdx;
      player.roads.push(eIdx);
      recalcLongestRoad();
      recalcAllVP();
      return true;
    }

    function upgradeCity(playerIdx, vIdx) {
      const player = state.players[playerIdx];
      if (!canAfford(player, COST.city)) return false;
      if (!canUpgradeCity(playerIdx, vIdx)) return false;
      spend(player, COST.city);
      state.vertices[vIdx].building = "city";
      state.lastPlacedVertex = vIdx;
      const target = player.buildings.find(b => b.vertex === vIdx);
      if (target) target.type = "city";
      recalcAllVP();
      return true;
    }

    function grantSecondSetupResources(playerIdx, vIdx) {
      for (const hIdx of state.vertices[vIdx].hexes) {
        const hex = state.hexes[hIdx];
        const PROD_TYPES = new Set(["brick","lumber","wool","grain","ore"]);
        if (PROD_TYPES.has(hex.type)) state.players[playerIdx].resources[hex.type] += 1;
      }
    }

    function pickBestAIGoldResource(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return "grain";
      return RESOURCES.reduce((best, r) => (p.resources[r] || 0) < (p.resources[best] || 0) ? r : best, "grain");
    }

    function showGainsToast(gains) {
      const humanIdx = localPlayerIndex();
      const parts = [];
      for (const [pidx, res] of Object.entries(gains)) {
        const pi = Number(pidx);
        const name = pi === humanIdx ? "나" : state.players[pi].name;
        const detail = Object.entries(res).map(([r, n]) => `${RESOURCE_ICONS[r] || r}×${n}`).join(" ");
        parts.push(`${name}: ${detail}`);
      }
      if (parts.length > 0) { SFX.resource(); showToast(`🎁\n${parts.join("\n")}`, 4000, { bottom: 150 }); }
    }

    function distributeResources(number) {
      const humanIdx = localPlayerIndex();
      const gains = {};
      state._pendingHumanGold = 0;

      for (const hex of state.hexes) {
        if (hex.number !== number || hex.index === state.robber) continue;
        for (const vIdx of hex.vertices) {
          const v = state.vertices[vIdx];
          if (!v.building || v.owner === null) continue;
          const rawAmount = v.building === "city" ? 2 : 1;
          const owner = state.players[v.owner];

          if (hex.type === "gold") {
            if (v.owner === humanIdx && !isMultiMode()) {
              state._pendingHumanGold += rawAmount; // deferred to picker
            } else {
              const preferred = pickBestAIGoldResource(v.owner);
              const amount = Math.min(rawAmount, bankRemaining(preferred));
              if (amount > 0) { owner.resources[preferred] += amount; if (!gains[v.owner]) gains[v.owner] = {}; gains[v.owner][preferred] = (gains[v.owner][preferred] || 0) + amount; }
            }
            continue;
          }

          const produced = resolveProducedResources(hex.type, rawAmount);
          for (const [resource, requested] of Object.entries(produced)) {
            const amount = Math.min(requested, bankRemaining(resource));
            if (amount <= 0) continue;
            owner.resources[resource] += amount;
            if (!gains[v.owner]) gains[v.owner] = {};
            gains[v.owner][resource] = (gains[v.owner][resource] || 0) + amount;
          }
        }
      }

      if (state._pendingHumanGold > 0) {
        state._pendingGains = gains; // toast deferred until picker resolves
      } else {
        showGainsToast(gains);
      }
    }

    function showGoldPicker(amount) {
      return new Promise(resolve => {
        const chosen = {}; RESOURCES.forEach(r => chosen[r] = 0);
        let remaining = amount;
        const render = () => {
          let el = document.getElementById("gold-picker-modal");
          if (!el) { el = document.createElement("div"); el.id = "gold-picker-modal"; document.body.appendChild(el); }
          el.innerHTML = `<div class="gold-picker-overlay"><div class="gold-picker-card">
            <div class="gold-picker-title">💰 금광 수확!</div>
            <div class="gold-picker-remaining">자원 <strong>${remaining}</strong>개 선택 가능</div>
            ${RESOURCES.map(r => `<div class="gold-picker-row">
              <span class="gold-picker-label">${RESOURCE_ICONS[r]} ${RESOURCE_NAMES[r]}</span>
              <div class="gold-picker-controls">
                <button onclick="window._gAdj('${r}',-1)" ${chosen[r]<=0?"disabled":""}>−</button>
                <span class="gold-picker-count">${chosen[r]}</span>
                <button onclick="window._gAdj('${r}',1)" ${remaining<=0?"disabled":""}>+</button>
              </div></div>`).join("")}
            <button style="width:100%;margin-top:14px;padding:10px;border-radius:10px;background:${remaining===0?'var(--accent)':'rgba(255,255,255,0.1)'};border:none;color:#fff;font-size:15px;font-weight:700;cursor:${remaining===0?'pointer':'default'};opacity:${remaining===0?1:0.45};"
              ${remaining!==0?"disabled":""} onclick="window._gOK()">확인</button>
          </div></div>`;
        };
        window._gAdj = (r, d) => {
          if (d < 0 && chosen[r] <= 0) return;
          if (d > 0 && remaining <= 0) return;
          chosen[r] += d; remaining -= d; render();
        };
        window._gOK = () => {
          const el = document.getElementById("gold-picker-modal");
          if (el) el.remove();
          delete window._gAdj; delete window._gOK;
          resolve({ ...chosen });
        };
        render();
      });
    }

    async function resolveHumanGoldIfNeeded() {
      if (!state._pendingHumanGold) return;
      const chosen = await showGoldPicker(state._pendingHumanGold);
      const humanIdx = localPlayerIndex();
      const human = state.players[humanIdx];
      const gains = state._pendingGains || {};
      for (const [r, n] of Object.entries(chosen)) {
        const amount = Math.min(n, bankRemaining(r));
        if (amount > 0) { human.resources[r] += amount; if (!gains[humanIdx]) gains[humanIdx] = {}; gains[humanIdx][r] = (gains[humanIdx][r] || 0) + amount; }
      }
      state._pendingHumanGold = 0; state._pendingGains = null;
      showGainsToast(gains);
      recalcAllVP();
      render();
    }

    function getDiceRevealDelayMs() {
      return 1000;
    }

    function getHexLabel(hexIndex) {
      const hex = state.hexes?.[hexIndex];
      if (!hex) return "알 수 없는 타일";
      const number = hex.number ? `${hex.number}번 ` : "";
      return `${number}${RESOURCE_NAMES[hex.type] || hex.type}`;
    }

    function formatRobberMoveMessage({ actorName, source, hexLabel, victimName, stolenResource }) {
      const sourceParticle = source === "도둑" ? "으로" : "로";
      if (victimName && stolenResource) {
        return `${actorName}가 ${source}${sourceParticle} ${hexLabel}에 도둑을 옮기고 ${victimName}에게서 ${RESOURCE_ICONS[stolenResource]} 1장을 가져갔습니다.`;
      }
      return `${actorName}가 ${source}${sourceParticle} ${hexLabel}에 도둑을 옮겼지만 훔칠 대상은 없었습니다.`;
    }

    function getLongestRoadBadge(isOwner) {
      return isOwner ? "🛣️" : "";
    }

    function handleSeven() {
      SFX.robber();
      showToast("🗡️ 강도가 나타났어요!", 1600, { bottom: 150 });
      showBigOverlay("🦹", "도둑 출현!", "robber-alert", 1200);
      Voice.human("seven");
      state.phase = "robber";
      state.canEndTurn = false;
      state.hint = "7이 나왔습니다. 자원 폐기 후 도둑을 이동하세요.";
    }

    function pickRandomDiscards(playerIdx, count) {
      const removed = emptyResources();
      const p = state.players[playerIdx];
      let n = count;
      while (n > 0) {
        const bag = RESOURCES.filter(r => p.resources[r] > 0);
        if (!bag.length) break;
        const picked = bag[Math.floor(Math.random() * bag.length)];
        p.resources[picked] -= 1;
        removed[picked] += 1;
        n -= 1;
      }
      return removed;
    }

    function pickDiscardSelection(playerIdx, count) {
      return new Promise(resolve => {
        const p = state.players[playerIdx];
        const picked = emptyResources();
        const initialTotal = totalResourceCount(p);
        const overlay = document.createElement("div");
        overlay.style.cssText = "position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);";
        const draw = () => {
          const pickedCount = RESOURCES.reduce((s, r) => s + picked[r], 0);
          const remaining = count - pickedCount;
          const canConfirm = pickedCount === count;
          overlay.innerHTML = `
            <div style="background:#16213e;border:2px solid #b33838;border-radius:16px;padding:20px;max-width:380px;width:92%;text-align:center;color:#fff;">
              <div style="font-size:18px;font-weight:700;margin-bottom:6px;">🦹 도둑 출현!</div>
              <div style="font-size:13px;color:#fbbf24;margin-bottom:4px;">버릴 카드를 ${count}장 선택하세요</div>
              <div style="font-size:11px;color:#9ca3af;margin-bottom:14px;">남은 선택: ${remaining}장 / 보유 ${initialTotal}장</div>
              <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;">
                ${RESOURCES.map(r => {
                  const have = p.resources[r];
                  const sel = picked[r];
                  const left = have - sel;
                  const decDis = sel <= 0;
                  const incDis = left <= 0 || pickedCount >= count;
                  return `
                    <div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.04);border-radius:8px;">
                      <div style="font-size:18px;width:30px;">${RESOURCE_ICONS[r]}</div>
                      <div style="flex:1;text-align:left;font-size:12px;">${RESOURCE_NAMES[r]}<div style="font-size:10px;color:#9ca3af;">남음 ${left} / ${have}</div></div>
                      <button data-act="dec" data-res="${r}" ${decDis ? "disabled" : ""} style="width:32px;height:32px;border-radius:8px;border:1px solid #444;background:${decDis ? "#222" : "#3a1212"};color:#fff;font-size:16px;cursor:${decDis ? "not-allowed" : "pointer"};">−</button>
                      <div style="min-width:24px;font-size:14px;font-weight:700;color:#fca5a5;">${sel}</div>
                      <button data-act="inc" data-res="${r}" ${incDis ? "disabled" : ""} style="width:32px;height:32px;border-radius:8px;border:1px solid #444;background:${incDis ? "#222" : "#3a1212"};color:#fff;font-size:16px;cursor:${incDis ? "not-allowed" : "pointer"};">+</button>
                    </div>`;
                }).join("")}
              </div>
              <button data-act="confirm" ${canConfirm ? "" : "disabled"} style="padding:10px 20px;border-radius:10px;border:1px solid ${canConfirm ? "#ffd700" : "#444"};background:${canConfirm ? "#b33838" : "#222"};color:#fff;font-weight:700;cursor:${canConfirm ? "pointer" : "not-allowed"};font-size:14px;">${canConfirm ? "🗑 확정" : `${remaining}장 더 필요`}</button>
            </div>`;
        };
        overlay.addEventListener("click", e => {
          const btn = e.target.closest("button[data-act]");
          if (!btn || btn.disabled) return;
          const act = btn.dataset.act;
          if (act === "confirm") {
            const total = RESOURCES.reduce((s, r) => s + picked[r], 0);
            if (total !== count) return;
            overlay.remove();
            resolve(picked);
            return;
          }
          const r = btn.dataset.res;
          if (!r) return;
          const totalPicked = RESOURCES.reduce((s, x) => s + picked[x], 0);
          if (act === "inc") {
            const left = p.resources[r] - picked[r];
            if (left <= 0 || totalPicked >= count) return;
            picked[r] += 1;
          } else if (act === "dec") {
            if (picked[r] <= 0) return;
            picked[r] -= 1;
          }
          draw();
        });
        draw();
        document.body.appendChild(overlay);
      });
    }

    async function postDicePromptDiscards(diceSum) {
      if (diceSum !== 7) return;
      const handlesAI = !isMultiMode() || mpState.isHost;
      if (handlesAI) {
        for (let i = 0; i < state.players.length; i += 1) {
          const pl = state.players[i];
          if (!pl || !pl.isAI) continue;
          const total = totalResourceCount(pl);
          if (total <= 7) continue;
          const discardCount = Math.floor(total / 2);
          const removed = pickRandomDiscards(i, discardCount);
          for (const r of RESOURCES) pl.resources[r] += removed[r];
          if (isMultiMode()) {
            await sendGameAction(ACTION.DISCARD_RESOURCES, {
              playerId: pl.userId || pl.id,
              resources: removed
            });
          } else {
            applyDiscardResources(i, removed);
          }
        }
      }
      const myIdx = localPlayerIndex();
      if (myIdx < 0) return;
      const me = state.players[myIdx];
      if (!me || me.isAI) return;
      const total = totalResourceCount(me);
      if (total <= 7) return;
      const discard = Math.floor(total / 2);
      const removed = await pickDiscardSelection(myIdx, discard);
      if (isMultiMode()) {
        await sendGameAction(ACTION.DISCARD_RESOURCES, {
          playerId: me.userId || me.id,
          resources: removed
        });
      } else {
        applyDiscardResources(myIdx, removed);
      }
      render();
    }

    function getBestTradeRatio(playerIdx, resourceType) {
      let best = 4;
      for (const port of (state.ports || [])) {
        const hasPort = port.vertices.some(vIdx => {
          const v = state.vertices[vIdx];
          return v && v.owner === playerIdx;
        });
        if (!hasPort) continue;
        if (port.type === "generic" && port.ratio < best) best = port.ratio;
        if (port.type === resourceType && port.ratio < best) best = port.ratio;
      }
      return best;
    }

    function applyPortTrade(playerIdx, give, get) {
      const p = state.players[playerIdx];
      if (!p || give === get || !RESOURCES.includes(give) || !RESOURCES.includes(get)) return false;
      const ratio = getBestTradeRatio(playerIdx, give);
      if ((p.resources[give] || 0) < ratio) return false;
      p.resources[give] -= ratio;
      p.resources[get] += 1;
      return true;
    }

    function canHumanTrade(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return false;
      return RESOURCES.some(r => (p.resources[r] || 0) >= getBestTradeRatio(playerIdx, r));
    }

    function closeTradeDialog() {
      state.tradeDialog = { open: false, give: null, get: null };
    }

    function openTradeDialog(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return false;
      const giveOptions = RESOURCES.filter(r => (p.resources[r] || 0) >= getBestTradeRatio(playerIdx, r));
      if (!giveOptions.length) return false;
      const give = giveOptions[0];
      const get = RESOURCES.find(r => r !== give) || RESOURCES[0];
      state.tradeDialog = { open: true, give, get };
      return true;
    }

    function tradeAdjust(type, resource, delta) {
      if (!state.tradeDialog.open) return;
      const td = state.tradeDialog;
      if (!td.offer) td.offer = Object.fromEntries(RESOURCES.map(r => [r, 0]));
      if (!td.want) td.want = Object.fromEntries(RESOURCES.map(r => [r, 0]));
      const counts = type === "offer" ? td.offer : td.want;
      const newVal = (counts[resource] || 0) + delta;
      if (type === "offer") {
        const max = state.players[localPlayerIndex()]?.resources[resource] || 0;
        counts[resource] = Math.max(0, Math.min(max, newVal));
      } else {
        counts[resource] = Math.max(0, newVal);
      }
      render();
    }

    function confirmBankTrade() {
      if (!state.tradeDialog.open) return;
      const pIdx = localPlayerIndex();
      const p = state.players[pIdx];
      const td = state.tradeDialog;
      const offer = td.offer || {};
      const want = td.want || {};
      
      // Calculate how many trades we can do
      const totalWant = RESOURCES.reduce((s, r) => s + (want[r] || 0), 0);
      if (totalWant <= 0) { state.hint = "받을 자원을 선택하세요."; render(); return; }
      
      // Try to fulfill each wanted resource
      let traded = 0;
      const tempRes = { ...p.resources };
      const giveLog = [];
      const getLog = [];
      
      for (const getRes of RESOURCES) {
        let needed = want[getRes] || 0;
        while (needed > 0) {
          // Find a give resource with enough remaining
          const giveRes = RESOURCES.find(r => {
            if (r === getRes) return false;
            const ratio = getBestTradeRatio(pIdx, r);
            return tempRes[r] >= ratio;
          });
          if (!giveRes) break;
          const ratio = getBestTradeRatio(pIdx, giveRes);
          tempRes[giveRes] -= ratio;
          tempRes[getRes] += 1;
          giveLog.push(`${RESOURCE_ICONS[giveRes]}×${ratio}`);
          getLog.push(`${RESOURCE_ICONS[getRes]}`);
          needed--;
          traded++;
        }
      }
      
      if (traded === 0) {
        state.hint = "은행 거래 불가: 자원이 부족합니다.";
        render();
        return;
      }
      
      // Apply
      for (const r of RESOURCES) p.resources[r] = tempRes[r];
      state.canEndTurn = true;
      state.hint = `은행 거래: ${giveLog.join("+")} → ${getLog.join("+")}`;
      Voice.human("trade-bank");
      SFX.build();
      closeTradeDialog();
      render();
    }

    function humanTrade() {
      const me = state.players[localPlayerIndex()];
      if (!me) return;
      if (!isHumanTurn() || state.phase !== "main" || state.winner) return;
      const pIdx = localPlayerIndex();
      // 은행 거래 가능하면 거래 모달, 아니면 AI 거래용 간단 모달
      if (!openTradeDialog(pIdx)) {
        // 은행 거래 불가해도 AI 거래용으로 모달 열기
        const give = RESOURCES.find(r => (me.resources[r] || 0) >= 1);
        if (!give) { state.hint = "자원이 없습니다."; render(); return; }
        const get = RESOURCES.find(r => r !== give) || give;
        state.tradeDialog = { open: true, give, get, aiOnly: true };
      }
      render();
    }

    function buyDevCard(playerIdx, free = false) {
      const p = state.players[playerIdx];
      if (!p || !state.devDeck.length) return false;
      if (!free && !canAfford(p, COST.devCard)) return false;
      if (!free) spend(p, COST.devCard);
      const cardType = state.devDeck.pop();
      p.devCards.push({ type: cardType, turnBought: state.turnNumber });
      recalcAllVP();
      return true;
    }

    function hasPlayableKnight(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return false;
      return (p.devCards || []).some(c => c.type === "knight" && c.turnBought < state.turnNumber && !c.played);
    }

    function hasPlayableMonopoly(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return false;
      return (p.devCards || []).some(c => c.type === "monopoly" && c.turnBought < state.turnNumber && !c.played);
    }

    function playMonopoly(playerIdx, resource) {
      const p = state.players[playerIdx];
      if (!p || !RESOURCES.includes(resource)) return { ok: false, gained: 0 };
      const card = (p.devCards || []).find(c => c.type === "monopoly" && c.turnBought < state.turnNumber && !c.played);
      if (!card) return { ok: false, gained: 0 };
      card.played = true;
      let gained = 0;
      for (let i = 0; i < state.players.length; i += 1) {
        if (i === playerIdx) continue;
        const amount = state.players[i].resources[resource] || 0;
        if (amount > 0) {
          state.players[i].resources[resource] = 0;
          p.resources[resource] += amount;
          gained += amount;
        }
      }
      recalcAllVP();
      return { ok: true, gained };
    }

    function playKnight(playerIdx, hexIndex, victimIdx) {
      const p = state.players[playerIdx];
      const card = (p.devCards || []).find(c => c.type === "knight" && c.turnBought < state.turnNumber && !c.played);
      if (!card) return false;
      card.played = true;
      p.knights += 1;
      // Largest army: 3+ knights, most knights (tie keeps current holder)
      const knights = state.players.map(pl => pl.knights);
      const maxKnights = Math.max(...knights);
      if (maxKnights < 3) {
        state.largestArmy = null;
      } else {
        const leaders = knights.map((v, i) => ({ v, i })).filter(x => x.v === maxKnights);
        if (leaders.length === 1) {
          state.largestArmy = leaders[0].i;
        } else if (!(state.largestArmy !== null && leaders.some(x => x.i === state.largestArmy))) {
          state.largestArmy = null;
        }
      }
      const result = moveRobber(hexIndex, victimIdx);
      recalcAllVP();
      return result;
    }

    function applyDiscardResources(playerIdx, resources) {
      const p = state.players[playerIdx];
      for (const r of RESOURCES) {
        const amount = Math.max(0, Number(resources?.[r] || 0));
        p.resources[r] = Math.max(0, p.resources[r] - amount);
      }
    }

    function stealFromVictim(thiefIdx, victimIdx, forcedResource = null) {
      if (victimIdx === null || victimIdx === undefined || victimIdx < 0) return null;
      const victim = state.players[victimIdx];
      if (!victim || totalResourceCount(victim) <= 0) return null;
      let picked = forcedResource;
      if (!picked) {
        const bag = RESOURCES.filter(r => victim.resources[r] > 0);
        if (!bag.length) return null;
        picked = bag[Math.floor(Math.random() * bag.length)];
      }
      if (!RESOURCES.includes(picked) || victim.resources[picked] <= 0) return null;
      victim.resources[picked] -= 1;
      state.players[thiefIdx].resources[picked] += 1;
      return picked;
    }

    function moveRobber(hexIndex, forcedVictim = null, forcedResource = null) {
      if (state.phase !== "robber" && state.phase !== "knight-robber") return { ok: false };
      if (hexIndex < 0 || hexIndex >= state.hexes.length || hexIndex === state.robber) return { ok: false };
      if (state.robber >= 0 && state.hexes[state.robber]) state.hexes[state.robber].robber = false;
      state.robber = hexIndex;
      if (state.hexes[state.robber]) state.hexes[state.robber].robber = true;
      let victimIdx = playerIndexFromAnyId(forcedVictim);
      if (victimIdx === -1) {
        const victims = new Set();
        for (const vIdx of state.hexes[hexIndex].vertices) {
          const owner = state.vertices[vIdx].owner;
          if (owner !== null && owner !== state.currentPlayer && totalResourceCount(state.players[owner]) > 0) victims.add(owner);
        }
        const list = [...victims];
        victimIdx = list.length ? list[Math.floor(Math.random() * list.length)] : -1;
      }
      const picked = stealFromVictim(state.currentPlayer, victimIdx, forcedResource);
      const actorName = state.players[state.currentPlayer]?.name || "플레이어";
      const victimName = victimIdx !== -1 ? state.players[victimIdx]?.name || "상대" : "";
      const source = state.phase === "knight-robber" ? "기사" : "도둑";
      const hexLabel = getHexLabel(hexIndex);
      const detailMessage = formatRobberMoveMessage({ actorName, source, hexLabel, victimName, stolenResource: picked });
      showToast(`🦹 ${detailMessage}`, 2600, { bottom: 150 });
      state.phase = "main";
      state.canEndTurn = true;
      state.hint = detailMessage;
      return {
        ok: true,
        victimId: victimIdx === -1 ? null : (state.players[victimIdx].userId || state.players[victimIdx].id),
        stolenResource: picked || null
      };
    }

    function applyRollDice(playerIdx, values, skipDiscard = false) {
      if (state.winner || state.phase !== "roll" || playerIdx !== state.currentPlayer) return false;
      const d1 = Number(values?.[0]);
      const d2 = Number(values?.[1]);
      if (!d1 || !d2) return false;
      const sum = d1 + d2;
      state.hint = `${getCurrentPlayer().name}: 🎲 ${d1} + ${d2} = ${sum}`;
      state.lastDiceSum = sum;
      if (sum === 7) handleSeven(skipDiscard);
      else {
        distributeResources(sum);
        state.phase = "main";
        state.canEndTurn = true;
      }
      return true;
    }

    function endTurnInternal() {
      if (state.winner || !state.canEndTurn) return false;
      // 도로 건설 카드 사용 중이면 턴 종료 차단
      if (state.roadBuildingRemaining > 0) {
        state.hint = `도로 건설 카드: 남은 무료 도로 ${state.roadBuildingRemaining}개를 먼저 배치하세요.`;
        render();
        return false;
      }
      state.buildMode = null;
      state.lastDiceSum = 0;
      closeTradeDialog();
      state.currentPlayer = (state.currentPlayer + 1) % state.players.length;
      state.phase = "roll";
      state.canEndTurn = false;
      state.turnNumber += 1;
      state.hint = `${getCurrentPlayer().name}의 차례: 주사위를 굴리세요.`;
      onTurnStart();
      return true;
    }

    function recalcLongestRoad() {
      if (!state.players.length) return;
      const lengths = state.players.map((_, i) => longestRoadLength(i));
      const maxLen = Math.max(...lengths);
      if (maxLen < 5) {
        state.longestRoad = null;
        return;
      }
      const leaders = lengths.map((v, i) => ({ v, i })).filter(x => x.v === maxLen);
      if (leaders.length === 1) {
        state.longestRoad = leaders[0].i;
        return;
      }
      if (state.longestRoad !== null && leaders.some(x => x.i === state.longestRoad)) return;
      state.longestRoad = null;
    }

    function longestRoadLength(playerIdx) {
      const roadEdges = state.players[playerIdx].roads;
      if (!roadEdges.length) return 0;
      const set = new Set(roadEdges);
      let best = 0;

      function blockedByOpponent(vIdx) {
        const owner = state.vertices[vIdx].owner;
        return owner !== null && owner !== playerIdx;
      }

      function dfs(vIdx, used, length, fromEdge) {
        best = Math.max(best, length);
        if (fromEdge !== null && blockedByOpponent(vIdx)) return;
        for (const eIdx of state.vertices[vIdx].edges) {
          if (!set.has(eIdx) || used.has(eIdx)) continue;
          used.add(eIdx);
          const e = state.edges[eIdx];
          const nextV = e.a === vIdx ? e.b : e.a;
          dfs(nextV, used, length + 1, eIdx);
          used.delete(eIdx);
        }
      }

      const touchedVertices = new Set();
      for (const eIdx of roadEdges) {
        touchedVertices.add(state.edges[eIdx].a);
        touchedVertices.add(state.edges[eIdx].b);
      }
      for (const v of touchedVertices) dfs(v, new Set(), 0, null);
      return best;
    }

    function recalcAllVP() {
      const prevWinner = state.winner;
      for (let i = 0; i < state.players.length; i += 1) {
        const p = state.players[i];
        let vp = 0;
        for (const b of p.buildings) vp += b.type === "city" ? 2 : 1;
        if (state.longestRoad === i) vp += 2;
        if (state.largestArmy === i) vp += 2;
        vp += (p.devCards || []).filter(c => c.type === "vp").length;
        p.vp = vp;
      }
      const winner = state.players.findIndex(p => p.vp >= 10);
      if (winner !== -1) {
        state.winner = winner;
        state.phase = "end";
        state.canEndTurn = false;
        state.hint = `🎉 ${state.players[winner].name} 승리!`;
        if (prevWinner !== winner) {
          SFX.win();
          if (winner === localPlayerIndex()) {
            launchConfetti();
            showToast("🎉 승리! +10,000G", 6000);
            if (typeof SharedWallet !== "undefined" && SharedWallet.addGold) SharedWallet.addGold(10000);
          } else {
            showToast(`😢 ${state.players[winner].name} 승리...`, 6000);
          }
          Voice.play("victory", winner % 2 === 0 ? "m" : "f");
        }
      }
    }

    function validRoadsFor(playerIdx, setup = false) {
      const out = [];
      for (let i = 0; i < state.edges.length; i += 1) if (canPlaceRoad(playerIdx, i, setup)) out.push(i);
      return out;
    }

    function validSettlementsFor(playerIdx, setup = false) {
      const out = [];
      for (let i = 0; i < state.vertices.length; i += 1) if (canPlaceSettlement(playerIdx, i, setup)) out.push(i);
      return out;
    }

    function validCitiesFor(playerIdx) {
      const out = [];
      for (let i = 0; i < state.vertices.length; i += 1) if (canUpgradeCity(playerIdx, i)) out.push(i);
      return out;
    }

    function advanceSetupTurn() {
      const order = setupOrder();
      if (state.setupOrderIndex < order.length - 1) {
        state.setupOrderIndex += 1;
        state.currentPlayer = order[state.setupOrderIndex];
        state.setupStep = "settlement";
        state.lastSetupVertex = null;
        state.hint = `${state.players[state.currentPlayer].name} 초기 배치: 마을을 놓으세요.`;
        onTurnStart();
        return;
      }
      if (state.phase === "setup1") {
        state.phase = "setup2";
        state.setupRound = 2;
        state.setupOrderIndex = 0;
        const order2 = setupOrder();
        state.currentPlayer = order2[0];
        state.setupStep = "settlement";
        state.lastSetupVertex = null;
        state.hint = "2라운드 초기 배치: 마지막 플레이어부터 역순으로 배치합니다.";
        onTurnStart();
        return;
      }
      state.phase = "roll";
      state.currentPlayer = 0;
      state.setupStep = "settlement";
      state.lastSetupVertex = null;
      state.hint = "메인 게임 시작: 주사위를 굴리세요.";
      onTurnStart();
    }

    function showTurnToast(msg, duration = 2000) {
      if (state.screen !== "game") return;
      const el = document.createElement("div");
      el.className = "turn-toast";
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), duration);
    }

    function onTurnStart(announce = true) {
      state.turnTimeLeft = 60;
      state.tradeRejectedThisTurn = false;
      cancelAutoEndTimer();
      closeTradeDialog();
      if (announce && state.players[state.currentPlayer]) {
        showTurnToast(`${state.players[state.currentPlayer].name}의 차례!`, 2000);
      }
    }

    let autoEndTimer = null;
    function cancelAutoEndTimer() {
      if (autoEndTimer) {
        clearTimeout(autoEndTimer);
        autoEndTimer = null;
      }
    }

    // Any user click on a button/hex during the auto-end countdown cancels it
    // so the player can still trade or build if they intend to.
    document.addEventListener("click", (e) => {
      if (!autoEndTimer) return;
      if (e.target.closest("button, .hex, [data-trade], [data-build]")) {
        cancelAutoEndTimer();
      }
    }, true);

    function maybeAutoEndTurn() {
      if (autoEndTimer) return;
      if (state.winner) return;
      if (state.phase !== "main") return;
      if (!state.canEndTurn) return;
      if (state.roadBuildingRemaining > 0) return;
      if (!isHumanTurn()) return;
      const myIdx = localPlayerIndex();
      if (myIdx < 0) return;
      const me = state.players[myIdx];
      if (!me) return;

      // Has a playable dev card → action available
      if (hasPlayableKnight(myIdx) || hasPlayableMonopoly(myIdx)) return;
      if ((me.devCards || []).some(c =>
        (c.type === "road_building" || c.type === "year_of_plenty")
        && c.turnBought < state.turnNumber && !c.played)) return;

      // Can build something → action available
      const canRoad = canAfford(me, COST.road) && validRoadsFor(myIdx).length > 0;
      const canSettlement = canAfford(me, COST.settlement) && validSettlementsFor(myIdx).length > 0;
      const canCity = canAfford(me, COST.city) && validCitiesFor(myIdx).length > 0;
      const canBuyDev = canAfford(me, COST.devCard) && state.devDeck.length > 0;
      if (canRoad || canSettlement || canCity || canBuyDev) return;

      // No build, no playable. Trade is the only remaining option — only auto-end
      // if there are no resources to trade with, OR a trade was already rejected this turn.
      const hasResources = totalResourceCount(me) > 0;
      const tradeRejected = state.tradeRejectedThisTurn === true;
      if (hasResources && !tradeRejected) return;

      showToast("💤 할 수 있는 행동이 없어 턴을 자동 종료합니다.", 1800);
      autoEndTimer = setTimeout(() => {
        autoEndTimer = null;
        if (isHumanTurn() && state.canEndTurn && !state.winner) endTurn();
      }, 1800);
    }

    function ensureTurnTimer() {
      if (turnTimerInterval) return;
      turnTimerInterval = setInterval(() => {
        if (state.screen !== "game" || state.winner !== null) return;
        if (!isHumanTurn()) return;
        if (state.turnTimeLeft > 0) state.turnTimeLeft -= 1;
        if (state.turnTimeLeft <= 0) {
          state.turnTimeLeft = 0;
          endTurn();
        }
        render();
      }, 1000);
    }

    function applyGameAction(action) {
      const type = action.type;
      const playerId = action.playerId ?? action.data?.playerId;
      const pIdx = playerIndexFromAnyId(playerId);

      if (type === ACTION.GAME_INIT) {
        resetCoreState();
        state.mode = "multi";
        state.screen = "game";
        if (Array.isArray(action.players) && action.players.length) {
          state.players = action.players.map((p, i) => makePlayer({
            id: p.id,
            userId: p.userId || p.id,
            name: p.name || p.nickname || `Player ${i + 1}`,
            color: p.color || PLAYER_COLORS[i],
            isAI: !!p.isAI
          }));
        } else if (Array.isArray(action.playerOrder)) {
          state.players = action.playerOrder.map((id, i) => makePlayer({
            id,
            userId: id,
            name: `Player ${i + 1}`,
            color: PLAYER_COLORS[i],
            isAI: String(id).startsWith("ai-")
          }));
        }
        generateBoard(clone(action.hexes || []));
        if (typeof action.robber === "number") {
          state.robber = action.robber;
          state.hexes.forEach(h => { h.robber = false; });
          if (state.robber >= 0 && state.hexes[state.robber]) state.hexes[state.robber].robber = true;
        }
        state.hint = "멀티플레이 시작: 초기 배치";
        onTurnStart(false);
        recalcAllVP();
        return true;
      }

      if (pIdx === -1) return false;
      if (type === ACTION.PLACE_SETTLEMENT) {
        if (state.phase === "setup1" || state.phase === "setup2") {
          if (pIdx !== state.currentPlayer || state.setupStep !== "settlement") return false;
          if (!placeSettlement(pIdx, action.vertexId, true)) return false;
          if (state.phase === "setup2") grantSecondSetupResources(pIdx, action.vertexId);
          state.lastSetupVertex = action.vertexId;
          state.setupStep = "road";
          state.hint = "이 마을에 연결된 도로를 하나 놓으세요.";
          return true;
        }
        if (pIdx !== state.currentPlayer || state.phase !== "main") return false;
        if (!placeSettlement(pIdx, action.vertexId, false)) return false;
        state.buildMode = null;
        state.hint = "마을 건설 완료.";
        return true;
      }
      if (type === ACTION.PLACE_ROAD) {
        if (state.phase === "setup1" || state.phase === "setup2") {
          if (pIdx !== state.currentPlayer || state.setupStep !== "road") return false;
          if (!placeRoad(pIdx, action.edgeId, true)) return false;
          advanceSetupTurn();
          return true;
        }
        if (pIdx !== state.currentPlayer || state.phase !== "main") return false;
        if (!placeRoad(pIdx, action.edgeId, false)) return false;
        state.buildMode = null;
        state.hint = "도로 건설 완료.";
        return true;
      }
      if (type === ACTION.PLACE_CITY) {
        if (pIdx !== state.currentPlayer || state.phase !== "main") return false;
        if (!upgradeCity(pIdx, action.vertexId)) return false;
        state.buildMode = null;
        state.hint = "도시 업그레이드 완료.";
        return true;
      }
      if (type === ACTION.ROLL_DICE) {
        return applyRollDice(pIdx, action.values, true);
      }
      if (type === ACTION.DISCARD_RESOURCES) {
        applyDiscardResources(pIdx, action.resources);
        return true;
      }
      if (type === ACTION.MOVE_ROBBER) {
        if (pIdx !== state.currentPlayer) return false;
        return moveRobber(action.hexId, action.stealFrom, action.stolenResource).ok;
      }
      if (type === ACTION.END_TURN) {
        if (pIdx !== state.currentPlayer) return false;
        return endTurnInternal();
      }

      // Multiplayer trade proposal received from other player
      if (type === "TRADE_PROPOSE") {
        const myIdx = localPlayerIndex();
        if (pIdx === myIdx) return true; // own proposal, skip
        const proposer = state.players[pIdx];
        if (!proposer) return true;
        const offer = action.offer || {};
        const want = action.want || {};
        const offerStr = action.offerStr || "";
        const wantStr = action.wantStr || "";
        const me = state.players[myIdx];
        let canAccept = true;
        for (const [r, n] of Object.entries(want)) {
          if ((me.resources[r] || 0) < n) canAccept = false;
        }
        const myResStr = RESOURCES.map(r => `${RESOURCE_ICONS[r]}${me.resources[r]}`).join(" ");
        const proposalId = action.actionId;
        const proposerId = proposer.userId || proposer.id;
        if (!mpState.activeTradeProposals) mpState.activeTradeProposals = new Map();
        if (mpState.activeTradeProposals.has(proposalId)) return true; // duplicate
        const dismissBox = { dismiss: null };
        mpState.activeTradeProposals.set(proposalId, dismissBox);
        (async () => {
          const tradeMeta = { resources: { ...me.resources }, offer, want };
          const accepted = await showTradeProposal(proposer.name, offerStr, wantStr, "거래 하실래요?", myResStr, canAccept, dismissBox, tradeMeta);
          // Proposal was consumed by another player accepting first → bail without sending reject
          if (!mpState.activeTradeProposals.has(proposalId)) {
            render();
            return;
          }
          if (accepted) {
            // Re-check resources at click time (state may have changed since dialog opened)
            for (const [r, n] of Object.entries(want)) {
              if ((me.resources[r] || 0) < (n || 0)) {
                mpState.activeTradeProposals.delete(proposalId);
                showToast("자원이 부족해 거래할 수 없습니다.", 2000);
                render();
                return;
              }
            }
          }
          mpState.activeTradeProposals.delete(proposalId);
          if (accepted) {
            // Execute trade locally
            for (const r of RESOURCES) {
              if (offer[r] > 0) { me.resources[r] += offer[r]; proposer.resources[r] -= offer[r]; }
              if (want[r] > 0) { me.resources[r] -= want[r]; proposer.resources[r] += want[r]; }
            }
            SFX.build();
            showToast("🤝 거래 성사!", 2000);
            // Notify proposer + bystanders (proposerId/proposalId let receivers identify the swap)
            mpState.client.sendAction({ type: "TRADE_ACCEPT", playerId: me.userId || me.id, proposerId, proposalId, offer, want, actionId: `ta_${Date.now()}` }).catch(()=>{});
          } else {
            mpState.client.sendAction({ type: "TRADE_REJECT", playerId: me.userId || me.id, proposalId, actionId: `tr_${Date.now()}` }).catch(()=>{});
          }
          render();
        })();
        return true;
      }

      if (type === "TRADE_ACCEPT") {
        const myIdx = localPlayerIndex();
        const accepter = state.players[pIdx];
        // proposerId is required; fall back to current player only as a safety net for legacy clients
        const proposerIdx = action.proposerId
          ? playerIndexFromAnyId(action.proposerId)
          : state.currentPlayer;
        const proposer = proposerIdx >= 0 ? state.players[proposerIdx] : null;

        // Dismiss any open trade-proposal dialog for this proposalId on bystanders
        const proposalId = action.proposalId;
        if (proposalId && mpState.activeTradeProposals?.has(proposalId)) {
          const box = mpState.activeTradeProposals.get(proposalId);
          mpState.activeTradeProposals.delete(proposalId);
          if (box?.dismiss) box.dismiss();
        }

        if (!accepter || !proposer) return true;
        // Accepter already mutated their own state in TRADE_PROPOSE when clicking accept — skip duplicate
        if (pIdx === myIdx) return true;

        const offer = action.offer || {};
        const want = action.want || {};
        // Apply swap explicitly to proposer + accepter (NOT to "me" — that was the bug
        // where bystanders had their own resources deducted into negatives)
        for (const r of RESOURCES) {
          if (offer[r] > 0) { proposer.resources[r] -= offer[r]; accepter.resources[r] += offer[r]; }
          if (want[r] > 0) { accepter.resources[r] -= want[r]; proposer.resources[r] += want[r]; }
        }
        SFX.build();
        if (myIdx === proposerIdx) {
          showToast(`🤝 ${accepter.name}이 거래를 수락!`, 2000);
          state.canEndTurn = true;
        } else {
          showToast(`🤝 ${proposer.name} ↔ ${accepter.name} 거래 성사`, 2000);
        }
        render();
        return true;
      }

      if (type === "TRADE_REJECT") {
        const myIdx = localPlayerIndex();
        if (pIdx === myIdx) return true;
        const rejecter = state.players[pIdx];
        showToast(`❌ ${rejecter?.name || "상대"}이 거래를 거절`, 2000);
        // If I'm the current player (proposer), mark rejection so auto-end can trigger
        // when paired with no-buildable + no-playable.
        if (myIdx === state.currentPlayer) {
          state.tradeRejectedThisTurn = true;
          maybeAutoEndTurn();
        }
        return true;
      }

      return false;
    }

    function nextActionId() {
      mpState.actionSeq += 1;
      return `${Date.now()}_${mpState.actionSeq}_${mpState.myUserId || "local"}`;
    }

    function markActionProcessed(actionId) {
      if (!actionId) return;
      mpState.processedActionIds.add(actionId);
      if (mpState.processedActionIds.size > 600) {
        const arr = [...mpState.processedActionIds];
        mpState.processedActionIds = new Set(arr.slice(arr.length - 300));
      }
    }

    async function sendGameAction(type, payload) {
      const action = { type, ...payload, actionId: nextActionId() };
      const applied = applyGameAction(action);
      if (!applied) return false;
      markActionProcessed(action.actionId);
      render();
      triggerAITurnIfNeeded();
      if (!isMultiMode()) return true;
      try {
        await mpState.client.sendAction(action);
      } catch (e) {
        state.hint = `동기화 실패: ${e.message || e}`;
        render();
      }
      return true;
    }

    async function rollDice() {
      if (window.anime) {
        anime({
          targets: "#diceDisplay",
          rotate: [{ value: -15 }, { value: 15 }, { value: 0 }],
          duration: 400,
          easing: "easeInOutSine"
        });
      }
      if (isMultiMode()) {
        if (!isHumanTurn() || state.phase !== "roll") return;
        SFX.dice();
        const d1 = 1 + Math.floor(Math.random() * 6);
        const d2 = 1 + Math.floor(Math.random() * 6);
        const sum = d1 + d2;
        const el = document.getElementById("diceDisplay");
        if (el) {
          el.classList.remove("dice-animate");
          void el.offsetWidth;
          el.classList.add("dice-animate");
          el.textContent = "🎲🎲";
          if (window.anime) {
            anime({ targets: "#diceDisplay", scale: [1, 1.3, 1], duration: 300, easing: "easeOutBack" });
            if (sum === 7) {
              anime({ targets: "#diceDisplay", backgroundColor: ["#1d5c3d", "#b33838", "#1d5c3d"], duration: 450, easing: "easeInOutSine" });
            } else if (sum === 6) {
              anime({ targets: "#diceDisplay", backgroundColor: ["#1d5c3d", "#d9a323", "#1d5c3d"], duration: 450, easing: "easeInOutSine" });
            }
          }
        }
        await new Promise(r => setTimeout(r, getDiceRevealDelayMs()));
        if (el) el.textContent = `${d1} + ${d2}`;
        await sendGameAction(ACTION.ROLL_DICE, { playerId: currentPlayerUserId(), values: [d1, d2] });
        await postDicePromptDiscards(d1 + d2);
        maybeAutoEndTurn();
        return;
      }
      if (state.winner || state.phase !== "roll") return;
      SFX.dice();
      const d1 = 1 + Math.floor(Math.random() * 6);
      const d2 = 1 + Math.floor(Math.random() * 6);
      const sum = d1 + d2;
      const DICE_FACES = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
      const el = document.getElementById("diceDisplay");
      if (el) {
        el.classList.remove("dice-animate");
        void el.offsetWidth;
        el.textContent = "🎲🎲";
        el.classList.add("dice-animate");
        setTimeout(() => {
          el.textContent = `${DICE_FACES[d1]} ${DICE_FACES[d2]} = ${sum}`;
          el.style.animation = "dice-bounce 0.4s ease";
          setTimeout(() => el.style.animation = "", 400);
          showBigOverlay(`${DICE_FACES[d1]} ${DICE_FACES[d2]}`, `= ${sum}${sum === 7 ? " 🦹 도둑!" : ""}`, sum === 7 ? "seven" : "", sum === 7 ? 1500 : 1000);
        }, getDiceRevealDelayMs());
        if (window.anime) {
          anime({ targets: "#diceDisplay", scale: [1, 1.3, 1], duration: 300, easing: "easeOutBack" });
          if (sum === 7) {
            anime({ targets: "#diceDisplay", backgroundColor: ["#1d5c3d", "#b33838", "#1d5c3d"], duration: 450, easing: "easeInOutSine" });
          } else if (sum === 6) {
            anime({ targets: "#diceDisplay", backgroundColor: ["#1d5c3d", "#d9a323", "#1d5c3d"], duration: 450, easing: "easeInOutSine" });
          }
        }
      }
      // seven sound handled in handleSeven()
      if (!applyRollDice(state.currentPlayer, [d1, d2], false)) return;
      render();
      await resolveHumanGoldIfNeeded();
      await postDicePromptDiscards(sum);
      maybeAutoEndTurn();
      triggerAITurnIfNeeded();

    function humanBuildSettlement() {

    function humanBuildRoad() {

      state.buildMode = state.buildMode === "road" ? null : "road";
