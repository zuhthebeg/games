<!DOCTYPE html>
<html lang="ko">
<head>
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f)})(window,document,'script','dataLayer','GTM-MV8KQGJF');</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pocket Sort</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV8KQGJF" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <main class="app-shell" data-qa="pocket-sort-app">
    <header class="topbar glass">
      <div>
        <p class="eyebrow">Pocket Objects Organizer</p>
        <h1>Pocket Sort</h1>
      </div>
      <button id="restartBtn" class="ghost-btn" type="button">다시 시작</button>
    </header>

    <section class="hero glass">
      <div>
        <p class="eyebrow">LEVEL</p>
        <strong id="levelLabel">1 / 20</strong>
      </div>
      <div>
        <p class="eyebrow">MOVES</p>
        <strong id="moveLabel">0</strong>
      </div>
      <div>
        <p class="eyebrow">LEFT</p>
        <strong id="remainingLabel">0</strong>
      </div>
    </section>

    <section class="howto glass">
      <p class="howto-title">플레이 방법</p>
      <ol>
        <li>아래 트레이에서 물건 하나를 누른다.</li>
        <li>위쪽에서 같은 그림이 있는 포켓을 누른다.</li>
        <li>모든 물건을 제자리 포켓에 넣으면 클리어.</li>
      </ol>
      <p id="messageLine" class="message-line">아래에서 물건 하나를 선택하세요.</p>
    </section>

    <section class="bins-section">
      <div class="section-head">
        <h2>목표 포켓</h2>
        <span id="selectionHint" class="selection-hint">선택된 물건 없음</span>
      </div>
      <div id="binGrid" class="bin-grid" aria-label="target pockets"></div>
    </section>

    <section class="tray-section glass">
      <div class="section-head">
        <h2>정리할 물건</h2>
        <span class="tray-caption">같은 그림 포켓으로 보내면 된다</span>
      </div>
      <div id="trayGrid" class="tray-grid" aria-label="items tray"></div>
    </section>

    <section class="actions">
      <button id="nextBtn" class="primary-btn" type="button" disabled>다음 레벨</button>
    </section>

    <div id="clearBanner" class="clear-banner hidden" role="dialog" aria-live="polite">
      <div>
        <p class="clear-title">정리 완료</p>
        <p class="clear-sub">이번 포켓은 끝났다. 다음 레벨로 넘어간다.</p>
      </div>
      <button id="bannerNextBtn" class="primary-btn" type="button">다음 레벨</button>
    </div>

    <details class="debug-panel glass">
      <summary>QA Debug State</summary>
      <pre id="debugState" data-qa="debug-json"></pre>
    </details>
  </main>

  <script src="./levels.js"></script>
  <script src="./engine.js"></script>
  <script src="./game.js"></script>
  <script src="/lib/site-meta.js"></script>
  <script>
    SiteMeta.init({
      title: 'Pocket Sort - game.cocy.io',
      description: '물건을 맞는 포켓으로 보내는 모바일 정리 퍼즐',
      url: 'https://game.cocy.io/pocket-sort/'
    });
  </script>
</body>
</html>
