<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>대만 마작</title>
<script src="/lib/shared-wallet.js?v=20260524a"></script>
<script src="/lib/multiplayer.js?v=20260524a"></script>
<style>
:root{--bg:#0a0f1a;--panel:#111827;--panel2:#1f2937;--line:#334155;--text:#f1f5f9;--muted:#64748b;--accent:#ffd700;--green:#4ecca3;--red:#ef4444;--blue:#3b82f6;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;padding-top:calc(48px + env(safe-area-inset-top));touch-action:manipulation;user-select:none;}
#start-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:100;padding-top:calc(48px + env(safe-area-inset-top));}
#start-screen h1{font-size:2.5rem;color:var(--accent);text-shadow:0 0 20px rgba(255,215,0,.4);}
#start-screen p{color:var(--muted);font-size:.95rem;text-align:center;}
.big-btn{padding:14px 40px;font-size:1.2rem;font-weight:700;background:var(--accent);color:#0a0f1a;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 20px rgba(255,215,0,.3);}
.big-btn:active{transform:scale(.96);}
#game-container{display:flex;flex-direction:column;height:100%;overflow:hidden;}
#round-info{display:flex;align-items:center;justify-content:space-between;padding:4px 12px;background:var(--panel);border-bottom:1px solid var(--line);font-size:.78rem;flex-shrink:0;gap:8px;flex-wrap:wrap;}
.ri-item{display:flex;flex-direction:column;align-items:center;}
.ri-label{color:var(--muted);font-size:.65rem;}
.ri-val{font-weight:700;color:var(--accent);}
#score-row{display:flex;gap:6px;flex-wrap:wrap;}
.score-chip{background:var(--panel2);border-radius:6px;padding:2px 6px;font-size:.7rem;border:1px solid var(--line);}
.score-chip.dealer{border-color:var(--accent);color:var(--accent);}
#opponent-areas{display:grid;grid-template-columns:52px 1fr 52px;grid-template-rows:auto 1fr;flex:1;min-height:0;overflow:hidden;padding:4px;gap:4px;}
.cpu-area{display:flex;flex-direction:column;align-items:center;background:var(--panel);border-radius:8px;padding:4px;overflow:hidden;min-width:0;}
.cpu-area.top{grid-column:2;grid-row:1;}
.cpu-area.left{grid-column:1;grid-row:1/3;justify-content:center;}
.cpu-area.right{grid-column:3;grid-row:1/3;justify-content:center;}
.cpu-name{font-size:.68rem;color:var(--muted);margin-bottom:2px;white-space:nowrap;}
.cpu-name.active{color:var(--green);font-weight:700;}
.cpu-hand{display:flex;flex-wrap:wrap;gap:1px;justify-content:center;}
.cpu-area.left .cpu-hand,.cpu-area.right .cpu-hand{flex-direction:column;}
.cpu-melds,.cpu-flowers{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;justify-content:center;}
#center-area{grid-column:2;grid-row:2;background:var(--panel2);border-radius:8px;display:flex;align-items:flex-start;justify-content:center;overflow:hidden;min-height:0;}
.discard-pool{display:flex;flex-wrap:wrap;gap:2px;padding:4px;overflow:hidden;align-content:flex-start;}
#player-area{background:var(--panel);border-top:1px solid var(--line);padding:6px 8px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
#player-hand-row{display:flex;gap:3px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
#action-btns{display:flex;gap:6px;flex-wrap:wrap;}
.action-btn{padding:8px 12px;font-size:.82rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;flex:1;min-width:56px;}
.action-btn:disabled{opacity:.3;cursor:not-allowed;}
.btn-discard{background:var(--red);color:#fff;}
.btn-tsumo{background:var(--green);color:#0a0f1a;}
.btn-kan{background:#8b5cf6;color:#fff;}
.tile{width:32px;height:44px;border-radius:5px;border:1.5px solid #334155;background:#f0f4f8;color:#111;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;}
.tile.hidden{background:#1e3a5f;font-size:0;}
.tile.hidden::after{content:'🀫';font-size:18px;}
.tile.flower-tile{background:#fef3c7;border-color:#f59e0b;}
.tile.wind-tile{background:#e0f2fe;border-color:#0284c7;color:#0c4a6e;}
.tile.dragon-tile{background:#fce7f3;border-color:#ec4899;color:#831843;}
.tile.selected{transform:translateY(-10px) scale(1.08);box-shadow:0 6px 20px rgba(255,215,0,.6);border-color:var(--accent)!important;z-index:10;}
.tile-sm{width:20px;height:28px;border-radius:3px;border:1px solid #334155;background:#f0f4f8;color:#111;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.tile-sm.hidden{background:#1e3a5f;font-size:0;}
.tile-sm.hidden::after{content:'🀫';font-size:11px;}
.tile-sm.flower-tile{background:#fef3c7;}
.tile-sm.wind-tile{background:#e0f2fe;color:#0c4a6e;}
.tile-sm.dragon-tile{background:#fce7f3;color:#831843;}
.tile-sm.last{box-shadow:0 0 6px rgba(255,80,80,.8);border-color:#ef4444;}
.meld-group{display:flex;gap:1px;padding:1px 2px;background:rgba(255,255,255,.06);border-radius:3px;}
#claim-overlay,#chi-overlay,#result-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:12px;}
#claim-overlay.on,#chi-overlay.on,#result-overlay.on{display:flex;}
.overlay-title{font-size:1.1rem;font-weight:700;color:var(--accent);}
.overlay-sub{font-size:.82rem;color:var(--muted);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.cbtn{padding:12px 22px;font-size:1rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;min-width:80px;}
.cbtn:active{transform:scale(.95);}
.c-ron{background:#ef4444;color:#fff;}
.c-pon{background:#f59e0b;color:#0a0f1a;}
.c-chi{background:#3b82f6;color:#fff;}
.c-kan{background:#8b5cf6;color:#fff;}
.c-pass{background:var(--panel2);color:var(--muted);border:1px solid var(--line);}
.chi-opt{display:flex;gap:2px;background:var(--panel);border:2px solid var(--blue);border-radius:8px;padding:8px;cursor:pointer;}
.chi-opt:hover{border-color:var(--accent);}
#result-title{font-size:1.8rem;font-weight:900;color:var(--accent);}
#result-detail{color:var(--text);font-size:.9rem;text-align:center;line-height:1.8;max-width:340px;}
.next-btn{padding:12px 32px;font-size:1rem;font-weight:700;background:var(--accent);color:#0a0f1a;border:none;border-radius:10px;cursor:pointer;margin-top:8px;}
#msg-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--panel2);color:var(--text);padding:7px 18px;border-radius:20px;font-size:.82rem;opacity:0;transition:opacity .3s;z-index:70;border:1px solid var(--line);pointer-events:none;white-space:nowrap;}
#msg-toast.show{opacity:1;}
#turn-indicator{font-size:.7rem;color:var(--muted);text-align:center;padding:2px 0;}
</style>
</head>
<body>
<div id="start-screen">
  <h1>🀄 대만 마작</h1>
  <p>인간 1명 + CPU 3명<br>16장 핸드 · 대만 룰</p>
  <button class="big-btn" onclick="startGame()">게임 시작</button>
  <div id="sw-gold" style="color:var(--accent);font-size:.85rem;margin-top:4px;"></div>
</div>
<div id="game-container" style="display:none">
  <div id="round-info">
    <div class="ri-item"><span class="ri-label">국</span><span class="ri-val" id="ri-round">동1국</span></div>
    <div class="ri-item"><span class="ri-label">잔여</span><span class="ri-val" id="ri-wall">0</span></div>
    <div class="ri-item"><span class="ri-label">본장</span><span class="ri-val" id="ri-honba">0</span></div>
    <div id="score-row"></div>
  </div>
  <div id="opponent-areas">
    <div class="cpu-area left" id="area-p1">
      <div class="cpu-name" id="name-p1">CPU 남</div>
      <div class="cpu-flowers" id="flowers-p1"></div>
      <div class="cpu-melds" id="melds-p1"></div>
      <div class="cpu-hand" id="hand-p1"></div>
    </div>
    <div class="cpu-area top" id="area-p2">
      <div class="cpu-name" id="name-p2">CPU 서</div>
      <div class="cpu-flowers" id="flowers-p2"></div>
      <div class="cpu-melds" id="melds-p2"></div>
      <div class="cpu-hand" id="hand-p2"></div>
    </div>
    <div id="center-area">
      <div class="discard-pool" id="discards-center"></div>
    </div>
    <div class="cpu-area right" id="area-p3">
      <div class="cpu-name" id="name-p3">CPU 북</div>
      <div class="cpu-flowers" id="flowers-p3"></div>
      <div class="cpu-melds" id="melds-p3"></div>
      <div class="cpu-hand" id="hand-p3"></div>
    </div>
  </div>
  <div id="player-area">
    <div id="turn-indicator">-</div>
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span style="font-size:.7rem;color:var(--muted)">화패</span>
      <div id="player-flowers" style="display:flex;gap:2px;"></div>
      <div id="player-melds" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
    </div>
    <div id="player-hand-row"></div>
    <div id="action-btns">
      <button class="action-btn btn-discard" id="btn-discard" onclick="humanDiscard()" disabled>버리기</button>
      <button class="action-btn btn-tsumo" id="btn-tsumo" onclick="humanTsumo()" disabled>자모</button>
      <button class="action-btn btn-kan" id="btn-kan" onclick="humanKan()" disabled>깡</button>
    </div>
  </div>
</div>
<div id="claim-overlay">
  <div class="overlay-title" id="claim-title">클레임 선택</div>
  <div class="overlay-sub" id="claim-sub"></div>
  <div class="btn-row" id="claim-btns"></div>
</div>
<div id="chi-overlay">
  <div class="overlay-title">치 조합 선택</div>
  <div class="btn-row" id="chi-opts"></div>
  <button class="cbtn c-pass" onclick="cancelChi()">취소</button>
</div>
<div id="result-overlay">
  <div id="result-title"></div>
  <div id="result-detail"></div>
  <button class="next-btn" id="result-next" onclick="nextRound()">다음 라운드</button>
</div>
<div id="msg-toast"></div>
<script>
const RELAY_URL='';
const TE={m1:'🀇',m2:'🀈',m3:'🀉',m4:'🀊',m5:'🀋',m6:'🀌',m7:'🀍',m8:'🀎',m9:'🀏',p1:'🀙',p2:'🀚',p3:'🀛',p4:'🀜',p5:'🀝',p6:'🀞',p7:'🀟',p8:'🀠',p9:'🀡',s1:'🀐',s2:'🀑',s3:'🀒',s4:'🀓',s5:'🀔',s6:'🀕',s7:'🀖',s8:'🀗',s9:'🀘',z1:'東',z2:'南',z3:'西',z4:'北',z5:'白',z6:'發',z7:'中',f1:'春',f2:'夏',f3:'秋',f4:'冬',f5:'梅',f6:'蘭',f7:'菊',f8:'竹'};
const WL=['동','남','서','북'];
function td(id){return TE[id]||id;}
function suit(id){return id[0];}
function num(id){return parseInt(id.slice(1));}
function isFlower(id){return id[0]==='f';}
function isTerminal(id){return'mps'.includes(suit(id))&&(num(id)===1||num(id)===9);}
function isSimple(id){return'mps'.includes(suit(id))&&num(id)>=2&&num(id)<=8;}
function tileClass(id){if(!id)return'';const s=suit(id);if(s==='f')return'flower-tile';if(s==='z')return num(id)<=4?'wind-tile':'dragon-tile';return'';}
function sortHand(h){const o={m:0,p:1,s:2,z:3,f:4};return[...h].sort((a,b)=>{const sa=o[a[0]]??5,sb=o[b[0]]??5;return sa!==sb?sa-sb:num(a)-num(b);});}
function countMap(t){const c={};for(const x of t)c[x]=(c[x]||0)+1;return c;}
function removeN(arr,tile,n){const r=[...arr];let rem=n;for(let i=r.length-1;i>=0&&rem>0;i--)if(r[i]===tile){r.splice(i,1);rem--;}return r;}

function buildWall(){const t=[];for(const s of['m','p','s'])for(let n=1;n<=9;n++)for(let k=0;k<4;k++)t.push(s+n);for(let n=1;n<=7;n++)for(let k=0;k<4;k++)t.push('z'+n);for(let n=1;n<=8;n++)t.push('f'+n);return t;}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function canWin(hand,melds){
  const needed=5-melds.length;if(needed<0)return false;
  if(needed===5&&sevenPairs(hand))return true;
  if(needed===5&&thirteenOrphans(hand))return true;
  const c=countMap(hand);
  for(const t of Object.keys(c)){if(c[t]>=2){const rest=removeN(hand,t,2);if(canFormSets(rest,needed))return true;}}
  return false;
}
function sevenPairs(h){if(h.length!==14)return false;const c=countMap(h);return Object.values(c).every(v=>v===2)&&Object.keys(c).length===7;}
function thirteenOrphans(h){if(h.length!==14)return false;const O=['m1','m9','p1','p9','s1','s9','z1','z2','z3','z4','z5','z6','z7'];const c=countMap(h);return O.every(t=>(c[t]||0)>=1)&&O.some(t=>(c[t]||0)>=2);}
function canFormSets(tiles,needed){
  if(tiles.length===0)return needed===0;if(needed===0)return tiles.length===0;
  const t=tiles[0],s=suit(t),n=num(t),c=countMap(tiles);
  if((c[t]||0)>=3){if(canFormSets(removeN(tiles,t,3),needed-1))return true;}
  if('mps'.includes(s)){const t2=s+(n+1),t3=s+(n+2);if((c[t2]||0)>=1&&(c[t3]||0)>=1){let r=[...tiles];r=removeN(r,t,1);r=removeN(r,t2,1);r=removeN(r,t3,1);if(canFormSets(r,needed-1))return true;}}
  return false;
}
function chiOptions(hand,disc){
  const s=suit(disc),n=num(disc);if(!'mps'.includes(s))return[];
  const opts=[];const h=new Set(hand);
  if(n>=2&&n<=8&&h.has(s+(n-1))&&h.has(s+(n+1)))opts.push([s+(n-1),disc,s+(n+1)]);
  if(n>=3&&h.has(s+(n-2))&&h.has(s+(n-1)))opts.push([s+(n-2),s+(n-1),disc]);
  if(n<=7&&h.has(s+(n+1))&&h.has(s+(n+2)))opts.push([disc,s+(n+1),s+(n+2)]);
  const seen=new Set();return opts.filter(o=>{const k=[...o].sort().join(',');if(seen.has(k))return false;seen.add(k);return true;});
}
function canPon(hand,tile){return hand.filter(t=>t===tile).length>=2;}
function canMinKan(hand,tile){return hand.filter(t=>t===tile).length>=3;}
function canAnKan(hand){const c=countMap(hand);return Object.entries(c).filter(([t,n])=>n>=4).map(([t])=>t);}

const TURN_ORDER=[0,3,2,1];
function nextPlayer(i){const p=TURN_ORDER.indexOf(i);return TURN_ORDER[(p+1)%4];}
function prevPlayer(i){const p=TURN_ORDER.indexOf(i);return TURN_ORDER[(p-1+4)%4];}

function isYakuhai(tile,pidx,windIdx){if(!tile)return false;const s=suit(tile),n=num(tile);if(s!=='z')return false;if(n>=5)return true;return n===(pidx+1)||n===(windIdx+1);}
function yakuhaiBonus(tile,pidx,windIdx){const s=suit(tile);if(s!=='z')return 0;const n=num(tile);if(n>=5)return 1;if(n===(pidx+1)||n===(windIdx+1))return 2;return 1;}
function isTwoSided(hand,winTile){const s=suit(winTile),n=num(winTile);if(!'mps'.includes(s))return false;const rest=removeN(hand,winTile,1);const c=countMap(rest);return(n>=2&&(c[s+(n-1)]||0)>=1)||( n<=8&&(c[s+(n+1)]||0)>=1);}

function decompose(hand,melds){
  const needed=5-melds.length;const sorted=sortHand(hand);const c=countMap(sorted);
  for(const h of Object.keys(c)){if(c[h]<2)continue;const rest=removeN(sorted,h,2);const sets=extractSets(rest,needed);if(sets!==null)return{head:h,sets};}
  return{head:null,sets:[]};
}
function extractSets(tiles,needed){
  if(tiles.length===0)return needed===0?[]:null;if(needed===0)return tiles.length===0?[]:null;
  const t=tiles[0],s=suit(t),n=num(t),c=countMap(tiles);
  if((c[t]||0)>=3){const r=extractSets(removeN(tiles,t,3),needed-1);if(r!==null)return[{type:'tri',tile:t},...r];}
  if('mps'.includes(s)){const t2=s+(n+1),t3=s+(n+2);if((c[t2]||0)>=1&&(c[t3]||0)>=1){let r2=[...tiles];r2=removeN(r2,t,1);r2=removeN(r2,t2,1);r2=removeN(r2,t3,1);const r=extractSets(r2,needed-1);if(r!==null)return[{type:'seq',tile:t},...r];}}
  return null;
}

function calcYaku(hand,melds,flowers,winTile,winType,pidx,ri){
  const yaku=[];let tai=0;
  function add(name,t){yaku.push({name,tai:t});tai+=t;}
  function remove(name){const i=yaku.findIndex(y=>y.name===name);if(i>=0){tai-=yaku[i].tai;yaku.splice(i,1);}}
  if(ri.firstDraw&&ri.isDealer&&winType==='tsumo'){add('천화',14);return{yaku,total:tai};}
  if(ri.firstDiscard&&!ri.isDealer&&winType==='ron'){add('지화',14);return{yaku,total:tai};}
  const isConcealed=melds.filter(m=>m.type!=='ankan').length===0;
  const allTiles=[...hand,...melds.flatMap(m=>m.tiles)];
  if(winType==='tsumo')add('츠모',1);
  if(isConcealed)add('멘젠',1);
  if(isConcealed&&winType==='tsumo'){remove('츠모');remove('멘젠');add('멘젠츠모',3);}
  if(melds.length>=4&&winType==='ron'){add('전구인',2);}
  const{head,sets}=decompose(hand,melds);
  const allTri=[...sets.filter(s=>s.type==='tri').map(s=>s.tile),...melds.filter(m=>['pon','minkan','addkan','ankan'].includes(m.type)).map(m=>m.tiles[0])];
  if(allTiles.every(t=>!'zf'.includes(suit(t))))add('무자',1);
  if(isConcealed){const allSeq=sets.every(s=>s.type==='seq');const hYaku=head&&isYakuhai(head,pidx,ri.windIdx);const ts=isTwoSided(hand,winTile);if(allSeq&&!hYaku&&ts)add('핑후',2);}
  const isTT=sets.length>0&&sets.every(s=>s.type==='tri')&&melds.every(m=>['pon','minkan','addkan','ankan'].includes(m.type))&&(sets.length+melds.length)>=5;
  if(isTT)add('또이또이',7);
  const concTri=sets.filter(s=>s.type==='tri').length+melds.filter(m=>m.type==='ankan').length;
  if(concTri>=3)add('삼안커',2);
  if(concTri>=4){remove('삼안커');add('사안커',7);}
  if(concTri>=5){remove('사안커');add('오안커',14);}
  for(const t of allTri){const b=yakuhaiBonus(t,pidx,ri.windIdx);if(b>0)add('역패('+td(t)+')',b);}
  const dragons=['z5','z6','z7'];const dTri=allTri.filter(t=>dragons.includes(t));const dHead=head&&dragons.includes(head);
  if(dTri.length===2&&dHead)add('소삼원',7);
  if(dTri.length===3){remove('소삼원');add('대삼원',14);}
  const winds=['z1','z2','z3','z4'];const wTri=allTri.filter(t=>winds.includes(t));const wHead=head&&winds.includes(head);
  if(wTri.length===3&&wHead)add('소사희',7);
  if(wTri.length===4){remove('소사희');add('대사희',14);}
  const anKC=melds.filter(m=>m.type==='ankan').length;const minKC=melds.filter(m=>m.type==='minkan'||m.type==='addkan').length;
  if(anKC>0)add('안깡×'+anKC,anKC*2);if(minKC>0)add('명깡×'+minKC,minKC);
  if(ri.isRinshan)add('영상개화',1);
  if(ri.isHaitei&&winType==='tsumo')add('해저',1);
  if(head===winTile&&!isTwoSided(hand,winTile))add('단기대기',1);
  if(flowers.length===8)return{yaku:[{name:'화만관',tai:14}],total:14};
  if(flowers.length===0)add('무화',1);
  const season=flowers.filter(f=>num(f)<=4);const plant=flowers.filter(f=>num(f)>=5);
  if(season.length===4)add('춘하추동',2);if(plant.length===4)add('매난국죽',2);
  const seatF=[[1,5],[2,6],[3,7],[4,8]][pidx]||[];
  for(const f of flowers){if(seatF.includes(num(f)))add('정화('+td(f)+')',2);}
  if(ri.isDealer)add('친장가',1);
  if(ri.honba>0)add('본장×'+ri.honba,ri.honba*2);
  return{yaku,total:Math.max(tai,0)};
}

function aiDecideDiscard(state,pidx){
  const hand=state.players[pidx].hand;let worst=null,ws=-Infinity;
  for(const t of hand){const sc=isoScore(t,hand);if(sc>ws){ws=sc;worst=t;}}
  return worst||hand[hand.length-1];
}
function isoScore(tile,hand){
  const s=suit(tile),n=num(tile);if(s==='f')return-100;if(s==='z'){return hand.filter(t=>t===tile).length>=2?-5:5;}
  const nb=[s+(n-2),s+(n-1),s+(n+1),s+(n+2)].filter(t=>num(t)>=1&&num(t)<=9);
  return -nb.filter(t=>hand.includes(t)).length+(hand.filter(t=>t===tile).length>=2?-3:0)+(isTerminal(tile)?1:0);
}
function aiDecideClaim(state,pidx,disc,discarderIdx){
  const p=state.players[pidx];const hand=p.hand;const melds=p.melds;
  if(canWin([...hand,disc],melds))return{type:'ron',tile:disc};
  if(canMinKan(hand,disc)&&Math.random()<0.7)return{type:'kan',kanType:'min',tile:disc};
  if(canPon(hand,disc)){const yk=isYakuhai(disc,pidx,state.round.windIdx);if(yk||Math.random()<0.5)return{type:'pon',tile:disc};}
  if(discarderIdx===prevPlayer(pidx)){const opts=chiOptions(hand,disc);if(opts.length>0&&Math.random()<0.3)return{type:'chi',tiles:opts[0],discarded:disc};}
  return{type:'pass'};
}

let G=null,selTile=null,cpuTimer=null,claimTimer=null,pending=[];

function makeState(sc,dealer,windIdx,honba){
  const s=sc||[50000,50000,50000,50000];
  return{round:{windIdx:windIdx||0,dealer:dealer||0,honba:honba||0},
    players:[
      {id:'p0',name:'나',type:'human',seatWind:0,hand:[],melds:[],flowers:[],score:s[0],isDealer:false},
      {id:'p1',name:'CPU 남',type:'cpu',seatWind:1,hand:[],melds:[],flowers:[],score:s[1],isDealer:false},
      {id:'p2',name:'CPU 서',type:'cpu',seatWind:2,hand:[],melds:[],flowers:[],score:s[2],isDealer:false},
      {id:'p3',name:'CPU 북',type:'cpu',seatWind:3,hand:[],melds:[],flowers:[],score:s[3],isDealer:false},
    ],
    wall:[],discards:[[],[],[],[]],currentPlayer:0,phase:'idle',claimInfo:null,
    flags:{firstDraw:true,firstDiscard:true,isRinshan:false,isHaitei:false}};
}

function dealAndStart(state){
  state.wall=shuffle(buildWall());const dealer=state.round.dealer;
  for(let p=0;p<4;p++){state.players[p].seatWind=(p-dealer+4)%4;state.players[p].isDealer=(p===dealer);state.players[p].hand=[];state.players[p].melds=[];state.players[p].flowers=[];}
  for(let p=0;p<4;p++){const n=(p===dealer)?17:16;state.players[p].hand=state.wall.splice(0,n);}
  for(let p=0;p<4;p++)processFlowers(state,p);
  for(let p=0;p<4;p++)state.players[p].hand=sortHand(state.players[p].hand);
  state.discards=[[],[],[],[]];state.currentPlayer=dealer;state.phase='discard';
  state.flags={firstDraw:true,firstDiscard:true,isRinshan:false,isHaitei:false};
  render();scheduleNext(dealer);
}
function processFlowers(state,pidx){
  const p=state.players[pidx];let changed=true;
  while(changed){changed=false;for(let i=p.hand.length-1;i>=0;i--){if(isFlower(p.hand[i])){p.flowers.push(p.hand.splice(i,1)[0]);if(state.wall.length>0){const d=state.wall.shift();p.hand.push(d);if(isFlower(d))changed=true;}}}}
}

function applyAction(action){
  const pidx=G.currentPlayer,player=G.players[pidx];
  if(action.type==='discard'){
    const i=player.hand.indexOf(action.tile);if(i<0){showToast('패 없음');return;}
    player.hand.splice(i,1);G.discards[pidx].push(action.tile);G.flags.firstDiscard=false;
    G.phase='claim';G.claimInfo={tile:action.tile,discarder:pidx};render();startClaim(action.tile,pidx);return;
  }
  if(action.type==='draw'){
    if(G.wall.length===0){endRound('패 소진');return;}
    const tile=G.wall.shift();G.flags.isHaitei=G.wall.length===0;player.hand.push(tile);
    if(isFlower(tile)){player.flowers.push(player.hand.pop());G.flags.isRinshan=false;if(G.wall.length>0)applyAction({type:'draw'});else endRound('패 소진');return;}
    player.hand=sortHand(player.hand);G.flags.isRinshan=false;G.phase='discard';render();
    if(player.type==='cpu')scheduleCpu(pidx,1000);else enableHuman(pidx);return;
  }
  if(action.type==='tsumo'){
    const ri=bri(pidx);const h=player.hand;const wt=h[h.length-1];
    const res=calcYaku(h.slice(0,-1),player.melds,player.flowers,wt,'tsumo',pidx,ri);
    showWin(pidx,-1,wt,res);return;
  }
  if(action.type==='kan'){doKan(action,pidx);return;}
  if(action.type==='chi'){
    const disc=action.discarded,discarder=G.claimInfo?.discarder;
    const fromH=action.tiles.filter(t=>t!==disc);
    for(const t of fromH){const i=player.hand.indexOf(t);if(i>=0)player.hand.splice(i,1);}
    const di=G.discards[discarder];const dIdx=di.lastIndexOf(disc);if(dIdx>=0)di.splice(dIdx,1);
    player.melds.push({type:'chi',tiles:[...action.tiles].sort(),from:discarder});
    G.phase='discard';render();if(player.type==='cpu')scheduleCpu(pidx,800);else enableHuman(pidx);return;
  }
  if(action.type==='pon'){
    const tile=action.tile,discarder=G.claimInfo?.discarder;let rm=0;
    for(let i=player.hand.length-1;i>=0&&rm<2;i--)if(player.hand[i]===tile){player.hand.splice(i,1);rm++;}
    const di=G.discards[discarder];const dIdx=di.lastIndexOf(tile);if(dIdx>=0)di.splice(dIdx,1);
    player.melds.push({type:'pon',tiles:[tile,tile,tile],from:discarder});
    G.phase='discard';render();if(player.type==='cpu')scheduleCpu(pidx,800);else enableHuman(pidx);return;
  }
  if(action.type==='ron'){
    const tile=action.tile,discarder=G.claimInfo?.discarder;player.hand.push(tile);
    const ri=bri(pidx);const res=calcYaku(player.hand.slice(0,-1),player.melds,player.flowers,tile,'ron',pidx,ri);
    showWin(pidx,discarder,tile,res);return;
  }
}
function doKan(action,pidx){
  const player=G.players[pidx];
  if(action.kanType==='an'){
    const tile=action.tiles[0];for(let i=player.hand.length-1;i>=0;i--)if(player.hand[i]===tile)player.hand.splice(i,1);
    player.melds.push({type:'ankan',tiles:[tile,tile,tile,tile],from:pidx});
  }else if(action.kanType==='min'){
    const tile=action.tile,discarder=G.claimInfo?.discarder;let rm=0;
    for(let i=player.hand.length-1;i>=0&&rm<3;i--)if(player.hand[i]===tile){player.hand.splice(i,1);rm++;}
    const di=G.discards[discarder];const dIdx=di.lastIndexOf(tile);if(dIdx>=0)di.splice(dIdx,1);
    player.melds.push({type:'minkan',tiles:[tile,tile,tile,tile],from:discarder});
  }else if(action.kanType==='add'){
    const tile=action.tiles[0];const mi=player.melds.findIndex(m=>m.type==='pon'&&m.tiles[0]===tile);
    if(mi>=0){player.melds[mi].type='addkan';player.melds[mi].tiles.push(tile);}
    const i=player.hand.indexOf(tile);if(i>=0)player.hand.splice(i,1);
  }
  G.flags.isRinshan=true;
  if(G.wall.length>0){const d=G.wall.shift();player.hand.push(d);if(isFlower(d)){player.flowers.push(player.hand.pop());if(G.wall.length>0){const d2=G.wall.shift();player.hand.push(d2);}}player.hand=sortHand(player.hand);}
  G.phase='discard';render();if(player.type==='cpu')scheduleCpu(pidx,800);else enableHuman(pidx);
}
function bri(pidx){return{windIdx:G.round.windIdx,isDealer:G.players[pidx].seatWind===0,honba:G.round.honba,isRinshan:G.flags.isRinshan,isHaitei:G.flags.isHaitei,firstDraw:G.flags.firstDraw,firstDiscard:G.flags.firstDiscard};}

function startClaim(tile,discarderIdx){
  if(claimTimer){clearTimeout(claimTimer);claimTimer=null;}pending=[];
  for(let p=0;p<4;p++){if(p===discarderIdx)continue;if(G.players[p].type==='cpu'){const cl=aiDecideClaim(G,p,tile,discarderIdx);if(cl.type!=='pass')pending.push({pidx:p,claim:cl});}}
  const hopts=getHumanOpts(tile,discarderIdx);
  if(hopts.length>0)showClaimOv(tile,hopts,discarderIdx);
  else claimTimer=setTimeout(()=>resolveClaims(discarderIdx),pending.length>0?700:400);
}
function getHumanOpts(tile,discarderIdx){
  const p=G.players[0];const opts=[];
  if(canWin([...p.hand,tile],p.melds))opts.push('ron');
  if(canMinKan(p.hand,tile))opts.push('kan');
  if(canPon(p.hand,tile))opts.push('pon');
  if(discarderIdx===prevPlayer(0)&&chiOptions(p.hand,tile).length>0)opts.push('chi');
  return opts;
}
function showClaimOv(tile,opts,discarderIdx){
  const ov=document.getElementById('claim-overlay');
  document.getElementById('claim-title').textContent='클레임? ('+td(tile)+')';
  document.getElementById('claim-sub').textContent=G.players[discarderIdx].name+'이 버린 패';
  const btns=document.getElementById('claim-btns');btns.innerHTML='';
  const map={ron:['론(화료)','c-ron'],pon:['퐁','c-pon'],chi:['치','c-chi'],kan:['깡','c-kan']};
  for(const o of opts){const b=document.createElement('button');b.className='cbtn '+map[o][1];b.textContent=map[o][0];b.onclick=()=>{ov.classList.remove('on');if(claimTimer)clearTimeout(claimTimer);humanClaim(o,tile,discarderIdx);};btns.appendChild(b);}
  const pb=document.createElement('button');pb.className='cbtn c-pass';pb.textContent='패스';pb.onclick=()=>{ov.classList.remove('on');if(claimTimer)clearTimeout(claimTimer);resolveClaims(discarderIdx);};btns.appendChild(pb);
  ov.classList.add('on');
  claimTimer=setTimeout(()=>{ov.classList.remove('on');resolveClaims(discarderIdx);},8000);
}
function humanClaim(opt,tile,discarderIdx){
  G.currentPlayer=0;G.claimInfo={tile,discarder:discarderIdx};
  if(opt==='ron')applyAction({type:'ron',tile});
  else if(opt==='pon')applyAction({type:'pon',tile});
  else if(opt==='kan')applyAction({type:'kan',kanType:'min',tile});
  else if(opt==='chi'){const opts=chiOptions(G.players[0].hand,tile);if(opts.length===1)applyAction({type:'chi',tiles:opts[0],discarded:tile});else showChiOv(opts,tile,discarderIdx);}
}
function showChiOv(opts,tile,discarderIdx){
  const ov=document.getElementById('chi-overlay');const cont=document.getElementById('chi-opts');cont.innerHTML='';
  for(const opt of opts){const btn=document.createElement('div');btn.className='chi-opt';for(const t of opt){const s=document.createElement('div');s.className='tile-sm '+tileClass(t);s.textContent=td(t);btn.appendChild(s);}btn.onclick=()=>{ov.classList.remove('on');applyAction({type:'chi',tiles:opt,discarded:tile});};cont.appendChild(btn);}
  ov.classList.add('on');
}
function cancelChi(){document.getElementById('chi-overlay').classList.remove('on');resolveClaims(G.claimInfo?.discarder??0);}
function resolveClaims(discarderIdx){
  if(claimTimer){clearTimeout(claimTimer);claimTimer=null;}
  const byT=(t)=>pending.filter(c=>c.claim.type===t);
  const ron=byT('ron');if(ron.length>0){const f=ron[0];G.currentPlayer=f.pidx;G.claimInfo={tile:f.claim.tile,discarder:discarderIdx};applyAction({type:'ron',tile:f.claim.tile});return;}
  const kan=byT('kan');if(kan.length>0){const f=kan[0];G.currentPlayer=f.pidx;G.claimInfo={tile:f.claim.tile,discarder:discarderIdx};applyAction({type:'kan',kanType:'min',tile:f.claim.tile});return;}
  const pon=byT('pon');if(pon.length>0){const f=pon[0];G.currentPlayer=f.pidx;G.claimInfo={tile:f.claim.tile,discarder:discarderIdx};applyAction({type:'pon',tile:f.claim.tile});return;}
  const chi=byT('chi');if(chi.length>0){const f=chi[0];G.currentPlayer=f.pidx;G.claimInfo={tile:f.claim.discarded,discarder:discarderIdx};applyAction({type:'chi',tiles:f.claim.tiles,discarded:f.claim.discarded});return;}
  pending=[];G.claimInfo=null;const next=nextPlayer(discarderIdx);G.currentPlayer=next;G.phase='draw';
  if(G.wall.length===0){endRound('패 소진');return;}
  if(G.players[next].type==='cpu')scheduleCpu(next,600);else applyAction({type:'draw'});
}

function scheduleCpu(pidx,delay){
  if(cpuTimer)clearTimeout(cpuTimer);
  cpuTimer=setTimeout(()=>{
    if(!G||G.players[pidx].type!=='cpu')return;
    const p=G.players[pidx];
    if(G.phase==='draw'){applyAction({type:'draw'});return;}
    if(G.phase==='discard'){
      const ankans=canAnKan(p.hand);if(ankans.length>0&&Math.random()<0.7){applyAction({type:'kan',kanType:'an',tiles:p.hand.filter(t=>t===ankans[0])});return;}
      for(const m of p.melds){if(m.type==='pon'&&p.hand.includes(m.tiles[0])&&Math.random()<0.7){applyAction({type:'kan',kanType:'add',tiles:[m.tiles[0]]});return;}}
      if(canWin(p.hand,p.melds)){applyAction({type:'tsumo'});return;}
      applyAction({type:'discard',tile:aiDecideDiscard(G,pidx)});
    }
  },delay);
}
function scheduleNext(pidx){if(G.players[pidx].type==='cpu')scheduleCpu(pidx,1200);else enableHuman(pidx);}
function enableHuman(pidx){
  if(pidx!==0)return;const p=G.players[0];
  document.getElementById('btn-discard').disabled=false;
  document.getElementById('btn-tsumo').disabled=!canWin(p.hand,p.melds);
  const ak=canAnKan(p.hand);const addK=p.melds.filter(m=>m.type==='pon').map(m=>m.tiles[0]).filter(t=>p.hand.includes(t));
  document.getElementById('btn-kan').disabled=(ak.length===0&&addK.length===0);
  setTI('내 차례');
}
function disableHuman(){['btn-discard','btn-tsumo','btn-kan'].forEach(id=>document.getElementById(id).disabled=true);}
function setTI(t){document.getElementById('turn-indicator').textContent=t;}
function humanDiscard(){
  if(G.currentPlayer!==0||G.phase!=='discard')return;
  if(!selTile){showToast('버릴 패를 선택하세요');return;}
  const tile=selTile;selTile=null;disableHuman();applyAction({type:'discard',tile});
}
function humanTsumo(){if(G.currentPlayer!==0)return;applyAction({type:'tsumo'});}
function humanKan(){
  if(G.currentPlayer!==0)return;const p=G.players[0];
  const ak=canAnKan(p.hand);if(ak.length>0){applyAction({type:'kan',kanType:'an',tiles:p.hand.filter(t=>t===ak[0])});return;}
  const addK=p.melds.filter(m=>m.type==='pon').map(m=>m.tiles[0]).filter(t=>p.hand.includes(t));
  if(addK.length>0)applyAction({type:'kan',kanType:'add',tiles:[addK[0]]});
}

function showWin(winnerIdx,discarderIdx,winTile,result){
  if(cpuTimer)clearTimeout(cpuTimer);if(claimTimer)clearTimeout(claimTimer);G.phase='roundEnd';
  const winner=G.players[winnerIdx];const tai=result.total+5;const isDW=winner.seatWind===0;
  if(discarderIdx===-1){for(let p=0;p<4;p++){if(p===winnerIdx)continue;const isDPay=G.players[p].seatWind===0;const amt=(isDW||isDPay)?tai*2000:tai*1000;G.players[p].score-=amt;G.players[winnerIdx].score+=amt;}}
  else{const isDPay=G.players[discarderIdx].seatWind===0;const mult=(isDW||isDPay)?2:1;const amt=tai*1000*mult;G.players[discarderIdx].score-=amt;G.players[winnerIdx].score+=amt;}
  if(winnerIdx===0){const gold=tai*100000;if(typeof SharedWallet!=='undefined'&&SharedWallet.addGold)try{SharedWallet.addGold(gold);}catch(_){}}
  const wl=discarderIdx===-1?'자모':'론';
  document.getElementById('result-title').textContent=winner.name+' 화료! ('+wl+')';
  document.getElementById('result-detail').innerHTML='<b>'+tai+'台 (기본5 + 역'+result.total+')</b><br>'+result.yaku.map(y=>y.name+' +'+y.tai+'台').join(' / ')+'<br><br>'+G.players.map(p=>p.name+': '+p.score.toLocaleString()+'G').join('<br>');
  document.getElementById('result-next').textContent=isDW?'연장 라운드':'다음 라운드';
  document.getElementById('result-overlay').classList.add('on');render();
}
function endRound(reason){
  if(cpuTimer)clearTimeout(cpuTimer);if(claimTimer)clearTimeout(claimTimer);G.phase='roundEnd';
  document.getElementById('result-title').textContent=reason||'유국';
  document.getElementById('result-detail').innerHTML=G.players.map(p=>p.name+': '+p.score.toLocaleString()+'G').join('<br>');
  document.getElementById('result-next').textContent='다음 라운드';
  document.getElementById('result-overlay').classList.add('on');render();
}
function nextRound(){
  document.getElementById('result-overlay').classList.remove('on');
  if(cpuTimer)clearTimeout(cpuTimer);if(claimTimer)clearTimeout(claimTimer);
  selTile=null;disableHuman();
  const sc=G.players.map(p=>p.score);const pd=G.round.dealer;const pw=G.round.windIdx;
  const nd=(pd+1)%4;const nw=nd===0?pw+1:pw;
  G=makeState(sc,nd,nw%4,0);dealAndStart(G);
}

function render(){
  if(!G)return;
  document.getElementById('ri-round').textContent=WL[G.round.windIdx]+(G.round.dealer+1)+'국';
  document.getElementById('ri-wall').textContent=G.wall.length;
  document.getElementById('ri-honba').textContent=G.round.honba;
  const sr=document.getElementById('score-row');
  sr.innerHTML=G.players.map(p=>'<div class="score-chip'+(p.isDealer?' dealer':'')+'">'+WL[p.seatWind]+'·'+p.name.replace('CPU ','')+' '+Math.floor(p.score/1000)+'k</div>').join('');
  setTI(G.players[G.currentPlayer].name+(G.currentPlayer===0?' (내 차례)':' 차례'));
  for(let p=1;p<=3;p++)renderCpu(p);
  renderDiscards();renderPlayer();
}
function renderCpu(pidx){
  const p=G.players[pidx];const isCur=G.currentPlayer===pidx;
  const ne=document.getElementById('name-p'+pidx);
  ne.textContent=p.name+'('+WL[p.seatWind]+')'+(p.isDealer?'◆':'');
  ne.className='cpu-name'+(isCur?' active':'');
  const he=document.getElementById('hand-p'+pidx);he.innerHTML='';
  for(let i=0;i<p.hand.length;i++){const d=document.createElement('div');d.className='tile-sm hidden';he.appendChild(d);}
  const me=document.getElementById('melds-p'+pidx);me.innerHTML='';
  for(const m of p.melds){const g=document.createElement('div');g.className='meld-group';const st=m.type==='ankan'?[m.tiles[0],'_h',m.tiles[2],'_h']:m.tiles;for(const t of st){const s=document.createElement('div');if(t==='_h'){s.className='tile-sm hidden';}else{s.className='tile-sm '+tileClass(t);s.textContent=td(t);}g.appendChild(s);}me.appendChild(g);}
  const fe=document.getElementById('flowers-p'+pidx);fe.innerHTML='';
  for(const f of p.flowers){const s=document.createElement('div');s.className='tile-sm flower-tile';s.textContent=td(f);fe.appendChild(s);}
}
function renderDiscards(){
  const el=document.getElementById('discards-center');el.innerHTML='';
  for(let p=0;p<4;p++){
    if(G.discards[p].length===0)continue;
    const grp=document.createElement('div');grp.style.cssText='display:flex;flex-wrap:wrap;gap:1px;margin:2px;';
    G.discards[p].forEach((t,i)=>{const s=document.createElement('div');const isLast=i===G.discards[p].length-1&&G.phase==='claim';s.className='tile-sm '+tileClass(t)+(isLast?' last':'');s.textContent=td(t);grp.appendChild(s);});
    el.appendChild(grp);
  }
}
function renderPlayer(){
  const p=G.players[0];const hr=document.getElementById('player-hand-row');hr.innerHTML='';
  p.hand.forEach(t=>{const d=document.createElement('div');d.className='tile '+tileClass(t)+(t===selTile?' selected':'');d.textContent=td(t);d.onclick=()=>{if(G.currentPlayer!==0||G.phase!=='discard')return;selTile=(selTile===t)?null:t;renderPlayer();};hr.appendChild(d);});
  const me=document.getElementById('player-melds');me.innerHTML='';
  for(const m of p.melds){const g=document.createElement('div');g.className='meld-group';m.tiles.forEach(t=>{const s=document.createElement('div');s.className='tile-sm '+tileClass(t);s.textContent=td(t);g.appendChild(s);});me.appendChild(g);}
  const fe=document.getElementById('player-flowers');fe.innerHTML='';
  for(const f of p.flowers){const s=document.createElement('div');s.className='tile-sm flower-tile';s.textContent=td(f);fe.appendChild(s);}
}

function showToast(msg,ms=2200){const el=document.getElementById('msg-toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),ms);}

function startGame(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-container').style.display='flex';
  G=makeState(null,0,0,0);dealAndStart(G);
}

window.addEventListener('load',()=>{
  if(typeof SharedWallet!=='undefined'){try{const g=SharedWallet.gold;if(g!=null)document.getElementById('sw-gold').textContent='보유 골드: '+Number(g).toLocaleString()+'G';}catch(_){}}
});
</script>
