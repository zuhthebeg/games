<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>대만 마작</title>
<script src="/lib/shared-wallet.js?v=20260524a"></script>
<script src="/lib/multiplayer.js?v=20260524a"></script>
<style>
:root {
  --bg: #0a0f1a;
  --panel: #111827;
  --panel2: #1f2937;
  --border: rgba(255,255,255,0.08);
  --text: #e5e7eb;
  --muted: #6b7280;
  --accent: #3b82f6;
  --gold: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --tile-bg: #f5f0e8;
  --tile-border: #d4c9a8;
  --tile-text: #1a1008;
  --tile-man: #c0392b;
  --tile-pin: #2980b9;
  --tile-sou: #27ae60;
  --tile-honor: #8e44ad;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
  padding-top: calc(48px + env(safe-area-inset-top));
}

/* ===== SCREENS ===== */
.screen { display: none; width: 100%; height: calc(100vh - 48px - env(safe-area-inset-top)); overflow: hidden; }
.screen.active { display: flex; flex-direction: column; }

/* ===== START SCREEN ===== */
#start-screen {
  align-items: center;
  justify-content: center;
  gap: 24px;
  background: radial-gradient(ellipse at center, #1a2535 0%, var(--bg) 70%);
}
.logo { font-size: 3rem; letter-spacing: 4px; }
.logo-sub { color: var(--muted); font-size: 0.85rem; letter-spacing: 2px; }
.btn { padding: 12px 32px; border-radius: 8px; border: none; font-size: 1rem; cursor: pointer; transition: all 0.15s; font-weight: 600; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-secondary { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
.btn-sm { padding: 8px 16px; font-size: 0.85rem; }
.start-info { color: var(--muted); font-size: 0.8rem; text-align: center; line-height: 1.6; }

/* ===== GAME SCREEN ===== */
#game-screen { flex-direction: column; }

/* Round info bar */
#round-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.78rem;
  flex-shrink: 0;
}
.round-info { color: var(--gold); font-weight: 700; }
.wall-count { color: var(--muted); }
.score-mini { display: flex; gap: 12px; }
.score-mini span { font-size: 0.72rem; }

/* Game table */
#game-table {
  flex: 1;
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  grid-template-columns: 60px 1fr 60px;
  gap: 4px;
  padding: 4px;
  overflow: hidden;
  min-height: 0;
}

/* CPU areas */
.cpu-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.cpu-area.top {
  grid-column: 1 / 4;
  grid-row: 1;
  flex-direction: column;
}
.cpu-area.left { grid-column: 1; grid-row: 2; justify-content: center; }
.cpu-area.right { grid-column: 3; grid-row: 2; justify-content: center; }

.cpu-label {
  font-size: 0.65rem;
  color: var(--muted);
  white-space: nowrap;
}
.cpu-score-label { font-size: 0.65rem; color: var(--gold); }

/* CPU hand - face down */
.cpu-hand { display: flex; gap: 1px; flex-wrap: wrap; justify-content: center; }
.cpu-hand.vertical { flex-direction: column; align-items: center; }

.tile-back {
  width: 18px; height: 26px;
  background: linear-gradient(135deg, #1e3a5f, #0d2137);
  border: 1px solid #2a4a6f;
  border-radius: 3px;
  font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #2a4a6f;
}
.tile-back.sm { width: 14px; height: 20px; }

/* Center area */
#center-area {
  grid-column: 2;
  grid-row: 2;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  border: 1px solid var(--border);
  display: grid;
  grid-template-rows: 1fr 20px 1fr;
  grid-template-columns: 1fr 20px 1fr;
  overflow: hidden;
}
.discard-zone {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  padding: 4px;
  align-content: flex-start;
  overflow: hidden;
}
.discard-zone.p0 { grid-column: 2; grid-row: 3; align-content: flex-end; justify-content: center; }
.discard-zone.p1 { grid-column: 1; grid-row: 2; align-content: center; }
.discard-zone.p2 { grid-column: 2; grid-row: 1; align-content: flex-start; justify-content: center; }
.discard-zone.p3 { grid-column: 3; grid-row: 2; align-content: center; justify-content: flex-end; }
.center-dora {
  grid-column: 2; grid-row: 2;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: var(--muted);
  flex-direction: column; gap: 2px;
}

/* CPU open melds */
.cpu-melds { display: flex; gap: 1px; flex-wrap: wrap; }

/* Player hand area */
#player-area {
  grid-column: 1 / 4;
  grid-row: 4;
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 6px;
  flex-shrink: 0;
}
.player-info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
  font-size: 0.75rem;
}
.player-name { font-weight: 700; }
.player-score { color: var(--gold); }
.player-wind { color: var(--muted); font-size: 0.65rem; }

/* Player hand tiles */
#player-hand {
  display: flex;
  gap: 3px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
#player-hand::-webkit-scrollbar { height: 3px; }
#player-hand::-webkit-scrollbar-track { background: transparent; }
#player-hand::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Tile styles */
.tile {
  min-width: 32px; width: 32px; height: 44px;
  background: var(--tile-bg);
  border: 1px solid var(--tile-border);
  border-bottom: 3px solid var(--tile-border);
  border-radius: 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  flex-shrink: 0;
  font-size: 18px;
  line-height: 1;
  position: relative;
}
.tile:hover { transform: translateY(-4px); box-shadow: 0 4px 8px rgba(0,0,0,0.4); }
.tile.selected { transform: translateY(-8px); box-shadow: 0 6px 12px rgba(59,130,246,0.5); border-color: var(--accent); }
.tile.just-drawn { border-color: var(--green); box-shadow: 0 0 6px rgba(16,185,129,0.4); }
.tile.discard-tile {
  width: 18px; min-width: 18px; height: 26px;
  font-size: 10px; border-width: 1px; border-bottom-width: 2px;
  cursor: default;
}
.tile.discard-tile:hover { transform: none; box-shadow: none; }
.tile.sm {
  min-width: 22px; width: 22px; height: 30px;
  font-size: 13px; border-bottom-width: 2px;
  cursor: default;
}
.tile.man { color: var(--tile-man); }
.tile.pin { color: var(--tile-pin); }
.tile.sou { color: var(--tile-sou); }
.tile.honor, .tile.flower { color: var(--tile-honor); font-size: 11px; }
.tile-label { font-size: 7px; color: var(--muted); line-height: 1; margin-top: 1px; }

/* Player melds */
#player-melds {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.meld-group { display: flex; gap: 1px; }

/* Player flowers */
#player-flowers { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; }

/* Action buttons */
#action-buttons {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.action-btn {
  padding: 8px 16px;
  border-radius: 6px;
  border: none;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-discard { background: var(--accent); color: white; }
.btn-tsumo { background: var(--green); color: white; }
.btn-kan { background: #7c3aed; color: white; }
.btn-pass { background: var(--panel2); color: var(--muted); border: 1px solid var(--border); }

/* ===== CLAIM OVERLAY ===== */
#claim-overlay {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.85);
  padding: 16px;
  z-index: 100;
  border-top: 1px solid var(--border);
  animation: slideUp 0.2s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
#claim-overlay.show { display: block; }
.claim-title { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
.claim-tile-show { display: flex; justify-content: center; margin-bottom: 10px; gap: 4px; }
.claim-buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.claim-btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  min-width: 80px;
}
.claim-btn-ron { background: #dc2626; color: white; }
.claim-btn-pon { background: #d97706; color: white; }
.claim-btn-chi { background: #0891b2; color: white; }
.claim-btn-kan { background: #7c3aed; color: white; }
.claim-btn-pass { background: var(--panel2); color: var(--muted); border: 1px solid var(--border); }

/* ===== RESULT OVERLAY ===== */
#result-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  padding: 20px;
}
#result-overlay.show { display: flex; }
.result-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  width: 100%;
  max-width: 360px;
}
.result-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 12px; text-align: center; }
.result-title.win { color: var(--green); }
.result-title.lose { color: var(--red); }
.result-title.draw { color: var(--gold); }
.yaku-list { margin: 8px 0; }
.yaku-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 0.85rem; border-bottom: 1px solid var(--border); }
.yaku-name { color: var(--text); }
.yaku-tai { color: var(--gold); font-weight: 700; }
.result-total { font-size: 1.1rem; font-weight: 800; color: var(--gold); text-align: center; margin-top: 10px; }
.result-gold { font-size: 1rem; color: var(--green); text-align: center; }
.result-scores { margin-top: 12px; }
.score-change-row { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 2px 0; }

/* ===== LOG ===== */
#game-log {
  position: fixed;
  top: calc(48px + env(safe-area-inset-top) + 32px);
  right: 8px;
  width: 140px;
  max-height: 100px;
  overflow: hidden;
  font-size: 0.65rem;
  color: var(--muted);
  pointer-events: none;
  z-index: 50;
}
.log-line { padding: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-line.win { color: var(--green); }
.log-line.action { color: var(--accent); }

/* ===== TURN INDICATOR ===== */
.turn-indicator {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 1s infinite;
  display: inline-block;
  margin-right: 4px;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

/* ===== TIMER BAR ===== */
#timer-bar {
  height: 2px;
  background: var(--accent);
  transition: width 0.1s linear;
  position: fixed;
  top: calc(48px + env(safe-area-inset-top));
  left: 0;
  z-index: 150;
}

/* Dealer badge */
.dealer-badge {
  background: var(--gold);
  color: #000;
  font-size: 0.6rem;
  font-weight: 800;
  padding: 1px 4px;
  border-radius: 3px;
}

/* Riichi / waiting indicator */
.tenpai-badge {
  background: var(--green);
  color: white;
  font-size: 0.6rem;
  padding: 1px 4px;
  border-radius: 3px;
  animation: pulse 1s infinite;
}
</style>
</head>

<script>
// =====================================================
// TILE ENGINE
// =====================================================
const TILE_SUITS = ['m','p','s'];
const WIND_NAMES = ['東','南','西','北'];
const DRAGON_NAMES = {z5:'白',z6:'發',z7:'中'};
const FLOWER_NAMES = {f1:'春',f2:'夏',f3:'秋',f4:'冬',f5:'梅',f6:'蘭',f7:'菊',f8:'竹'};

// Mahjong tile unicode block
const TILE_UNICODE = {
  m1:'🀇',m2:'🀈',m3:'🀉',m4:'🀊',m5:'🀋',m6:'🀌',m7:'🀍',m8:'🀎',m9:'🀏',
  p1:'🀙',p2:'🀚',p3:'🀛',p4:'🀜',p5:'🀝',p6:'🀞',p7:'🀟',p8:'🀠',p9:'🀡',
  s1:'🀐',s2:'🀑',s3:'🀒',s4:'🀓',s5:'🀔',s6:'🀕',s7:'🀖',s8:'🀗',s9:'🀘',
  z1:'東',z2:'南',z3:'西',z4:'北',z5:'白',z6:'發',z7:'中',
  f1:'春',f2:'夏',f3:'秋',f4:'冬',f5:'梅',f6:'蘭',f7:'菊',f8:'竹'
};

function tileClass(t) {
  if (!t) return '';
  const s = t[0];
  if (s === 'm') return 'man';
  if (s === 'p') return 'pin';
  if (s === 's') return 'sou';
  if (s === 'z') return 'honor';
  if (s === 'f') return 'flower';
  return '';
}

function tileSuit(t) { return t ? t[0] : ''; }
function tileNum(t) { return t ? parseInt(t.slice(1)) : 0; }
function isFlower(t) { return t && t[0] === 'f'; }
function isHonor(t) { return t && (t[0] === 'z'); }
function isTerminal(t) { if (isHonor(t)) return false; const n = tileNum(t); return n === 1 || n === 9; }
function isYaochu(t) { return isHonor(t) || isTerminal(t); }

function buildWall() {
  const tiles = [];
  // 수패 (man, pin, sou) × 4
  for (const s of ['m','p','s']) {
    for (let n = 1; n <= 9; n++) {
      for (let i = 0; i < 4; i++) tiles.push(s + n);
    }
  }
  // 바람패 × 4
  for (let n = 1; n <= 4; n++) {
    for (let i = 0; i < 4; i++) tiles.push('z' + n);
  }
  // 삼원패 × 4
  for (let n = 5; n <= 7; n++) {
    for (let i = 0; i < 4; i++) tiles.push('z' + n);
  }
  // 화패 × 1 each
  for (let n = 1; n <= 8; n++) tiles.push('f' + n);
  return shuffle(tiles);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sortHand(hand) {
  return [...hand].sort((a, b) => {
    const order = ['m','p','s','z','f'];
    const ai = order.indexOf(a[0]), bi = order.indexOf(b[0]);
    if (ai !== bi) return ai - bi;
    return tileNum(a) - tileNum(b);
  });
}

// =====================================================
// WIN DETECTION (화료 판정)
// =====================================================

// Check if tiles can form all melds (순쯔/커쯔)
function canFormMelds(tiles) {
  if (tiles.length === 0) return true;
  const sorted = [...tiles].sort();
  const first = sorted[0];
  // 커쯔 시도 (3장 같은 패)
  if (sorted.filter(t => t === first).length >= 3) {
    const rest = removeFromArr(sorted, [first, first, first]);
    if (canFormMelds(rest)) return true;
  }
  // 순쯔 시도 (연속 3장, 수패만)
  const s = tileSuit(first);
  if (s === 'm' || s === 'p' || s === 's') {
    const n = tileNum(first);
    const t2 = s + (n + 1), t3 = s + (n + 2);
    if (sorted.includes(t2) && sorted.includes(t3)) {
      const rest = removeFromArr(sorted, [first, t2, t3]);
      if (canFormMelds(rest)) return true;
    }
  }
  return false;
}

function removeFromArr(arr, remove) {
  const a = [...arr];
  for (const r of remove) {
    const idx = a.indexOf(r);
    if (idx >= 0) a.splice(idx, 1);
  }
  return a;
}

// 화료 판정: hand(비공개) + melds(공개), 총 16장 or 완성패
function canWin(hand, melds) {
  const handTiles = [...hand];
  const meldCount = melds.reduce((acc, m) => acc + (m.type === 'ankan' || m.type === 'minkan' || m.type === 'addkan' ? 0 : 1), 0);
  const totalMeldsNeeded = 5 - melds.length; // 남은 몸통 수

  // 7또이쯔 (7 pairs) - 멘젠만
  if (melds.length === 0 && handTiles.length === 16) {
    const counts = {};
    for (const t of handTiles) counts[t] = (counts[t] || 0) + 1;
    const pairs = Object.values(counts).filter(c => c >= 2).length;
    const singles = Object.values(counts).filter(c => c === 1).length;
    if (pairs === 7 && singles === 0) return { win: true, special: '칠대자' };
    // 7쌍 with quadruples counting as 2 pairs
    const allPairs = Object.entries(counts).filter(([,c]) => c >= 2);
    if (allPairs.length === 7) return { win: true, special: '칠대자' };
  }

  // 13야오 (국사무쌍) - 멘젠만
  if (melds.length === 0 && handTiles.length === 16) {
    const yaochuTiles = ['m1','m9','p1','p9','s1','s9','z1','z2','z3','z4','z5','z6','z7'];
    const hasAll = yaochuTiles.every(t => handTiles.includes(t));
    if (hasAll) {
      const counts = {};
      for (const t of handTiles) if (yaochuTiles.includes(t)) counts[t] = (counts[t] || 0) + 1;
      const hasPair = Object.values(counts).some(c => c >= 2);
      if (hasPair) return { win: true, special: '국사무쌍' };
    }
  }

  // 표준 5몸통+1머리
  // 각 타일을 머리(또이쯔) 후보로 시도
  const unique = [...new Set(handTiles)];
  for (const pair of unique) {
    const cnt = handTiles.filter(t => t === pair).length;
    if (cnt < 2) continue;
    const remaining = removeFromArr(handTiles, [pair, pair]);
    if (remaining.length !== (16 - 2 - melds.reduce((s, m) => s + (m.type.includes('kan') ? 4 : 3), 0))) continue;
    if (canFormMelds(remaining)) return { win: true, pair, special: null };
  }
  return { win: false };
}

// 화료 가능 여부 확인 (tenpai check - 1장 빼면 화료 가능?)
function isTenpai(hand, melds) {
  for (let i = 0; i < hand.length; i++) {
    const test = [...hand];
    test.splice(i, 1);
    if (canWin(test, melds).win) return true;
  }
  return false;
}

// =====================================================
// YAKU CALCULATION (역 계산)
// =====================================================

function calcYaku(hand, melds, flowers, winTile, winType, seatWind, roundWind, isDealer, honba) {
  const yaku = [];
  const allTiles = [...hand, ...melds.flatMap(m => m.tiles)];
  const isMenzen = melds.every(m => m.type === 'ankan');
  const isTsumo = winType === 'tsumo';

  // 기본 5타이
  yaku.push({ name: '기본', tai: 5 });

  // 츠모 (1타이)
  if (isTsumo) yaku.push({ name: '자모', tai: 1 });

  // 멘젠 (1타이) - 론으로 이겼을 때
  if (isMenzen && !isTsumo) yaku.push({ name: '멘젠', tai: 1 });

  // 멘젠 츠모 (3타이) - 멘젠+자모 (기존 자모 1타이 대신 3타이)
  if (isMenzen && isTsumo) {
    // 자모 1타이 제거하고 멘젠츠모 3타이로
    const tsumoIdx = yaku.findIndex(y => y.name === '자모');
    if (tsumoIdx >= 0) yaku.splice(tsumoIdx, 1);
    yaku.push({ name: '멘젠츠모', tai: 3 });
  }

  // 무자 (1타이) - 자패 없음
  const hasHonor = allTiles.some(t => isHonor(t));
  if (!hasHonor) yaku.push({ name: '무자', tai: 1 });

  // 핑후 (2타이) - 전부 순쯔 + 역패 아닌 머리 + 양면대기
  if (isMenzen && melds.length === 0) {
    const winResult = canWin(hand, melds);
    if (winResult.win && !winResult.special) {
      // Check all sequences
      const nonPairTiles = removeFromArr(hand, [winResult.pair, winResult.pair]);
      let allChi = true;
      let tempTiles = [...nonPairTiles].sort();
      while (tempTiles.length > 0) {
        const f = tempTiles[0];
        const s = tileSuit(f), n = tileNum(f);
        if (isHonor(f) || tempTiles.filter(t => t === f).length >= 3) {
          allChi = false; break;
        }
        const t2 = s + (n + 1), t3 = s + (n + 2);
        if (!tempTiles.includes(t2) || !tempTiles.includes(t3)) { allChi = false; break; }
        tempTiles = removeFromArr(tempTiles, [f, t2, t3]);
      }
      // 역패 아닌 머리
      const pairIsHonor = isHonor(winResult.pair);
      const pairIsWindOrDragon = pairIsHonor && (
        (winResult.pair === 'z' + (seatWind + 1)) ||
        (winResult.pair === 'z' + (roundWind + 1)) ||
        (winResult.pair >= 'z5')
      );
      if (allChi && !pairIsWindOrDragon) {
        yaku.push({ name: '평화', tai: 2 });
      }
    }
  }

  // 또이또이 (7타이) - 전부 커쯔
  const allPonKan = melds.every(m => m.type === 'pon' || m.type.includes('kan'));
  if (melds.length > 0 && allPonKan) {
    // check hand has only pairs→pungs
    const winResult = canWin(hand, melds);
    if (winResult.win && !winResult.special) {
      const nonPair = removeFromArr(hand, [winResult.pair, winResult.pair]);
      const allPung = nonPair.length === 0 || checkAllPungs(nonPair);
      if (allPung && melds.length === 5) yaku.push({ name: '대대화', tai: 7 });
    }
  }
  // 멘젠 또이또이
  if (melds.length === 0) {
    const wr = canWin(hand, melds);
    if (wr.win && !wr.special) {
      const nonPair = removeFromArr(hand, [wr.pair, wr.pair]);
      if (checkAllPungs(nonPair)) yaku.push({ name: '대대화', tai: 7 });
    }
  }

  // 삼안커 (2타이) - 비공개 커쯔 3개
  const ankoCount = countAnko(hand, melds);
  if (ankoCount >= 3) yaku.push({ name: '삼암각', tai: 2 });
  if (ankoCount >= 4) yaku.push({ name: '사암각', tai: 7 });
  if (ankoCount >= 5) yaku.push({ name: '오암각', tai: 14 });

  // 소삼원 (7타이)
  const dragonMelds = melds.filter(m => m.tiles[0] >= 'z5' && m.tiles[0] <= 'z7');
  const wr2 = canWin(hand, melds);
  if (wr2.win && dragonMelds.length === 2 && wr2.pair >= 'z5' && wr2.pair <= 'z7') {
    yaku.push({ name: '소삼원', tai: 7 });
  }
  // 대삼원 (14타이)
  if (dragonMelds.length === 3) yaku.push({ name: '대삼원', tai: 14 });

  // 소사희/대사희 (7/14타이)
  const windMelds = melds.filter(m => m.tiles[0] >= 'z1' && m.tiles[0] <= 'z4');
  if (wr2.win && windMelds.length === 3 && wr2.pair >= 'z1' && wr2.pair <= 'z4') {
    yaku.push({ name: '소사희', tai: 7 });
  }
  if (windMelds.length === 4) yaku.push({ name: '대사희', tai: 14 });

  // 바깥깡 (1타이)
  const minkanCount = melds.filter(m => m.type === 'minkan' || m.type === 'addkan').length;
  if (minkanCount > 0 && winType !== 'rinshan') yaku.push({ name: '바깥깡', tai: minkanCount });

  // 안깡 (2타이/개)
  const ankanCount = melds.filter(m => m.type === 'ankan').length;
  if (ankanCount > 0) yaku.push({ name: '안깡', tai: ankanCount * 2 });

  // 영상개화 (1타이)
  if (winType === 'rinshan') yaku.push({ name: '영상개화', tai: 1 });

  // 해저 (1타이)
  if (winType === 'haitei') yaku.push({ name: '해저', tai: 1 });

  // 전구인 (2타이) - 전부 울어서 + 론
  if (melds.length === 5 && !isMenzen && !isTsumo) yaku.push({ name: '전구인', tai: 2 });

  // 역패 커쯔 (바람/삼원)
  for (const m of melds) {
    if (!m.tiles[0]) continue;
    const t = m.tiles[0];
    if (t === 'z5' || t === 'z6' || t === 'z7') {
      yaku.push({ name: TILE_UNICODE[t] + '커쯔', tai: 1 });
    } else if (t === 'z' + (seatWind + 1) && t === 'z' + (roundWind + 1)) {
      yaku.push({ name: WIND_NAMES[seatWind] + '커쯔(더블)', tai: 4 });
    } else if (t === 'z' + (seatWind + 1)) {
      yaku.push({ name: WIND_NAMES[seatWind] + '커쯔', tai: 2 });
    } else if (t === 'z' + (roundWind + 1)) {
      yaku.push({ name: WIND_NAMES[roundWind] + '커쯔', tai: 2 });
    } else if (t[0] === 'z' && tileNum(t) <= 4) {
      yaku.push({ name: WIND_NAMES[tileNum(t)-1] + '커쯔', tai: 1 });
    }
  }

  // 단기대기 (1타이)
  if (wr2.win && !wr2.special) {
    // 단기: 머리 기다리는 형태 (1장만 기다림)
    // 간략 체크: 나머지가 모두 커쯔면 단기
    const nonPair = removeFromArr(hand, [wr2.pair, wr2.pair]);
    if (allTiles.filter(t => t === winTile).length <= 1) {
      // single wait heuristic
    }
  }

  // 화패 처리
  if (flowers.length === 0) {
    yaku.push({ name: '무화', tai: 1 });
  } else {
    // 춘하추동 (f1-f4) 모두
    const seasons = flowers.filter(f => f >= 'f1' && f <= 'f4');
    if (seasons.length === 4) yaku.push({ name: '춘하추동', tai: 2 });
    // 매난국죽 (f5-f8) 모두
    const flowers2 = flowers.filter(f => f >= 'f5' && f <= 'f8');
    if (flowers2.length === 4) yaku.push({ name: '매난국죽', tai: 2 });
    // 화만관
    if (flowers.length === 8) yaku.push({ name: '화만관', tai: 14 });
    // 정화 (좌석 일치)
    for (const fl of flowers) {
      const fn = tileNum(fl);
      const playerFlower = (fn === seatWind + 1) || (fn === seatWind + 5);
      if (playerFlower) yaku.push({ name: FLOWER_NAMES[fl] + '(정화)', tai: 2 });
      else yaku.push({ name: FLOWER_NAMES[fl], tai: 1 });
    }
  }

  // 친 장가 (1타이)
  if (isDealer) yaku.push({ name: '친(동가)', tai: 1 });

  // 연장 (2타이/연장)
  if (honba > 0 && isDealer) yaku.push({ name: '연장 ×' + honba, tai: honba * 2 });

  // 특수패
  if (wr2.special === '칠대자') yaku.push({ name: '칠대자', tai: 7 });
  if (wr2.special === '국사무쌍') yaku.push({ name: '국사무쌍', tai: 13 });

  const total = yaku.reduce((s, y) => s + y.tai, 0);
  return { yaku, total };
}

function checkAllPungs(tiles) {
  const t = [...tiles].sort();
  while (t.length > 0) {
    const f = t[0];
    if (t.filter(x => x === f).length < 3) return false;
    t.splice(0, 3);
  }
  return true;
}

function countAnko(hand, melds) {
  let count = melds.filter(m => m.type === 'ankan').length;
  // count pungs in hand
  const sorted = [...hand].sort();
  let i = 0;
  while (i < sorted.length) {
    let j = i;
    while (j < sorted.length && sorted[j] === sorted[i]) j++;
    if (j - i >= 3) count++;
    i = j;
  }
  return count;
}

// =====================================================
// GAME STATE
// =====================================================
let G = null; // global game state
let selectedTile = null; // index in player hand
let claimTimer = null;
let cpuTimer = null;

const WINDS = ['동','남','서','북'];
const START_SCORE = 50000;

function initGameState() {
  const wall = buildWall();
  const players = [
    { id: 'p0', name: (typeof SharedWallet !== 'undefined' && SharedWallet.user?.nickname) || '나', type: 'human', seatWind: 0, hand: [], melds: [], flowers: [], score: START_SCORE, isDealer: true },
    { id: 'p1', name: 'CPU 남', type: 'cpu', seatWind: 1, hand: [], melds: [], flowers: [], score: START_SCORE, isDealer: false },
    { id: 'p2', name: 'CPU 서', type: 'cpu', seatWind: 2, hand: [], melds: [], flowers: [], score: START_SCORE, isDealer: false },
    { id: 'p3', name: 'CPU 북', type: 'cpu', seatWind: 3, hand: [], melds: [], flowers: [], score: START_SCORE, isDealer: false },
  ];

  return {
    players,
    wall: wall.slice(16 * 4 + 1), // dealt 64+1 tiles
    deadWall: [],
    round: { windIdx: 0, dealer: 0, honba: 0 },
    currentPlayer: 0,
    phase: 'draw', // draw | action | claim | end
    lastDiscard: null,
    lastDiscardPlayer: -1,
    claimInfo: null,
    log: [],
    gameOver: false,
    justDrawn: null, // index of just-drawn tile in hand
    rinshan: false,
  };
}

function dealTiles(state) {
  const wall = buildWall();
  let wallIdx = 0;

  // Deal 16 each, dealer gets 17th later
  for (let round = 0; round < 4; round++) {
    for (let p = 0; p < 4; p++) {
      for (let i = 0; i < 4; i++) {
        state.players[p].hand.push(wall[wallIdx++]);
      }
    }
  }

  // Handle flower tiles drawn during initial deal
  // (simplified: deal remaining wall)
  state.wall = wall.slice(wallIdx);

  // Resolve flowers for all players
  for (let p = 0; p < 4; p++) {
    resolveFlowers(state, p);
    state.players[p].hand = sortHand(state.players[p].hand);
  }

  // Dealer draws extra tile
  const extra = drawFromWall(state);
  if (extra) {
    if (isFlower(extra)) {
      state.players[0].flowers.push(extra);
      addLog('화패 ' + TILE_UNICODE[extra] + ' 교체', 'action');
      const rep = drawFromWall(state);
      if (rep) {
        state.players[0].hand.push(rep);
        state.players[0].hand = sortHand(state.players[0].hand);
      }
    } else {
      state.players[0].hand.push(extra);
      state.players[0].hand = sortHand(state.players[0].hand);
      state.justDrawn = state.players[0].hand.length - 1;
    }
  }
}

function resolveFlowers(state, playerIdx) {
  const player = state.players[playerIdx];
  let i = 0;
  while (i < player.hand.length) {
    if (isFlower(player.hand[i])) {
      player.flowers.push(player.hand.splice(i, 1)[0]);
      // Draw replacement
      const rep = drawFromWall(state);
      if (rep) player.hand.push(rep);
    } else {
      i++;
    }
  }
}

function drawFromWall(state) {
  if (state.wall.length === 0) return null;
  return state.wall.shift();
}

// =====================================================
// AI ENGINE
// =====================================================

function cpuChooseDiscard(playerIdx) {
  const player = G.players[playerIdx];
  const hand = [...player.hand];

  // Score each tile for isolation
  const scores = hand.map((t, i) => ({
    tile: t, idx: i,
    score: isolationScore(t, hand, player.melds)
  }));
  scores.sort((a, b) => b.score - a.score);

  // Discard highest isolation score (most isolated)
  return scores[0].idx;
}

function isolationScore(tile, hand, melds) {
  if (isFlower(tile)) return -100; // flowers should be removed already
  let score = 0;
  // Honor tiles are more isolated (unless they form melds)
  if (isHonor(tile)) score += 3;
  // Terminal tiles slightly more isolated
  if (isTerminal(tile)) score += 1;

  const s = tileSuit(tile), n = tileNum(tile);
  if (!isHonor(tile)) {
    // Check neighbors
    const neighbors = [s + (n - 2), s + (n - 1), s + (n + 1), s + (n + 2)];
    for (const nb of neighbors) {
      if (hand.includes(nb)) score -= 2;
    }
    // Same tile count
    const sameCount = hand.filter(t => t === tile).length;
    if (sameCount >= 2) score -= 3;
    if (sameCount >= 3) score -= 5;
  }
  return score;
}

function cpuDecideClaim(playerIdx, discardedTile, discarderIdx) {
  const player = G.players[playerIdx];
  const hand = player.hand;

  // Check ron (화료)
  const testHand = [...hand, discardedTile];
  if (canWin(testHand, player.melds).win) {
    return { type: 'ron' };
  }

  // Check pon
  const sameInHand = hand.filter(t => t === discardedTile).length;
  if (sameInHand >= 2) {
    // Always pon honor/dragon/wind tiles for yaku
    const isValueTile = isHonor(discardedTile);
    if (isValueTile || Math.random() < 0.5) {
      return { type: 'pon' };
    }
  }

  // Check chi (only from left player = previous in turn order)
  const prevPlayer = (playerIdx + 3) % 4;
  if (prevPlayer === discarderIdx) {
    const s = tileSuit(discardedTile);
    if (s === 'm' || s === 'p' || s === 's') {
      const n = tileNum(discardedTile);
      const chiOptions = [
        [s+(n-2), s+(n-1)], [s+(n-1), s+(n+1)], [s+(n+1), s+(n+2)]
      ];
      for (const opt of chiOptions) {
        if (opt.every(t => hand.includes(t)) && Math.random() < 0.3) {
          return { type: 'chi', tiles: opt };
        }
      }
    }
  }

  return { type: 'pass' };
}

// =====================================================
// GAME CONTROLLER
// =====================================================

function startGame() {
  G = initGameState();
  dealTiles(G);
  showScreen('game-screen');
  render();
  G.phase = 'action';
  G.currentPlayer = G.round.dealer;

  // If dealer is CPU, start CPU turn
  if (G.players[G.currentPlayer].type === 'cpu') {
    scheduleCpuTurn();
  } else {
    render();
  }
  addLog('게임 시작! 동1국', 'action');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function addLog(text, cls = '') {
  if (!G) return;
  G.log.unshift({ text, cls });
  if (G.log.length > 8) G.log.pop();
}

// Player selects tile
function selectTile(idx) {
  if (G.phase !== 'action' || G.currentPlayer !== 0) return;
  selectedTile = (selectedTile === idx) ? null : idx;
  render();
}

// Player discards selected tile
function playerDiscard() {
  if (selectedTile === null) return;
  if (G.phase !== 'action' || G.currentPlayer !== 0) return;
  doDiscard(0, selectedTile);
  selectedTile = null;
}

function doDiscard(playerIdx, tileIdx) {
  const player = G.players[playerIdx];
  const tile = player.hand[tileIdx];
  player.hand.splice(tileIdx, 1);
  player.hand = sortHand(player.hand);

  G.lastDiscard = tile;
  G.lastDiscardPlayer = playerIdx;
  G.justDrawn = null;

  // Add to discard pile (we'll track in a separate structure)
  if (!G.discards) G.discards = [[],[],[],[]];
  G.discards[playerIdx].push(tile);

  addLog(player.name + ' → ' + TILE_UNICODE[tile]);
  G.phase = 'claim';
  G.claimInfo = {
    tile,
    discarder: playerIdx,
    pending: [],
    timerEnd: Date.now() + 2000
  };

  // Check all other players for claims
  processClaims(playerIdx, tile);
}

function processClaims(discarderIdx, tile) {
  // Check if human player (p0) can claim
  if (discarderIdx !== 0) {
    const humanClaims = getHumanClaimOptions(0, tile, discarderIdx);
    if (humanClaims.length > 0) {
      showClaimOverlay(tile, humanClaims);
      // Start timer
      G.claimInfo.timer = setTimeout(() => {
        hideClaimOverlay();
        resolveClaims(null);
      }, 2500);
      return;
    }
  }
  // No human claim options, resolve with CPU only
  resolveClaims(null);
}

function getHumanClaimOptions(playerIdx, tile, discarderIdx) {
  const player = G.players[playerIdx];
  const hand = player.hand;
  const options = [];

  // Ron
  const testHand = [...hand, tile];
  if (canWin(testHand, player.melds).win) options.push('ron');

  // Pon
  if (hand.filter(t => t === tile).length >= 2) options.push('pon');

  // Chi (only from left/previous player)
  const prevPlayer = (playerIdx + 3) % 4;
  if (prevPlayer === discarderIdx) {
    const s = tileSuit(tile);
    if (s === 'm' || s === 'p' || s === 's') {
      const n = tileNum(tile);
      const chiOptions = [
        [s+(n-2), s+(n-1)], [s+(n-1), s+(n+1)], [s+(n+1), s+(n+2)]
      ];
      for (const opt of chiOptions) {
        if (opt.every(t => hand.includes(t))) {
          options.push({ type: 'chi', tiles: opt });
        }
      }
    }
  }

  return options;
}

function resolveClaims(humanClaim) {
  if (!G || G.phase !== 'claim') return;
  clearTimeout(G.claimInfo?.timer);

  const { tile, discarder } = G.claimInfo;

  // Collect all CPU claims
  const cpuClaims = [];
  for (let p = 1; p < 4; p++) {
    if (p === discarder) continue;
    const decision = cpuDecideClaim(p, tile, discarder);
    if (decision.type !== 'pass') {
      cpuClaims.push({ player: p, ...decision });
    }
  }

  // Determine winning claim (ron > pon > chi)
  let winner = null;
  if (humanClaim && humanClaim.type === 'ron') winner = { player: 0, ...humanClaim };
  else if (cpuClaims.find(c => c.type === 'ron')) winner = cpuClaims.find(c => c.type === 'ron');
  else if (humanClaim && (humanClaim.type === 'pon' || humanClaim.type === 'chi')) winner = { player: 0, ...humanClaim };
  else if (cpuClaims.length > 0) winner = cpuClaims[0];

  if (winner) {
    applyClaimAction(winner);
  } else {
    // No claim, next player draws
    const nextPlayer = (discarder + 1) % 4;
    G.currentPlayer = nextPlayer;
    G.phase = 'draw';
    playerDraw(nextPlayer);
  }
}

function applyClaimAction(claim) {
  const player = G.players[claim.player];

  if (claim.type === 'ron') {
    // Win by ron
    const winTile = G.claimInfo.tile;
    player.hand.push(winTile);
    player.hand = sortHand(player.hand);
    handleWin(claim.player, winTile, 'ron', G.claimInfo.discarder);
    return;
  }

  if (claim.type === 'pon') {
    const tile = G.claimInfo.tile;
    const idx1 = player.hand.indexOf(tile);
    player.hand.splice(idx1, 1);
    const idx2 = player.hand.indexOf(tile);
    player.hand.splice(idx2, 1);
    player.melds.push({ type: 'pon', tiles: [tile, tile, tile], from: G.claimInfo.discarder });
    addLog(player.name + ' 퐁! ' + TILE_UNICODE[tile], 'action');
    G.currentPlayer = claim.player;
    G.phase = 'action';
    G.justDrawn = null;
    render();
    if (player.type === 'cpu') scheduleCpuTurn();
    return;
  }

  if (claim.type === 'chi') {
    const tile = G.claimInfo.tile;
    const tiles = claim.tiles || [];
    for (const t of tiles) {
      const idx = player.hand.indexOf(t);
      if (idx >= 0) player.hand.splice(idx, 1);
    }
    player.melds.push({ type: 'chi', tiles: [tile, ...tiles].sort(), from: G.claimInfo.discarder });
    addLog(player.name + ' 치! ' + tiles.map(t => TILE_UNICODE[t]).join(''), 'action');
    G.currentPlayer = claim.player;
    G.phase = 'action';
    G.justDrawn = null;
    render();
    if (player.type === 'cpu') scheduleCpuTurn();
    return;
  }
}

function playerDraw(playerIdx) {
  if (G.wall.length === 0) {
    // 유산 (exhaustive draw)
    handleDraw();
    return;
  }

  const tile = drawFromWall(G);
  if (!tile) { handleDraw(); return; }

  const player = G.players[playerIdx];

  // Handle flower
  if (isFlower(tile)) {
    player.flowers.push(tile);
    addLog(player.name + ' 화패 ' + TILE_UNICODE[tile], 'action');
    playerDraw(playerIdx); // draw replacement
    return;
  }

  player.hand.push(tile);
  player.hand = sortHand(player.hand);
  G.justDrawn = player.hand.lastIndexOf(tile);
  G.phase = 'action';
  G.currentPlayer = playerIdx;

  // Check tsumo
  if (canWin(player.hand, player.melds).win) {
    if (player.type === 'cpu') {
      handleWin(playerIdx, tile, 'tsumo', -1);
      return;
    }
    // Human: show tsumo button
  }

  render();
  if (player.type === 'cpu') scheduleCpuTurn();
}

function scheduleCpuTurn() {
  clearTimeout(cpuTimer);
  cpuTimer = setTimeout(doCpuTurn, 900 + Math.random() * 400);
}

function doCpuTurn() {
  if (!G || G.phase !== 'action') return;
  const playerIdx = G.currentPlayer;
  const player = G.players[playerIdx];
  if (player.type !== 'cpu') return;

  // Check tsumo
  if (canWin(player.hand, player.melds).win) {
    const lastTile = G.justDrawn !== null ? player.hand[G.justDrawn] : player.hand[player.hand.length - 1];
    handleWin(playerIdx, lastTile, 'tsumo', -1);
    return;
  }

  // Check kan in hand
  const counts = {};
  for (const t of player.hand) counts[t] = (counts[t] || 0) + 1;
  const kanTile = Object.entries(counts).find(([t, c]) => c === 4);
  if (kanTile && Math.random() < 0.7) {
    doCpuKan(playerIdx, kanTile[0]);
    return;
  }

  // Discard
  const discIdx = cpuChooseDiscard(playerIdx);
  doDiscard(playerIdx, discIdx);
  render();
}

function doCpuKan(playerIdx, tile) {
  const player = G.players[playerIdx];
  const tiles = player.hand.filter(t => t === tile);
  player.hand = player.hand.filter(t => t !== tile);
  player.melds.push({ type: 'ankan', tiles: [tile, tile, tile, tile], from: playerIdx });
  addLog(player.name + ' 안깡! ' + TILE_UNICODE[tile], 'action');
  G.rinshan = true;
  playerDraw(playerIdx);
}

// Player tsumo
function playerTsumo() {
  if (G.phase !== 'action' || G.currentPlayer !== 0) return;
  const player = G.players[0];
  if (!canWin(player.hand, player.melds).win) return;
  const lastTile = G.justDrawn !== null ? player.hand[G.justDrawn] : player.hand[player.hand.length - 1];
  handleWin(0, lastTile, 'tsumo', -1);
}

// Player kan
function playerKan() {
  if (G.phase !== 'action' || G.currentPlayer !== 0) return;
  const player = G.players[0];
  const counts = {};
  for (const t of player.hand) counts[t] = (counts[t] || 0) + 1;
  const kanTile = Object.entries(counts).find(([t, c]) => c === 4);
  if (!kanTile) return;
  const tile = kanTile[0];
  player.hand = player.hand.filter(t => t !== tile);
  player.melds.push({ type: 'ankan', tiles: [tile, tile, tile, tile], from: 0 });
  addLog('안깡! ' + TILE_UNICODE[tile], 'action');
  G.rinshan = true;
  playerDraw(0);
}

// Handle win
function handleWin(winnerIdx, winTile, winType, discarderIdx) {
  G.phase = 'end';
  clearTimeout(cpuTimer);
  hideClaimOverlay();

  const winner = G.players[winnerIdx];
  const isDealer = winnerIdx === G.round.dealer;
  const { yaku, total } = calcYaku(
    winner.hand, winner.melds, winner.flowers,
    winTile, winType,
    winner.seatWind, G.round.windIdx,
    isDealer, G.round.honba
  );

  // Calculate payments
  const basePayment = total * 1000;
  let payments = [0, 0, 0, 0];
  let scoreChanges = [0, 0, 0, 0];

  if (winType === 'tsumo') {
    for (let p = 0; p < 4; p++) {
      if (p === winnerIdx) continue;
      let pay = basePayment;
      if (p === G.round.dealer) pay *= 2;
      payments[p] = -pay;
      scoreChanges[winnerIdx] += pay;
    }
  } else {
    // Ron
    let pay = basePayment;
    if (discarderIdx === G.round.dealer) pay *= 2;
    if (winnerIdx === G.round.dealer) pay *= 2;
    payments[discarderIdx] = -pay;
    scoreChanges[winnerIdx] = pay;
  }

  // Apply scores
  for (let p = 0; p < 4; p++) {
    G.players[p].score += (p === winnerIdx ? scoreChanges[p] : payments[p]);
  }

  // SharedWallet reward
  if (winnerIdx === 0) {
    const goldReward = total * 100000;
    if (goldReward > 0 && typeof SharedWallet !== 'undefined' && SharedWallet.addGold) {
      try { SharedWallet.addGold(goldReward); } catch (_) {}
    }
    addLog('화료! ' + total + '타이 → +' + goldReward.toLocaleString() + 'G', 'win');
  } else {
    addLog(winner.name + ' 화료! ' + total + '타이', 'win');
  }

  // Show result
  showResult(winnerIdx, yaku, total, winType, discarderIdx, scoreChanges, payments);
}

function handleDraw() {
  G.phase = 'end';
  clearTimeout(cpuTimer);
  hideClaimOverlay();
  addLog('유산! (패 소진)', 'action');
  showResultDraw();
}

// =====================================================
// CLAIM OVERLAY
// =====================================================

function showClaimOverlay(tile, options) {
  const overlay = document.getElementById('claim-overlay');
  const tileShow = document.getElementById('claim-tile-show');
  const buttons = document.getElementById('claim-buttons');

  tileShow.innerHTML = `<div class="tile ${tileClass(tile)}">${TILE_UNICODE[tile]||tile}</div>`;

  buttons.innerHTML = '';
  for (const opt of options) {
    const type = typeof opt === 'string' ? opt : opt.type;
    const btn = document.createElement('button');
    btn.className = 'claim-btn claim-btn-' + type;
    btn.textContent = { ron: '화료!', pon: '퐁', chi: '치', kan: '깡' }[type] || type;
    btn.onclick = () => {
      clearTimeout(G.claimInfo?.timer);
      hideClaimOverlay();
      if (type === 'chi') {
        // For chi, need to pick which tiles to use
        resolveClaims({ type: 'chi', tiles: opt.tiles || [] });
      } else {
        resolveClaims({ type });
      }
    };
    buttons.appendChild(btn);
  }

  // Pass button
  const passBtn = document.createElement('button');
  passBtn.className = 'claim-btn claim-btn-pass';
  passBtn.textContent = '패스';
  passBtn.onclick = () => {
    clearTimeout(G.claimInfo?.timer);
    hideClaimOverlay();
    resolveClaims(null);
  };
  buttons.appendChild(passBtn);

  overlay.classList.add('show');
}

function hideClaimOverlay() {
  document.getElementById('claim-overlay').classList.remove('show');
}

// =====================================================
// RESULT
// =====================================================

function showResult(winnerIdx, yaku, total, winType, discarderIdx, scoreChanges, payments) {
  const winner = G.players[winnerIdx];
  const isHumanWin = winnerIdx === 0;

  let html = `<div class="result-title ${isHumanWin ? 'win' : 'lose'}">${isHumanWin ? '🎉 화료!' : winner.name + ' 화료'}</div>`;

  if (isHumanWin) {
    html += `<div style="font-size:0.75rem;color:var(--muted);margin-bottom:8px;">`;
    html += winType === 'tsumo' ? '자모 (自摸)' : '론 (放銃: ' + G.players[discarderIdx]?.name + ')';
    html += `</div>`;
  }

  html += `<div class="yaku-list">`;
  for (const y of yaku) {
    html += `<div class="yaku-row"><span class="yaku-name">${y.name}</span><span class="yaku-tai">${y.tai}타이</span></div>`;
  }
  html += `</div>`;
  html += `<div class="result-total">합계: ${total}타이</div>`;

  if (isHumanWin) {
    html += `<div class="result-gold">+${(total * 100000).toLocaleString()}G 획득!</div>`;
  }

  html += `<div class="result-scores">`;
  for (let p = 0; p < 4; p++) {
    const change = p === winnerIdx ? scoreChanges[p] : payments[p];
    if (change === 0) continue;
    const name = G.players[p].name;
    const sign = change > 0 ? '+' : '';
    html += `<div class="score-change-row"><span>${name}</span><span style="color:${change > 0 ? 'var(--green)':'var(--red)'}">${sign}${change.toLocaleString()}</span></div>`;
  }
  html += `</div>`;

  const card = document.getElementById('result-card');
  card.innerHTML = html;
  document.getElementById('result-overlay').classList.add('show');
  render();
}

function showResultDraw() {
  let html = `<div class="result-title draw">유산 (流局)</div>`;
  html += `<div style="font-size:0.85rem;color:var(--muted);text-align:center;margin:12px 0;">패가 모두 소진되었습니다</div>`;
  html += `<div class="result-scores">`;
  for (let p = 0; p < 4; p++) {
    html += `<div class="score-change-row"><span>${G.players[p].name}</span><span>${G.players[p].score.toLocaleString()}</span></div>`;
  }
  html += `</div>`;
  document.getElementById('result-card').innerHTML = html;
  document.getElementById('result-overlay').classList.add('show');
}

function nextRound() {
  document.getElementById('result-overlay').classList.remove('show');
  if (!G) return;

  // Rotate dealer
  G.round.dealer = (G.round.dealer + 1) % 4;
  if (G.round.dealer === 0) G.round.windIdx = (G.round.windIdx + 1) % 4;

  // Reset for new round
  G.players.forEach((p, i) => {
    p.hand = [];
    p.melds = [];
    p.flowers = [];
    p.isDealer = (i === G.round.dealer);
    p.seatWind = (i - G.round.dealer + 4) % 4;
  });

  G.phase = 'draw';
  G.lastDiscard = null;
  G.lastDiscardPlayer = -1;
  G.claimInfo = null;
  G.log = [];
  G.justDrawn = null;
  G.rinshan = false;
  if (!G.discards) G.discards = [[],[],[],[]];
  G.discards = [[],[],[],[]];

  dealTiles(G);
  render();
  G.phase = 'action';
  G.currentPlayer = G.round.dealer;
  addLog(WINDS[G.round.windIdx] + (G.round.dealer + 1) + '국 시작', 'action');

  if (G.players[G.currentPlayer].type === 'cpu') {
    scheduleCpuTurn();
  } else {
    render();
  }
}

function backToTitle() {
  document.getElementById('result-overlay').classList.remove('show');
  G = null;
  showScreen('start-screen');
}

// =====================================================
// RENDER
// =====================================================

function render() {
  if (!G) return;
  renderRoundBar();
  renderCpuAreas();
  renderPlayerArea();
  renderDiscards();
  renderLog();
}

function renderRoundBar() {
  const wi = G.round.windIdx;
  const dealer = G.round.dealer;
  document.getElementById('round-text').textContent = WINDS[wi] + (dealer + 1) + '국' + (G.round.honba > 0 ? ' ' + G.round.honba + '연' : '');
  document.getElementById('wall-count').textContent = '잔여 ' + (G.wall ? G.wall.length : 0) + '장';

  const scoreMini = document.getElementById('score-mini');
  scoreMini.innerHTML = G.players.map(p =>
    `<span style="color:${p.id==='p0'?'var(--accent)':'var(--muted)'}">${p.name.slice(0,2)}: ${(p.score/1000).toFixed(0)}k</span>`
  ).join('');
}

function renderCpuAreas() {
  // CPU 1 (p1, left, south)
  renderCpuArea(1, 'cpu1', 'vertical');
  // CPU 2 (p2, top, west)
  renderCpuArea(2, 'cpu2', 'horizontal');
  // CPU 3 (p3, right, north)
  renderCpuArea(3, 'cpu3', 'vertical');
}

function renderCpuArea(playerIdx, prefix, orientation) {
  const player = G.players[playerIdx];
  const handEl = document.getElementById(prefix + '-hand');
  const nameEl = document.getElementById(prefix + '-name');
  const scoreEl = document.getElementById(prefix + '-score');
  const dealerEl = document.getElementById(prefix + '-dealer');

  nameEl.textContent = player.name + ' (' + WINDS[player.seatWind] + ')';
  scoreEl.textContent = player.score.toLocaleString();
  dealerEl.innerHTML = player.isDealer ? '<span class="dealer-badge">親</span>' : '';

  // Show turn indicator
  const isCurrent = G.currentPlayer === playerIdx;
  nameEl.style.color = isCurrent ? 'var(--green)' : '';

  handEl.innerHTML = '';
  const count = player.hand.length;
  for (let i = 0; i < count; i++) {
    const tile = document.createElement('div');
    tile.className = 'tile-back' + (orientation === 'vertical' ? ' sm' : '');
    tile.textContent = '🀫';
    handEl.appendChild(tile);
  }

  // Show melds
  const meldsEl = document.getElementById(prefix + '-melds');
  meldsEl.innerHTML = '';
  for (const meld of player.melds) {
    const group = document.createElement('div');
    group.className = 'meld-group';
    for (const t of meld.tiles) {
      const tile = document.createElement('div');
      tile.className = `tile sm ${tileClass(t)}`;
      tile.textContent = TILE_UNICODE[t] || t;
      group.appendChild(tile);
    }
    meldsEl.appendChild(group);
  }

  // Show flowers
  const flowersEl = document.getElementById(prefix + '-flowers');
  if (flowersEl) {
    flowersEl.innerHTML = player.flowers.map(f =>
      `<div class="tile sm flower">${TILE_UNICODE[f]||f}</div>`
    ).join('');
  }
}

function renderPlayerArea() {
  const player = G.players[0];
  const handEl = document.getElementById('player-hand');

  document.getElementById('player-name').textContent = player.name;
  document.getElementById('player-score').textContent = player.score.toLocaleString();
  document.getElementById('player-wind').textContent = WINDS[player.seatWind];
  document.getElementById('player-dealer').innerHTML = player.isDealer ? '<span class="dealer-badge">親</span>' : '';

  // Turn indicator
  const isCurrent = G.currentPlayer === 0 && G.phase === 'action';
  document.getElementById('player-turn-dot').style.display = isCurrent ? 'inline-block' : 'none';

  handEl.innerHTML = '';
  player.hand.forEach((tile, idx) => {
    const el = document.createElement('div');
    el.className = `tile ${tileClass(tile)}`;
    if (idx === selectedTile) el.classList.add('selected');
    if (idx === G.justDrawn) el.classList.add('just-drawn');
    el.textContent = TILE_UNICODE[tile] || tile;
    el.onclick = () => selectTile(idx);
    handEl.appendChild(el);
  });

  // Player melds
  const meldsEl = document.getElementById('player-melds');
  meldsEl.innerHTML = '';
  for (const meld of player.melds) {
    const group = document.createElement('div');
    group.className = 'meld-group';
    for (const t of meld.tiles) {
      const tile = document.createElement('div');
      tile.className = `tile sm ${tileClass(t)}`;
      tile.textContent = TILE_UNICODE[t] || t;
      group.appendChild(tile);
    }
    meldsEl.appendChild(group);
  }

  // Flowers
  const flowersEl = document.getElementById('player-flowers');
  flowersEl.innerHTML = player.flowers.map(f =>
    `<div class="tile sm flower">${TILE_UNICODE[f]||f}</div>`
  ).join('');

  // Action buttons
  const canDiscard = isCurrent && selectedTile !== null;
  const canTsumo = isCurrent && canWin(player.hand, player.melds).win;
  const counts = {};
  for (const t of player.hand) counts[t] = (counts[t] || 0) + 1;
  const canKan = isCurrent && Object.values(counts).some(c => c === 4);

  document.getElementById('btn-discard').disabled = !canDiscard;
  document.getElementById('btn-tsumo').disabled = !canTsumo;
  document.getElementById('btn-kan').disabled = !canKan;

  // Tenpai indicator
  const tenpaiEl = document.getElementById('player-tenpai');
  if (tenpaiEl) {
    tenpaiEl.innerHTML = isTenpai(player.hand, player.melds) ? '<span class="tenpai-badge">텐파이</span>' : '';
  }
}

function renderDiscards() {
  if (!G.discards) G.discards = [[],[],[],[]];
  for (let p = 0; p < 4; p++) {
    const el = document.getElementById('discard-p' + p);
    if (!el) continue;
    el.innerHTML = '';
    for (const t of G.discards[p]) {
      const tile = document.createElement('div');
      tile.className = `tile discard-tile ${tileClass(t)}`;
      tile.textContent = TILE_UNICODE[t] || t;
      el.appendChild(tile);
    }
  }

  // Center info
  const info = document.getElementById('current-player-label');
  if (G.phase === 'claim') {
    info.textContent = '클레임';
    info.style.color = 'var(--gold)';
  } else {
    info.textContent = G.players[G.currentPlayer]?.name.slice(0, 2) + ' 차례';
    info.style.color = G.currentPlayer === 0 ? 'var(--accent)' : 'var(--muted)';
  }
}

function renderLog() {
  const el = document.getElementById('game-log');
  if (!el || !G.log) return;
  el.innerHTML = G.log.slice(0, 6).map(l =>
    `<div class="log-line ${l.cls||''}">${l.text}</div>`
  ).join('');
}
