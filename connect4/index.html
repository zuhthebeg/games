    <style>
        :root {
            --bg: #1e1e2e;
            --board: #1e40af;
            --board-dark: #1e3a8a;
            --text: #eee;
            --accent: #4ecca3;
            --red: #ef4444;
            --yellow: #eab308;
            --blue: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-top: calc(48px + env(safe-area-inset-top)); /* SharedWallet bar */
        }

        #app { min-height: 100vh; }

        .game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            min-height: 100vh;
        }

        .players-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            width: 100%;
            max-width: 500px;
        }

        .player-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .player-tag.active {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .player-tag.red.active { background: var(--red); color: #fff; }
        .player-tag.yellow.active { background: var(--yellow); color: #000; }
        .player-tag.blue.active { background: var(--blue); color: #fff; }

        .player-tag .disc {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .disc.red { background: var(--red); }
        .disc.yellow { background: var(--yellow); }
        .disc.blue { background: var(--blue); }

        .board-container {
            position: relative;
            width: 100%;
            max-width: 520px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: linear-gradient(145deg, var(--board), var(--board-dark));
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .cell {
            aspect-ratio: 1;
            background: var(--bg);
            border-radius: 50%;
            position: relative;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        .cell.clickable {
            cursor: pointer;
            transition: background 0.2s;
        }

        .cell.clickable:hover {
            background: rgba(255,255,255,0.15);
        }

        .cell .piece {
            position: absolute;
            inset: 8%;
            border-radius: 50%;

            animation: pop 0.2s ease-out;
        }

        @keyframes pop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .piece.red { 
            background: radial-gradient(circle at 30% 30%, #f87171, var(--red)); 
            box-shadow: 0 2px 8px rgba(239,68,68,0.5);
        }
        .piece.yellow { 
            background: radial-gradient(circle at 30% 30%, #fde047, var(--yellow)); 
            box-shadow: 0 2px 8px rgba(234,179,8,0.5);
        }
        .piece.blue { 
            background: radial-gradient(circle at 30% 30%, #60a5fa, var(--blue)); 
            box-shadow: 0 2px 8px rgba(59,130,246,0.5);
        }

        .piece.win {
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            to { transform: scale(1.1); box-shadow: 0 0 20px currentColor; }
        }

        .game-status {
            text-align: center;
            padding: 16px;
            font-size: 1.1rem;
        }

        .game-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: var(--text);
            transition: all 0.2s;
        }

        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn.primary { background: var(--accent); color: #000; }

        .turn-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 16px;
        }

        .turn-indicator .disc {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            animation: bounce 0.5s ease-in-out infinite alternate;
        }

        @keyframes bounce {
            to { transform: translateY(-4px); }
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV8KQGJF" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div id="app"></div>

    <script src="/lib/multiplayer.js?v=20260618leave"></script>
    <script src="/lib/multiplayer-ui.js?v=20260605a"></script>
    <script src="/lib/mp-lobby.js?v=20260619A"></script>
    <script>
        // ===== Constants =====
        const COLS = 10;
        const ROWS = 9;
        const COLORS = ['red', 'yellow', 'blue'];

        // ===== Sound Effects =====
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new AudioCtx();
            return audioCtx;
        }
        function playSound(freq, duration = 0.1, type = 'sine') {
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }
        function sfxPlace() { playSound(600, 0.08, 'triangle'); }
        function sfxWin() {
            [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playSound(f, 0.2, 'sine'), i * 120));
        }
        function sfxLose() { playSound(200, 0.4, 'sawtooth'); }

        // ===== State =====
        let board = [];
        let players = [];
        let currentPlayerIndex = 0;
        let gameOver = false;
        let resultShown = false;
        let winner = null;
        let winLine = null;
        let myColor = null;
        let isMultiplayer = false;
        let mpUI = null;
        let doClient = null;   // (레거시) 직접 WSClient — 현재 DO 경로는 MultiplayerLobby 사용으로 미사용
        let usingLobby = false; // ?relay=do → 공용 MultiplayerLobby 모듈 경로 여부
        // 멀티 내 userId — DO(doClient) 우선, 아니면 REST(mpUI). 두 경로 공통 사용.
        function mpMyId() { return doClient ? doClient.getMyUserId() : (mpUI?.getClient()?.getMyUserId() || null); }

        // ===== Initialize =====
        async function init() {
            // 로그인 상태 확정 후 로비 표시(안 하면 isLoggedIn=false라 "로그인하고 방 만들기"만 뜸)
            try { if (typeof SharedWallet !== 'undefined' && SharedWallet.init && !SharedWallet._initialized) await SharedWallet.init(); } catch (e) {}

            // DO/WS 실시간 경로(?relay=do): REST MultiplayerUI 대신 공용 WSClient 직접 사용.
            if (new URLSearchParams(location.search).get('relay') === 'do') { startConnect4DO(); return; }

            mpUI = new MultiplayerUI({
                gameType: 'connect4',
                gameName: '🔴🟡🔵 삼인 사목',
                container: document.getElementById('app'),
                maxPlayers: 3,
                supportsLocal: true,  // 솔로(로컬 3인 핫시트) + 멀티 선택
                onGameStart: handleGameStart,
                onGameEvent: handleGameEvent,
                onLeave: () => { isMultiplayer = false; }
            });

            const roomCode = MultiplayerUI.checkUrlRoom();
            if (roomCode) {
                mpUI._renderLobby();
                setTimeout(() => {
                    document.getElementById('mp-room-code').value = roomCode;
                }, 100);
            } else {
                mpUI.show();
            }
        }

        // ===== DO/WS 실시간 경로 (?relay=do) — 공용 MultiplayerLobby 모듈 사용 =====
        // 인라인 미니로비 제거. 매칭/대기실/재대결(모델A 합의)/상대나감/좀비정리는 모듈+서버가 담당.
        // enhance/gomoku와 동일 인프라(MultiplayerWSClient + generic RoomDO, gameType=connect4).
        function startConnect4DO() {
            if (typeof MultiplayerLobby !== 'function') { alert('멀티 라이브러리 로드 실패 — 새로고침'); return; }
            usingLobby = true;
            mpUI = new MultiplayerLobby({
                gameType: 'connect4',
                gameName: '🔴🟡🔵 삼인 사목',
                maxPlayers: 3,
                minPlayers: 2,
                container: document.getElementById('app'),
                onGameStart: handleGameStart,                 // {gameState:view}
                onGameEvent: handleGameEvent,                 // 'state_update' / 'game_end'
                onLeave: () => { isMultiplayer = false; }
            });
        }

        // ===== Game Start =====
        function handleGameStart(state) {
            if (state.mode === 'local') {
                startLocalGame();
            } else {
                startMultiplayerGame(state);
            }
        }

        function startLocalGame() {
            isMultiplayer = false;
            players = [
                { id: '1', nickname: 'P1', color: 'red' },
                { id: '2', nickname: 'P2', color: 'yellow' },
                { id: '3', nickname: 'P3', color: 'blue' }
            ];
            initBoard();
            renderGame();
        }

        function startMultiplayerGame(state) {
            isMultiplayer = true;
            resultShown = false;  // 새 판(재대결 포함) 시작 → 결과 중복가드 해제

            const gs = state.gameState;
            const myId = mpUI.getClient().getMyUserId();
            const me = gs.players.find(p => p.id === myId);
            
            myColor = me?.color;
            players = gs.players;
            currentPlayerIndex = gs.currentPlayerIndex;
            
            // Restore board
            board = gs.board.map(row => row.map(cell => {
                if (!cell) return null;
                const p = gs.players.find(pl => pl.id === cell);
                return p?.color || null;
            }));
            
            gameOver = !!gs.winner;
            winner = gs.winner;
            winLine = gs.winLine;
            
            renderGame(gs);
            
            mpUI.getClient().onStateChange = (newState) => {
                if (newState.status === 'playing' || newState.status === 'finished') {
                    updateFromState(newState);
                }
            };
            
            showToast(`게임 시작! 당신은 ${getColorName(myColor)}입니다`);
        }

        function getColorName(color) {
            return { red: '빨강🔴', yellow: '노랑🟡', blue: '파랑🔵' }[color] || color;
        }

        // ===== Board Logic =====
        function initBoard() {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
            currentPlayerIndex = 0;
            gameOver = false;
            resultShown = false;
            winner = null;
            winLine = null;
        }

        function handlePlace(row, col) {
            if (gameOver) return;
            if (board[row][col] !== null) return;
            
            const currentPlayer = players[currentPlayerIndex];
            
            if (isMultiplayer) {
                const myId = mpMyId();
                if (currentPlayer.id !== myId) {
                    showToast('당신의 차례가 아닙니다');
                    return;
                }
                sendPlace(row, col);
            } else {
                board[row][col] = currentPlayer.color;
                sfxPlace();
                checkGameEnd();
                if (!gameOver) {
                    currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
                }
                renderGame();
            }
        }

        async function sendPlace(row, col) {
            // DO 경로: 서버 권위 → 액션만 전송, state echo로 렌더.
            const sender = doClient || mpUI;
            try {
                await sender.sendAction({ type: 'place', payload: { row, col } });
            } catch (e) {
                showToast('실패: ' + e.message);
            }
        }

        function updateFromState(state) {
            const gs = state.gameState;
            
            players = gs.players;
            currentPlayerIndex = gs.currentPlayerIndex ?? 0;
            
            board = gs.board.map(row => row.map(cell => {
                if (!cell) return null;
                const p = gs.players.find(pl => pl.id === cell);
                return p?.color || null;
            }));
            
            const wasOver = gameOver;
            gameOver = !!gs.winner;
            winner = gs.winner;
            winLine = gs.winLine;
            
            if (!wasOver && gs.lastMove) sfxPlace();
            
            renderGame(gs);
            
            if (gameOver && !resultShown) {
                if (winner && winner !== 'draw') {
                    const winnerPlayer = players.find(p => p.id === winner);
                    setTimeout(() => showResult(winnerPlayer, gs.stoneCounts), 300);
                } else if (winner === 'draw') {
                    setTimeout(() => showResult(null, null), 300);
                }
            }
        }

        function checkGameEnd() {
            // Check each cell that was just placed
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (board[row][col]) {
                        const result = checkWin(row, col, board[row][col]);
                        if (result) {
                            gameOver = true;
                            winLine = result;
                            const winnerPlayer = players.find(p => p.color === board[row][col]);
                            setTimeout(() => showResult(winnerPlayer, null), 300);
                            return;
                        }
                    }
                }
            }
            
            // Check draw
            const allFull = board.every(row => row.every(cell => cell !== null));
            if (allFull) {
                gameOver = true;
                winner = 'draw';
                setTimeout(() => showResult(null, null), 300);
            }
        }

        function checkWin(row, col, color) {
            const directions = [[0,1],[1,0],[1,1],[1,-1]];
            
            for (const [dr, dc] of directions) {
                const line = [{ row, col }];
                
                for (let i = 1; i < 4; i++) {
                    const r = row + dr*i, c = col + dc*i;
                    if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === color) {
                        line.push({ row: r, col: c });
                    } else break;
                }
                
                for (let i = 1; i < 4; i++) {
                    const r = row - dr*i, c = col - dc*i;
                    if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === color) {
                        line.push({ row: r, col: c });
                    } else break;
                }
                
                if (line.length >= 4) return line;
            }
            return null;
        }

        function showResult(winnerPlayer, stoneCounts) {
            if (resultShown) return;
            resultShown = true;
            
            if (isMultiplayer) {
                const myId = mpMyId();
                const isWin = winnerPlayer?.id === myId;
                
                // Gold: winner gets stones × 100, losers lose 100
                let goldChange = 0;
                let goldText = '';
                if (winnerPlayer) {
                    if (isWin) {
                        const myStones = stoneCounts?.[myId] ?? 0;
                        goldChange = myStones * 100;
                        sfxWin();
                    } else {
                        goldChange = -100;
                        sfxLose();
                    }
                    if (typeof SharedWallet !== 'undefined') {
                        SharedWallet.addGold(goldChange);
                    }
                    goldText = goldChange > 0 
                        ? `<span style="color:#4ecca3">+${goldChange}G</span>` 
                        : `<span style="color:#ff6b6b">${goldChange}G</span>`;
                }
                
                const stoneInfo = winnerPlayer && stoneCounts?.[winnerPlayer.id] 
                    ? ` (돌 ${stoneCounts[winnerPlayer.id]}개)` : '';
                
                mpUI.showResult({
                    title: isWin ? '🎉 승리!' : '😢 패배',
                    detail: winnerPlayer 
                        ? `${getColorName(winnerPlayer.color)} ${winnerPlayer.nickname} 승리${stoneInfo} ${goldText}` 
                        : '무승부',
                    isWin,
                    actions: [
                        { label: '🔄 다시 한 판', primary: true, handler: async () => {
                            try {
                                const pd = mpUI.getPlayerData ? mpUI.getPlayerData() : null;
                                await mpUI.getClient().rematch(pd);
                                mpUI.goToWaitingRoom();
                            } catch(e) { alert('리매치 실패: ' + e.message); }
                        }},
                        { label: '나가기', primary: false, handler: () => {
                            if (mpUI.getClient()) { mpUI.getClient().leaveRoom().catch(()=>{}); MultiplayerClient.resetInstance(); }
                            location.reload();
                        }}
                    ]
                });
            } else {
                if (winnerPlayer) sfxWin();
                mpUI.showResult({
                    title: winnerPlayer ? `${getColorName(winnerPlayer.color)} 승리!` : '무승부',
                    isWin: null,
                    showRematch: false
                });
            }
        }

        // ===== Events =====
        function handleGameEvent(type, data) {
            // 공용 모듈(MultiplayerLobby) DO 경로: 상태는 state_update로 운반.
            // ('game_end'는 updateFromState가 winner를 감지해 showResult하므로 별도 처리 불필요)
            if (type === 'state_update') updateFromState(data);
        }

        // ===== Rendering =====
        function renderGame(gs = {}) {
            const myId = mpMyId();
            const currentPlayer = players[currentPlayerIndex];
            const isMyTurn = isMultiplayer ? currentPlayer?.id === myId : true;
            
            document.getElementById('app').innerHTML = `
                <div class="game-screen">
                    <div class="players-bar">
                        ${players.map((p, i) => `
                            <div class="player-tag ${p.color} ${i === currentPlayerIndex && !gameOver ? 'active' : ''}">
                                <div class="disc ${p.color}"></div>
                                <span>${p.nickname}${p.id === myId ? ' (나)' : ''}</span>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="turn-indicator">
                        ${gameOver ? '게임 종료' : `
                            <div class="disc ${currentPlayer?.color}"></div>
                            <span>${isMultiplayer ? 
                                (isMyTurn ? '내 차례!' : `${currentPlayer?.nickname}의 차례`) : 
                                `${currentPlayer?.nickname}의 차례`}</span>
                        `}
                    </div>
                    
                    <div class="board-container">
                        <div class="board">
                            ${renderBoard(isMyTurn)}
                        </div>
                    </div>
                    
                    <div class="game-actions">
                        ${!isMultiplayer ? '<button class="btn" onclick="restartGame()">새 게임</button>' : ''}
                        <button class="btn" onclick="exitGame()">나가기</button>
                    </div>
                </div>
            `;
        }

        function renderBoard(canClick = true) {
            let html = '';
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const color = board[row][col];
                    const isWinCell = winLine?.some(p => p.row === row && p.col === col);
                    const isEmpty = !color && !gameOver && canClick;
                    
                    html += `
                        <div class="cell ${isEmpty ? 'clickable' : ''}" 
                             ${isEmpty ? `onclick="handlePlace(${row},${col})"` : ''}>
                            ${color ? `<div class="piece ${color} ${isWinCell ? 'win' : ''}"></div>` : ''}
                        </div>
                    `;
                }
            }
            return html;
        }

        function restartGame() {
            initBoard();
            renderGame();
        }

        function exitGame() {
            if (usingLobby && mpUI) {
                // 공용 로비(DO): 방 나가고(상대에 opponent_left 통보) 모드선택 화면으로.
                if (confirm('게임을 나가시겠습니까?')) {
                    try { mpUI.getClient().leaveRoom(); } catch (e) {}
                    location.href = location.pathname + '?relay=do';
                }
                return;
            }
            if (isMultiplayer && mpUI?.getClient()) {
                if (confirm('게임을 나가시겠습니까?')) {
                    mpUI.getClient().leaveRoom().catch(() => {});
                    MultiplayerClient.resetInstance();
                    isMultiplayer = false;
                    mpUI.show();
                }
            } else {
                mpUI?.show();
            }
        }

        function showToast(msg) {
            const existing = document.querySelector('.mp-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'mp-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        init();
    </script>

        title: '커넥트4 - game.cocy.io',
        description: '가로·세로·대각선 4개를 먼저 연결하는 전략 보드게임',
        url: 'https://game.cocy.io/connect4/'
      });
    </script>
