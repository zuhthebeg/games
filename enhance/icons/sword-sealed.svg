<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#110800"/>
  <!-- sword blade -->
  <polygon points="50,6 53,55 50,62 47,55" fill="#c8941a"/>
  <!-- blade shine -->
  <polygon points="50,6 51.5,35 50,42 49.5,35" fill="#ffd97a" opacity="0.5"/>
  <!-- guard -->
  <rect x="37" y="53" width="26" height="7" rx="3" fill="#a07010"/>
  <!-- handle -->
  <rect x="46" y="60" width="8" height="16" rx="3" fill="#6b4a0a"/>
  <!-- chain links wrapping -->
  <ellipse cx="50" cy="65" rx="10" ry="4" fill="none" stroke="#ffa500" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="50" cy="72" rx="10" ry="4" fill="none" stroke="#ffa500" stroke-width="2.5" opacity="0.6"/>
  <!-- padlock body -->
  <rect x="43" y="42" width="14" height="12" rx="3" fill="#ffcc00"/>
  <!-- padlock shackle -->
  <path d="M46 42 Q46 36 50 36 Q54 36 54 42" fill="none" stroke="#ffcc00" stroke-width="2.5" stroke-linecap="round"/>
  <!-- keyhole -->
  <circle cx="50" cy="47" r="2.5" fill="#110800"/>
  <rect x="49" y="47" width="2" height="4" rx="1" fill="#110800"/>
</svg>
