<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0c0800" rx="8"/>
  <!-- sword blade -->
  <path d="M50 8 C52 8 55 16 55 52 L50 62 L45 52 C45 16 48 8 50 8Z" fill="#b8820e"/>
  <!-- blade shine -->
  <path d="M50 8 C51 8 53 18 52.5 50" stroke="#ffe066" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- crossguard -->
  <path d="M35 58 Q50 54 65 58 Q65 64 50 62 Q35 64 35 58Z" fill="#8a5f08"/>
  <!-- handle -->
  <rect x="46" y="62" width="8" height="20" rx="4" fill="#5a3f04"/>
  <!-- handle wraps -->
  <line x1="44" y1="67" x2="56" y2="67" stroke="#ffa500" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="73" x2="56" y2="73" stroke="#ffa500" stroke-width="1.5" opacity="0.7"/>
  <!-- pommel -->
  <circle cx="50" cy="84" r="4" fill="#8a5f08"/>
  <!-- PADLOCK body — center of blade -->
  <rect x="40" y="28" width="20" height="18" rx="4" fill="#ffd700"/>
  <!-- padlock shackle -->
  <path d="M43 28 L43 22 Q43 16 50 16 Q57 16 57 22 L57 28" fill="none" stroke="#ffd700" stroke-width="3.5" stroke-linecap="round"/>
  <!-- keyhole -->
  <circle cx="50" cy="36" r="3.5" fill="#0c0800"/>
  <rect x="48.5" y="36" width="3" height="5" rx="1" fill="#0c0800"/>
  <!-- chain links -->
  <ellipse cx="28" cy="52" rx="7" ry="4" fill="none" stroke="#ffa500" stroke-width="2.5" opacity="0.7"/>
  <ellipse cx="72" cy="52" rx="7" ry="4" fill="none" stroke="#ffa500" stroke-width="2.5" opacity="0.7"/>
</svg>
