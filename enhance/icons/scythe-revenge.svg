<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0f0000"/>
  <!-- handle pole -->
  <line x1="65" y1="18" x2="32" y2="88" stroke="#661100" stroke-width="5" stroke-linecap="round"/>
  <!-- blade curve -->
  <path d="M65 18 Q90 22 88 48 Q86 62 60 55" fill="none" stroke="#ff2200" stroke-width="5" stroke-linecap="round"/>
  <!-- blade inner edge (sharp) -->
  <path d="M65 20 Q85 28 82 48 Q80 58 62 53" fill="none" stroke="#ff6644" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- blade fill -->
  <path d="M65 20 Q88 26 86 50 Q84 60 62 54 Q76 44 72 32 Z" fill="#cc1100" opacity="0.5"/>
  <!-- blood drips from blade tip -->
  <ellipse cx="61" cy="57" rx="2.5" ry="3" fill="#ff3300"/>
  <ellipse cx="56" cy="64" rx="2" ry="3.5" fill="#ff3300" opacity="0.8"/>
  <ellipse cx="52" cy="71" rx="1.5" ry="2.5" fill="#ff3300" opacity="0.6"/>
  <!-- blade shine -->
  <path d="M72 26 Q80 36 79 46" fill="none" stroke="#ff8866" stroke-width="1.5" opacity="0.5"/>
</svg>
