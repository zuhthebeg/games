<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0a0515"/>
  <!-- paradox loop arc top -->
  <path d="M30 50 Q30 15 50 15 Q70 15 70 50" fill="none" stroke="#bb55ff" stroke-width="4" stroke-linecap="round"/>
  <!-- paradox loop arc bottom (reversed) -->
  <path d="M70 50 Q70 85 50 85 Q30 85 30 50" fill="none" stroke="#7722cc" stroke-width="4" stroke-linecap="round"/>
  <!-- blade — diagonal across loop -->
  <line x1="20" y1="72" x2="80" y2="28" stroke="#ddaaff" stroke-width="3" stroke-linecap="round"/>
  <!-- blade tip triangle -->
  <polygon points="80,28 73,25 77,33" fill="#ddaaff"/>
  <!-- guard -->
  <rect x="42" y="54" width="16" height="5" rx="2" transform="rotate(-35,50,56)" fill="#aa44ee"/>
  <!-- handle -->
  <line x1="28" y1="67" x2="20" y2="75" stroke="#882acc" stroke-width="5" stroke-linecap="round"/>
  <!-- sparkles -->
  <circle cx="50" cy="50" r="3" fill="#ee99ff" opacity="0.7"/>
  <circle cx="50" cy="50" r="5" fill="none" stroke="#bb55ff" stroke-width="1" opacity="0.5"/>
</svg>
