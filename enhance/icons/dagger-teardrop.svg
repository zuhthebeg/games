<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#04080f" rx="8"/>
  <!-- blade body -->
  <path d="M50 10 C53 10 58 20 58 50 L50 68 L42 50 C42 20 47 10 50 10Z" fill="#2255aa"/>
  <!-- blade edge highlight -->
  <path d="M50 10 C51.5 10 54 20 54 50 L50 63" stroke="#88bbff" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- crossguard -->
  <rect x="38" y="65" width="24" height="6" rx="3" fill="#1a3d88"/>
  <!-- handle -->
  <rect x="46" y="71" width="8" height="18" rx="4" fill="#0e2455"/>
  <!-- handle wrap lines -->
  <line x1="44" y1="76" x2="56" y2="76" stroke="#2255aa" stroke-width="1.5" opacity="0.6"/>
  <line x1="44" y1="82" x2="56" y2="82" stroke="#2255aa" stroke-width="1.5" opacity="0.6"/>
  <!-- pommel -->
  <ellipse cx="50" cy="89" rx="5" ry="3" fill="#1a3d88"/>
  <!-- teardrop -->
  <path d="M70 18 Q73 12 76 18 Q76 24 70 24 Q64 24 64 18 Q64 12 70 18Z" fill="#55aaff" opacity="0.95"/>
  <path d="M65 22 Q70 12 72 20" stroke="#aaddff" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- small drip -->
  <ellipse cx="70" cy="28" rx="2" ry="3" fill="#55aaff" opacity="0.6"/>
</svg>
