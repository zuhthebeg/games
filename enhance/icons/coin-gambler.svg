<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#100a00"/>
  <!-- outer coin ring -->
  <circle cx="50" cy="50" r="36" fill="#cc9900" stroke="#ffdd44" stroke-width="2"/>
  <!-- coin face -->
  <circle cx="50" cy="50" r="30" fill="#e6aa00"/>
  <!-- coin inner ring decoration -->
  <circle cx="50" cy="50" r="26" fill="none" stroke="#ffdd44" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- sword engraved on coin -->
  <line x1="50" y1="28" x2="50" y2="68" stroke="#773300" stroke-width="3" stroke-linecap="round"/>
  <!-- sword crossguard -->
  <line x1="40" y1="60" x2="60" y2="60" stroke="#773300" stroke-width="3" stroke-linecap="round"/>
  <!-- sword tip -->
  <polygon points="50,25 52,30 48,30" fill="#773300"/>
  <!-- dice pips — 3 dots -->
  <circle cx="42" cy="38" r="2.5" fill="#773300"/>
  <circle cx="58" cy="38" r="2.5" fill="#773300"/>
  <circle cx="50" cy="44" r="2.5" fill="#773300"/>
  <!-- edge shine -->
  <path d="M26 38 Q22 50 26 62" fill="none" stroke="#ffee88" stroke-width="2" opacity="0.6"/>
</svg>
