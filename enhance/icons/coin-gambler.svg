<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0a0800" rx="8"/>
  <!-- coin shadow/depth -->
  <ellipse cx="52" cy="52" rx="34" ry="34" fill="#7a5500"/>
  <!-- coin body -->
  <circle cx="50" cy="50" r="34" fill="#e8a800"/>
  <!-- coin rim -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#ffd700" stroke-width="2.5"/>
  <!-- coin inner ring -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#b87800" stroke-width="1.5"/>
  <!-- coin face: sword silhouette engraved -->
  <path d="M50 22 C51.5 22 53 26 53 48 L50 55 L47 48 C47 26 48.5 22 50 22Z" fill="#7a4a00"/>
  <rect x="43" y="52" width="14" height="4" rx="2" fill="#7a4a00"/>
  <rect x="47.5" y="56" width="5" height="10" rx="2" fill="#7a4a00"/>
  <!-- coin face: two dice -->
  <rect x="20" y="34" width="14" height="14" rx="3" fill="#b87800"/>
  <circle cx="24" cy="38" r="1.8" fill="#0a0800"/>
  <circle cx="30" cy="38" r="1.8" fill="#0a0800"/>
  <circle cx="27" cy="44" r="1.8" fill="#0a0800"/>
  <rect x="66" y="52" width="14" height="14" rx="3" fill="#b87800"/>
  <circle cx="70" cy="56" r="1.8" fill="#0a0800"/>
  <circle cx="76" cy="56" r="1.8" fill="#0a0800"/>
  <circle cx="70" cy="62" r="1.8" fill="#0a0800"/>
  <circle cx="76" cy="62" r="1.8" fill="#0a0800"/>
  <!-- shine arc -->
  <path d="M26 28 Q18 50 24 68" fill="none" stroke="#fff5aa" stroke-width="2.5" opacity="0.35" stroke-linecap="round"/>
</svg>
