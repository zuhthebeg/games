<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#080504" rx="8"/>
  <!-- Y-frame left arm -->
  <path d="M50 60 Q38 44 26 22" stroke="#7a4e20" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Y-frame right arm -->
  <path d="M50 60 Q62 44 74 22" stroke="#7a4e20" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Y-frame handle -->
  <path d="M50 60 L50 90" stroke="#7a4e20" stroke-width="9" stroke-linecap="round"/>
  <!-- frame highlights -->
  <path d="M50 62 Q39 46 28 24" stroke="#c08040" stroke-width="2" stroke-linecap="round" opacity="0.4" fill="none"/>
  <path d="M50 62 Q61 46 72 24" stroke="#c08040" stroke-width="2" stroke-linecap="round" opacity="0.4" fill="none"/>
  <!-- rubber band left -->
  <path d="M26 22 Q36 42 44 52" stroke="#cc3300" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- rubber band right -->
  <path d="M74 22 Q64 42 56 52" stroke="#cc3300" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- pouch / sling center -->
  <path d="M44 52 Q50 56 56 52 Q55 58 50 60 Q45 58 44 52Z" fill="#664422"/>
  <!-- stone in pouch -->
  <circle cx="50" cy="55" r="4.5" fill="#888888"/>
  <circle cx="49" cy="54" r="1.5" fill="#aaaaaa" opacity="0.5"/>
  <!-- fork tips (rubber attachment) -->
  <circle cx="26" cy="22" r="4" fill="#553300"/>
  <circle cx="74" cy="22" r="4" fill="#553300"/>
  <!-- handle grip wrap -->
  <line x1="47" y1="70" x2="53" y2="70" stroke="#c08040" stroke-width="2" opacity="0.5"/>
  <line x1="47" y1="78" x2="53" y2="78" stroke="#c08040" stroke-width="2" opacity="0.5"/>
</svg>
