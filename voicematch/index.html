<script>
const $=id=>document.getElementById(id);
const show=id=>{['s-intro','s-rec','s-ana','s-result','s-err'].forEach(s=>$(s).classList.toggle('hidden',s!==id));};
$('roomno').textContent='NO. '+String(Math.floor(1000+Math.random()*9000));

let LANG=detectLang();
const t=k=>I18N[LANG][k];

function applyLang(){
  document.documentElement.lang=LANG;
  $('t-title').textContent=t('title');
  $('t-hero').innerHTML=t('hero');
  $('t-herosub').innerHTML=t('heroSub');
  $('btn-start').textContent=t('start');
  $('btn-stop').textContent=t('stop');
  $('t-tipintro').innerHTML=t('tipIntro');
  $('t-lyric').innerHTML=t('lyric');
  $('t-tipfirst').textContent=t('tipFirst');
  $('ana-t').textContent=t('judging');
  $('btn-share').textContent=t('share');
  $('btn-save').textContent=t('save');
  $('btn-retry').textContent=t('retry');
  $('btn-more').textContent=t('more');
  $('btn-restart').textContent=t('restart');
  $('r-tip').textContent=t('tipResult');
  document.querySelectorAll('.lg').forEach(b=>b.classList.toggle('on',b.dataset.l===LANG));
  if(lastResult)renderResult(lastResult);
}
const LANGS=['ko','en','ja','es'];
$('langs').innerHTML=LANGS.map(l=>`<button class="lg" data-l="${l}">${l.toUpperCase()}</button>`).join('');
document.querySelectorAll('.lg').forEach(b=>b.onclick=()=>{LANG=b.dataset.l;localStorage.setItem('vm_lang',LANG);applyLang();});

const PREVIEW=['뉴진스|NewJeans','아이유|IU','정국|Jung Kook','임영웅|Lim Young Woong','에스파|aespa','폴킴|Paul Kim','블랙핑크|BLACKPINK','박효신|Park Hyo Shin','아이브|IVE','헌트릭스|HUNTR/X','엘사|Elsa','지드래곤|G-DRAGON','테일러스위프트|Taylor Swift','조용필|Cho Yong-pil','린킨파크|Linkin Park','+304'];
function drawLineup(){$('lineup').innerHTML=PREVIEW.map(p=>{const[ko,en]=p.split('|');return `<span class="lu">${LANG==='ko'?ko:(en||ko)}</span>`;}).join('');}
for(let i=0;i<14;i++){const b=document.createElement('i');$('eq').appendChild(b);}

const worker=new Worker('analyzer.js?v=20260721c');
let workerReady=false, modelLoading=null, lastResult=null;

function loadModel(){
  if(modelLoading) return modelLoading;
  modelLoading=(async()=>{
    const [sj,mb]=await Promise.all([
      fetch('singers.json?v=20260721b').then(r=>r.json()).then(j=>{window._singersCache=j;return j;}),
      (async()=>{
        const r=await fetch('ecapa_int8.onnx?v=20260719a');
        const total=+r.headers.get('Content-Length')||21664162;
        const reader=r.body.getReader();const chunks=[];let got=0;
        while(true){const{done,value}=await reader.read();if(done)break;chunks.push(value);got+=value.length;
          $('ana-bar').style.width=Math.round(got/total*70)+'%';
          $('ana-s').textContent=t('dlLabel')+' '+Math.round(got/total*100)+'%';}
        const buf=new Uint8Array(got);let o=0;for(const c of chunks){buf.set(c,o);o+=c.length;}
        return buf.buffer;
      })()
    ]);
    worker.postMessage({type:'init',singers:sj,model:mb},[mb]);
    await new Promise((res,rej)=>{
      const h=ev=>{if(ev.data.type==='ready'){worker.removeEventListener('message',h);workerReady=true;res();}
        if(ev.data.type==='error'){worker.removeEventListener('message',h);rej(new Error(ev.data.message));}};
      worker.addEventListener('message',h);
    });
  })();
  return modelLoading;
}

/* ---- 녹음 ---- */
let audioCtx,stream,proc,pcmChunks,recRate,recTimer,recLeft;
async function startRec(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({audio:{
      echoCancellation:false,noiseSuppression:false,autoGainControl:false,channelCount:1}});
  }catch(e){
    $('err-t').innerHTML=t('errMic');show('s-err');return;
  }
  show('s-rec');
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  recRate=audioCtx.sampleRate;
  const src=audioCtx.createMediaStreamSource(stream);
  proc=audioCtx.createScriptProcessor(4096,1,1);
  pcmChunks=[];
  const bars=$('eq').children;
  proc.onaudioprocess=e=>{
    const d=e.inputBuffer.getChannelData(0);
    pcmChunks.push(new Float32Array(d));
    let q=0;for(let i=0;i<d.length;i+=16)q+=d[i]*d[i];
    const lv=Math.min(1,Math.sqrt(q/(d.length/16))*9);
    for(let i=0;i<bars.length;i++)bars[i].style.height=(6+lv*(18+Math.random()*32))+'px';
  };
  src.connect(proc);proc.connect(audioCtx.destination);
  recLeft=10;$('count').innerHTML=recLeft+'<small>'+t('sec')+'</small>';
  recTimer=setInterval(()=>{recLeft--;
    if(recLeft<=0){stopRec();return;}
    $('count').innerHTML=recLeft+'<small>'+t('sec')+'</small>';},1000);
  loadModel().catch(()=>{});
}
async function stopRec(){
  clearInterval(recTimer);
  try{proc.disconnect();}catch(e){}
  stream.getTracks().forEach(tk=>tk.stop());
  const total=pcmChunks.reduce((a,c)=>a+c.length,0);
  if(total<recRate*2.5){$('err-t').innerHTML=t('errShort');show('s-err');return;}
  const pcm=new Float32Array(total);let o=0;for(const c of pcmChunks){pcm.set(c,o);o+=c.length;}
  show('s-ana');$('ana-t').textContent=t('judging');
  await analyzePcm(pcm,recRate);
}
async function resampleTo16k(pcm,rate){
  if(rate===16000)return pcm;
  const len=Math.floor(pcm.length*16000/rate);
  const oc=new OfflineAudioContext(1,len,16000);
  const buf=oc.createBuffer(1,pcm.length,rate);
  buf.copyToChannel(pcm,0);
  const s=oc.createBufferSource();s.buffer=buf;s.connect(oc.destination);s.start();
  return (await oc.startRendering()).getChannelData(0);
}
async function analyzePcm(pcm,rate){
  try{
    await loadModel();
    $('ana-bar').style.width='75%';$('ana-t').textContent=t('judging2');$('ana-s').textContent=t('analyzeSub');
    const p16=await resampleTo16k(pcm,rate);
    const done=await new Promise((res,rej)=>{
      const h=ev=>{const m=ev.data;
        if(m.type==='progress'){$('ana-bar').style.width=Math.min(95,75+m.done*6)+'%';}
        if(m.type==='result'){worker.removeEventListener('message',h);res(m);}
        if(m.type==='error'){worker.removeEventListener('message',h);rej(new Error(m.message));}};
      worker.addEventListener('message',h);
      const cp=new Float32Array(p16);
      worker.postMessage({type:'analyze',pcm:cp},[cp.buffer]);
    });
    if(done.error==='silent'){$('err-t').innerHTML=t('errSilent');show('s-err');return;}
    renderResult(done.rank,done.genres);
  }catch(e){
    $('err-t').innerHTML=t('errAnalyze')+'<br><span style="font-size:11px;opacity:.7">'+String(e.message||e).slice(0,120)+'</span>';show('s-err');
  }
}

/* ---- 랭킹 ---- */
const RANK_API='https://relay.cocy.io/api/rankings/voicematch';
function authUser(){
  try{
    const tk=localStorage.getItem('cocy_auth_token');if(!tk)return null;
    const b=atob(tk.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'));
    const p=JSON.parse(decodeURIComponent(Array.from(b,c=>'%'+c.charCodeAt(0).toString(16).padStart(2,'0')).join('')));
    const uid=p.sub||p.userId||p.user_id;if(!uid)return null;
    return {userId:uid,nickname:p.nickname||null,registered:!p.isAnonymous};
  }catch(e){return null;}
}
async function rankFlow(top){
  const line=$('r-rankline');line.innerHTML='';
  const u=authUser();
  if(u&&u.registered){
    let needLogin=false;
    try{
      const r=await fetch(RANK_API,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({userId:u.userId,nickname:u.nickname,artist:top.slug,pct:top.pct})}).then(x=>x.json());
      if(r.success&&r.myRank){
        lastRank=r.myRank;
        line.innerHTML=`<div>${t('lb_myrank')(r.myRank)}</div><button onclick="showBoard('${top.slug}')">${t('lb_btn')}</button>`;
        return;
      }
      needLogin=(r.error==='need_login');
    }catch(e){}
    if(!needLogin){
      line.innerHTML=`<button onclick="showBoard('${top.slug}')">${t('lb_btn')}</button>`;
      return;
    }
  }
  {
    line.innerHTML=`<div style="font-size:12px;color:var(--mut);font-weight:600">${t('lb_login')}</div>
      <button onclick="try{SharedWallet.showLogin()}catch(e){}">${t('lb_loginBtn')}</button>
      <button onclick="showBoard('${top.slug}')" style="background:var(--panel2);color:var(--txt)">${t('lb_btn')}</button>`;
  }
}
let lastRank=null;let lastGenres=null;
async function showBoard(slug){
  const u=authUser();
  const s=(window._singersCache||[]).find(x=>x.slug===slug)||{slug,name:slug};
  let html=`<h3>${t('lb_title')(singerName(s,LANG))}</h3>`;
  try{
    const q=u?`&me=${encodeURIComponent(u.userId)}`:'';
    const r=await fetch(`${RANK_API}?artist=${slug}${q}`).then(x=>x.json());
    const rows=r.rankings||[];
    if(!rows.length)html+=`<div style="text-align:center;color:var(--mut);font-size:13px;padding:14px 0">${t('lb_empty')}</div>`;
    rows.forEach((row,i)=>{
      const me=u&&row.user_id===u.userId;
      html+=`<div class="lb-row${me?' me':''}"><span class="rk-no${i<3?' top':''}">${i+1}</span><span class="nick">${row.nickname}${me?' ('+t('lb_me')+')':''}</span><span class="pct">${row.pct}%</span></div>`;
    });
    if(r.myRank&&r.myRank>rows.length)html+=`<div class="lb-row me"><span class="rk-no">${r.myRank}</span><span class="nick">${t('lb_me')}</span><span class="pct">${r.myPct}%</span></div>`;
  }catch(e){html+=`<div style="text-align:center;color:var(--mut);font-size:12px">…</div>`;}
  html+=`<button id="lb-close" onclick="document.getElementById('lb-modal').remove()">${t('lb_close')}</button>`;
  const m=document.createElement('div');m.id='lb-modal';m.innerHTML=`<div id="lb-box">${html}</div>`;
  m.onclick=e=>{if(e.target===m)m.remove();};
  document.body.appendChild(m);
}
/* ---- 결과 ---- */
function comment(s){return t('c_'+s.g+'_'+s.kind)||'';}
function renderGaxis(genres){
  const box=$('r-gaxis');
  if(!genres||genres.length<3){box.classList.add('hidden');return;}
  box.innerHTML=`<div class="ga-t">${t('gaxis')}</div>
    <div class="ga-type">${t('gaxisType')(axisLabel(genres[0].key,LANG))}</div>`+
    genres.slice(0,4).map(g=>`<div class="ga-row"><span class="ga-nm">${axisLabel(g.key,LANG)}</span>
      <div class="ga-tr"><i data-w="${g.pct}"></i></div><span class="ga-p">${g.pct}</span></div>`).join('');
  box.classList.remove('hidden');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    box.querySelectorAll('.ga-tr i').forEach(b=>b.style.width=b.dataset.w+'%');}));
}
function renderResult(rank,genres){
  lastResult=rank;
  lastGenres=genres||null;
  const top=rank[0];
  $('r-score').innerHTML=top.pct+'<small>'+(t('pts')||'%')+'</small>';
  $('r-judge').innerHTML=t('judge')+' <em>'+singerName(top,LANG)+'</em>';
  $('r-sub').textContent=`${comment(top)} · ${genreLabel(top.genre,LANG)} · ${t('reco')} "${top.song}"`;
  $('r-rank').innerHTML=rank.slice(1,4).map((s,i)=>
    `<div class="rk">${t('rankN')?(i+2)+t('rankN'):'#'+(i+2)}<b>${singerName(s,LANG)}</b><span class="p">${s.pct}%</span></div>`).join('');
  show('s-result');
  lastRank=null;
  renderGaxis(genres);
  rankFlow(top);
  renderSetlist(rank);
}

/* ---- 2단계: 선곡 추천 (top3 가수의 검증곡 → 노래방 셋리스트) ---- */
let catalogCache=null;
async function renderSetlist(rank){
  const box=$('r-setlist');
  try{
    if(!catalogCache)catalogCache=await fetch('catalog.json?v=20260721b').then(r=>r.json());
    const bySlug={};catalogCache.artists.forEach(a=>bySlug[a.slug]=a);
    const picks=[];
    rank.slice(0,3).forEach((s,i)=>{
      const a=bySlug[s.slug];if(!a||!a.songs)return;
      a.songs.slice(0,i===0?3:1).forEach(sg=>{
        if(sg.vid&&sg.title)picks.push({artist:singerName(s,LANG),title:sg.title,vid:sg.vid});
      });
    });
    if(!picks.length){box.classList.add('hidden');return;}
    box.innerHTML=`<div class="sl-t">${t('setlist')}</div>`+picks.slice(0,5).map(p=>
      `<a class="sl-row" href="https://youtu.be/${p.vid}" target="_blank" rel="noreferrer">`+
      `<span class="sl-play">▶</span><span class="sl-song">${p.title}</span><span class="sl-artist">${p.artist}</span></a>`).join('');
    box.classList.remove('hidden');
  }catch(e){box.classList.add('hidden');}
}
$('btn-start').onclick=startRec;
$('btn-stop').onclick=stopRec;
$('btn-retry').onclick=()=>show('s-intro');

/* ---- 공유 카드 ---- */
function drawCard(){
  const c=$('card'),x=c.getContext('2d'),W=720,H=900,top=lastResult[0];
  const name=singerName(top,LANG);
  x.fillStyle='#1d1526';x.fillRect(0,0,W,H);
  const g=x.createRadialGradient(W*.85,0,10,W*.85,0,500);g.addColorStop(0,'rgba(240,110,170,.25)');g.addColorStop(1,'transparent');
  x.fillStyle=g;x.fillRect(0,0,W,H);
  x.strokeStyle='rgba(190,150,220,.5)';x.lineWidth=3;x.strokeRect(24,24,W-48,H-48);
  x.textAlign='center';
  x.fillStyle='#e8c66a';x.font='700 26px Pretendard';x.fillText(t('cardTitle'),W/2,96);
  x.fillStyle='#b9f455';x.font="180px 'Black Han Sans'";x.fillText(top.pct,W/2,330);
  x.font="60px 'Black Han Sans'";x.fillText(t('pts')||'%',W/2+130,330);
  x.fillStyle='#f5eefb';x.font="40px 'Black Han Sans'";x.fillText(t('cardJudge'),W/2,430);
  x.fillStyle='#f06eaa';
  x.font=(name.length>10?"58px":"80px")+" 'Black Han Sans'";x.fillText(name,W/2,540);
  x.fillStyle='#cdbcdd';x.font='500 26px Pretendard';x.fillText(genreLabel(top.genre,LANG)+' · '+comment(top),W/2,600);
  if(lastRank){x.fillStyle='#e8c66a';x.font="700 30px Pretendard";x.fillText(t('lb_myrank')(lastRank),W/2,646);}
  x.strokeStyle='rgba(190,150,220,.4)';x.setLineDash([6,8]);x.beginPath();x.moveTo(80,650);x.lineTo(W-80,650);x.stroke();x.setLineDash([]);
  x.fillStyle='#f5eefb';x.font='700 30px Pretendard';
  lastResult.slice(1,4).forEach((s,i)=>{x.fillText(`${i+2}. ${singerName(s,LANG)}  ${s.pct}%`,W/2,712+i*46);});
  x.fillStyle='#8f7fa3';x.font='500 22px Pretendard';x.fillText(t('cardFoot'),W/2,H-56);
  return c;
}
async function cardBlob(){await document.fonts.load("40px 'Black Han Sans'");drawCard();
  return new Promise(r=>$('card').toBlob(r,'image/png'));}
$('btn-save').onclick=async()=>{const b=await cardBlob();const a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='voicematch.png';a.click();};
$('btn-share').onclick=async()=>{
  const b=await cardBlob();const f=new File([b],'voicematch.png',{type:'image/png'});
  const top=lastResult[0];
  const url=`https://game.cocy.io/voicematch/${LANG!=='ko'?'?lang='+LANG:''}`;
  const data={files:[f],title:t('title'),text:I18N[LANG].shareText(singerName(top,LANG),top.pct)+' '+url};
  if(navigator.canShare&&navigator.canShare(data)){try{await navigator.share(data);}catch(e){}}
  else $('btn-save').click();
};

document.querySelectorAll('.lg').forEach(b=>{const old=b.onclick;b.onclick=()=>{LANG=b.dataset.l;localStorage.setItem('vm_lang',LANG);try{if(typeof SharedWallet!=='undefined'&&SharedWallet.init&&!SharedWallet._initialized)SharedWallet.init();}catch(e){}
applyLang();drawLineup();};});

if(new URLSearchParams(location.search).get('debug')){
  const inp=document.createElement('input');inp.type='file';inp.accept='audio/*';inp.id='dbg-file';
  inp.style.cssText='position:fixed;left:10px;bottom:10px;z-index:99;color:#fff;font-size:11px';

  };
