<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>점수판 — 조별 점수 기록</title>
<meta name="description" content="1~4조 조별 점수판. 10점 단위로 올리고 내리고, 되돌리기와 초기화까지. 설치 없이 브라우저에서 바로." />
<link rel="icon" href="icon.svg" />
<meta property="og:title" content="점수판 — 조별 점수 기록" />
<meta property="og:description" content="1~4조 조별 점수판. 10점 단위 기록, 되돌리기, 순위 자동 표시." />
<meta property="og:url" content="https://game.cocy.io/scoreboard/" />
<style>
:root{
  --bg:#0f0f1a;
  --card-bg:#1a1a2e;
  --card-hover:#252540;
  --text:#f1f5f9;
  --text-secondary:#94a3b8;
  --border:#2a2a4a;
  --gold:#fbbf24;
  --t1:#ec4899;
  --t2:#8b5cf6;
  --t3:#22d3ee;
  --t4:#34d399;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  display:flex;flex-direction:column;
  padding:calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));
  overflow:hidden;
}
header{
  display:flex;align-items:center;gap:10px;
  padding:4px 6px 10px;flex:0 0 auto;
}
h1{font-size:1rem;font-weight:800;letter-spacing:-.01em}
h1 span{color:var(--text-secondary);font-weight:500;font-size:.76rem;margin-left:6px}
.tools{margin-left:auto;display:flex;gap:6px}
.tools button{
  border:1px solid var(--border);background:var(--card-bg);color:var(--text-secondary);
  border-radius:8px;padding:8px 12px;font-size:.76rem;font-weight:700;cursor:pointer;
  transition:background .15s,color .15s;
}
.tools button:hover:not(:disabled){background:var(--card-hover);color:var(--text)}
.tools button:disabled{opacity:.32;cursor:default}

/* 조 4개 — 세로로 꽉 채움 */
.grid{
  flex:1 1 auto;display:grid;gap:10px;
  grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  min-height:0;
}
.team{
  position:relative;
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:14px;
  display:flex;flex-direction:column;
  padding:12px;
  min-height:0;overflow:hidden;
  transition:border-color .2s;
}
.team::before{
  content:"";position:absolute;inset:0 auto 0 0;width:4px;
  background:var(--c);
}
.team.lead{border-color:var(--gold)}
.team.lead .crown{opacity:1}
.crown{
  position:absolute;top:9px;right:11px;font-size:.9rem;opacity:0;transition:opacity .2s;
}
.nm{
  font-size:.82rem;font-weight:800;color:var(--c);
  background:none;border:none;padding:2px 4px;margin:-2px 0 0 -4px;
  font-family:inherit;width:72%;
  border-radius:5px;cursor:text;
}
.nm:focus{outline:none;background:#0d0d18;color:var(--text)}
.score{
  flex:1 1 auto;display:flex;align-items:center;justify-content:center;
  font-size:clamp(2rem, 8.5vh, 3.4rem);font-weight:900;
  font-variant-numeric:tabular-nums;letter-spacing:-.03em;
  min-height:0;
}
.score.bump{animation:bump .22s ease}
@keyframes bump{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}
.btns{display:flex;gap:8px;flex:0 0 auto}
.btns button{
  flex:1;border:none;border-radius:10px;cursor:pointer;
  padding:13px 0;font-size:1rem;font-weight:800;font-family:inherit;
  color:#0f0f1a;background:var(--c);
  transition:filter .12s, transform .06s;
}
.btns button:active{transform:translateY(1px)}
.btns button.minus{
  background:transparent;border:1px solid var(--border);color:var(--text-secondary);
}
.btns button.minus:disabled{opacity:.3;cursor:default}
.btns button:hover:not(:disabled){filter:brightness(1.12)}

.rank{
  position:absolute;bottom:12px;right:12px;
  font-size:.64rem;color:var(--text-secondary);font-weight:700;letter-spacing:.04em;
}

/* 가로가 넉넉하면 4열로 */
@media(min-width:820px){
  .grid{grid-template-columns:repeat(4,1fr);grid-template-rows:1fr}
  .score{font-size:clamp(2.6rem, 11vh, 4.6rem)}
}
.home{
  flex:0 0 auto;text-align:center;padding-top:9px;
}
.home a{color:var(--text-secondary);font-size:.68rem;text-decoration:none}
.home a:hover{color:var(--text)}
</style>
</head>
<body>

<header>
  <h1>점수판<span id="stepLabel">10점 단위</span></h1>
  <div class="tools">
    <button id="undo" title="마지막 기록 되돌리기">되돌리기</button>
    <button id="reset" title="전부 0점으로">초기화</button>
  </div>
</header>

<div class="grid" id="grid"></div>

<div class="home"><a href="/">← game.cocy.io</a></div>

<script>
const STEP = 10;                    // 10점 단위
const KEY  = 'scoreboard_v1';
const COLORS = ['var(--t1)','var(--t2)','var(--t3)','var(--t4)'];
const DEFAULT_NAMES = ['1조','2조','3조','4조'];

let state = load();

function load(){
  try{
    const raw = JSON.parse(localStorage.getItem(KEY));
    if(raw && Array.isArray(raw.teams) && raw.teams.length === 4){
      // 저장된 값이 깨져 있어도 화면이 죽지 않게 정규화
      raw.teams = raw.teams.map((t,i)=>({
        name: typeof t.name === 'string' && t.name.trim() ? t.name : DEFAULT_NAMES[i],
        score: Number.isFinite(t.score) ? t.score : 0
      }));
      raw.log = Array.isArray(raw.log) ? raw.log : [];
      return raw;
    }
  }catch(_){}
  return { teams: DEFAULT_NAMES.map(n=>({name:n, score:0})), log: [] };
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(_){}
}

const grid = document.getElementById('grid');

grid.innerHTML = state.teams.map((t,i)=>`
  <div class="team" data-i="${i}" style="--c:${COLORS[i]}">
    <span class="crown">👑</span>
    <input class="nm" data-i="${i}" value="${esc(t.name)}" maxlength="8"
           aria-label="${esc(t.name)} 이름" />
    <div class="score" data-i="${i}">0</div>
    <div class="rank" data-i="${i}"></div>
    <div class="btns">
      <button class="minus" data-i="${i}" data-d="-1" aria-label="${esc(t.name)} 10점 빼기">−${STEP}</button>
      <button class="plus"  data-i="${i}" data-d="1"  aria-label="${esc(t.name)} 10점 더하기">+${STEP}</button>
    </div>
  </div>
`).join('');

function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

grid.addEventListener('click', e=>{
  const b = e.target.closest('button[data-d]');
  if(!b) return;
  const i = +b.dataset.i, d = +b.dataset.d;
  const next = state.teams[i].score + d*STEP;
  if(next < 0) return;                 // 음수는 막는다
  state.teams[i].score = next;
  state.log.push(i + ':' + d);
  save(); render(i);
});

grid.addEventListener('input', e=>{
  const inp = e.target.closest('.nm');
  if(!inp) return;
  state.teams[+inp.dataset.i].name = inp.value;
  save(); render();
});
// 이름 입력 중 엔터 → 키보드 닫기
grid.addEventListener('keydown', e=>{
  if(e.key === 'Enter' && e.target.closest('.nm')) e.target.blur();
});

document.getElementById('undo').addEventListener('click', ()=>{
  const last = state.log.pop();
  if(!last) return;
  const [i,d] = last.split(':').map(Number);
  state.teams[i].score -= d*STEP;
  save(); render(i);
});

document.getElementById('reset').addEventListener('click', ()=>{
  if(!confirm('점수를 전부 0으로 되돌릴까요? (조 이름은 그대로)')) return;
  state.teams.forEach(t=>t.score = 0);
  state.log = [];
  save(); render();
});

function render(bumpIdx){
  const scores = state.teams.map(t=>t.score);
  const max = Math.max(...scores);
  const anyScore = scores.some(s=>s>0);

  // 동점은 같은 등수 (1,1,3,4 식)
  const sorted = [...scores].sort((a,b)=>b-a);
  const rankOf = s => sorted.indexOf(s) + 1;

  state.teams.forEach((t,i)=>{
    const card  = grid.querySelector(`.team[data-i="${i}"]`);
    const scEl  = grid.querySelector(`.score[data-i="${i}"]`);
    const rkEl  = grid.querySelector(`.rank[data-i="${i}"]`);
    const minus = grid.querySelector(`button.minus[data-i="${i}"]`);

    scEl.textContent = t.score;
    minus.disabled = t.score === 0;
    card.classList.toggle('lead', anyScore && t.score === max);
    rkEl.textContent = anyScore ? rankOf(t.score) + '위' : '';

    if(bumpIdx === i){
      scEl.classList.remove('bump');
      void scEl.offsetWidth;          // 애니메이션 재시작
      scEl.classList.add('bump');
    }
  });

  document.getElementById('undo').disabled = state.log.length === 0;
}

// 다른 탭/기기에서 고쳐도 따라오게
window.addEventListener('storage', e=>{
  if(e.key === KEY){ state = load(); syncInputs(); render(); }
});
function syncInputs(){
  state.teams.forEach((t,i)=>{
    const inp = grid.querySelector(`.nm[data-i="${i}"]`);
    if(inp && document.activeElement !== inp) inp.value = t.name;
  });
}

render();
</script>
</body>
</html>
