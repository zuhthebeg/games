    async function onHexClick(hIdx) {
      if (!isHumanTurn() || state.winner) return;
      if (state.phase === "pirate") {
        const result = movePirate(hIdx);
        if (result.ok) {
          state.phase = "main";
          state.canEndTurn = true;
          state.phaseBeforeKnight = null;
          render();
        }
        return;
      }
      if (state.phase === "knight-robber") {
        // If sea map, offer pirate option for knight too
        const hasSeaTiles = state.hexes.some(h => h && h.type === "sea");
        if (hasSeaTiles && state.hexes[hIdx]?.type === "sea") {
          // Mark knight card as played (movePirate doesn't do this unlike playKnight)
          const _kpIdx = localPlayerIndex();
          const _kp = state.players[_kpIdx];
          const _kCard = (_kp?.devCards || []).find(c => c.type === "knight" && c.turnBought < state.turnNumber && !c.played);
          if (_kCard) {
            _kCard.played = true;
            _kp.knights += 1;
            recalcAllVP();
          }
          const result = movePirate(hIdx);
          if (result.ok) {
            state.phase = state.phaseBeforeKnight === "roll" ? "roll" : "main";
            state.canEndTurn = state.phaseBeforeKnight !== "roll";
            state.phaseBeforeKnight = null;
            render();
          }
          return;
        }
        const pIdx = localPlayerIndex();
        const knightVictims = new Set();
        for (const vIdx of (state.hexes[hIdx]?.vertices || [])) {
          const owner = state.vertices[vIdx]?.owner;
          if (owner !== null && owner !== undefined && owner !== state.currentPlayer && totalResourceCount(state.players[owner]) > 0) knightVictims.add(owner);
        }
        const knightVictimList = [...knightVictims];
        let chosenVictimId = null;
        if (knightVictimList.length > 1) {
          const chosenIdx = await humanPickVictim(knightVictimList);
          chosenVictimId = state.players[chosenIdx]?.userId || state.players[chosenIdx]?.id || null;
        }
        const result = playKnight(pIdx, hIdx, chosenVictimId);
        if (result && result.ok) {
          SFX.robber();
          showToast(pt("knightCardToast"));
          // Restore phase: if knight used before roll → go back to roll, else stay main
          const wasRoll = state.phaseBeforeKnight === "roll";
          state.phase = wasRoll ? "roll" : "main";
          state.canEndTurn = wasRoll ? false : true;
          state.phaseBeforeKnight = null;
          state.hint = wasRoll ? "병사 발동 완료. 이제 주사위를 굴리세요." : "병사 발동 완료.";
          render();
        }
        return;
      }
      if (state.phase === "robber-or-pirate") {
        const hex = state.hexes[hIdx];
        if (!hex) return;
        if (hex.type === "sea") {
          const result = movePirate(hIdx);
          if (result.ok) { state.phase = "main"; state.canEndTurn = true; render(); }
          return;
        }
        state.phase = "robber"; // land tile: fall through to robber handling
      }
      if (state.phase !== "robber") return;
      const robberVictims = new Set();
      for (const vIdx of (state.hexes[hIdx]?.vertices || [])) {
        const owner = state.vertices[vIdx]?.owner;
        if (owner !== null && owner !== undefined && owner !== state.currentPlayer && totalResourceCount(state.players[owner]) > 0) robberVictims.add(owner);
      }
      const victimList = [...robberVictims];
      let chosenVictimId = null;
      if (victimList.length > 1) {
        const chosenIdx = await humanPickVictim(victimList);
        chosenVictimId = state.players[chosenIdx]?.userId || state.players[chosenIdx]?.id || null;
      }
      if (isMultiMode()) {
        const snapshot = clone(state);
        const moveResult = moveRobber(hIdx, chosenVictimId);
        Object.assign(state, snapshot);
        if (!moveResult.ok) return;
        await sendGameAction(ACTION.MOVE_ROBBER, {
          playerId: currentPlayerUserId(),
          hexId: hIdx,
          stealFrom: moveResult.victimId,
          stolenResource: moveResult.stolenResource
        });
        return;
      }
      if (moveRobber(hIdx, chosenVictimId).ok) {
        render();
        triggerAITurnIfNeeded();
      }
    }

    function aiTakeSetupTurn() {
      const pIdx = state.currentPlayer;
      const ai = window.pingtanAI;
      if (state.setupStep === "settlement") {
        const choices = validSettlementsFor(pIdx, true);
        if (!choices.length) { advanceSetupTurn(); render(); triggerAITurnIfNeeded(); return; }
        const pick = ai ? ai.pickVertexByDifficulty(state, choices, state.aiDifficulty, pIdx) : choices[Math.floor(Math.random() * choices.length)];
        placeSettlement(pIdx, pick, true);
        SFX.build();
        showToast(`${state.players[pIdx].name}이 마을을 건설했어요`);
        if (state.phase === "setup2") grantSecondSetupResources(pIdx, pick);
        state.lastSetupVertex = pick;
        state.setupStep = "road";
        state.hint = `${state.players[pIdx].name}가 마을 배치.`;
        render();
        // 도로 배치를 딜레이 후 실행
        setTimeout(() => {
          if (state.winner || isHumanTurn()) return;
          aiTakeSetupTurn(); // re-enter for road step
        }, 800);
        return;
      }
      if (state.setupStep === "road") {
        const roads = validRoadsFor(pIdx, true);
        const ships = state.edges.filter(e => canPlaceShip(pIdx, e.index, true)).map(e => e.index);
        const allEdges = [...roads, ...ships];
        if (!allEdges.length) { advanceSetupTurn(); render(); triggerAITurnIfNeeded(); return; }
        const pick = ai
          ? ai.pickBestRoadFromVertex(state, allEdges, state.lastSetupVertex)
          : allEdges[Math.floor(Math.random() * allEdges.length)];
        const pickIsShip = ships.includes(pick);
        if (pickIsShip) placeShip(pIdx, pick, true); else placeRoad(pIdx, pick, true);
        SFX.road();
        state.hint = `${state.players[pIdx].name}가 ${pickIsShip ? "항로" : "도로"} 배치.`;
        advanceSetupTurn();
        render();
        setTimeout(() => triggerAITurnIfNeeded(), 600);
        return;
      }
    }

    async function aiMainTurn() {
      if (state.winner || isHumanTurn() || isMultiMode()) return;
      if (state._aiTurnInProgress) return;
      state._aiTurnInProgress = true;
      const pIdx = state.currentPlayer;
      const p = state.players[pIdx];
      if (!p) { state._aiTurnInProgress = false; return; }
      const ai = window.pingtanAI;

      try {
        // ── Phase: roll ──────────────────────────────────────────────────
        if (state.phase === "roll") {
          // Knight before roll
          if (ai && hasPlayableKnight(pIdx) && ai.shouldUseKnight(state, pIdx)) {
            const kTarget = ai.pickRobberTarget(state, pIdx, localPlayerIndex());
            let kHex = kTarget.hexIndex !== state.robber
              ? kTarget.hexIndex
              : state.hexes.findIndex((_, i) => i !== state.robber);
            if (kHex !== -1) {
              const savedPhase = state.phase;
              state.phase = "robber";
              const kr = playKnight(pIdx, kHex, kTarget.victimIdx);
              if (!kr || !kr.ok) state.phase = savedPhase;
              else { showDevCardPopup(pIdx, "knight"); state.hint = `${p.name} 병사 카드 사용.`; render(); }
            }
          }
          if (state.phase === "roll") {
            SFX.dice();
            const d1 = 1 + Math.floor(Math.random() * 6);
            const d2 = 1 + Math.floor(Math.random() * 6);
            const el = document.getElementById("diceDisplay");
            if (el) { el.classList.remove("dice-animate"); void el.offsetWidth; el.classList.add("dice-animate"); el.textContent = `${d1} + ${d2}`; }
            const DICE_FACES = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
            showBigOverlay(`${DICE_FACES[d1]} ${DICE_FACES[d2]}`, `${p.name}: ${d1}+${d2}=${d1+d2}${d1+d2===7?" 🦹 도둑!":""}`, d1+d2===7?"seven":"", 1200);
            // SFX.dice() already plays dice sound
            render();
            await new Promise(r => setTimeout(r, 1000));
            if (!applyRollDice(pIdx, [d1, d2], false)) {
              state.phase = "main"; state.canEndTurn = true;
            }
            render();
            await resolveHumanGoldIfNeeded();
            await postDicePromptDiscards(d1 + d2);
          }
        }

        // ── Phase: robber-or-pirate (AI decides which to use) ────────────
        if (state.phase === "robber-or-pirate") {
          const opponentShips = state.players.some((pl, i) => i !== pIdx && (pl.ships || []).length > 0);
          if (opponentShips && Math.random() > 0.4) {
            state.phase = "pirate";
          } else {
            state.phase = "robber";
          }
          render();
        }

        // ── Phase: pirate ─────────────────────────────────────────────────
        if (state.phase === "pirate") {
          const seaHexes = state.hexes.filter(h => h && h.type === "sea" && h.index !== state.pirate);
          if (seaHexes.length > 0) {
            // Prefer sea hexes adjacent to opponent ships
            let bestHex = seaHexes[0];
            let bestScore = -1;
            for (const hex of seaHexes) {
              let score = 0;
              for (const vIdx of hex.vertices) {
                for (const eIdx of state.vertices[vIdx].edges) {
                  const e = state.edges[eIdx];
                  if (e.buildType === "ship" && e.owner !== null && e.owner !== pIdx) score += 2;
                }
              }
              if (score > bestScore) { bestScore = score; bestHex = hex; }
            }
            movePirate(bestHex.index);
            SFX.robber();
            showToast(`${p.name}이 해적을 이동!`);
          } else {
            state.phase = "main"; state.canEndTurn = true;
          }
          render();
          await new Promise(r => setTimeout(r, 1000));
        }

        // ── Phase: robber ─────────────────────────────────────────────────
        if (state.phase === "robber") {
          let hexIdx = -1, victimIdx = null;
          if (ai) {
            const t = ai.pickRobberTarget(state, pIdx, localPlayerIndex());
            hexIdx = t.hexIndex !== state.robber ? t.hexIndex
              : state.hexes.findIndex((_, i) => i !== state.robber);
            victimIdx = t.victimIdx;
          } else {
            hexIdx = state.hexes.findIndex((_, i) => i !== state.robber);
          }
          if (hexIdx !== -1) {
            moveRobber(hexIdx, victimIdx);
            SFX.robber();
            showToast(`${p.name}이 도둑을 이동!`);
          } else {
            state.phase = "main"; state.canEndTurn = true;
          }
          render();
          await new Promise(r => setTimeout(r, 1000));
        }

        // ── Guard: unexpected phase ────────────────────────────────────────
        if (state.phase !== "main") {
          state.phase = "main"; state.canEndTurn = true;
        }
        if (state.winner) { render(); return; }

        // C&K: activate knights if barbarian approaching
        if (state.citiesKnights && state.phase === "main") {
          const ckAI = window.pingtanAI;
          if (ckAI && ckAI.shouldActivateCKKnight && ckAI.shouldActivateCKKnight(state, pIdx)) {
            const inactiveKnight = (p.ckKnights || []).find(vIdx => !state.knightActive[vIdx]);
            if (inactiveKnight !== undefined) {
              activateCKKnight(pIdx, inactiveKnight);
              await sleep(500);
            }
          }
        }

        // Optional dev-card timing: monopoly when clearly profitable
        if (hasPlayableMonopoly(pIdx)) {
          const best = RESOURCES.map(r => ({ r, total: state.players.reduce((sum, pl, i) => sum + (i === pIdx ? 0 : (pl.resources[r] || 0)), 0) }))
            .sort((a, b) => b.total - a.total)[0];
          if (best && best.total >= 3) {
            const m = playMonopoly(pIdx, best.r);
            if (m.ok) {
              showDevCardPopup(pIdx, "monopoly", `${RESOURCE_ICONS[best.r]} ×${m.gained}`);
              state.hint = `${p.name} 모노폴리 사용: ${RESOURCE_NAMES[best.r]} ${m.gained}개`;
              render();
            }
          }
        }

        // Year of Plenty: use when can't afford preferred build action
        const yopCard = (p.devCards||[]).find(c => c.type === "year_of_plenty" && c.turnBought < state.turnNumber && !c.played);
        if (yopCard && !canAfford(p, COST.settlement) && !canAfford(p, COST.city)) {
          const targetCost = validCitiesFor(pIdx).length ? COST.city : COST.settlement;
          const deficits = RESOURCES
            .map(r => ({ r, need: Math.max(0, (targetCost[r]||0) - (p.resources[r]||0)) }))
            .sort((a, b) => b.need - a.need);
          if (deficits[0]?.need > 0) {
            const r1 = deficits[0].r;
            const r2 = deficits[1]?.need > 0 ? deficits[1].r : r1;
            yopCard.played = true;
            p.resources[r1] = (p.resources[r1]||0) + 1;
            p.resources[r2] = (p.resources[r2]||0) + 1;
            SFX.card();
            showDevCardPopup(pIdx, "year_of_plenty", `${RESOURCE_ICONS[r1]} + ${RESOURCE_ICONS[r2]}`);
            state.hint = `${p.name} 풍년 카드 사용.`;
            recalcAllVP();
            render();
            await new Promise(r => setTimeout(r, 700));
          }
        }

        // Road Building: use when expansion roads are valuable
        const rbCard = (p.devCards||[]).find(c => c.type === "road_building" && c.turnBought < state.turnNumber && !c.played);
        const rbEdges = [...validRoadsFor(pIdx), ...validShipsFor(pIdx)];
        if (rbCard && rbEdges.length > 0) {
          rbCard.played = true;
          state.roadBuildingRemaining = 2;
          SFX.card();
          showDevCardPopup(pIdx, "road_building");
          state.hint = `${p.name} 도로 건설 카드 사용.`;
          render();
          await new Promise(r => setTimeout(r, 700));
          for (let rb = 0; rb < 2 && state.roadBuildingRemaining > 0; rb++) {
            const freeRoads = validRoadsFor(pIdx);
            const freeShips = validShipsFor(pIdx);
            const freeEdges = [...freeRoads, ...freeShips];
            if (!freeEdges.length) break;
            const spot = ai ? ai.pickBestRoadGeneral(state, freeEdges, pIdx) : freeEdges[0];
            const isShip = freeShips.includes(spot);
            if (!(isShip ? placeShip(pIdx, spot, true) : placeRoad(pIdx, spot, true))) break;
            state.roadBuildingRemaining -= 1;
            SFX.road();
            render();
            await new Promise(r => setTimeout(r, 600));
          }
          state.roadBuildingRemaining = 0;
          state.buildMode = null;
        }

        // ── LLM AI: trade proposal (skip if low resources) ──────────────
        if (!state.winner && totalResourceCount(p) >= 2 && totalResourceCount(state.players[localPlayerIndex()]) >= 1) {
          try {
            const tradeResult = await aiLLMTrade(pIdx);
            // 거래 안 하는 경우엔 의미없는 멘트 표시하지 않음
          } catch(e) { console.error("LLM trade error:", e); }
        }

        // ── Build loop ────────────────────────────────────────────────────
        let safety = 15, buildsDone = 0;
        const budget = ai ? ai.getTurnBudget(state.aiDifficulty, totalResourceCount(p)) : 2;
        while (safety-- > 0 && buildsDone < budget && !state.winner) {
          const citySpots = validCitiesFor(pIdx);
          const settlementSpots = validSettlementsFor(pIdx);
          const roadSpots = validRoadsFor(pIdx);
          const act = ai ? ai.chooseBuildAction(state, pIdx, {
            cityCount: citySpots.length, settlementCount: settlementSpots.length,
            roadCount: roadSpots.length, costs: COST
          }) : null;
          const pickedAction = act || (
            canAfford(p, COST.city) && citySpots.length ? "city"
              : canAfford(p, COST.settlement) && settlementSpots.length ? "settlement"
              : canAfford(p, COST.road) && roadSpots.length ? "road"
              : null
          );
          if (!pickedAction) {
            if (ai) {
              if (state.devDeck.length > 0 && canAfford(p, COST.devCard) && state.aiDifficulty !== "easy") {
                buyDevCard(pIdx); buildsDone += 1; continue;
              }
              const targetCost = canAfford(p, COST.city)
                ? (canAfford(p, COST.settlement) ? COST.road : COST.settlement)
                : COST.city;
              const trade = ai.chooseBankTrade(p.resources, targetCost, (r) => getBestTradeRatio(pIdx, r));
              if (trade && applyPortTrade(pIdx, trade.give, trade.get)) continue;
            }
            break;
          }
          if (pickedAction === "city") {
            const spot = ai ? ai.pickVertexByDifficulty(state, citySpots, state.aiDifficulty, pIdx) : citySpots[Math.floor(Math.random() * citySpots.length)];
            upgradeCity(pIdx, spot);
            SFX.build();
            showToast(`${p.name}이 도시를 건설!`);
            Voice.ai("build-city", pIdx);
          } else if (pickedAction === "settlement") {
            const spot = ai ? ai.pickVertexByDifficulty(state, settlementSpots, state.aiDifficulty, pIdx) : settlementSpots[Math.floor(Math.random() * settlementSpots.length)];
            placeSettlement(pIdx, spot, false);
            SFX.build();
            showToast(`${p.name}이 마을을 건설!`);
            Voice.ai("build-settlement", pIdx);
          } else {
            const spot = ai ? ai.pickRoadByDifficulty(state, roadSpots, pIdx, state.aiDifficulty) : roadSpots[Math.floor(Math.random() * roadSpots.length)];
            placeRoad(pIdx, spot, false);
            SFX.road();
          }
          buildsDone += 1;
          render();
          await new Promise(r => setTimeout(r, 1000));
          if (state.winner || (ai && ai.shouldStopBuilding(state.aiDifficulty, buildsDone - 1, totalResourceCount(p)))) break;
        }

        // Ship building: extend network across sea when map has sea tiles
        if (state.hexes.some(h => h.type === "sea") && canAfford(p, COST.ship)) {
          const shipSpots = validShipsFor(pIdx);
          if (shipSpots.length > 0) {
            const spot = ai ? ai.pickBestRoadGeneral(state, shipSpots, pIdx) : shipSpots[0];
            if (placeShip(pIdx, spot)) {
              SFX.road();
              render();
              await new Promise(r => setTimeout(r, 800));
            }
          }
        }

        // Ship movement: move a tip ship if it helps (on sea maps, occasionally)
        if (!state.movedShipThisTurn && state.hexes.some(h => h.type === "sea")) {
          const movable = getMovableShips(pIdx);
          if (movable.length > 0 && Math.random() > 0.55) {
            const fromEIdx = movable[Math.floor(Math.random() * movable.length)];
            const candidates = validShipsFor(pIdx);
            if (candidates.length > 0) {
              const toEIdx = ai ? ai.pickBestRoadGeneral(state, candidates, pIdx) : candidates[0];
              if (moveShip(pIdx, fromEIdx, toEIdx)) {
                SFX.road();
                showToast(`${p.name}이 배를 이동!`);
                render();
                await new Promise(r => setTimeout(r, 800));
              }
            }
          }
        }

        if (state.roadBuildingRemaining > 0) state.roadBuildingRemaining = 0;
        state.hint = `${p.name} 턴 종료.`;
        render();
        await new Promise(r => setTimeout(r, 800));
        if (!state.winner) {
          endTurnInternal();
          render();
          state._aiTurnTriggerAfterFinish = true;
        }
      } catch (err) {
        console.error("aiMainTurn error:", err);
        // Recovery: force end turn
        try { state.phase = "main"; state.canEndTurn = true; endTurnInternal(); render(); state._aiTurnTriggerAfterFinish = true; } catch (_) {}
      } finally {
        state._aiTurnInProgress = false;
        if (state._aiTurnTriggerAfterFinish) {
          state._aiTurnTriggerAfterFinish = false;
          triggerAITurnIfNeeded();
        }
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function aiMultiSetupTurn() {
      if (!mpState.isHost || !isMultiMode()) return;
      const pIdx = state.currentPlayer;
      const p = state.players[pIdx];
      if (!p || !p.isAI) return;
      const ai = window.pingtanAI;

      if (state.setupStep === "settlement") {
        const choices = validSettlementsFor(pIdx, true);
        if (!choices.length) {
          state.hint = `${p.name} 초기 마을 위치를 찾지 못했습니다.`;
          render();
          return;
        }
        const pick = ai ? ai.pickVertexByDifficulty(state, choices, state.aiDifficulty, pIdx) : choices[0];
        await sendGameAction(ACTION.PLACE_SETTLEMENT, { playerId: p.userId || p.id, vertexId: pick });
        return;
      }

      if (state.setupStep === "road") {
        const roads = validRoadsFor(pIdx, true);
        const ships = state.edges.filter(e => canPlaceShip(pIdx, e.index, true)).map(e => e.index);
        const allEdges = [...roads, ...ships];
        if (!allEdges.length) {
          state.hint = `${p.name} 초기 도로 위치를 찾지 못했습니다.`;
          render();
          return;
        }
        const pick = ai ? ai.pickBestRoadFromVertex(state, allEdges, state.lastSetupVertex) : allEdges[0];
        const pickIsShip = ships.includes(pick);
        await sendGameAction(ACTION.PLACE_ROAD, { playerId: p.userId || p.id, edgeId: pick, isShip: pickIsShip });
      }
    }

    async function aiMultiMainTurn() {
      if (!mpState.isHost || !isMultiMode()) return;
      if (mpState.aiTurnInProgress) return;
      mpState.aiTurnInProgress = true;
      const pIdx = state.currentPlayer;
      const p = state.players[pIdx];
      if (!p || !p.isAI || state.winner) { mpState.aiTurnInProgress = false; return; }
      const ai = window.pingtanAI;

      try {
        if (state.phase === "roll") {
          const d1 = 1 + Math.floor(Math.random() * 6);
          const d2 = 1 + Math.floor(Math.random() * 6);
          await sendGameAction(ACTION.ROLL_DICE, { playerId: p.userId || p.id, values: [d1, d2] });
          await resolveHumanGoldIfNeeded();
          await postDicePromptDiscards(d1 + d2);
          await sleep(1200);
        }

        if (state.phase === "robber-or-pirate") {
          const opponentShips = state.players.some((pl, i) => i !== pIdx && (pl.ships || []).length > 0);
          state.phase = (opponentShips && Math.random() > 0.4) ? "pirate" : "robber";
        }

        if (state.phase === "pirate") {
          const seaHexes = state.hexes.filter(h => h && h.type === "sea" && h.index !== state.pirate);
          if (seaHexes.length > 0) {
            let bestHex = seaHexes[0], bestScore = -1;
            for (const hex of seaHexes) {
              let score = 0;
              for (const vIdx of hex.vertices) {
                for (const eIdx of state.vertices[vIdx].edges) {
                  const e = state.edges[eIdx];
                  if (e.buildType === "ship" && e.owner !== null && e.owner !== pIdx) score += 2;
                }
              }
              if (score > bestScore) { bestScore = score; bestHex = hex; }
            }
            movePirate(bestHex.index);
            await sleep(1000);
          } else {
            state.phase = "main"; state.canEndTurn = true;
          }
        }

        if (state.phase === "robber") {
          let hexIdx = -1;
          let victimIdx = null;
          if (ai) {
            const t = ai.pickRobberTarget(state, pIdx, localPlayerIndex());
            hexIdx = t.hexIndex !== state.robber ? t.hexIndex : state.hexes.findIndex((_, i) => i !== state.robber);
            victimIdx = t.victimIdx;
          } else {
            hexIdx = state.hexes.findIndex((_, i) => i !== state.robber);
          }
          if (hexIdx !== -1) {
            const victim = victimIdx !== null && victimIdx !== undefined ? state.players[victimIdx] : null;
            await sendGameAction(ACTION.MOVE_ROBBER, {
              playerId: p.userId || p.id,
              hexId: hexIdx,
              stealFrom: victim ? (victim.userId || victim.id) : null
            });
            await sleep(1200);
          }
        }

        if (state.phase !== "main") {
          state.phase = "main";
          state.canEndTurn = true;
        }
        if (state.winner) return;

        if (totalResourceCount(p) >= 2) {
          try {
            const tradeSent = await sendAIMultiplayerTradeProposal(pIdx);
            await sleep(tradeSent ? 8000 : 800);
          } catch (e) { console.error("AI multiplayer trade error:", e); }
        }

        let safety = 15;
        let buildsDone = 0;
        const budget = ai ? ai.getTurnBudget(state.aiDifficulty, totalResourceCount(p)) : 2;
        while (safety-- > 0 && buildsDone < budget && !state.winner && state.phase === "main") {
          const citySpots = validCitiesFor(pIdx);
          const settlementSpots = validSettlementsFor(pIdx);
          const roadSpots = validRoadsFor(pIdx);
          const act = ai ? ai.chooseBuildAction(state, pIdx, {
            cityCount: citySpots.length,
            settlementCount: settlementSpots.length,
            roadCount: roadSpots.length,
            costs: COST
          }) : null;
          const pickedAction = act || (
            canAfford(p, COST.city) && citySpots.length ? "city"
              : canAfford(p, COST.settlement) && settlementSpots.length ? "settlement"
              : canAfford(p, COST.road) && roadSpots.length ? "road"
              : null
          );

          if (!pickedAction) {
            // 멀티에서는 은행/항구 거래 동기화 액션이 아직 없어서
            // 로컬 상태만 바꾸면 클라이언트간 desync가 발생할 수 있다.
            break;
          }

          if (pickedAction === "city") {
            const spot = ai ? ai.pickVertexByDifficulty(state, citySpots, state.aiDifficulty, pIdx) : citySpots[0];
            const ok = await sendGameAction(ACTION.PLACE_CITY, { playerId: p.userId || p.id, vertexId: spot });
            if (!ok) break;
          } else if (pickedAction === "settlement") {
            const spot = ai ? ai.pickVertexByDifficulty(state, settlementSpots, state.aiDifficulty, pIdx) : settlementSpots[0];
            const ok = await sendGameAction(ACTION.PLACE_SETTLEMENT, { playerId: p.userId || p.id, vertexId: spot });
            if (!ok) break;
          } else {
            const spot = ai ? ai.pickRoadByDifficulty(state, roadSpots, pIdx, state.aiDifficulty) : roadSpots[0];
            const ok = await sendGameAction(ACTION.PLACE_ROAD, { playerId: p.userId || p.id, edgeId: spot });
            if (!ok) break;
          }

          buildsDone += 1;
          await sleep(1200 + Math.floor(Math.random() * 600));
          if (state.winner || (ai && ai.shouldStopBuilding(state.aiDifficulty, buildsDone - 1, totalResourceCount(p)))) break;
        }

        if (!state.winner && state.hexes.some(h => h && h.type === "sea") && canAfford(p, COST.ship)) {
          const shipSpots = validShipsFor(pIdx);
          if (shipSpots.length > 0) {
            const spot = ai ? ai.pickBestRoadGeneral(state, shipSpots, pIdx) : shipSpots[0];
            const ok = await sendGameAction(ACTION.PLACE_ROAD, { playerId: p.userId || p.id, edgeId: spot, isShip: true });
            if (ok) await sleep(1000);
          }
        }

        if (!state.winner && state.currentPlayer === pIdx) {
          await sleep(1000);
          await sendGameAction(ACTION.END_TURN, { playerId: p.userId || p.id });
          mpState.aiTurnTriggerAfterFinish = true;
        }
      } catch (err) {
        console.error("aiMultiMainTurn error:", err);
        try {
          state.phase = "main";
          state.canEndTurn = true;
          await sendGameAction(ACTION.END_TURN, { playerId: p.userId || p.id });
          mpState.aiTurnTriggerAfterFinish = true;
        } catch (_) {}
      } finally {
        mpState.aiTurnInProgress = false;
        if (mpState.aiTurnTriggerAfterFinish) {
          mpState.aiTurnTriggerAfterFinish = false;
          triggerAITurnIfNeeded();
        }
      }
    }

    function triggerAITurnIfNeeded() {
      if (state.winner) return;

      if (!isMultiMode()) {
        if (isHumanTurn() || state._aiTurnScheduled || state._aiTurnInProgress) return;
        state._aiTurnScheduled = true;
        const delay = (state.phase === "setup1" || state.phase === "setup2") ? 800 : 1000;
        setTimeout(() => {
          state._aiTurnScheduled = false;
          if (state.winner || isHumanTurn()) return;
          if (state.phase === "setup1" || state.phase === "setup2") aiTakeSetupTurn();
          else aiMainTurn();
        }, delay);
        return;
      }

      if (!mpState.isHost) return;
      const cp = state.players[state.currentPlayer];
      if (!cp || !cp.isAI || mpState.aiTurnScheduled || mpState.aiTurnInProgress) return;
      mpState.aiTurnScheduled = true;
      const delay = (state.phase === "setup1" || state.phase === "setup2") ? 1200 : 1500;
      setTimeout(() => {
        mpState.aiTurnScheduled = false;
        if (state.winner) return;
        const cp2 = state.players[state.currentPlayer];
        if (!cp2 || !cp2.isAI) return;
        if (state.phase === "setup1" || state.phase === "setup2") aiMultiSetupTurn();
        else aiMultiMainTurn();
      }, delay);
    }

    function statusText() {
      if (state.winner !== null) return pt("winnerStatus", { player: state.players[state.winner].name, vp: state.players[state.winner].vp });
      const cp = getCurrentPlayer();
      const waiting = isMultiMode() && !isHumanTurn() ? " | 다른 플레이어를 기다리는 중..." : "";
      const base = `${cp.name} 차례 | 단계: ${state.phase}${waiting}`;
      return state.hint ? `${base} | ${state.hint}` : base;
    }

    const BANK_MAX = 19; // 각 자원 19장

    function bankRemaining(resource) {
      const used = state.players.reduce((s, p) => s + (p.resources[resource] || 0), 0);
      return Math.max(0, BANK_MAX - used);
    }

    function resourceStrip(player) {
      if (!player) return "";
      return RESOURCES.map(r => {
        const bank = bankRemaining(r);
        return `<div class="res" onclick="onResourceTap('${r}')" style="cursor:pointer;" title="은행: ${bank}장 남음">
          ${RESOURCE_ICONS[r]} ${player.resources[r]}<span style="font-size:8px;color:#666;"> /${bank}</span>
        </div>`;
      }).join("");
    }

    function commodityStrip(player) {
      if (!player || !state.citiesKnights) return "";
      const comm = player.commodities || { cloth: 0, coin: 0, paper: 0 };
      const commIcons = { cloth: "🧵", coin: "💰", paper: "📚" };
      const commNames = { cloth: "천", coin: "주화", paper: "책" };
      const cells = COMMODITIES.map(c =>
        `<div class="res" title="${commNames[c]} (상품)" style="font-size:11px;border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.06);">${commIcons[c]}<b>${comm[c]||0}</b></div>`
      ).join("");
      return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:3px;" title="상품 (도시 생산)">${cells}</div>`;
    }

    function onResourceTap(resource) {
      if (!isHumanTurn() || state.phase !== "main" || state.winner) return;
      const me = state.players[localPlayerIndex()];
      if (!me) return;
      const have = (me.resources[resource] || 0);
      if (have >= 1) {
        // 가진 자원 → 줄 자원으로
        state.tradeDialog = {
          open: true,
          offer: Object.fromEntries(RESOURCES.map(r => [r, r === resource ? 1 : 0])),
          want: Object.fromEntries(RESOURCES.map(r => [r, 0]))
        };
      } else {
        // 없는 자원 → 받을 자원으로
        state.tradeDialog = {
          open: true,
          offer: Object.fromEntries(RESOURCES.map(r => [r, 0])),
          want: Object.fromEntries(RESOURCES.map(r => [r, r === resource ? 1 : 0]))
        };
      }
      render();
    }

    function buildableVertexSet() {
      if (!isHumanTurn() || state.winner) return new Set();
      const set = new Set();
      if (state.phase === "setup1" || state.phase === "setup2") {
        if (state.setupStep === "settlement") validSettlementsFor(state.currentPlayer, true).forEach(v => set.add(v));
        return set;
      }
      if (state.phase !== "main") return set;
      if (state.buildMode === "settlement") validSettlementsFor(state.currentPlayer).forEach(v => set.add(v));
      if (state.buildMode === "city") validCitiesFor(state.currentPlayer).forEach(v => set.add(v));
      return set;
    }

    function buildableEdgeSet() {
      if (!isHumanTurn() || state.winner) return new Set();
      const set = new Set();
      if (state.phase === "setup1" || state.phase === "setup2") {
        if (state.setupStep === "road") {
          validRoadsFor(state.currentPlayer, true).forEach(e => set.add(e));
          state.edges.forEach(e => { if (canPlaceShip(state.currentPlayer, e.index, true)) set.add(e.index); });
        }
        return set;
      }
      if (state.phase === "main" && state.buildMode === "road") {
        validRoadsFor(state.currentPlayer).forEach(e => set.add(e));
        // Also highlight sea edges for road building card on sea maps
        if (state.roadBuildingRemaining > 0) validShipsFor(state.currentPlayer).forEach(e => set.add(e));
      }
      if (state.phase === "main" && state.buildMode === "ship") validShipsFor(state.currentPlayer).forEach(e => set.add(e));
      if (state.phase === "main" && state.buildMode === "ship-move") validShipsFor(state.currentPlayer).forEach(e => set.add(e));
      return set;
    }

    function mapPixel(vx, vy, mapW, mapH) {
      const g = state.geometry;
      const pad = 64;
      const spanX = (g.maxX - g.minX) || 1;
      const spanY = (g.maxY - g.minY) || 1;
      const sx = (mapW - pad * 2) / spanX;
      const sy = (mapH - pad * 2) / spanY;
      const scale = Math.min(sx, sy);
      const contentW = spanX * scale;
      const contentH = spanY * scale;
      const offsetX = (mapW - contentW) / 2;
      const offsetY = (mapH - contentH) / 2;
      return {
        x: offsetX + (vx - g.minX) * scale,
        y: offsetY + (vy - g.minY) * scale,
        scale
      };
    }

    function clampZoom(v) {
      return Math.max(0.45, Math.min(1.35, v));
    }

    function applyResponsiveDefaults(force = false) {
      if (!force && state.mapView.zoomTouched) return;
      const vw = window.innerWidth, vh = window.innerHeight;
      if (vw > 900) {
        state.mapView.zoom = 1;
      } else if (vw > vh) {
        // 가로모드: 양 패널(130+145=275) 제외한 너비와 상태바 제외 높이로 맞춤
        const availW = vw - 280;
        const availH = vh - 32;
        state.mapView.zoom = clampZoom(Math.min(availW / 900, availH / 620) * 1.05);
      } else {
        // 세로모드: 0.7 고정 (스크롤로 나머지 탐색)
        state.mapView.zoom = 0.7;
      }
      state.mapView.initialized = false;
    }

    function setMapZoom(nextZoom, userInitiated = true) {
      const z = clampZoom(nextZoom);
      if (Math.abs(z - state.mapView.zoom) < 0.001) return;
      state.mapView.zoom = z;
      if (userInitiated) state.mapView.zoomTouched = true;
      state.mapView.initialized = false;
      render();
    }

    function centerMapViewport(force = false) {
      if (!force && (state.mapView.initialized || state.mapView.userMoved)) return;
      requestAnimationFrame(() => {
        const wrap = document.querySelector('.map-wrap');
        if (!wrap) return;
        const targetLeft = Math.max(0, Math.floor((wrap.scrollWidth - wrap.clientWidth) / 2));
        const targetTop = Math.max(0, Math.floor((wrap.scrollHeight - wrap.clientHeight) / 2));
        wrap.scrollLeft = targetLeft;
        wrap.scrollTop = targetTop;
        state.mapView.initialized = true;
      });
    }

    function bindMapPanHandlers() {
      const wrap = document.querySelector('.map-wrap');
      if (!wrap || wrap.dataset.panBound === '1') return;
      wrap.dataset.panBound = '1';

      const onPointerDown = (e) => {
        if (e.target && e.target.closest && e.target.closest('.map-zoom-controls')) return;
        state.mapView.dragActive = true;
        state.mapView.pointerId = e.pointerId;
        state.mapView.lastX = e.clientX;
        state.mapView.lastY = e.clientY;
        wrap.classList.add('dragging');
        if (wrap.setPointerCapture) {
          try { wrap.setPointerCapture(e.pointerId); } catch (_) {}
        }
      };

      const onPointerMove = (e) => {
        if (!state.mapView.dragActive) return;
        if (state.mapView.pointerId !== null && e.pointerId !== state.mapView.pointerId) return;
        const dx = e.clientX - state.mapView.lastX;
        const dy = e.clientY - state.mapView.lastY;
        if (dx !== 0 || dy !== 0) {
          wrap.scrollLeft -= dx;
          wrap.scrollTop -= dy;
          state.mapView.userMoved = true;
        }
        state.mapView.lastX = e.clientX;
        state.mapView.lastY = e.clientY;
        e.preventDefault();
      };

      const onPointerUp = (e) => {
        if (state.mapView.pointerId !== null && e.pointerId !== state.mapView.pointerId) return;
        state.mapView.dragActive = false;
        state.mapView.pointerId = null;
        wrap.classList.remove('dragging');
      };

      wrap.addEventListener('pointerdown', onPointerDown, { passive: true });
      wrap.addEventListener('pointermove', onPointerMove, { passive: false });
      wrap.addEventListener('pointerup', onPointerUp, { passive: true });
      wrap.addEventListener('pointercancel', onPointerUp, { passive: true });
      wrap.addEventListener('lostpointercapture', onPointerUp, { passive: true });

      // Fallback for browsers/devices where pointer events are unreliable in nested tap targets.
      let touchLastX = 0;
      let touchLastY = 0;
      wrap.addEventListener('touchstart', (e) => {
        if (!e.touches || !e.touches.length) return;
        if (e.touches.length >= 2) {
          const a = e.touches[0];
          const b = e.touches[1];
          state.mapView.pinchDist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
          return;
        }
        touchLastX = e.touches[0].clientX;
        touchLastY = e.touches[0].clientY;
      }, { passive: true });
      wrap.addEventListener('touchmove', (e) => {
        if (!e.touches || !e.touches.length) return;
        if (e.touches.length >= 2) {
          const a = e.touches[0];
          const b = e.touches[1];
          const dist = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
          if (state.mapView.pinchDist > 0) {
            const ratio = dist / state.mapView.pinchDist;
            setMapZoom(state.mapView.zoom * ratio);
          }
          state.mapView.pinchDist = dist;
          e.preventDefault();
          return;
        }
        const t = e.touches[0];
        const dx = t.clientX - touchLastX;
        const dy = t.clientY - touchLastY;
        if (dx !== 0 || dy !== 0) {
          wrap.scrollLeft -= dx;
          wrap.scrollTop -= dy;
          state.mapView.userMoved = true;
        }
        touchLastX = t.clientX;
        touchLastY = t.clientY;
        e.preventDefault();
      }, { passive: false });
      wrap.addEventListener('touchend', () => {
        state.mapView.pinchDist = 0;
      }, { passive: true });
    }

    function renderMap() {
      const zoom = state.mapView.zoom || 1;
      const mapW = Math.round(900 * zoom);
      const mapH = Math.round(620 * zoom);
      const vBuild = buildableVertexSet();
      const eBuild = buildableEdgeSet();
      // Compute hex element scale so tiles never overlap on large maps.
      // mapPixelScale = how many CSS px one native-geometry px occupies after mapPixel().
      // Hex CSS width = 78px * zoom * hexScale; center-to-center = sqrt(3)*42 * mapPixelScale.
      // Constraint: hexWidth ≤ center-to-center → hexScale ≤ sqrt(3)*42 * mapPixelScale / (78 * zoom).
      const _g = state.geometry;
      const _spanX = (_g.maxX - _g.minX) || 1;
      const _spanY = (_g.maxY - _g.minY) || 1;
      const _mapPixelScale = Math.min((mapW - 128) / _spanX, (mapH - 128) / _spanY);
      const _hexNativeW = (_g.size || 42) * Math.sqrt(3);
      const hexScale = Math.min(0.88, _hexNativeW * _mapPixelScale * 0.90 / (78 * zoom)).toFixed(4);
      let html = `<div class="map-wrap" id="map-wrap">`;
      html += `<div class="board" style="width:${mapW}px;height:${mapH}px;--zoom:${zoom};--hex-scale:${hexScale};">`;
      for (const hex of state.hexes) {
        const c = state.geometry.centers[hex.index];
        const p = mapPixel(c.x, c.y, mapW, mapH);
        const isFog = !!hex.fogHidden;
        const displayType = isFog ? "fog-hidden" : hex.type;
        const revealClass = hex._justRevealed ? " fog-revealing" : "";
        if (hex._justRevealed) hex._justRevealed = false;
        const hot = !isFog && (hex.number === 6 || hex.number === 8);
        const isHighlit = !isFog && state.lastDiceSum && hex.number === state.lastDiceSum && hex.index !== state.robber;
        const isBlocked = !isFog && state.lastDiceSum && hex.number === state.lastDiceSum && hex.index === state.robber;
        html += `<div class="hex ${displayType}${revealClass}${hex.robber === true ? " has-robber" : ""}${isHighlit ? " hex-hit" : ""}${isBlocked ? " hex-blocked" : ""}" data-hex-num="${hex.number || 0}" style="left:${p.x}px; top:${p.y}px;" onclick="onHexClick(${hex.index})">`;
        if (isFog) {
          html += `<div style="font-size:calc(20px * var(--zoom,1));opacity:0.35;">🌫️</div>`;
          html += `<div style="font-size:calc(16px * var(--zoom,1));font-weight:900;color:rgba(150,180,220,0.45);">?</div>`;
        } else {
          html += `<div>${RESOURCE_ICONS[hex.type] || ""}</div>`;
          if (hex.number) html += `<div class="number ${hot ? "hot" : ""}">${hex.number}</div>`;
        }
        if (!isFog && state.robber === hex.index) html += `<div class="robber">🦹</div>`;
        if (!isFog && state.pirate === hex.index) html += `<div class="robber" style="background:rgba(10,10,20,0.88);border:1.5px solid #6b21a8;">☠️</div>`;
        html += `</div>`;
      }
      for (const edge of state.edges) {
        const a = state.vertices[edge.a];
        const b = state.vertices[edge.b];
        const pa = mapPixel(a.x, a.y, mapW, mapH);
        const pb = mapPixel(b.x, b.y, mapW, mapH);
        const dx = pb.x - pa.x;
        const dy = pb.y - pa.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        const ang = Math.atan2(dy, dx) * 180 / Math.PI;
        const edgeBuildType = edge.owner !== null ? (edge.buildType || "road") : "";
        const isShip = edgeBuildType === "ship";
        const movableShips = (state.buildMode === "ship-select" || state.buildMode === "ship-move")
          ? (state.buildMode === "ship-select" ? getMovableShips(state.currentPlayer) : [state.shipMovingIdx])
          : [];
        const isMovable = isShip && state.buildMode === "ship-select" && movableShips.includes(edge.index);
        const isSelected = isShip && state.buildMode === "ship-move" && state.shipMovingIdx === edge.index;
        const cls = ["edge", edgeBuildType, eBuild.has(edge.index) ? "buildable" : "", isMovable ? "ship-movable" : "", isSelected ? "ship-selected" : ""].filter(Boolean).join(" ");
        const color = edge.owner !== null ? state.players[edge.owner].color : "";
        const shipStyle = isShip && color ? `background:${color}55;border-color:${color};` : (color ? `background:${color};border-color:${color};` : "");
        html += `<div class="${cls}" style="left:${pa.x}px; top:${pa.y}px; width:${len}px; transform: rotate(${ang}deg); ${shipStyle}" onclick="onEdgeClick(${edge.index})"></div>`;
      }
      for (const v of state.vertices) {
        const p = mapPixel(v.x, v.y, mapW, mapH);
        if (v.building) {
          const label = v.building === "city" ? "도시" : "마을";
          const ownerIdx = v.owner;
          const isHuman = ownerIdx === 0 && !isMultiMode();
          const isJustPlaced = v.index === state.lastPlacedVertex;
          const cityTarget = state.buildMode === "city" && vBuild.has(v.index) && v.building === "settlement";
          const cityClick = cityTarget ? ` onclick="onVertexClick(${v.index})"` : "";
          const bIcon = v.building === "city" ? "🏰" : "🏠";
          html += `<div class="vertex ${v.building} player-${ownerIdx}${isHuman ? " human-player" : ""}${isJustPlaced ? " just-placed" : ""}${cityTarget ? " city-target" : ""}" style="left:${p.x}px;top:${p.y}px;--owner-color:${state.players[ownerIdx].color};background:${state.players[ownerIdx].color};color:#fff;" title="${state.players[ownerIdx].name} ${label}"${cityClick}>${bIcon}</div>`;
        } else if (state.citiesKnights && state.knightLevels[v.index] !== undefined) {
          const active = state.knightActive[v.index];
          const knightColor = active ? "#ffd700" : "#888";
          html += `<div class="vertex" style="left:${p.x}px;top:${p.y}px;background:${knightColor};color:#000;border:2px solid #000;font-size:14px;cursor:default;" title="기사단 Lv${state.knightLevels[v.index]}${active?' (활성)':' (비활성)'}">⚔</div>`;
        } else {
          const cls = ["vertex", vBuild.has(v.index) ? "buildable" : ""].join(" ");
          html += `<div class="${cls}" style="left:${p.x}px; top:${p.y}px;" onclick="onVertexClick(${v.index})"></div>`;
        }
      }
      // Render ports
      const portIcons = { brick:"🧱", lumber:"🪵", wool:"🐑", grain:"🌾", ore:"⛏️", generic:"⚓" };
      for (const port of (state.ports || [])) {
        const va = state.vertices[port.vertices[0]];
        const vb = state.vertices[port.vertices[1]];
        if (!va || !vb) continue;
        const pa = mapPixel(va.x, va.y, mapW, mapH);
        const pb = mapPixel(vb.x, vb.y, mapW, mapH);
        const mx = (pa.x + pb.x) / 2;
        const my = (pa.y + pb.y) / 2;
        html += `<div class="port-label" style="left:${mx}px;top:${my}px;">${portIcons[port.type] || "⚓"} ${port.ratio}:1</div>`;
      }
      html += `</div></div>`;
      return html;
    }

    function onMapCardClick(mapId) {
      const scroller = document.getElementById("map-select-scroll");
      const st = scroller ? scroller.scrollTop : 0;
      state.selectedMapId = mapId;
      if (!state.targetScoreCustom) state.targetScore = defaultTargetScoreForMap(mapId);
      render();
      requestAnimationFrame(() => {
        const s = document.getElementById("map-select-scroll");

    function getMapTags(m) {
      const tags = [];
      const axial = m.layout?.axial || [];
      if (m.specialRules?.citiesKnights) tags.push("expansion");
      if (axial.some(h => h.fog)) tags.push("fog");
      if (axial.some(h => h.type === "sea")) tags.push("seafarers");
      if (m.maxPlayers <= 2) tags.push("2p");
      if (m.maxPlayers >= 5 || axial.length >= 28) tags.push("large");
      if (!tags.length || (tags.length === 1 && tags[0] === "2p")) tags.push("standard");
      return tags;
    }

    function roomInviteUrl(roomCode = mpState.roomCode) {
      const path = window.location.pathname
        .replace(/\/index\.html$/i, "/")
        .replace(/\/$/, "");
      const baseUrl = `${window.location.origin}${path}`;
      return `${baseUrl}/?room=${encodeURIComponent(roomCode || "")}`;

    function inviteRoomCodeFromUrl() {
      const hash = window.location.hash || "";
      const hashMatch = hash.match(/(?:^#|[&#])room=([^&]+)/i);
      if (hashMatch) return decodeURIComponent(hashMatch[1]).trim().toUpperCase();
      const queryRoom = new URLSearchParams(window.location.search).get("room");
      return queryRoom ? queryRoom.trim().toUpperCase() : "";
    }

    function renderWinnerModal() {
      if (state.winner === null || state.winner === undefined || state.dismissedWinner) return "";

      const mapId = state.selectedMapId || "standard";
      resetCoreState();
      state.mode = null;
      state.screen = "map-select";
      state.mapSelectSource = "single";
      state.selectedMapId = mapId;
      render();

      if (!isMultiMode() || !mpState.client) { returnToSingleMapSelect(); return; }
      const keepRoomCode = mpState.roomCode;
      const keepMapId = state.selectedMapId || mpState.mapId || "standard";
      try { await mpState.client.rematch?.(); } catch (_) {}
      resetCoreState();
      state.mode = "multi";
      state.screen = "room-lobby";
      state.selectedMapId = keepMapId;
      mpState.roomCode = keepRoomCode;
      mpState.ready = false;
      mpState.startRequested = false;
      mpState.initSent = false;
      mpState.processedActionIds = new Set();
      mpState.aiTurnScheduled = false;
      mpState.aiTurnInProgress = false;
      mpState.aiTurnTriggerAfterFinish = false;
      mpState.waitingMessage = "리매치 대기실로 돌아왔습니다.";
      try { await refreshRoomState(); } catch (_) {}
      render();

    function getHumanActionAvailability(me, myTurn) {
      const canMain = myTurn && state.phase === "main";
      if (!canMain || !me) {
        return { canMain, canRoad: false, canSettlement: false, canCity: false, canShip: false, possible: [] };
      }
      const idx = state.currentPlayer;
      const canRoad = canAfford(me, COST.road) && validRoadsFor(idx).length > 0;
      const canSettlement = canAfford(me, COST.settlement) && validSettlementsFor(idx).length > 0;
      const canCity = canAfford(me, COST.city) && validCitiesFor(idx).length > 0;
      const canShip = canAfford(me, COST.ship) && validShipsFor(idx).length > 0;
      const canMoveShip = !state.movedShipThisTurn && getMovableShips(idx).length > 0;
      const possible = [];
      if (canRoad) possible.push("도로");
      if (canSettlement) possible.push("마을");
      if (canCity) possible.push("도시");
      if (canShip) possible.push("배");
      if (canMoveShip) possible.push("배이동");
      return { canMain, canRoad, canSettlement, canCity, canShip, canMoveShip, possible };
    }

    function renderGameScreen() {
      const myIdx = localPlayerIndex();
      const idx = myIdx >= 0 ? myIdx : 0;
      const me = state.players[myIdx >= 0 ? myIdx : 0];
      const myTurn = isHumanTurn();
      const inSetup = state.phase === "setup1" || state.phase === "setup2";
      const canRoll = myTurn && state.phase === "roll";
      const canRobber = myTurn && (state.phase === "robber" || state.phase === "robber-or-pirate" || state.phase === "pirate");
      const actionState = getHumanActionAvailability(me, myTurn);
      const vp = me?.vp || 0;
      const vpPct = Math.min(100, Math.max(0, vp * 10));
      const turnPct = Math.min(100, Math.max(0, (state.turnTimeLeft / state.turnSeconds) * 100));
      const vpGoal = targetScoreForMap(state.selectedMapId);
      const vpPctFull = Math.min(100, Math.max(0, (vp / vpGoal) * 100));
      const devCardText = (me.devCards && me.devCards.length)
        ? `카드: ${me.devCards.filter(c=>!c.played).map(c=>c.type==='knight'?'🐴병사':c.type==='vp'?'⭐VP':c.type==='monopoly'?'💰모노폴리':c.type==='road_building'?'🛣️도로':c.type==='year_of_plenty'?'🌾풍년':'🃏').join(' ')}`
        : "";
      const canEndTurnNow = actionState.canMain && state.canEndTurn;
      const timerHtml = myTurn ? `<div class="turn-timer"><div class="turn-timer-row"><div class="turn-timer-label">${pt("turnTimer")}: ${state.turnTimeLeft}s</div><button class="danger end-turn-timer-btn" ${canEndTurnNow ? "" : "disabled"} onclick="endTurn()">${pt("endTurn")}</button></div><div class="turn-timer-bar"><div class="turn-timer-fill" style="width:${turnPct}%;"></div></div></div>` : "";
      const vpBarHtml = `<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#aaa;padding:2px 4px;"><span>${pt("clearTarget")}: ${vpGoal}점 · VP: ${vp}/${vpGoal}</span><div style="flex:1;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;"><div style="height:100%;width:${vpPctFull}%;background:linear-gradient(90deg,#4ecca3,#ffd700);border-radius:2px;"></div></div></div>`;
      const hintText = [
        inSetup ? `초기 배치 ${state.setupRound}라운드 | ${state.setupStep === "settlement" ? pt("setupSettlement") : pt("setupRoad")}` : "",
        (canRobber || state.phase === "knight-robber") ? `🦹 ${pt("robberMove")}` : "",
        state.phase === "robber-or-pirate" ? pt("pirateSevenHint") : "",
        state.buildMode === "ship-select" ? pt("moveShipSelectHint") : "",
        state.buildMode === "ship-move" ? pt("moveShipPlaceHint") : "",
        (actionState.canMain && actionState.possible.length && !["ship-select","ship-move"].includes(state.buildMode)) ? `가능: ${actionState.possible.join(', ')}` : ""
      ].filter(Boolean).join(" · ");
      const buildActionButtonClass = (mode, extra = "") => `${extra}${state.buildMode === mode ? `${extra ? " " : ""}selected-action` : ""}`;
      const robberOrPirateHtml = (myTurn && state.phase === "robber-or-pirate") ? `
        <div style="display:flex;gap:6px;padding:4px 0;justify-content:center;">
          <button onclick="humanChooseRobber()" style="flex:1;background:#b91c1c;border-color:#b91c1c;color:#fff;">${pt("robberButton")}</button>
          <button onclick="humanChoosePirate()" style="flex:1;background:#6b21a8;border-color:#6b21a8;color:#fff;">${pt("pirateButton")}</button>
        </div>` : "";
      const hasSeaMap = state.hexes.some(h => h.type === "sea");
      const actionsHtml = `
        <div class="actions">
          ${robberOrPirateHtml}
          <button id="diceDisplay" class="primary dice-button" ${canRoll ? "" : "disabled"} onclick="rollDice()">${renderDiceButtonContent(canRoll)}</button>
          <button class="${buildActionButtonClass("road")}" ${actionState.canRoad ? "" : "disabled"} onclick="${actionState.canRoad ? "humanBuildRoad()" : "humanTryBuild('road')"}">${pt("road")}${getLongestRoadBadge(state.longestRoad === myIdx)}(${me.roads.length}/15)${costLabel(COST.road, idx)}</button>
          ${hasSeaMap ? `<button class="${buildActionButtonClass("ship")}" ${actionState.canShip ? "" : "disabled"} onclick="${actionState.canShip ? "humanBuildShip()" : "humanTryBuild('ship')"}">⛵${pt("ship")}(${(me.ships||[]).length})${costLabel(COST.ship, idx)}</button>` : ""}
          ${hasSeaMap ? `<button class="${buildActionButtonClass("ship-select")}" ${actionState.canMoveShip ? "" : "disabled"} onclick="${actionState.canMoveShip ? "humanMoveShip()" : ""}">${pt("moveShip")}</button>` : ""}
          <button class="${buildActionButtonClass("settlement")}" ${actionState.canSettlement ? "" : "disabled"} onclick="${actionState.canSettlement ? "humanBuildSettlement()" : "humanTryBuild('settlement')"}">${pt("settlement")}(${me.buildings.filter(b=>b.type==="settlement").length}/5)${costLabel(COST.settlement, idx)}</button>
          <button class="${buildActionButtonClass("city")}" ${actionState.canCity ? "" : "disabled"} onclick="${actionState.canCity ? "humanBuildCity()" : "humanTryBuild('city')"}">${pt("city")}(${me.buildings.filter(b=>b.type==="city").length}/4)${costLabel(COST.city, idx)}</button>
          ${state.citiesKnights ? (() => {
            const ckCanBuild = actionState.canMain && canAfford(me, COST_KNIGHT_BUILD) && validCKKnightSpots(myIdx).length > 0;
            const ckCanActivate = actionState.canMain && canAfford(me, COST_KNIGHT_ACTIVATE) && (me.ckKnights||[]).some(vIdx => !state.knightActive[vIdx]);
            const totalKnights = (me.ckKnights||[]).length;
            const activeKnights = (me.ckKnights||[]).filter(vIdx => state.knightActive[vIdx]).length;
            const cardNames = { crane:"크레인", irrigation:"관개", resourceMonopoly:"자원독점", merchantFleet:"상인함대", knightCard:"기사패", spy:"스파이" };

          <button ${(myTurn && state.phase === "main" && (me.devCards||[]).some(c=>c.type==="year_of_plenty"&&c.turnBought<state.turnNumber&&!c.played)) ? "" : "disabled"} onclick="humanUseYearOfPlenty()">🌾풍년</button>

            </div>
            <div class="resources">${resourceStrip(me)}</div>
            ${commodityStrip(me)}
            ${state.citiesKnights ? (() => {
              const pos = state.barbarianPos || 0;

                const cls = i >= pos ? "" : pos >= 6 ? "filled danger" : pos >= 4 ? "filled warn" : "filled";

              const evtLabels = { barbarian:"야만인", science:"과학", trade:"무역", politics:"정치" };
              const evtIcons  = { barbarian:"★", science:"📗", trade:"📘", politics:"📕" };

    function renderTradeModal() {
      if (!state.tradeDialog.open) return "";
      const pIdx = localPlayerIndex();
      const p = state.players[pIdx];
      if (!p) return "";
      const td = state.tradeDialog;
      if (!td.offer) td.offer = Object.fromEntries(RESOURCES.map(r => [r, 0]));
      if (!td.want) td.want = Object.fromEntries(RESOURCES.map(r => [r, 0]));
      
      const totalOffer = RESOURCES.reduce((s, r) => s + (td.offer[r] || 0), 0);
      const totalWant = RESOURCES.reduce((s, r) => s + (td.want[r] || 0), 0);
      const noSameResource = RESOURCES.every(r => !((td.offer[r] || 0) > 0 && (td.want[r] || 0) > 0));

      function resRow(r, counts, type) {
        const max = type === "offer" ? (p.resources[r] || 0) : 99;
        const val = counts[r] || 0;
        const othersTotal = type === "want"
          ? state.players.reduce((s, pl, i) => i === pIdx ? s : s + (pl.resources[r] || 0), 0)
          : null;
        const sideLabel = type === "offer"
          ? `<span style="font-size:10px;color:#9ca3af;margin-left:2px;">보유 ${p.resources[r] || 0}</span>`
          : othersTotal !== null
            ? `<span style="font-size:10px;color:#9ca3af;margin-left:2px;">유통 ${othersTotal}</span>`
            : "";
        return `<div style="display:flex;align-items:center;gap:4px;justify-content:space-between;padding:2px 0;">
          <span style="font-size:13px;">${RESOURCE_ICONS[r]} ${resourceName(r)} ${sideLabel}</span>
          <span style="display:flex;gap:2px;align-items:center;">
            <button class="trade-option" style="padding:2px 8px;min-width:28px;" onclick="tradeAdjust('${type}','${r}',-1)" ${val <= 0 ? "disabled" : ""}>−</button>
            <span style="min-width:20px;text-align:center;font-weight:700;">${val}</span>
            <button class="trade-option" style="padding:2px 8px;min-width:28px;" onclick="tradeAdjust('${type}','${r}',1)" ${val >= max ? "disabled" : ""}>+</button>
          </span>
        </div>`;
      }

      // 은행 거래 가능 여부 (선택한 자원 하나에 대해)
      const bankGive = RESOURCES.find(r => td.offer[r] >= getBestTradeRatio(pIdx, r));
      const bankGet = RESOURCES.find(r => td.want[r] > 0);
      const canBank = bankGive && bankGet && bankGive !== bankGet;

      return `
        <div class="trade-modal-overlay" onclick="cancelTradeDialog()">
          <div class="trade-modal" onclick="event.stopPropagation()" style="max-width:360px;">
            <h3>💱 ${pt("tradeModalTitle")}</h3>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <div class="trade-section">
                <div class="trade-section-title">📤 ${pt("giveResources", { count: totalOffer })}</div>
                ${RESOURCES.map(r => resRow(r, td.offer, "offer")).join("")}
              </div>
              <div class="trade-section">
                <div class="trade-section-title">📥 ${pt("wantResources", { count: totalWant })}</div>
                ${RESOURCES.map(r => resRow(r, td.want, "want")).join("")}
              </div>
            </div>
            <div class="trade-actions" style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;">
              <button onclick="cancelTradeDialog()" style="flex:1;">${pt("cancel")}</button>
              <button class="primary" ${canBank ? "" : "disabled"} onclick="confirmBankTrade()" style="flex:1;">🏦 ${pt("bankTrade")}</button>
              <button style="background:#6366f1;border-color:#6366f1;color:#fff;flex:1;" ${(totalOffer > 0 && totalWant > 0 && noSameResource) ? "" : "disabled"} onclick="proposeTrade()">🤝 ${pt("proposeTrade")}</button>
            </div>
          </div>
        </div>
      `;
    }

    function cancelTradeDialog() {
      closeTradeDialog();
      render();
    }

    function render() {
      const app = document.getElementById("app");
      const mpLobby = document.getElementById("mpLobbyContainer");
      app.classList.toggle("mode-app", state.screen === "mode");
      // Hide mpLobby when not in multi lobby
      if (state.screen !== "multi-lobby") {
        mpLobby.classList.add("hidden");
        app.classList.remove("hidden");
      }
      if (state.screen === "mode") app.innerHTML = renderModeScreen();
      else if (state.screen === "map-select") app.innerHTML = renderMapSelect();
      else if (state.screen === "multi-lobby") {
        // MultiplayerUI handles this screen
        app.classList.add("hidden");
        mpLobby.classList.remove("hidden");
        return;
      }
      else {
        // Save scroll positions before DOM replacement
        const _prev = document.getElementById("map-wrap");
        const _sl = _prev ? _prev.scrollLeft : 0;
        const _st = _prev ? _prev.scrollTop : 0;
        const _prevAction = document.getElementById("panel-action");
        const _actionST = _prevAction ? _prevAction.scrollTop : 0;
        const _prevInfo = document.getElementById("panel-info");
        const _infoST = _prevInfo ? _prevInfo.scrollTop : 0;
        normalizeTurnPhaseForDice();
        app.innerHTML = renderGameScreen();
        bindMapPanHandlers();
        const _wrap = document.getElementById("map-wrap");
        if (_wrap && (state.mapView.userMoved || state.mapView.initialized)) {
          _wrap.scrollLeft = _sl;
          _wrap.scrollTop = _st;
        } else {
          centerMapViewport();
        }
        if (_actionST > 0) {
          const _actionEl = document.getElementById("panel-action");
          if (_actionEl) _actionEl.scrollTop = _actionST;
        }
        if (_infoST > 0) {
          const _infoEl = document.getElementById("panel-info");
          if (_infoEl) _infoEl.scrollTop = _infoST;
        }
      }
      updateTurnBanner();
      state.lastPlacedVertex = null;
    }

    function normalizeEvent(a, b) {
      if (typeof a === "string") return { type: a, ...(b || {}) };
      return a || {};
    }

    async function ensureMp() {
      if (!window.MultiplayerClient) throw new Error("multiplayer.js 로드 실패");
      if (!mpState.client) {
        mpState.client = MultiplayerClient.getInstance();
        await mpState.client.ensureAuth();
        mpState.myUserId = mpState.client.getMyUserId();
        mpState.client.onStateChange = onRoomStateChange;
        mpState.client.onEvent = onMpEvent;
        mpState.client.onRoomDestroyed = () => {
          mpState.waitingMessage = "방이 종료되었습니다.";
          leaveRoom(false);
        };
      }
      return mpState.client;
    }

    function roomMapIdFromState(room, preferLocal = false) {
      const localMapId = mpState.mapId || state.selectedMapId;
      const roomMapId = room?.meta?.mapId || room?.mapId || room?.config?.mapId || room?.gameConfig?.mapId;
      if (preferLocal && localMapId) return localMapId;
      return roomMapId || localMapId || "standard";
    }

    function roomTurnSecondsFromState(room, preferLocal = false) {
      const localTurnSeconds = state.turnSeconds;
      const roomTurnSeconds = room?.meta?.turnSeconds || room?.config?.turnSeconds || room?.gameConfig?.turnSeconds;
      if (preferLocal && localTurnSeconds) return clampTurnSeconds(localTurnSeconds);
      return clampTurnSeconds(roomTurnSeconds || localTurnSeconds || 60);
    }

    function roomTargetScoreFromState(room, mapId, preferLocal = false) {
      const localTargetScore = state.targetScore;
      const roomTargetScore = room?.meta?.targetScore || room?.config?.targetScore || room?.gameConfig?.targetScore;
      if (preferLocal && localTargetScore) return clampTargetScore(localTargetScore);
      return clampTargetScore(roomTargetScore || localTargetScore || defaultTargetScoreForMap(mapId));
    }

    function pingtanRoomConfig() {
      const mapId = state.selectedMapId || mpState.mapId || "standard";
      const turnSeconds = clampTurnSeconds(state.turnSeconds || 60);
      const targetScore = clampTargetScore(state.targetScore || defaultTargetScoreForMap(mapId));
      return {
        mapId,
        gameConfig: { mapId, turnSeconds, targetScore }
      };
    }

    function onRoomStateChange(room) {
      if (!room) return;
      mpState.room = room;
      mpState.roomCode = room.id || room.roomId || mpState.roomCode;
      const me = room.players?.find(p => p.id === mpState.myUserId);
      mpState.isHost = !!me?.isHost;
      mpState.ready = !!me?.isReady;
      const roomMapId = roomMapIdFromState(room, mpState.isHost);
      mpState.mapId = roomMapId;
      state.selectedMapId = roomMapId;
      state.turnSeconds = roomTurnSecondsFromState(room, mpState.isHost);
      state.targetScore = roomTargetScoreFromState(room, roomMapId, mpState.isHost);
      if (mpState.isHost) {
        const _p = resolveMapPreset(mpState.mapId || state.selectedMapId || "standard");
        const _maxCap = (_p && _p.maxPlayers) ? _p.maxPlayers : 4;
        const maxAi = Math.max(0, _maxCap - (room.players?.length || 0));
        mpState.aiPlayers = getLobbyAiPlayers().slice(0, maxAi);
      }
      if (state.screen === "room-lobby") {
        const others = (room.players || []).filter(p => p.id !== mpState.myUserId);
        const allReady = others.length > 0 && others.every(p => p.isReady);
        mpState.waitingMessage = allReady ? "모두 준비 완료. 게임 시작 가능." : "플레이어를 기다리는 중...";
      }
      if (room.status === "playing" && state.screen === "room-lobby") {
        state.screen = "game";
        state.mode = "multi";
        state.hint = pt("initWaiting");
      }
      autoStartIfReady();
      render();
    }

    async function autoStartIfReady() {
      if (!mpState.client || !mpState.room || !mpState.isHost) return;
      if (mpState.room.status === "playing" || mpState.startRequested) return;
      const players = mpState.room.players || [];
      const others = players.filter(p => p.id !== mpState.myUserId);
      const allReady = others.length > 0 && others.every(p => p.isReady);
      const displayCount = players.length + getLobbyAiPlayers().length;
      if ((!allReady && !getLobbyAiPlayers().length) || displayCount < 2) return;
      mpState.startRequested = true;
      try {
        await mpState.client.startGame();
      } catch (e) {
        mpState.waitingMessage = `자동 시작 실패: ${e.message || e}`;
        mpState.startRequested = false;
        render();
      }
    }

    async function maybeHostInitGame() {
      if (!isMultiMode() && state.mode !== "multi") return;
      if (!mpState.isHost || mpState.initSent || !mpState.room) return;
      if (mpState.room.status !== "playing") return;
      const players = mpState.room.players || [];
      const _ip = resolveMapPreset(mpState.mapId || state.selectedMapId || "standard");
      const _ipCap = (_ip && _ip.maxPlayers) ? _ip.maxPlayers : 4;
      if (!getLobbyAiPlayers().length && players.length < _ipCap) {
        mpState.aiPlayers = buildAiPlayers(players);
      }
      const aiPlayers = getLobbyAiPlayers();
      const others = players.filter(p => p.id !== mpState.myUserId);
      const allReady = others.length > 0 && others.every(p => p.isReady);
      const fullPlayers = players.concat(aiPlayers).slice(0, _ipCap);
      if (fullPlayers.length < 2 || (!allReady && !aiPlayers.length)) return;
      setMultiplayerPlayers(fullPlayers);
      resetCoreState();
      const mapId = roomMapIdFromState(mpState.room, true);
      state.selectedMapId = mapId;
      mpState.mapId = mapId;
      state.turnSeconds = roomTurnSecondsFromState(mpState.room, true);
      state.targetScore = roomTargetScoreFromState(mpState.room, mapId, true);
      state.targetScoreCustom = true;
      generateBoard(null, mapId);
      recalcAllVP();
      mpState.initSent = true;
      await sendGameAction(ACTION.GAME_INIT, {
        playerId: mpState.myUserId,
        mapId,
        hexes: clone(state.hexes),
        vertices: clone(state.vertices),
        edges: clone(state.edges),
        ports: clone(state.ports),
        robber: state.robber,
        turnSeconds: state.turnSeconds,
        targetScore: state.targetScore,
        playerOrder: state.players.map(p => p.userId || p.id),
        players: state.players.map(p => ({ id: p.userId || p.id, userId: p.userId || p.id, name: p.name, color: p.color, isAI: !!p.isAI }))
      });
    }

    async function onMpEvent(a, b) {
      const event = normalizeEvent(a, b);
      dbg(`[MP-EVT] ${event.type || "?"}`);
      if (!event.type) return;
      if (event.type === "game_started") {
        state.screen = "game";
        state.mode = "multi";
        state.hint = pt("hostGeneratingMap");
        if (soundSettings.bgm) BGM.start();
        render();
        await maybeHostInitGame();
        return;
      }
      if (event.type === "player_left") {
        const aiReplacement = event.payload?.aiReplacement === true;
        if (state.screen === "game" && aiReplacement && markPlayerDisconnectedAsAI(event.userId)) {
          render();
          triggerAITurnIfNeeded();
          return;
        }
        await refreshRoomState();
        return;
      }
      if (event.type === "player_joined") {
        if (state.screen === "game" && markPlayerRejoinedHuman(event.userId, event.payload?.nickname)) {
          render();
          return;
        }
        await refreshRoomState();
        return;
      }
      if (event.type === "host_changed") {
        await refreshRoomState();
        state.hint = event.userId === mpState.myUserId
          ? "호스트가 이탈해서 내가 AI 진행을 이어받았습니다."
          : "호스트가 이탈해서 다른 플레이어가 진행을 이어받았습니다.";
        render();
        triggerAITurnIfNeeded();
        return;
      }
      if (event.type === "player_ready") {
        await refreshRoomState();
        return;
      }
      if (event.type === "action") {
        const raw = event.data || event.action || event.payload || {};
        // relay sends { action: {...}, events: [...] } or direct action
        const data = raw.action || raw;
        if (!data.type) { dbg(`[MP] no type in: ${JSON.stringify(raw).slice(0,100)}`); return; }
        if (data.actionId && mpState.processedActionIds.has(data.actionId)) return;
        if (data.type === ACTION.REACTION_EMOTE || data.type === "REACTION_EMOTE") {
          const idx = playerIndexFromAnyId(data.playerId || event.userId);
          const player = state.players[idx];
          const emote = getReactionEmote(data.emoteId);
          showReactionEmote({
            playerName: player?.name || data.playerName || "플레이어",
            emoji: data.emoji || emote.emoji,
            phrase: data.phrase || emote.phrase,
            motion: data.motion || emote.motion,
            speak: idx !== localPlayerIndex(),
            localTts: data.localTts !== false,
            playerVoice: data.playerVoice || reactionVoiceForPlayer(idx)
          });
          markActionProcessed(data.actionId);
          if (!player?.isAI) maybeAIReactToHumanReaction({ emoji: data.emoji || emote.emoji, phrase: data.phrase || emote.phrase, sourcePlayerIdx: idx });
          return;
        }
        if (data.type === "LOBBY_AI_STATE") {
          mpState.aiPlayers = Array.isArray(data.aiPlayers) ? data.aiPlayers.map((p, i) => ({ 
            id: p.id || `ai-${i + 1}`,
            userId: p.userId || p.id || `ai-${i + 1}`,
            name: p.name || p.nickname || `AI 봇 ${i + 1}`,
            nickname: p.nickname || p.name || `AI 봇 ${i + 1}`,
            isAI: true,
            color: p.color || PLAYER_COLORS[i]
          })) : [];
          markActionProcessed(data.actionId);
          render();
          return;
        }
        dbg(`[MP] action: ${data.type} id:${data.actionId||"?"}`);
        console.log("[onMpEvent] applying:", data.type, data);
        const ok = applyGameAction(data);
        if (!ok && data.__snapshot && recoverFromActionSnapshot(data.__snapshot, data.type)) {
          markActionProcessed(data.actionId);
          render();
          triggerAITurnIfNeeded();
          return;
        }
        if (ok) {
          addActivityForAction(data, playerIndexFromAnyId(data.playerId || event.userId));
          markActionProcessed(data.actionId);
          render();
          if (data.type === ACTION.ROLL_DICE) {
            const sum = (Number(data.values?.[0]) || 0) + (Number(data.values?.[1]) || 0);
            await resolveHumanGoldIfNeeded();
            await postDicePromptDiscards(sum);
          }
          triggerAITurnIfNeeded();
        }
      }
    }

    function localizeReactionEmote(emote) {
      const base = emote || REACTION_EMOTES[0];
      return { ...base, phrase: base.phraseByLang?.[PINGTAN_LANG] || base.phrase };
    }

    function visibleReactionEmotes() {
      return REACTION_EMOTES
        .filter(e => !e.langs || e.langs.includes(PINGTAN_LANG))
        .map(localizeReactionEmote);
    }

    function getReactionEmote(emoteId) {
      return localizeReactionEmote(REACTION_EMOTES.find(e => e.id === emoteId) || REACTION_EMOTES[0]);
    }

    function sanitizeReactionSpeech(text) {
      return String(text || "")
        .replace(/ㅋㅋ+|ㅋ+/g, "")
        .replace(/ㅎㅎ+|ㅎ+/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function speakReactionBrowser(text) {
      text = sanitizeReactionSpeech(text);
      if (!soundSettings.voice || !text || !window.speechSynthesis) return;
      try {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "ko-KR";
        u.rate = 1.08;
        u.pitch = 1.05;
        u.volume = Math.max(0, Math.min(1, soundSettings.voiceVol));
        window.speechSynthesis.speak(u);
      } catch (_) {}
    }

    function reactionVoiceForPlayer(playerIdxOrVoice) {
      if (playerIdxOrVoice === "ko-male" || playerIdxOrVoice === "ko-female") return playerIdxOrVoice;
      const idx = Number(playerIdxOrVoice);
      if (Number.isFinite(idx)) {
        const p = state.players[idx];
        return p?.voice || (idx % 2 === 0 ? "ko-male" : "ko-female");
      }
      return inferVoiceFromName(playerIdxOrVoice) || "ko-male";
    }

    const reactionTtsCache = new Map();
    const REACTION_TTS_CACHE_MAX = 24;

    async function getCachedReactionTtsUrl(text, voice) {
      const key = String(voice) + "|" + String(text);
      const cached = reactionTtsCache.get(key);
      if (cached?.url) return cached.url;
      if (cached?.promise) return cached.promise;
      const promise = fetch("https://llm.cocy.io/v1/audio/speech", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer choon150622" },
        body: JSON.stringify({ model: "cosyvoice", input: text, voice, response_format: "wav" })
      }).then(async (res) => {
        if (!res.ok) throw new Error("tts failed");
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        reactionTtsCache.set(key, { url });
        while (reactionTtsCache.size > REACTION_TTS_CACHE_MAX) {
          const oldest = reactionTtsCache.keys().next().value;
          const old = reactionTtsCache.get(oldest);
          if (old?.url) URL.revokeObjectURL(old.url);
          reactionTtsCache.delete(oldest);
        }
        return url;
      }).catch((err) => {
        reactionTtsCache.delete(key);
        throw err;
      });
      reactionTtsCache.set(key, { promise });
      return promise;
    }

        .filter(x => x.name && x.name.length >= 1)

      for (const { p, i, name } of playersByName) {

    async function replaypingtanRoomEvents(roomId) {
      if (!mpState.client || !roomId) return 0;
      const res = await mpState.client.request('GET', `/api/rooms/${roomId}/events?after=0`);
      const events = Array.isArray(res.events) ? res.events : [];
      let lastSeq = 0;
      let latestSnapshotEvent = null;
      const actionEvents = events.map(event => {
        if (typeof event.seq === "number") lastSeq = Math.max(lastSeq, event.seq);
        if (event.type !== "action") return null;
        const raw = event.data || event.action || event.payload || {};
        const data = raw.action || raw;
        if (data?.__snapshot) latestSnapshotEvent = { seq: event.seq || 0, data };
        return data?.type ? { seq: event.seq || 0, data } : null;
      }).filter(Boolean);
      mpState.replaying = true;
      try {
        const replayFromSeq = latestSnapshotEvent && applypingtanStateSnapshot(latestSnapshotEvent.data.__snapshot)
          ? latestSnapshotEvent.seq
          : 0;
        for (const item of actionEvents) {
          if (item.seq <= replayFromSeq) {
            if (item.data.actionId) markActionProcessed(item.data.actionId);
            continue;
          }
          const data = item.data;
          if (data.actionId && mpState.processedActionIds.has(data.actionId)) continue;
          const ok = applyGameAction(data);
          if (ok) markActionProcessed(data.actionId);
        }
      } finally {
        mpState.replaying = false;
      }
      mpState.client.lastSeq = lastSeq;
      return lastSeq;
    }

        const c = this._ctx;
        this._gainNode = c.createGain();
        this._gainNode.gain.value = soundSettings.bgmVol * 0.15;
        this._gainNode.connect(c.destination);
        // Ambient medieval loop using oscillators
        const playNote = (freq, start, dur) => {
          const o = c.createOscillator(); const g = c.createGain();
          o.type = "sine"; o.frequency.value = freq;
          g.gain.setValueAtTime(0, c.currentTime + start);
          g.gain.linearRampToValueAtTime(0.08, c.currentTime + start + 0.3);
          g.gain.linearRampToValueAtTime(0, c.currentTime + start + dur);
          o.connect(g); g.connect(this._gainNode);
          o.start(c.currentTime + start); o.stop(c.currentTime + start + dur);
        };
        const melody = [262,294,330,349,392,349,330,294,262,247,220,247,262,294,330,392];
        const loop = () => {
          if (!this._playing) return;
          melody.forEach((f, i) => playNote(f, i * 1.2, 1.4));
          this._timer = setTimeout(loop, melody.length * 1200);
        };
        this._playing = true;
        loop();
        this.ensureUnlocked();
      },
      ensureUnlocked() {
        if (!soundSettings.bgm) return;
        if (!this._playing && this._desired) this.start();
        if (this._ctx && this._ctx.state === "suspended") this._ctx.resume().catch(()=>{});
      },
      stop() {
        this._desired = false;
        this._playing = false;
        clearTimeout(this._timer);
        if (this._ctx) { this._ctx.close().catch(()=>{}); this._ctx = null; }
        this._gainNode = null;
      },
      setVolume(v) {
        if (this._gainNode) this._gainNode.gain.value = v * 0.15;
