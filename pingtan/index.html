    function evaluateAITradeOffer(aiPlayer, offer = {}, want = {}) {
      const totalOffer = RESOURCES.reduce((s, r) => s + (Number(offer[r]) || 0), 0);
      const totalWant = RESOURCES.reduce((s, r) => s + (Number(want[r]) || 0), 0);
      const resourceWeight = (r) => {
        const have = Number(aiPlayer.resources?.[r] || 0);
        if (have <= 0) return 1.45;
        if (have <= 1) return 1.25;
        if (have >= 5) return 0.72;
        return 1;
      };
      const receiveValue = RESOURCES.reduce((s, r) => s + (Number(offer[r]) || 0) * resourceWeight(r), 0);
      const giveValue = RESOURCES.reduce((s, r) => s + (Number(want[r]) || 0) * (aiPlayer.resources?.[r] <= 1 ? 1.35 : 1), 0);
      const favorableScore = receiveValue - giveValue;
      const fairTradeAcceptChance = totalOffer === totalWant ? 0.72 : 0.55;
      const scarceLoss = RESOURCES.some(r => (Number(want[r]) || 0) > 0 && (aiPlayer.resources?.[r] || 0) <= 1 && totalOffer < totalWant + 1);
      if (totalOffer > totalWant || favorableScore >= 0.8) return { accept: true, fallbackAccept: true, favorableScore, dialogue: "좋아, 이건 받지!" };
      if (totalOffer === totalWant && !scarceLoss) return { accept: Math.random() < fairTradeAcceptChance, fallbackAccept: true, favorableScore, dialogue: "공정하네, 좋아." };
      if (favorableScore >= -0.35 && !scarceLoss) return { accept: Math.random() < 0.45, fallbackAccept: Math.random() < 0.35, favorableScore, dialogue: "음... 해볼게." };
      if (favorableScore < -1.2 || scarceLoss) return { accept: false, fallbackAccept: false, rejectHard: true, favorableScore, dialogue: "그건 좀 아까워." };
      return { accept: false, fallbackAccept: Math.random() < 0.2, favorableScore, dialogue: "조건이 애매해." };
    }

    async function proposeTradeToAI() {
      if (!state.tradeDialog.open) return;
      const humanIdx = localPlayerIndex();
      const human = state.players[humanIdx];
      const td = state.tradeDialog;
      const offer = td.offer || {};
      const want = td.want || {};
      const totalOffer = RESOURCES.reduce((s, r) => s + (offer[r] || 0), 0);
      const totalWant = RESOURCES.reduce((s, r) => s + (want[r] || 0), 0);
      if (totalOffer <= 0 || totalWant <= 0) return;

      closeTradeDialog();
      render();

      const offerStr = RESOURCES.filter(r => offer[r] > 0).map(r => `${RESOURCE_ICONS[r]}${RESOURCE_NAMES[r]}×${offer[r]}`).join(" ");
      const wantStr = RESOURCES.filter(r => want[r] > 0).map(r => `${RESOURCE_ICONS[r]}${RESOURCE_NAMES[r]}×${want[r]}`).join(" ");
      showToast(pt("tradeOfferToast", { offer: offerStr, want: wantStr }), 2000);

      // Ask all AI players in parallel
      const aiPlayers = state.players.map((p, i) => ({ p, i })).filter(x => x.i !== humanIdx && totalResourceCount(x.p) > 0);
      const eligible = aiPlayers.filter(x => RESOURCES.every(r => (x.p.resources[r] || 0) >= (want[r] || 0)));
      
      if (!eligible.length) {
        showToast(pt("noTradeableAI"), 2000);
        render();
        maybeAutoEndTurn();
        return;
      }

      showToast(pt("tradeProposalSending"), 2000);

      // Parallel AI decisions. Local heuristic prevents LLM role confusion and makes fair trades feel alive.
      const results = await Promise.allSettled(eligible.map(async (target) => {
        const tp = target.p;
        const heuristic = evaluateAITradeOffer(tp, offer, want);
        if (heuristic.accept) return { target, accept: true, dialogue: heuristic.dialogue };
        if (heuristic.rejectHard) return { target, accept: false, dialogue: heuristic.dialogue };
        const stateStr = `삥탄 게임. 당신은 "${tp.name}".
당신 자원: 벽돌${tp.resources.brick} 나무${tp.resources.lumber} 양${tp.resources.wool} 밀${tp.resources.grain} 광석${tp.resources.ore} (VP:${tp.vp})
상대 "${human.name}"(VP:${human.vp})의 거래 제안:
상대가 줄 것 = 당신이 받는 자원: ${offerStr}
상대가 받을 것 = 당신이 내는 자원: ${wantStr}
원칙: 공정한 1:1 거래는 웬만하면 수락. 내가 받는 수량이 더 많거나 부족한 자원을 받으면 적극 수락. 단, 내가 거의 없는 자원을 많이 뺏기면 거절.
수락? JSON: {"accept":true/false,"dialogue":"한마디(한국어20자)"}`;
        const res = await fetch("https://llm.cocy.io/v2/chat/completions", {

      }));

        }
      }
      if (!traded) {

      }

    function normalizeAITradeResources(obj = {}) {
      const RES_MAP = { "벽돌":"brick","나무":"lumber","양모":"wool","양":"wool","밀":"grain","곡물":"grain","광석":"ore",
        "Brick":"brick","Lumber":"lumber","Wool":"wool","Grain":"grain","Ore":"ore",
        "brick":"brick","lumber":"lumber","wool":"wool","grain":"grain","ore":"ore" };
      const out = {};
      for (const [k, v] of Object.entries(obj || {})) {
        const nk = RES_MAP[k] || String(k).toLowerCase();
        const n = Math.max(0, Math.floor(Number(v) || 0));
        if (RESOURCES.includes(nk) && n > 0) out[nk] = (out[nk] || 0) + n;
      }
      return out;
    }

    function isNonEmptyResourceBundle(bundle = {}) {
      return RESOURCES.some(r => Number(bundle[r] || 0) > 0);
    }

    function canPlayerPayBundle(player, bundle = {}) {
      return RESOURCES.every(r => Number(player?.resources?.[r] || 0) >= Number(bundle[r] || 0));
    }

    function bestHumanTradeTargetForAI(aiIdx) {
      return state.players
        .map((p, i) => ({ p, i }))
        .filter(x => x.i !== aiIdx && !x.p?.isAI && totalResourceCount(x.p) > 0)
        .sort((a, b) => (b.p.vp || 0) - (a.p.vp || 0) || totalResourceCount(b.p) - totalResourceCount(a.p))[0] || null;
    }

    function showTradeProposal(playerName, giveStr, wantStr, dialogue, myResStr = "", canAccept = true, dismissBox = null, tradeMeta = null) {
      return new Promise(resolve => {
        const overlay = document.createElement("div");
        overlay.style.cssText = "position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);animation:big-overlay-in 0.3s ease-out;";

        let resourceBlock = "";
        if (tradeMeta && tradeMeta.resources) {
          const want = tradeMeta.want || {};
          const offer = tradeMeta.offer || {};
          const cells = RESOURCES.map(r => {
            const have = Number(tradeMeta.resources[r] || 0);
            const give = Number(want[r] || 0);
            const get = Number(offer[r] || 0);
            const after = have - give + get;
            const insufficient = give > have;
            const cellBg = insufficient
              ? "rgba(239,68,68,0.18)"
              : (give > 0 ? "rgba(239,68,68,0.08)" : (get > 0 ? "rgba(78,204,163,0.12)" : "rgba(255,255,255,0.04)"));
            const haveColor = insufficient ? "#ef4444" : "#fff";
            let deltaLine = "";
            if (give > 0) deltaLine = `<div style="font-size:10px;color:#ef4444;font-weight:700;">−${give}</div>`;
            else if (get > 0) deltaLine = `<div style="font-size:10px;color:#4ecca3;font-weight:700;">+${get}</div>`;
            const afterLine = (give > 0 || get > 0)
              ? `<div style="font-size:10px;color:${insufficient ? "#ef4444" : "#9ca3af"};">→ ${after}</div>`
              : `<div style="font-size:10px;color:transparent;">→</div>`;
            return `<div style="flex:1;background:${cellBg};border-radius:6px;padding:6px 2px;text-align:center;min-width:0;">
              <div style="font-size:16px;line-height:1;">${RESOURCE_ICONS[r]}</div>
              <div style="font-size:10px;color:#9ca3af;margin-top:2px;">${resourceName(r)}</div>
              <div style="font-size:16px;font-weight:800;color:${haveColor};margin-top:2px;">${have}</div>
              ${deltaLine || `<div style="font-size:10px;color:transparent;">·</div>`}
              ${afterLine}
            </div>`;
          }).join("");
          resourceBlock = `<div style="margin-bottom:10px;">
            <div style="font-size:10px;color:#9ca3af;margin-bottom:4px;text-align:left;">${pt("onAcceptDelta")}</div>
            <div style="display:flex;gap:3px;">${cells}</div>
          </div>`;
        } else if (myResStr) {
          resourceBlock = `<div style="font-size:11px;color:#9ca3af;margin-bottom:10px;padding:4px 8px;background:rgba(255,255,255,0.05);border-radius:6px;">${pt("myResources", { resources: myResStr })}</div>`;
        }

        overlay.innerHTML = `
          <div style="background:#16213e;border:2px solid #4ecca3;border-radius:16px;padding:20px;max-width:380px;width:92%;text-align:center;">
            <div style="font-size:14px;color:#9ca3af;margin-bottom:6px;">💱 ${pt("tradeProposal")}</div>
            <div style="font-size:18px;font-weight:700;margin-bottom:12px;">${playerName}</div>
            <div style="display:flex;justify-content:center;gap:16px;margin-bottom:12px;">
              <div style="text-align:center;">
                <div style="font-size:11px;color:#9ca3af;margin-bottom:4px;">${pt("tradeGive")}</div>
                <div style="font-size:16px;font-weight:600;">${giveStr}</div>
              </div>
              <div style="font-size:24px;color:#4ecca3;">⇄</div>
              <div style="text-align:center;">
                <div style="font-size:11px;color:#9ca3af;margin-bottom:4px;">${pt("tradeWant")}</div>
                <div style="font-size:16px;font-weight:600;">${wantStr}</div>
              </div>
            </div>
            ${dialogue ? `<div style="font-size:13px;color:#ffd700;margin-bottom:8px;font-style:italic;">"${dialogue}"</div>` : ""}
            ${resourceBlock}
            ${!canAccept ? `<div style="font-size:11px;color:#ef4444;margin-bottom:8px;">⚠️ ${pt("insufficientResources")}</div>` : ""}
            <div style="display:flex;gap:8px;">
              <button id="tradeRejectBtn" style="flex:1;padding:10px;border-radius:10px;border:1px solid #ef4444;background:rgba(239,68,68,0.15);color:#ef4444;font-weight:700;cursor:pointer;font-size:14px;">❌ ${pt("reject")}</button>
              ${canAccept ? `<button id="tradeAcceptBtn" style="flex:1;padding:10px;border-radius:10px;border:none;background:#4ecca3;color:#000;font-weight:700;cursor:pointer;font-size:14px;">✅ ${pt("accept")}</button>` : ""}
            </div>
          </div>`;
        document.body.appendChild(overlay);
        let settled = false;
        const finish = (val) => {
          if (settled) return;
          settled = true;
          if (overlay.parentNode) overlay.remove();
          resolve(val);
        };
        const acceptBtn = overlay.querySelector("#tradeAcceptBtn");
        if (acceptBtn) acceptBtn.onclick = () => finish(true);
        overlay.querySelector("#tradeRejectBtn").onclick = () => finish(false);
        if (dismissBox) {
          dismissBox.dismiss = () => finish(false);
        }
      });
    }

    async function enterGameFullscreen() {
      try {
        const el = document.documentElement;
        if (el.requestFullscreen) await el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape').catch(() => {});
        }
      } catch (e) {}
    }
    async function exitGameFullscreen() {
      try {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          if (document.exitFullscreen) await document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      } catch (e) {}
    }

    function syncFullscreenLayoutClass() {
      const fsEl = document.fullscreenElement || document.webkitFullscreenElement;
      const landscape = window.innerWidth > window.innerHeight;
      const active = !!fsEl && landscape;
      document.documentElement.classList.toggle("pingtan-landscape-fullscreen", active);
      document.body.classList.toggle("pingtan-landscape-fullscreen", active);
    }

    function toggleFullscreen() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        exitGameFullscreen();
      } else {
        enterGameFullscreen();
      }
      setTimeout(() => { syncFullscreenLayoutClass(); render(); }, 150);
    }
    window.toggleFullscreen = toggleFullscreen;

    document.addEventListener('fullscreenchange', () => { syncFullscreenLayoutClass(); render(); });
    document.addEventListener('webkitfullscreenchange', () => { syncFullscreenLayoutClass(); render(); });

    window.addEventListener('resize', () => {
      syncFullscreenLayoutClass();
      const isLandscape = window.innerWidth > window.innerHeight;
      if (isLandscape !== state.mapView._wasLandscape) {
        state.mapView._wasLandscape = isLandscape;
        state.mapView.zoomTouched = false;
        state.mapView.userMoved = false;
        applyResponsiveDefaults(true);
        state.mapView.initialized = false;
        render();
        requestAnimationFrame(() => centerMapViewport(true));
      } else if (!state.mapView.userMoved) {
        applyResponsiveDefaults(false);
        state.mapView.initialized = false;
        centerMapViewport(true);
      }
    });

    function updateTurnBanner() {
      let banner = document.getElementById("turn-banner");
      if (!banner) {
        banner = document.createElement("div");
        banner.id = "turn-banner";
        document.body.prepend(banner);
      }
      if (state.screen !== "game" && state.screen !== undefined) {
        banner.style.display = "none";
        return;
      }
      banner.style.display = "grid";
      const cp = state.players[state.currentPlayer] || {};
      const color = cp.color || "#fff";
      const isMyTurn = state.currentPlayer === localPlayerIndex();
      const isWaiting = !isMyTurn;
      // Action text
      let action = state.hint || "";
      if (isMyTurn) {
        if (state.phase === "roll") action = "🎲 주사위를 굴리세요";
        else if (state.phase === "robber" || state.phase === "knight-robber") action = "🦹 강도를 이동하세요";
        else if (state.phase === "main") action = state.buildMode ? `🏗️ ${state.buildMode} 위치를 선택하세요` : "🔨 건설하거나 턴 종료";
        else if (state.phase === "setup1" || state.phase === "setup2") action = state.setupStep === "settlement" ? "🏠 마을을 놓으세요" : "🛤️ 도로를 놓으세요";
      } else {
        action = isMultiMode() ? `⏳ ${cp.name}의 차례...` : `🤔 AI 생각 중...`;
      }
      banner.classList.toggle("ai-thinking", isWaiting && !state.winner);

      const myIdx = localPlayerIndex();
      const vpChips = state.players.map((p, i) => {
        const active = i === state.currentPlayer;
        const rl = longestRoadLength(i);
        const lr = getLongestRoadBadge(state.longestRoad === i);
        const la = state.largestArmy === i ? "⚔" : "";
        const label = i === myIdx ? "나" : p.name;
        const shownVp = publicVPForPlayer(i, myIdx);
        return `<span class="vp-chip${active ? " active" : ""}" style="color:${p.color};"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color};"></span>${label} ${shownVp}${lr}${la}</span>`;
      }).join("");

      const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      banner.innerHTML = `
        <div style="display:flex;gap:3px;flex-shrink:0;">
          <button onclick="zoomOutMap()" style="width:28px;height:28px;padding:0;font-size:16px;line-height:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;cursor:pointer;">−</button>
          <button onclick="zoomInMap()" style="width:28px;height:28px;padding:0;font-size:16px;line-height:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;cursor:pointer;">+</button>
          <button onclick="toggleFullscreen()" style="width:28px;height:28px;padding:0;font-size:14px;line-height:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;cursor:pointer;">${isFs ? "⊡" : "⛶"}</button>
        </div>
        <div class="banner-turn-line"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};box-shadow:0 0 6px ${color};margin-right:5px;"></span>${escapeHtml(cp.name || "플레이어")} 차례 · 단계: ${escapeHtml(state.phase || "-")}</div>
        <div class="banner-vps">${vpChips}<span class="vp-chip" onclick="toggleSoundPanel()" style="cursor:pointer;">⚙️</span></div>
        <span class="banner-action">${escapeHtml(action)}</span>
      `;
    }

    function costLabel(cost, playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return "";
      const ICONS = { brick: "🧱", lumber: "🪵", wool: "🐑", grain: "🌾", ore: "⛏️" };
      const parts = Object.entries(cost).map(([r, n]) => {
        const have = p.resources[r] || 0;
        return have >= n ? `${ICONS[r]}${n}` : `<span style="color:#e95b5b">${ICONS[r]}${n}</span>`;
      });
      return `<span class="cost-hint">${parts.join(" ")}</span>`;
    }

    function humanTryBuild(type) {
      const idx = localPlayerIndex();
      const p = state.players[idx];
      if (!p) return;
      if (!isHumanTurn() || state.phase !== "main" || state.winner) return;
      const ICONS = { brick: "🧱", lumber: "🪵", wool: "🐑", grain: "🌾", ore: "⛏️" };
      const cost = COST[type];
      const missing = Object.entries(cost)
        .filter(([r, n]) => (p.resources[r] || 0) < n)
        .map(([r, n]) => `${ICONS[r]}×${n - (p.resources[r] || 0)}`);
      if (missing.length) {
        showToast(pt("resourceMissingToast", { item: type === "road" ? pt("road") : type === "settlement" ? pt("settlement") : type === "city" ? pt("city") : pt("devCard"), missing: missing.join(" ") }));
      }
    }
    window.humanTryBuild = humanTryBuild;

    (async function boot() {
      if (window.SharedWallet) {
        try { await SharedWallet.init(); } catch (_) {}
      }
      applyResponsiveDefaults(true);
      setSinglePlayers();
      ensureTurnTimer();
      const inviteRoomCode = inviteRoomCodeFromUrl();
      if (inviteRoomCode) {
        if (window.location.hash && !new URLSearchParams(window.location.search).get("room")) {
          window.history.replaceState({}, "", `${window.location.pathname}?room=${encodeURIComponent(inviteRoomCode)}`);
        }
        showMultiOptions();
        return;
      }
      if (await restorepingtanMultiplayerSession()) return;
      render();
    })();
  </script>

    <script src="/lib/site-meta.js"></script>

      SiteMeta.init({
        title: '삥탄 - game.cocy.io',

        url: 'https://game.cocy.io/pingtan/'
      });
    </script>
</body>
