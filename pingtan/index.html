    function getLongestRoadBadge(isOwner) {
      return isOwner ? "🛣️" : "";
    }

    function handleSeven() {
      SFX.robber();
      showToast(pt("robberToast"), 1600, { bottom: 150 });
      showBigOverlay("🦹", pt("robberAppeared"), "robber-alert", 1200);
      Voice.human("seven");
      const hasSeaTiles = state.hexes.some(h => h && h.type === "sea");
      state.phase = hasSeaTiles ? "robber-or-pirate" : "robber";
      state.canEndTurn = false;
      state.hint = hasSeaTiles ? pt("pirateSevenHint") : pt("robberSevenHint");
    }

    function humanChooseRobber() {
      if (state.phase !== "robber-or-pirate") return;
      state.phase = "robber";
      state.hint = pt("robberSevenHint");
      render();
    }

    function humanChoosePirate() {
      if (state.phase !== "robber-or-pirate") return;
      state.phase = "pirate";
      state.hint = pt("pirateMove") + " — 바다 타일을 클릭하세요.";
      render();
    }

    function pickRandomDiscards(playerIdx, count) {
      const removed = emptyResources();
      const p = state.players[playerIdx];
      let n = count;
      while (n > 0) {
        const bag = RESOURCES.filter(r => p.resources[r] > 0);
        if (!bag.length) break;
        const picked = bag[Math.floor(Math.random() * bag.length)];
        p.resources[picked] -= 1;
        removed[picked] += 1;
        n -= 1;
      }
      return removed;
    }

    function pickDiscardSelection(playerIdx, count) {
      return new Promise(resolve => {
        const p = state.players[playerIdx];
        const picked = emptyResources();
        const initialTotal = totalResourceCount(p);
        const overlay = document.createElement("div");
        overlay.style.cssText = "position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);";
        const draw = () => {
          const pickedCount = RESOURCES.reduce((s, r) => s + picked[r], 0);
          const remaining = count - pickedCount;
          const canConfirm = pickedCount === count;
          overlay.innerHTML = `
            <div style="background:#16213e;border:2px solid #b33838;border-radius:16px;padding:20px;max-width:380px;width:92%;text-align:center;color:#fff;">
              <div style="font-size:18px;font-weight:700;margin-bottom:6px;">🦹 ${pt("robberAppeared")}</div>
              <div style="font-size:13px;color:#fbbf24;margin-bottom:4px;">${pt("discardCardsPrompt", { count })}</div>
              <div style="font-size:11px;color:#9ca3af;margin-bottom:14px;">${pt("remainingPick", { remaining, total: initialTotal })}</div>
              <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px;">
                ${RESOURCES.map(r => {
                  const have = p.resources[r];
                  const sel = picked[r];
                  const left = have - sel;
                  const decDis = sel <= 0;
                  const incDis = left <= 0 || pickedCount >= count;
                  return `
                    <div style="display:flex;align-items:center;gap:8px;padding:8px;background:rgba(255,255,255,0.04);border-radius:8px;">
                      <div style="font-size:18px;width:30px;">${RESOURCE_ICONS[r]}</div>
                      <div style="flex:1;text-align:left;font-size:12px;">${resourceName(r)}<div style="font-size:10px;color:#9ca3af;">${pt("leftCards", { left, total: have })}</div></div>
                      <button data-act="dec" data-res="${r}" ${decDis ? "disabled" : ""} style="width:32px;height:32px;border-radius:8px;border:1px solid #444;background:${decDis ? "#222" : "#3a1212"};color:#fff;font-size:16px;cursor:${decDis ? "not-allowed" : "pointer"};">−</button>
                      <div style="min-width:24px;font-size:14px;font-weight:700;color:#fca5a5;">${sel}</div>
                      <button data-act="inc" data-res="${r}" ${incDis ? "disabled" : ""} style="width:32px;height:32px;border-radius:8px;border:1px solid #444;background:${incDis ? "#222" : "#3a1212"};color:#fff;font-size:16px;cursor:${incDis ? "not-allowed" : "pointer"};">+</button>
                    </div>`;
                }).join("")}
              </div>
              <button data-act="confirm" ${canConfirm ? "" : "disabled"} style="padding:10px 20px;border-radius:10px;border:1px solid ${canConfirm ? "#ffd700" : "#444"};background:${canConfirm ? "#b33838" : "#222"};color:#fff;font-weight:700;cursor:${canConfirm ? "pointer" : "not-allowed"};font-size:14px;">${canConfirm ? pt("confirmDiscard") : pt("needMoreCards", { remaining })}</button>
            </div>`;
        };
        overlay.addEventListener("click", e => {
          const btn = e.target.closest("button[data-act]");
          if (!btn || btn.disabled) return;
          const act = btn.dataset.act;
          if (act === "confirm") {
            const total = RESOURCES.reduce((s, r) => s + picked[r], 0);
            if (total !== count) return;
            overlay.remove();
            resolve(picked);
            return;
          }
          const r = btn.dataset.res;
          if (!r) return;
          const totalPicked = RESOURCES.reduce((s, x) => s + picked[x], 0);
          if (act === "inc") {
            const left = p.resources[r] - picked[r];
            if (left <= 0 || totalPicked >= count) return;
            picked[r] += 1;
          } else if (act === "dec") {
            if (picked[r] <= 0) return;
            picked[r] -= 1;
          }
          draw();
        });
        draw();
        document.body.appendChild(overlay);
        const autoTimer = setInterval(() => {
          if (state.turnTimeLeft > 0) return;
          clearInterval(autoTimer);
          overlay.remove();
          const pickedCount = RESOURCES.reduce((s, r) => s + picked[r], 0);
          const needed = count - pickedCount;
          if (needed > 0) {
            const p = state.players[playerIdx];
            const temp = {};
            for (const r of RESOURCES) temp[r] = p.resources[r] - picked[r];
            let n = needed;
            while (n > 0) {
              const bag = RESOURCES.filter(r => temp[r] > 0);
              if (!bag.length) break;
              const res = bag[Math.floor(Math.random() * bag.length)];
              temp[res] -= 1;
              picked[res] += 1;
              n -= 1;
            }
          }
          resolve(picked);
        }, 300);
      });
    }

    async function postDicePromptDiscards(diceSum) {
      if (diceSum !== 7) return;
      const handlesAI = !isMultiMode() || mpState.isHost;
      if (handlesAI) {
        for (let i = 0; i < state.players.length; i += 1) {
          const pl = state.players[i];
          if (!pl || !pl.isAI) continue;
          const total = totalResourceCount(pl);
          const _threshold = getRobberDiscardThreshold();
          if (total <= _threshold) continue;
          const discardCount = Math.floor(total / 2);
          const removed = pickRandomDiscards(i, discardCount);
          for (const r of RESOURCES) pl.resources[r] += removed[r];
          if (isMultiMode()) {
            await sendGameAction(ACTION.DISCARD_RESOURCES, {
              playerId: pl.userId || pl.id,
              resources: removed
            });
          } else {
            applyDiscardResources(i, removed);
          }
        }
      }
      const myIdx = localPlayerIndex();
      if (myIdx < 0) return;
      const me = state.players[myIdx];
      if (!me || me.isAI) return;
      const total = totalResourceCount(me);
      const _discardThreshold = getRobberDiscardThreshold();
      if (total <= _discardThreshold) return;
      const discard = Math.floor(total / 2);
      const removed = await pickDiscardSelection(myIdx, discard);
      if (isMultiMode()) {
        await sendGameAction(ACTION.DISCARD_RESOURCES, {
          playerId: me.userId || me.id,
          resources: removed
        });
      } else {
        applyDiscardResources(myIdx, removed);
      }
      render();
    }

    function getBestTradeRatio(playerIdx, resourceType) {
      let best = 4;
      for (const port of (state.ports || [])) {
        const hasPort = port.vertices.some(vIdx => {
          const v = state.vertices[vIdx];
          return v && v.owner === playerIdx;
        });
        if (!hasPort) continue;
        if (port.type === "generic" && port.ratio < best) best = port.ratio;
        if (port.type === resourceType && port.ratio < best) best = port.ratio;
      }
      // merchantFleet: 모든 자원 2:1
      if (state.merchantFleetPlayerIdx === playerIdx) best = Math.min(best, 2);
      return best;
    }

    function applyPortTrade(playerIdx, give, get) {
      const p = state.players[playerIdx];
      if (!p || give === get || !RESOURCES.includes(give) || !RESOURCES.includes(get)) return false;
      const ratio = getBestTradeRatio(playerIdx, give);
      if ((p.resources[give] || 0) < ratio) return false;
      p.resources[give] -= ratio;
      p.resources[get] += 1;
      return true;
    }

    function canHumanTrade(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return false;
      return RESOURCES.some(r => (p.resources[r] || 0) >= getBestTradeRatio(playerIdx, r));
    }

    function closeTradeDialog() {
      state.tradeDialog = { open: false, give: null, get: null };
    }

    function dismissActiveTradeProposals(reason = "dismiss") {
      if (!mpState.activeTradeProposals) return;
      for (const box of mpState.activeTradeProposals.values()) {
        if (box?.dismiss) box.dismiss(reason);
      }
      mpState.activeTradeProposals.clear();
    }

    function canPlayersExecuteTrade(proposer, accepter, offer = {}, want = {}) {
      return RESOURCES.every(r =>
        Number(proposer?.resources?.[r] || 0) >= Number(offer[r] || 0) &&
        Number(accepter?.resources?.[r] || 0) >= Number(want[r] || 0)
      );
    }

    function applyTradeSwap(proposer, accepter, offer = {}, want = {}) {
      if (!canPlayersExecuteTrade(proposer, accepter, offer, want)) return false;
      for (const r of RESOURCES) {
        const offerN = Number(offer[r] || 0);
        const wantN = Number(want[r] || 0);
        if (offerN > 0) { proposer.resources[r] -= offerN; accepter.resources[r] += offerN; }
        if (wantN > 0) { accepter.resources[r] -= wantN; proposer.resources[r] += wantN; }
      }
      return true;
    }

    function openTradeDialog(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return false;
      const giveOptions = RESOURCES.filter(r => (p.resources[r] || 0) >= getBestTradeRatio(playerIdx, r));
      if (!giveOptions.length) return false;
      const give = giveOptions[0];
      const get = RESOURCES.find(r => r !== give) || RESOURCES[0];
      state.tradeDialog = { open: true, give, get };
      return true;
    }

    function tradeAdjust(type, resource, delta) {
      if (!state.tradeDialog.open) return;
      const td = state.tradeDialog;
      if (!td.offer) td.offer = Object.fromEntries(RESOURCES.map(r => [r, 0]));
      if (!td.want) td.want = Object.fromEntries(RESOURCES.map(r => [r, 0]));
      const counts = type === "offer" ? td.offer : td.want;
      const newVal = (counts[resource] || 0) + delta;
      if (type === "offer") {
        const max = state.players[localPlayerIndex()]?.resources[resource] || 0;
        counts[resource] = Math.max(0, Math.min(max, newVal));
      } else {
        counts[resource] = Math.max(0, newVal);
      }
      render();
    }

    function confirmBankTrade() {
      if (!state.tradeDialog.open) return;
      const pIdx = localPlayerIndex();
      const p = state.players[pIdx];
      const td = state.tradeDialog;
      const offer = td.offer || {};
      const want = td.want || {};
      
      // Calculate how many trades we can do
      const totalWant = RESOURCES.reduce((s, r) => s + (want[r] || 0), 0);
      if (totalWant <= 0) { state.hint = pt("chooseWantedResource"); render(); return; }
      
      // Try to fulfill each wanted resource
      let traded = 0;
      const tempRes = { ...p.resources };
      const offerRemaining = { ...offer }; // track how much of the offer is still usable
      const giveLog = [];
      const getLog = [];

      for (const getRes of RESOURCES) {
        let needed = want[getRes] || 0;
        while (needed > 0) {
          // Only use resources the user explicitly offered in the dialog
          const giveRes = RESOURCES.find(r => {
            if (r === getRes) return false;
            if (!(offerRemaining[r] > 0)) return false; // must be in the offer
            const ratio = getBestTradeRatio(pIdx, r);
            return tempRes[r] >= ratio && offerRemaining[r] >= ratio;
          });
          if (!giveRes) break;
          const ratio = getBestTradeRatio(pIdx, giveRes);
          tempRes[giveRes] -= ratio;
          offerRemaining[giveRes] -= ratio;
          tempRes[getRes] += 1;
          giveLog.push(`${RESOURCE_ICONS[giveRes]}×${ratio}`);
          getLog.push(`${RESOURCE_ICONS[getRes]}`);
          needed--;
          traded++;
        }
      }
      
      if (traded === 0) {
        state.hint = pt("bankTradeUnavailable");
        render();
        return;
      }
      
      // Apply
      for (const r of RESOURCES) p.resources[r] = tempRes[r];
      state.canEndTurn = true;
      state.hint = pt("bankTradeHint", { give: giveLog.join("+"), get: getLog.join("+") });
      addActivityLog("trade", `${p.name || "플레이어"} 은행 거래 완료: ${giveLog.join("+")} → ${getLog.join("+")}`);
      Voice.human("trade-bank");
      SFX.build();
      closeTradeDialog();
      render();
    }

    function humanTrade() {
      const me = state.players[localPlayerIndex()];
      if (!me) return;
      if (!isHumanTurn() || state.phase !== "main" || state.winner) return;
      const pIdx = localPlayerIndex();
      // 은행 거래 가능하면 거래 모달, 아니면 AI 거래용 간단 모달
      if (!openTradeDialog(pIdx)) {
        // 은행 거래 불가해도 AI 거래용으로 모달 열기
        const give = RESOURCES.find(r => (me.resources[r] || 0) >= 1);
        if (!give) { state.hint = pt("noResources"); render(); return; }
        const get = RESOURCES.find(r => r !== give) || give;
        state.tradeDialog = { open: true, give, get, aiOnly: true };
      }
      render();
    }

    function buyDevCard(playerIdx, free = false) {
      const p = state.players[playerIdx];
      if (!p || !state.devDeck.length) return false;
      if (!free && !canAfford(p, COST.devCard)) return false;
      if (!free) spend(p, COST.devCard);
      const cardType = state.devDeck.pop();
      p.devCards.push({ type: cardType, turnBought: state.turnNumber });
      recalcAllVP();
      return true;
    }

    function hasPlayableKnight(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return false;
      return (p.devCards || []).some(c => c.type === "knight" && c.turnBought < state.turnNumber && !c.played);
    }

    function hasPlayableMonopoly(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return false;
      return (p.devCards || []).some(c => c.type === "monopoly" && c.turnBought < state.turnNumber && !c.played);
    }

    function playMonopoly(playerIdx, resource) {
      const p = state.players[playerIdx];
      if (!p || !RESOURCES.includes(resource)) return { ok: false, gained: 0 };
      const card = (p.devCards || []).find(c => c.type === "monopoly" && c.turnBought < state.turnNumber && !c.played);
      if (!card) return { ok: false, gained: 0 };
      card.played = true;
      let gained = 0;
      for (let i = 0; i < state.players.length; i += 1) {
        if (i === playerIdx) continue;
        const amount = state.players[i].resources[resource] || 0;
        if (amount > 0) {
          state.players[i].resources[resource] = 0;
          p.resources[resource] += amount;
          gained += amount;
        }
      }
      recalcAllVP();
      return { ok: true, gained };
    }

    function myResourceSnapshotHtml(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return "";
      return `<div style="margin:10px 0;padding:8px;border-radius:10px;background:rgba(255,255,255,0.06);font-size:11px;color:#cbd5e1;">
        <div style="font-weight:800;color:#fff;margin-bottom:5px;">${pt("myResourceSnapshot")}</div>
        <div style="display:flex;gap:5px;justify-content:center;flex-wrap:wrap;">${RESOURCES.map(r => `<span>${RESOURCE_ICONS[r]} ${p.resources[r] || 0}</span>`).join("")}</div>
      </div>`;
    }

    function resourceDeckStatusHtml(resource, playerIdx = localPlayerIndex()) {
      const owned = state.players[playerIdx]?.resources?.[resource] || 0;
      const others = state.players.reduce((sum, p, i) => i === playerIdx ? sum : sum + (p.resources?.[resource] || 0), 0);
      const bank = bankRemaining(resource);
      return `<div style="font-size:10px;color:#9ca3af;margin-top:3px;">${pt("ownBankOpponents", { own: owned, bank, opponents: others })}</div>`;
    }

    function monopolyGainPreview(resource, playerIdx = localPlayerIndex()) {
      return state.players.reduce((sum, p, i) => i === playerIdx ? sum : sum + (p.resources?.[resource] || 0), 0);
    }

    function playKnight(playerIdx, hexIndex, victimIdx) {
      const p = state.players[playerIdx];
      const card = (p.devCards || []).find(c => c.type === "knight" && c.turnBought < state.turnNumber && !c.played);
      if (!card) return false;
      card.played = true;
      p.knights += 1;
      // Largest army: 3+ knights, most knights (tie keeps current holder)
      const knights = state.players.map(pl => pl.knights);
      const maxKnights = Math.max(...knights);
      if (maxKnights < 3) {
        state.largestArmy = null;
      } else {
        const leaders = knights.map((v, i) => ({ v, i })).filter(x => x.v === maxKnights);
        if (leaders.length === 1) {
          state.largestArmy = leaders[0].i;
        } else if (!(state.largestArmy !== null && leaders.some(x => x.i === state.largestArmy))) {
          state.largestArmy = null;
        }
      }
      const result = moveRobber(hexIndex, victimIdx);
      recalcAllVP();
      return result;
    }

    function applyDiscardResources(playerIdx, resources) {
      const p = state.players[playerIdx];
      let discarded = 0;
      for (const r of RESOURCES) {
        const amount = Math.max(0, Number(resources?.[r] || 0));
        if (amount > 0) discarded += amount;
        p.resources[r] = Math.max(0, p.resources[r] - amount);
      }
      if (discarded > 0) addActivityLog("robber", `${p.name || "플레이어"}가 은행에게 삥을 뜯겼습니다 (${discarded}장)`);
    }

    function stealFromVictim(thiefIdx, victimIdx, forcedResource = null) {
      if (victimIdx === null || victimIdx === undefined || victimIdx < 0) return null;
      const victim = state.players[victimIdx];
      if (!victim || totalResourceCount(victim) <= 0) return null;
      let picked = forcedResource;
      if (!picked) {
        const bag = RESOURCES.filter(r => victim.resources[r] > 0);
        if (!bag.length) return null;
        picked = bag[Math.floor(Math.random() * bag.length)];
      }
      if (!RESOURCES.includes(picked) || victim.resources[picked] <= 0) return null;
      victim.resources[picked] -= 1;
      state.players[thiefIdx].resources[picked] += 1;
      return picked;
    }

    function moveRobber(hexIndex, forcedVictim = null, forcedResource = null) {
      if (state.phase !== "robber" && state.phase !== "knight-robber") return { ok: false };
      if (hexIndex < 0 || hexIndex >= state.hexes.length || hexIndex === state.robber) return { ok: false };
      if (state.robber >= 0 && state.hexes[state.robber]) state.hexes[state.robber].robber = false;
      state.robber = hexIndex;
      if (state.hexes[state.robber]) state.hexes[state.robber].robber = true;
      let victimIdx = playerIndexFromAnyId(forcedVictim);
      if (victimIdx === -1) {
        const victims = new Set();
        for (const vIdx of state.hexes[hexIndex].vertices) {
          const owner = state.vertices[vIdx].owner;
          if (owner !== null && owner !== state.currentPlayer && totalResourceCount(state.players[owner]) > 0) victims.add(owner);
        }
        const list = [...victims];
        victimIdx = list.length ? list[Math.floor(Math.random() * list.length)] : -1;
      }
      const picked = stealFromVictim(state.currentPlayer, victimIdx, forcedResource);
      const actorName = state.players[state.currentPlayer]?.name || "플레이어";
      const victimName = victimIdx !== -1 ? state.players[victimIdx]?.name || "상대" : "";
      const source = state.phase === "knight-robber" ? "병사" : "도둑";
      const hexLabel = getHexLabel(hexIndex);
      const detailMessage = formatRobberMoveMessage({ actorName, source, hexLabel, victimName, stolenResource: picked });
      if (picked && victimName) addActivityLog("robber", `${victimName}가 ${actorName}에게 ${formatStealResourceText(picked)}를 삥뜯겼습니다.`);
      showToast(`🦹 ${detailMessage}`, 2600, { bottom: 150 });
      if (picked && (victimIdx === localPlayerIndex() || state.currentPlayer === localPlayerIndex())) {
        const isVictim = victimIdx === localPlayerIndex();
        const targetName = isVictim ? actorName : victimName;
        const message = isVictim
          ? `${targetName}에게<br>${formatStealResourceText(picked)}를 삥뜯겼다!`
          : `${targetName}에게<br>${formatStealResourceText(picked)}를 삥뜯었다!`;
        const el = document.createElement("div");
        el.style.cssText = "position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;pointer-events:none;animation:big-overlay-in 0.3s ease-out;";
        const panelStyle = isVictim
          ? "background:rgba(180,0,0,0.92);border:3px solid #ff4444;box-shadow:0 0 40px rgba(255,0,0,0.5);"
          : "background:rgba(0,130,80,0.92);border:3px solid #4ecca3;box-shadow:0 0 40px rgba(78,204,163,0.5);";
        el.innerHTML = `<div style="${panelStyle}border-radius:20px;padding:20px 32px;text-align:center;">
          <div style="font-size:38px;margin-bottom:4px;">🦹</div>
          <div style="font-size:20px;font-weight:900;color:#fff;text-shadow:0 2px 8px #000;">${message}</div>
        </div>`;
        document.body.appendChild(el);
        setTimeout(() => { el.style.animation = "big-overlay-out 0.3s ease-in forwards"; setTimeout(() => el.remove(), 300); }, 2000);
      }
      state.phase = "main";
      state.canEndTurn = true;
      state.hint = detailMessage;
      return {
        ok: true,
        victimId: victimIdx === -1 ? null : (state.players[victimIdx].userId || state.players[victimIdx].id),
        stolenResource: picked || null
      };
    }

    function applyRollDice(playerIdx, values, skipDiscard = false) {
      if (state.winner || state.phase !== "roll" || playerIdx !== state.currentPlayer) return false;
      const d1 = Number(values?.[0]);
      const d2 = Number(values?.[1]);
      if (!d1 || !d2) return false;
      const sum = d1 + d2;
      state.hint = `${getCurrentPlayer().name}: 🎲 ${d1} + ${d2} = ${sum}`;
      state.lastDiceSum = sum;
      state.lastDiceValues = [d1, d2];
      // C&K: roll event dice
      if (state.citiesKnights) {
        const evt = rollEventDice();
        state.eventDiceResult = evt;
        if (evt === "barbarian") {
          advanceBarbarian();
        } else {
          drawProgressCard(playerIdx, evt);
          SFX.card();
          const deckName = { science:"📗과학", trade:"📘무역", politics:"📕정치" }[evt] || evt;
          showToast(`🎲 이벤트: ${deckName} 진보카드 획득!`, 2500);
        }
      }
      if (sum === 7) handleSeven(skipDiscard);
      else {
        distributeResources(sum);
        state.phase = "main";
        state.canEndTurn = true;
      }
      return true;
    }

    function endTurnInternal() {
      if (state.winner || !state.canEndTurn) return false;
      // 도로 건설 카드 사용 중이면 턴 종료 차단
      if (state.roadBuildingRemaining > 0) {
        state.hint = pt("roadBuildingRemainingHint", { count: state.roadBuildingRemaining });
        render();
        return false;
      }
      state.buildMode = null;
      // C&K: deactivate all knights + clear merchantFleet at turn end
      if (state.citiesKnights) {
        for (const vIdx of Object.keys(state.knightActive)) {
          state.knightActive[vIdx] = false;
        }
        state.merchantFleetPlayerIdx = null;
      }
      state.shipMovingIdx = null;
      state.movedShipThisTurn = false;
      state.lastDiceSum = 0;
      state.lastDiceValues = null;
      closeTradeDialog();
      state.currentPlayer = (state.currentPlayer + 1) % state.players.length;
      state.phase = "roll";
      state.canEndTurn = false;
      state.turnNumber += 1;
      state.hint = pt("turnRollHint", { player: getCurrentPlayer().name });
      onTurnStart();
      return true;
    }

    function recalcLongestRoad() {
      if (!state.players.length) return;
      const lengths = state.players.map((_, i) => longestRoadLength(i));
      const maxLen = Math.max(...lengths);
      if (maxLen < 5) {
        state.longestRoad = null;
        return;
      }
      const leaders = lengths.map((v, i) => ({ v, i })).filter(x => x.v === maxLen);
      if (leaders.length === 1) {
        state.longestRoad = leaders[0].i;
        return;
      }
      if (state.longestRoad !== null && leaders.some(x => x.i === state.longestRoad)) return;
      state.longestRoad = null;
    }

    function longestRoadLength(playerIdx) {
      const p = state.players[playerIdx];
      const roadEdges = p.roads || [];
      const shipEdges = p.ships || [];
      const allEdges = [...roadEdges, ...shipEdges];
      if (!allEdges.length) return 0;
      const set = new Set(allEdges);
      let best = 0;

      function blockedByOpponent(vIdx) {
        const owner = state.vertices[vIdx].owner;
        return owner !== null && owner !== playerIdx;
      }

      function dfs(vIdx, used, length, fromEdge) {
        best = Math.max(best, length);
        if (fromEdge !== null && blockedByOpponent(vIdx)) return;
        const fromType = fromEdge !== null ? (state.edges[fromEdge].buildType || "road") : null;
        const hasOwnBuilding = state.vertices[vIdx].owner === playerIdx && state.vertices[vIdx].building;
        for (const eIdx of state.vertices[vIdx].edges) {
          if (!set.has(eIdx) || used.has(eIdx)) continue;
          const toType = state.edges[eIdx].buildType || "road";
          // road↔ship transition only allowed through own settlement/city
          if (fromType !== null && fromType !== toType && !hasOwnBuilding) continue;
          used.add(eIdx);
          const e = state.edges[eIdx];
          const nextV = e.a === vIdx ? e.b : e.a;
          dfs(nextV, used, length + 1, eIdx);
          used.delete(eIdx);
        }
      }

      const touchedVertices = new Set();
      for (const eIdx of allEdges) {
        touchedVertices.add(state.edges[eIdx].a);
        touchedVertices.add(state.edges[eIdx].b);
      }
      for (const v of touchedVertices) dfs(v, new Set(), 0, null);
      return best;
    }

    function hiddenDevVpForPlayer(playerIdx) {
      const p = state.players[playerIdx];
      return (p?.devCards || []).filter(c => c.type === "vp").length;
    }

    function publicVPForPlayer(playerIdx, viewerIdx = localPlayerIndex()) {
      const p = state.players[playerIdx];
      if (!p) return 0;
      if (state.winner !== null || playerIdx === viewerIdx) return p.vp || 0;
      return Math.max(0, (p.vp || 0) - hiddenDevVpForPlayer(playerIdx));
    }

    function recalcAllVP() {
      const prevWinner = state.winner;
      for (let i = 0; i < state.players.length; i += 1) {
        const p = state.players[i];
        let vp = 0;
        for (const b of p.buildings) vp += b.type === "city" ? 2 : 1;
        if (state.longestRoad === i) vp += 2;
        if (state.largestArmy === i) vp += 2;
        vp += (p.devCards || []).filter(c => c.type === "vp").length;
        vp += (p.islandBonusVP || 0);
        p.vp = vp;
      }
      const _vpGoal = targetScoreForMap(state.selectedMapId);
      const winner = state.players.findIndex(p => p.vp >= _vpGoal);
      if (winner !== -1) {
        state.winner = winner;
        state.phase = "end";
        state.canEndTurn = false;
        clearActivityLog();
        state.hint = pt("winnerHint", { player: state.players[winner].name });
        if (prevWinner !== winner) {
          dismissActiveTradeProposals("winner");
          SFX.win();
          if (winner === localPlayerIndex()) {
            launchConfetti();
            const _prize = victoryPrizeForMap(state.selectedMapId);
            showToast(pt("victoryPrizeToast", { prize: _prize.toLocaleString() }), 6000);
            if (typeof SharedWallet !== "undefined" && SharedWallet.addGold) SharedWallet.addGold(_prize);
          } else {
            showToast(pt("defeatToast", { player: state.players[winner].name }), 6000);
          }
          Voice.play("victory", winner % 2 === 0 ? "m" : "f");
        }
      }
    }

    function validRoadsFor(playerIdx, setup = false) {
      const out = [];
      for (let i = 0; i < state.edges.length; i += 1) if (canPlaceRoad(playerIdx, i, setup)) out.push(i);
      return out;
    }

    function validSettlementsFor(playerIdx, setup = false) {
      const out = [];
      for (let i = 0; i < state.vertices.length; i += 1) if (canPlaceSettlement(playerIdx, i, setup)) out.push(i);
      return out;
    }

    function validCitiesFor(playerIdx) {
      const out = [];
      for (let i = 0; i < state.vertices.length; i += 1) if (canUpgradeCity(playerIdx, i)) out.push(i);
      return out;
    }

    function advanceSetupTurn() {
      const order = setupOrder();
      if (state.setupOrderIndex < order.length - 1) {
        state.setupOrderIndex += 1;
        state.currentPlayer = order[state.setupOrderIndex];
        state.setupStep = "settlement";
        state.lastSetupVertex = null;
        state.hint = `${state.players[state.currentPlayer].name} ${pt("initialSettlementHint")}`;
        onTurnStart();
        return;
      }
      if (state.phase === "setup1") {
        state.phase = "setup2";
        state.setupRound = 2;
        state.setupOrderIndex = 0;
        const order2 = setupOrder();
        state.currentPlayer = order2[0];
        state.setupStep = "settlement";
        state.lastSetupVertex = null;
        state.hint = pt("secondSetupHint");
        onTurnStart();
        return;
      }
      state.phase = "roll";
      state.currentPlayer = 0;
      state.setupStep = "settlement";
      state.lastSetupVertex = null;
      state.hint = pt("mainGameStartHint");
      onTurnStart();
    }

    function showTurnToast(msg, duration = 2000) {
      if (state.screen !== "game") return;
      const el = document.createElement("div");
      el.className = "turn-toast";
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), duration);
    }

    function clampTurnSeconds(value) {
      const n = Number(value) || 60;
      const allowed = [30, 45, 60, 90, 120];
      return allowed.includes(n) ? n : Math.min(120, Math.max(30, Math.round(n)));
    }

    function normalizeTurnPhaseForDice() {
      if (state.screen !== "game" || state.winner) return false;
      if (state.phase !== "main") return false;
      if (state.lastDiceSum || state.lastDiceValues) return false;
      const current = getCurrentPlayer();
      state.phase = "roll";
      state.canEndTurn = false;
      state.hint = pt("turnRollHint", { player: current?.name || "Player" });
      return true;
    }

    function onTurnStart(announce = true) {
      state.turnSeconds = clampTurnSeconds(state.turnSeconds || 60);
      state.turnTimeLeft = state.turnSeconds;
      state.lastTurnTickSecond = null;
      state.tradeRejectedThisTurn = false;
      cancelAutoEndTimer();
      closeTradeDialog();
      dismissActiveTradeProposals("turn-change");
      if (announce && state.players[state.currentPlayer]) {
        showTurnToast(`${state.players[state.currentPlayer].name}의 차례!`, 2000);
      }
    }

    let autoEndTimer = null;
    function cancelAutoEndTimer() {
      if (autoEndTimer) {
        clearTimeout(autoEndTimer);
        autoEndTimer = null;
      }
    }

    // Any user click on a button/hex during the auto-end countdown cancels it
    // so the player can still trade or build if they intend to.
    document.addEventListener("click", (e) => {
      if (!autoEndTimer) return;
      if (e.target.closest("button, .hex, [data-trade], [data-build]")) {
        cancelAutoEndTimer();
      }
    }, true);

    function maybeAutoEndTurn() {
      return; // Human turns should use their full timer after dice/trade decisions.
      if (autoEndTimer) return;
      if (state.winner) return;
      if (state.phase !== "main") return;
      if (!state.canEndTurn) return;
      if (state.roadBuildingRemaining > 0) return;
      if (!isHumanTurn()) return;
      const myIdx = localPlayerIndex();
      if (myIdx < 0) return;
      const me = state.players[myIdx];
      if (!me) return;

      // Has a playable dev card → action available
      if (hasPlayableKnight(myIdx) || hasPlayableMonopoly(myIdx)) return;
      if ((me.devCards || []).some(c =>
        (c.type === "road_building" || c.type === "year_of_plenty")
        && c.turnBought < state.turnNumber && !c.played)) return;

      // Can build something → action available
      const canRoad = canAfford(me, COST.road) && validRoadsFor(myIdx).length > 0;
      const canSettlement = canAfford(me, COST.settlement) && validSettlementsFor(myIdx).length > 0;
      const canCity = canAfford(me, COST.city) && validCitiesFor(myIdx).length > 0;
      const canBuyDev = canAfford(me, COST.devCard) && state.devDeck.length > 0;
      if (canRoad || canSettlement || canCity || canBuyDev) return;

      // No build, no playable. Trade is the only remaining option — only auto-end
      // if there are no resources to trade with, OR a trade was already rejected this turn.
      const hasResources = totalResourceCount(me) > 0;
      const tradeRejected = state.tradeRejectedThisTurn === true;
      if (hasResources && !tradeRejected) return;

      showToast(pt("autoEndNoActions"), 1800);
      autoEndTimer = setTimeout(() => {
        autoEndTimer = null;
        if (isHumanTurn() && state.canEndTurn && !state.winner) endTurn();
      }, 1800);
    }

    function maybePlayTurnTimerTick() {
      if (!soundSettings.sfx) return;
      if (state.screen !== "game" || state.winner !== null) return;
      if (!isHumanTurn()) return;
      if (state.lastTurnTickSecond === state.turnTimeLeft) return;
      state.lastTurnTickSecond = state.turnTimeLeft;
      const urgent = state.turnTimeLeft <= 10;
      if (state.turnTimeLeft <= 0) return;
      if (!urgent && state.turnTimeLeft % 5 !== 0) return;
      SFX.turnTick(urgent);
    }

    async function autoPlaceSetupForCurrentPlayer() {
      if (state._setupTimeoutInProgress) return false;
      if (state.winner || !(state.phase === "setup1" || state.phase === "setup2")) return false;
      if (!isHumanTurn()) return false;
      state._setupTimeoutInProgress = true;
      try {
        const pIdx = state.currentPlayer;
        const p = state.players[pIdx];
        const ai = window.pingtanAI;
        if (!p) return false;

        if (state.setupStep === "settlement") {
          const choices = validSettlementsFor(pIdx, true);
          if (!choices.length) {
            advanceSetupTurn();
            render();
            triggerAITurnIfNeeded();
            return true;
          }
          const pick = ai ? ai.pickVertexByDifficulty(state, choices, state.aiDifficulty, pIdx) : choices[Math.floor(Math.random() * choices.length)];
          state.hint = `${p.name} 시간초과 - AI가 마을 위치를 자동 배치했습니다.`;
          if (isMultiMode()) {
            await sendGameAction(ACTION.PLACE_SETTLEMENT, { playerId: currentPlayerUserId(), vertexId: pick });
          } else {
            if (!placeSettlement(pIdx, pick, true)) return false;
            SFX.build();
            if (state.phase === "setup2") {
              grantSecondSetupResources(pIdx, pick);
              await resolveHumanGoldIfNeeded();
            }
            state.lastSetupVertex = pick;
            state.setupStep = "road";
            state.hint = pt("connectedRoadHint");
            render();
            triggerAITurnIfNeeded();
          }
          setTimeout(() => {
            if (!state.winner && (state.phase === "setup1" || state.phase === "setup2") && state.setupStep === "road") {
              autoPlaceSetupForCurrentPlayer();
            }
          }, 350);
          return true;
        }

        if (state.setupStep === "road") {
          const roads = validRoadsFor(pIdx, true);
          const ships = state.edges.filter(e => canPlaceShip(pIdx, e.index, true)).map(e => e.index);
          const allEdges = [...roads, ...ships];
          if (!allEdges.length) {
            advanceSetupTurn();
            render();
            triggerAITurnIfNeeded();
            return true;
          }
          const pick = ai
            ? ai.pickBestRoadFromVertex(state, allEdges, state.lastSetupVertex)
            : allEdges[Math.floor(Math.random() * allEdges.length)];
          const pickIsShip = ships.includes(pick);
          state.hint = `${p.name} 시간초과 - AI가 ${pickIsShip ? "항로" : "도로"}를 자동 배치했습니다.`;
          if (isMultiMode()) {
            await sendGameAction(ACTION.PLACE_ROAD, { playerId: currentPlayerUserId(), edgeId: pick, isShip: pickIsShip });
          } else {
            const placed = pickIsShip ? placeShip(pIdx, pick, true) : placeRoad(pIdx, pick, true);
            if (!placed) return false;
            SFX.road();
            advanceSetupTurn();
            render();
            triggerAITurnIfNeeded();
          }
          return true;
        }

        return false;
      } finally {
        state._setupTimeoutInProgress = false;
      }
    }

    function ensureTurnTimer() {
      if (turnTimerInterval) return;
      turnTimerInterval = setInterval(async () => {
        if (state.screen !== "game" || state.winner !== null) return;
        normalizeTurnPhaseForDice();
        if (!isHumanTurn()) return;
        if (state.turnTimeLeft > 0) {
          state.turnTimeLeft -= 1;
          maybePlayTurnTimerTick();
          if (state.turnTimeLeft === 0) {
            if (state.phase === "setup1" || state.phase === "setup2") await autoPlaceSetupForCurrentPlayer();
            else endTurn();
          }
        }
        render();
      }, 1000);
    }

    function applyGameAction(action) {
      const type = action.type;
      const playerId = action.playerId ?? action.data?.playerId;
      const pIdx = playerIndexFromAnyId(playerId);

      if (type === ACTION.GAME_INIT) {
        // Set mapId BEFORE resetCoreState so specialRules (citiesKnights etc.) are applied correctly
        const _initMapId = action.mapId || "standard";
        state.selectedMapId = _initMapId;
        resetCoreState();
        state.mode = "multi";
        state.screen = "game";
        if (Array.isArray(action.players) && action.players.length) {
          state.players = action.players.map((p, i) => makePlayer({
            id: p.id,
            userId: p.userId || p.id,
            name: p.name || p.nickname || `Player ${i + 1}`,
            color: p.color || PLAYER_COLORS[i],
            isAI: !!p.isAI
          }));
        } else if (Array.isArray(action.playerOrder)) {
          state.players = action.playerOrder.map((id, i) => makePlayer({
            id,
            userId: id,
            name: `Player ${i + 1}`,
            color: PLAYER_COLORS[i],
            isAI: String(id).startsWith("ai-")
          }));
        }
        state.selectedMapId = _initMapId; // ensure after player creation
        state.turnSeconds = clampTurnSeconds(action.turnSeconds || 60);
        state.targetScore = clampTargetScore(action.targetScore || defaultTargetScoreForMap(_initMapId));
        state.targetScoreCustom = true;
        generateBoard(clone(action.hexes || []), _initMapId);
        if (Array.isArray(action.ports) && action.ports.length) state.ports = action.ports;
        if (typeof action.robber === "number") {
          state.robber = action.robber;
          state.hexes.forEach(h => { h.robber = false; });
          if (state.robber >= 0 && state.hexes[state.robber]) state.hexes[state.robber].robber = true;
        }
        state.hint = pt("multiplayerStartSetup");
        addGameStartActivityLog();
        onTurnStart(false);
        recalcAllVP();
        setTimeout(() => maybeAIIntroReaction(), 500);
        return true;
      }

      if (pIdx === -1) return false;
      if (type === ACTION.PLACE_SETTLEMENT) {
        if (state.phase === "setup1" || state.phase === "setup2") {
          if (pIdx !== state.currentPlayer || state.setupStep !== "settlement") return false;
          if (!placeSettlement(pIdx, action.vertexId, true)) return false;
          if (state.phase === "setup2") {
            grantSecondSetupResources(pIdx, action.vertexId);
            if (pIdx === localPlayerIndex() && state._pendingHumanGold) setTimeout(() => resolveHumanGoldIfNeeded(), 0);
          }
          state.lastSetupVertex = action.vertexId;
          state.setupStep = "road";
          state.hint = pt("connectedRoadHint");
          return true;
        }
        if (pIdx !== state.currentPlayer || state.phase !== "main") return false;
        if (!placeSettlement(pIdx, action.vertexId, false)) return false;
        state.buildMode = null;
        state.hint = pt("settlementBuiltHint");
        return true;
      }
      if (type === ACTION.PLACE_ROAD) {
        if (state.phase === "setup1" || state.phase === "setup2") {
          if (pIdx !== state.currentPlayer || state.setupStep !== "road") return false;
          const placed = action.isShip
            ? placeShip(pIdx, action.edgeId, true)
            : placeRoad(pIdx, action.edgeId, true);
          if (!placed) return false;
          advanceSetupTurn();
          return true;
        }
        if (pIdx !== state.currentPlayer || state.phase !== "main") return false;
        if (action.isShip) {
          if (!placeShip(pIdx, action.edgeId, !!action.isFree)) return false;
          state.buildMode = null;
          state.hint = "⛵ 항로를 건설했습니다.";
          return true;
        }
        if (!placeRoad(pIdx, action.edgeId, !!action.isFree)) return false;
        state.buildMode = null;
        state.hint = pt("roadBuiltHint");
        return true;
      }
      if (type === ACTION.PLACE_CITY) {
        if (pIdx !== state.currentPlayer || state.phase !== "main") return false;
        if (!upgradeCity(pIdx, action.vertexId)) return false;
        state.buildMode = null;
        state.hint = pt("cityBuiltHint");
        return true;
      }
      if (type === ACTION.ROLL_DICE) {
        return applyRollDice(pIdx, action.values, true);
      }
      if (type === ACTION.DISCARD_RESOURCES) {
        applyDiscardResources(pIdx, action.resources);
        return true;
      }
      if (type === ACTION.GOLD_CHOICE) {
        return applyGoldChoice(playerId, action.resources);
      }
      if (type === ACTION.BUY_DEV_CARD) {
        if (pIdx !== state.currentPlayer || state.phase !== "main") return false;
        if (!buyDevCard(pIdx)) return false;
        state.canEndTurn = true;
        state.hint = pt("devCardBought");
        return true;
      }
      if (type === ACTION.MOVE_ROBBER) {
        if (pIdx !== state.currentPlayer) return false;
        return moveRobber(action.hexId, action.stealFrom, action.stolenResource).ok;
      }
      if (type === ACTION.END_TURN) {
        if (pIdx !== state.currentPlayer) return false;
        return endTurnInternal();
      }
      if (type === ACTION.BUILD_CK_KNIGHT) {
        if (pIdx !== state.currentPlayer) return false;
        return buildCKKnight(pIdx, action.vertexId);
      }
      if (type === ACTION.ACTIVATE_CK_KNIGHT) {
        if (pIdx !== state.currentPlayer) return false;
        return activateCKKnight(pIdx, action.vertexId);
      }
      if (type === ACTION.PLAY_PROGRESS_CARD) {
        if (pIdx !== state.currentPlayer) return false;
        return playProgressCard(pIdx, action.cardType, action.opts || {});
      }
      if (type === ACTION.GAME_SETTINGS) {
        if (isMultiMode() && hasAnyInitialSettlement()) return false;
        const previousSettings = {
          turnSeconds: action.previousTurnSeconds !== undefined ? action.previousTurnSeconds : state.turnSeconds,
          targetScore: action.previousTargetScore !== undefined ? action.previousTargetScore : state.targetScore
        };
        const nextTurnSeconds = action.turnSeconds !== undefined ? clampTurnSeconds(action.turnSeconds) : state.turnSeconds;
        const nextTargetScore = action.targetScore !== undefined ? clampTargetScore(action.targetScore) : state.targetScore;
        state.turnSeconds = nextTurnSeconds;
        state.targetScore = nextTargetScore;
        state.targetScoreCustom = true;
        if (state.turnTimeLeft > nextTurnSeconds) state.turnTimeLeft = nextTurnSeconds;
        addGameSettingsChangeLogs(previousSettings, { turnSeconds: nextTurnSeconds, targetScore: nextTargetScore });
        return true;
      }

      // Multiplayer trade proposal received from other player
      if (type === "TRADE_PROPOSE") {
        if (mpState.replaying) return true;
        const myIdx = localPlayerIndex();
        if (pIdx === myIdx) return true; // own proposal, skip
        const proposer = state.players[pIdx];
        if (!proposer) return true;
        const offer = action.offer || {};
        const want = action.want || {};
        const offerStr = action.offerStr || "";
        const wantStr = action.wantStr || "";
        // Host: auto-respond on behalf of AI players who are targeted
        if (mpState.isHost && mpState.client && !mpState.replaying) {
          const proposalId = action.actionId;
          const aiRecipients = state.players
            .map((p2, i2) => ({ p2, i2 }))
            .filter(x => x.i2 !== pIdx && x.p2?.isAI && canPlayerPayBundle(x.p2, want));
          if (aiRecipients.length > 0) {
            const aiActor = aiRecipients[0];
            const offerVal = Object.entries(offer).reduce((s, [r, n]) => s + ({brick:0.5,lumber:0.6,wool:0.45,grain:0.9,ore:1.1}[r]||0.5)*n, 0);
            const wantVal = Object.entries(want).reduce((s, [r, n]) => s + ({brick:0.5,lumber:0.6,wool:0.45,grain:0.9,ore:1.1}[r]||0.5)*n, 0);
            const shouldAccept = offerVal >= wantVal * 0.8;
            const aiDelay = 1800 + Math.random() * 2500;
            setTimeout(async () => {
              const aiP = state.players[aiActor.i2];
              const prop = state.players[pIdx];
              if (!aiP || !prop) return;
              const snap = createpingtanStateSnapshot ? createpingtanStateSnapshot() : undefined;
              if (shouldAccept && canPlayerPayBundle(aiP, want) && canPlayerPayBundle(prop, offer)) {
                try { await mpState.client.sendAction({ type: "TRADE_ACCEPT", playerId: aiP.userId || aiP.id, proposerId: prop.userId || prop.id, proposalId, offer, want, actionId: `ai_ta_${Date.now()}`, ...(snap ? { __snapshot: snap } : {}) }); } catch {}
              } else {
                try { await mpState.client.sendAction({ type: "TRADE_REJECT", playerId: aiP.userId || aiP.id, proposalId, actionId: `ai_tr_${Date.now()}`, ...(snap ? { __snapshot: snap } : {}) }); } catch {}
              }
            }, aiDelay);
          }
        }
        const me = state.players[myIdx];
        let canAccept = canPlayersExecuteTrade(proposer, me, offer, want);
        const myResStr = RESOURCES.map(r => `${RESOURCE_ICONS[r]}${me.resources[r]}`).join(" ");
        const proposalId = action.actionId;
        const proposerId = proposer.userId || proposer.id;
        if (!mpState.activeTradeProposals) mpState.activeTradeProposals = new Map();
        if (mpState.activeTradeProposals.has(proposalId)) return true; // duplicate
        const dismissBox = { dismiss: null };
        mpState.activeTradeProposals.set(proposalId, dismissBox);
        (async () => {
          const tradeMeta = { resources: { ...me.resources }, offer, want };
          SFX.trade();
          const accepted = await showTradeProposal(proposer.name, offerStr, wantStr, "거래 하실래요?", myResStr, canAccept, dismissBox, tradeMeta);
          // Proposal was consumed by another player accepting first → bail without sending reject
          if (!mpState.activeTradeProposals.has(proposalId)) {
            render();
            return;
          }
          if (accepted) {
            if (!canPlayersExecuteTrade(proposer, me, offer, want)) {
              mpState.activeTradeProposals.delete(proposalId);
              showToast(pt("insufficientTradeResources"), 2000);
              render();
              return;
            }
          }
          mpState.activeTradeProposals.delete(proposalId);
          if (accepted) {
            if (!applyTradeSwap(proposer, me, offer, want)) {
              showToast(pt("insufficientTradeResources"), 2000);
              render();
              return;
            }
            SFX.build();
            addActivityLog("trade", `${proposer.name || "플레이어"} ↔ ${me.name || "플레이어"} 거래: ${describeResourceBundle(offer)} → ${describeResourceBundle(want)}`);
            showToast(pt("tradeSuccessToast"), 2000);
            // Notify proposer + bystanders (proposerId/proposalId let receivers identify the swap)
            mpState.client.sendAction({ type: "TRADE_ACCEPT", playerId: me.userId || me.id, proposerId, proposalId, offer, want, actionId: `ta_${Date.now()}`, __snapshot: createpingtanStateSnapshot() }).catch(()=>{});
          } else {
            mpState.client.sendAction({ type: "TRADE_REJECT", playerId: me.userId || me.id, proposalId, actionId: `tr_${Date.now()}`, __snapshot: createpingtanStateSnapshot() }).catch(()=>{});
          }
          render();
        })();
        return true;
      }

      if (type === "TRADE_ACCEPT") {
        const myIdx = localPlayerIndex();
        const accepter = state.players[pIdx];
        // proposerId is required; fall back to current player only as a safety net for legacy clients
        const proposerIdx = action.proposerId
          ? playerIndexFromAnyId(action.proposerId)
          : state.currentPlayer;
        const proposer = proposerIdx >= 0 ? state.players[proposerIdx] : null;

        // Dismiss any open trade-proposal dialog for this proposalId on bystanders
        const proposalId = action.proposalId;
        if (proposalId && mpState.activeTradeProposals?.has(proposalId)) {
          const box = mpState.activeTradeProposals.get(proposalId);
          mpState.activeTradeProposals.delete(proposalId);
          if (box?.dismiss) box.dismiss();
        }

        if (!accepter || !proposer) return true;
        // Accepter already mutated their own state in TRADE_PROPOSE when clicking accept — skip duplicate
        if (pIdx === myIdx) return true;

        const offer = action.offer || {};
        const want = action.want || {};
        if (!canPlayersExecuteTrade(proposer, accepter, offer, want)) return true;
        if (!applyTradeSwap(proposer, accepter, offer, want)) return true;
        SFX.build();
        addActivityLog("trade", `${proposer.name || "플레이어"} ↔ ${accepter.name || "플레이어"} 거래: ${describeResourceBundle(offer)} → ${describeResourceBundle(want)}`);
        if (myIdx === proposerIdx) {
          showToast(pt("tradeAcceptedToast", { player: accepter.name }), 2000);
          state.canEndTurn = true;
        } else {
          showToast(pt("tradeMatchedToast", { from: proposer.name, to: accepter.name }), 2000);
        }
        render();
        return true;
      }

      if (type === "TRADE_REJECT") {
        const myIdx = localPlayerIndex();
        if (pIdx === myIdx) return true;
        const rejecter = state.players[pIdx];
        showToast(pt("tradeRejectedToast", { player: rejecter?.name || "Opponent" }), 2000);
        // If I'm the current player (proposer), mark rejection so auto-end can trigger
        // when paired with no-buildable + no-playable.
        if (myIdx === state.currentPlayer) {
          maybeAutoEndTurn();
        }
        return true;
      }

      return false;
    }

    function nextActionId() {
      mpState.actionSeq += 1;
      return `${Date.now()}_${mpState.actionSeq}_${mpState.myUserId || "local"}`;
    }

    function markActionProcessed(actionId) {
      if (!actionId) return;
      mpState.processedActionIds.add(actionId);
      if (mpState.processedActionIds.size > 600) {
        const arr = [...mpState.processedActionIds];
        mpState.processedActionIds = new Set(arr.slice(arr.length - 300));
      }
    }

    function createpingtanStateSnapshot() {
      return clone({
        phase: state.phase,
        currentPlayer: state.currentPlayer,
        players: state.players,
        hexes: state.hexes,
        vertices: state.vertices,
        edges: state.edges,
        robber: state.robber,
        longestRoad: state.longestRoad,
        largestArmy: state.largestArmy,
        devDeck: state.devDeck,
        ports: state.ports,
        turnNumber: state.turnNumber,
        setupRound: state.setupRound,
        setupOrderIndex: state.setupOrderIndex,
        setupStep: state.setupStep,
        lastSetupVertex: state.lastSetupVertex,
        canEndTurn: state.canEndTurn,
        winner: state.winner,
        turnSeconds: state.turnSeconds,
        targetScore: state.targetScore,
        targetScoreCustom: state.targetScoreCustom,
        roadBuildingRemaining: state.roadBuildingRemaining,
        lastDiceSum: state.lastDiceSum,
        lastDiceValues: state.lastDiceValues,
        selectedMapId: state.selectedMapId,
        mapView: state.mapView,
        tradeRejectedThisTurn: state.tradeRejectedThisTurn
      });
    }

    function applypingtanStateSnapshot(snapshot) {
      if (!snapshot || !Array.isArray(snapshot.players) || !Array.isArray(snapshot.hexes)) return false;
      const keep = {
        screen: state.screen,
        mode: state.mode,
        roomCodeInput: state.roomCodeInput,
        maxPlayers: state.maxPlayers,
        tradeDialog: state.tradeDialog,
        debug: state.debug
      };
      Object.assign(state, clone(snapshot));
      state.screen = keep.screen || "game";
      state.mode = keep.mode || "multi";
      state.roomCodeInput = keep.roomCodeInput || "";
      state.maxPlayers = keep.maxPlayers || 4;
      state.tradeDialog = { open: false, offer: {}, want: {} };
      state.debug = keep.debug;
      if (!state.mapView) state.mapView = { zoom: 1, userMoved: false, initialized: false };
      recalcAllVP();
      return true;
    }

    function recoverFromActionSnapshot(snapshot, actionType = "") {
      const recovered = applypingtanStateSnapshot(snapshot);
      if (!recovered) return false;
      state.hint = actionType === ACTION.END_TURN
        ? "턴 동기화 복구 완료."
        : "게임 상태 동기화 복구 완료.";
      return true;
    }

    async function sendGameAction(type, payload) {
      const action = { type, ...payload, actionId: nextActionId() };
      const applied = applyGameAction(action);
      if (!applied) return false;
      addActivityForAction(action, playerIndexFromAnyId(action.playerId));
      markActionProcessed(action.actionId);
      render();
      triggerAITurnIfNeeded();
      if (!isMultiMode()) return true;
      try {
        action.__snapshot = createpingtanStateSnapshot();
        await mpState.client.sendAction(action);
      } catch (e) {
        state.hint = `동기화 실패: ${e.message || e}`;
        render();
      }
      return true;
    }

    async function rollDice() {
      if (isMultiMode()) {
        if (!isHumanTurn() || state.phase !== "roll") return;
        SFX.dice();
        const d1 = 1 + Math.floor(Math.random() * 6);
        const d2 = 1 + Math.floor(Math.random() * 6);
        const sum = d1 + d2;
        const el = document.getElementById("diceDisplay");
        await animateDiceRoll(el, d1, d2, sum);
        showBigOverlay(`${DICE_FACES[d1]} ${DICE_FACES[d2]}`, `= ${sum}${sum === 7 ? " 🦹 도둑!" : ""}`, sum === 7 ? "seven" : "", sum === 7 ? 1500 : 1000);
        await sendGameAction(ACTION.ROLL_DICE, { playerId: currentPlayerUserId(), values: [d1, d2] });
        await resolveHumanGoldIfNeeded();
        await postDicePromptDiscards(d1 + d2);
        maybeAutoEndTurn();
        return;
      }
      if (state.winner || state.phase !== "roll") return;
      SFX.dice();
      const d1 = 1 + Math.floor(Math.random() * 6);
      const d2 = 1 + Math.floor(Math.random() * 6);
      const sum = d1 + d2;
      const el = document.getElementById("diceDisplay");
      await animateDiceRoll(el, d1, d2, sum);
      showBigOverlay(`${DICE_FACES[d1]} ${DICE_FACES[d2]}`, `= ${sum}${sum === 7 ? " 🦹 도둑!" : ""}`, sum === 7 ? "seven" : "", sum === 7 ? 1500 : 1000);
      // seven sound handled in handleSeven()
      if (!applyRollDice(state.currentPlayer, [d1, d2], false)) return;
      render();
      await resolveHumanGoldIfNeeded();
      await postDicePromptDiscards(sum);
      maybeAutoEndTurn();
      triggerAITurnIfNeeded();
    }


    async function endTurn() {
      if (isMultiMode()) {
        if (!isHumanTurn() || !state.canEndTurn) return;
        await sendGameAction(ACTION.END_TURN, { playerId: currentPlayerUserId() });
        return;
      }
      if (!endTurnInternal()) return;
      render();
      triggerAITurnIfNeeded();
    }

    async function humanBuyDevCard() {
      if (!isHumanTurn() || state.phase !== "main" || state.winner) return;
      if (!state.devDeck.length) { state.hint = pt("devDeckEmpty"); render(); return; }
      const me = state.players[localPlayerIndex()];
      if (!canAfford(me, COST.devCard)) { state.hint = pt("devCardCostMissing"); render(); return; }
      let bought = false;
      if (isMultiMode()) {
        bought = await sendGameAction(ACTION.BUY_DEV_CARD, { playerId: currentPlayerUserId() });
      } else {
        bought = buyDevCard(localPlayerIndex());
      }
      if (!bought) { render(); return; }
      SFX.card();
      showToast(pt("devCardToast"));
      state.canEndTurn = true;
      state.hint = pt("devCardBought");
      render();
    }

    function humanUseKnight() {
      if (!isHumanTurn() || state.winner) return;
      if (!hasPlayableKnight(localPlayerIndex())) { state.hint = pt("noKnightCard"); render(); return; }
      state.phaseBeforeKnight = state.phase; // save so we can restore after robber move
      state.phase = "knight-robber";
      state.hint = pt("knightUseHint");
      showDevCardPopup(localPlayerIndex(), "knight");
      render();
    }

    function humanUseMonopoly() {
      if (!isHumanTurn() || state.phase !== "main" || state.winner) return;
      const me = localPlayerIndex();
      if (!hasPlayableMonopoly(me)) { state.hint = pt("noMonopolyCard"); render(); return; }
      const overlay = document.createElement("div");
      overlay.style.cssText = "position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);";
      overlay.innerHTML = `
        <div style="background:#16213e;border:2px solid #ffd700;border-radius:16px;padding:20px;max-width:340px;width:90%;text-align:center;">
          <div style="font-size:16px;font-weight:700;margin-bottom:8px;">💰 모노폴리</div>
          <div style="font-size:12px;color:#9ca3af;margin-bottom:8px;">모든 플레이어에게서 가져올 자원을 선택하세요</div>
          ${myResourceSnapshotHtml(me)}
          <div style="font-size:11px;color:#fbbf24;margin-bottom:8px;">모노폴리 선택 시 획득 예정 수량</div>
          <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">

        p.resources[sel[0]] += 1;

    async function onVertexClick(vIdx) {
      if (!isHumanTurn() || state.winner) return;
      if (isMultiMode()) {
        if (state.phase === "setup1" || state.phase === "setup2") {
          if (state.setupStep !== "settlement") return;
          await sendGameAction(ACTION.PLACE_SETTLEMENT, { playerId: currentPlayerUserId(), vertexId: vIdx });
          return;
        }
        if (state.phase !== "main") return;
        if (state.buildMode === "settlement") {
          await sendGameAction(ACTION.PLACE_SETTLEMENT, { playerId: currentPlayerUserId(), vertexId: vIdx });
        } else if (state.buildMode === "city") {
          await sendGameAction(ACTION.PLACE_CITY, { playerId: currentPlayerUserId(), vertexId: vIdx });
        }
        return;
      }

      if (state.phase === "setup1" || state.phase === "setup2") {
        const pIdx = state.currentPlayer;
        if (state.setupStep !== "settlement") return;
        if (!placeSettlement(pIdx, vIdx, true)) return;
        SFX.build();
        if (state.phase === "setup2") {
          grantSecondSetupResources(pIdx, vIdx);
          await resolveHumanGoldIfNeeded();
        }
        state.lastSetupVertex = vIdx;
        state.setupStep = "road";
        state.hint = pt("connectedRoadHint");
        render();
        triggerAITurnIfNeeded();
        return;
      }
      if (state.phase !== "main") return;
      if (state.buildMode === "settlement") {
        if (placeSettlement(state.currentPlayer, vIdx, false)) {
          SFX.build();
          state.buildMode = null;
          state.hint = pt("settlementBuiltHint");
          render();
          triggerAITurnIfNeeded();
        }
      } else if (state.buildMode === "city") {
        if (upgradeCity(state.currentPlayer, vIdx)) {
          SFX.build();
          state.buildMode = null;
          state.hint = pt("cityBuiltHint");
          render();
          triggerAITurnIfNeeded();
        }
      } else if (state.buildMode === "ck-knight") {
        if (isMultiMode()) {
          await sendGameAction(ACTION.BUILD_CK_KNIGHT, { playerId: currentPlayerUserId(), vertexId: vIdx });
          state.buildMode = null;
          render();
        } else {
          const pIdx = localPlayerIndex();
          if (buildCKKnight(pIdx, vIdx)) {
            state.buildMode = null;
            state.hint = "기사단 배치 완료!";
            render();
          }
        }
        return;
      }
    }

    async function onEdgeClick(eIdx) {
      if (!isHumanTurn() || state.winner) return;
      if (isMultiMode()) {
        if (state.phase === "setup1" || state.phase === "setup2") {
          if (state.setupStep !== "road") return;
          await sendGameAction(ACTION.PLACE_ROAD, { playerId: currentPlayerUserId(), edgeId: eIdx, isShip: isSeaEdge(eIdx) });
          return;
        }
        if (state.phase === "main" && state.buildMode === "road") {
          const isFree = state.roadBuildingRemaining > 0;
          const useShip = isFree && isSeaEdge(eIdx);
          await sendGameAction(ACTION.PLACE_ROAD, { playerId: currentPlayerUserId(), edgeId: eIdx, isShip: useShip, isFree });
        } else if (state.phase === "main" && state.buildMode === "ship") {
          await sendGameAction(ACTION.PLACE_ROAD, { playerId: currentPlayerUserId(), edgeId: eIdx, isShip: true });
        }
        return;
      }
      if (state.phase === "setup1" || state.phase === "setup2") {
        const pIdx = state.currentPlayer;
        if (state.setupStep !== "road") return;
        const setupIsShip = isSeaEdge(eIdx);
        const placed = setupIsShip ? placeShip(pIdx, eIdx, true) : placeRoad(pIdx, eIdx, true);
        if (!placed) return;
        SFX.road();
        advanceSetupTurn();
        render();
        triggerAITurnIfNeeded();
        return;
      }
      if (state.phase !== "main") return;
      // Ship movement modes
      if (state.buildMode === "ship-select") {
        const movable = getMovableShips(state.currentPlayer);
        if (movable.includes(eIdx)) {
          state.shipMovingIdx = eIdx;
          state.buildMode = "ship-move";
          state.hint = pt("moveShipPlaceHint");
          render();
        }
        return;
      }
      if (state.buildMode === "ship-move") {
        if (moveShip(state.currentPlayer, state.shipMovingIdx, eIdx)) {
          SFX.road();
          state.buildMode = null;
          state.shipMovingIdx = null;
          state.hint = pt("moveShipDone");
          render();
        } else {
          // Check if pirate is the reason
          const isPirateBlocked = state.pirate >= 0 && (state.hexes[state.pirate]?.edges || []).includes(eIdx);
          if (isPirateBlocked) showToast("☠️ 해적이 막고 있어 배를 이동할 수 없습니다.", 2000);
        }
        return;
      }
      if (state.buildMode === "road") {
        const isFreeRoad = state.roadBuildingRemaining > 0;
        // During road building on sea maps: clicking a sea edge builds a ship instead
        if (isFreeRoad && isSeaEdge(eIdx) && canPlaceShip(state.currentPlayer, eIdx)) {
          if (placeShip(state.currentPlayer, eIdx, true)) {
            SFX.road();
            state.roadBuildingRemaining -= 1;
            if (state.roadBuildingRemaining > 0) {
              state.hint = pt("roadBuildingShipHint", { count: state.roadBuildingRemaining });
            } else {
              state.buildMode = null;
              state.roadBuildingRemaining = 0;
              state.hint = pt("roadBuildingDoneHint");
            }
            render();
            triggerAITurnIfNeeded();
          }
          return;
        }
        if (placeRoad(state.currentPlayer, eIdx, isFreeRoad)) {
          SFX.road();
          if (isFreeRoad) {
            state.roadBuildingRemaining -= 1;
            if (state.roadBuildingRemaining > 0) {
              const hasSeaTiles = state.hexes.some(h => h && h.type === "sea");
              state.hint = hasSeaTiles ? pt("roadBuildingShipHint", { count: state.roadBuildingRemaining }) : pt("roadBuildingRemainingHint", { count: state.roadBuildingRemaining });
            } else {
              state.buildMode = null;
              state.roadBuildingRemaining = 0;
              state.hint = pt("roadBuildingDoneHint");
            }
          } else {
            state.buildMode = null;
            state.hint = pt("roadBuiltHint");
          }
          render();
          triggerAITurnIfNeeded();
        }
        return;
      }
      if (state.buildMode === "ship") {
        if (placeShip(state.currentPlayer, eIdx)) {
          SFX.road();
          state.buildMode = null;
          state.hint = "⛵ 항로를 건설했습니다.";
          render();
          triggerAITurnIfNeeded();
        }
      }
    }

    function humanPickVictim(list) {
      return new Promise(resolve => {
        const overlay = document.createElement("div");
        overlay.style.cssText = "position:fixed;inset:0;z-index:10001;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);";
        overlay.innerHTML = `
          <div style="background:#16213e;border:2px solid #b33838;border-radius:16px;padding:20px;max-width:360px;width:92%;text-align:center;color:#fff;">
            <div style="font-size:18px;font-weight:700;margin-bottom:12px;">🦹 ${pt("chooseVictim")}</div>
            <div style="display:flex;flex-direction:column;gap:10px;">
              ${list.map(vIdx => {
                const p = state.players[vIdx];
                const total = totalResourceCount(p);
                const color = p.color || PLAYER_COLORS[vIdx] || "#fff";
                return `<button data-victim="${vIdx}" style="padding:12px 16px;border-radius:10px;border:2px solid ${escapeHtml(color)};background:#1a1a2e;color:#fff;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;width:100%;">
                  <span style="display:flex;align-items:center;gap:8px;font-weight:700;"><span aria-label="${pt("playerColor")}" style="width:14px;height:14px;border-radius:50%;background:${escapeHtml(color)};box-shadow:0 0 0 2px rgba(255,255,255,.2);"></span>${escapeHtml(p.name)}</span>
                  <span style="color:#fbbf24;">${pt("cardsCount", { count: total })}</span>
                </button>`;
              }).join("")}
            </div>
          </div>`;
        overlay.addEventListener("click", e => {
          const btn = e.target.closest("button[data-victim]");
          if (!btn) return;
          overlay.remove();
          resolve(Number(btn.dataset.victim));
        });
        document.body.appendChild(overlay);
      });
