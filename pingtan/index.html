    }

    function spend(player, cost) {
      for (const [k, v] of Object.entries(cost)) player.resources[k] -= v;
    }

    function applyBankTrade(playerIdx, give, get) {
      const p = state.players[playerIdx];
      if (!p) return false;
      if (!RESOURCES.includes(give) || !RESOURCES.includes(get)) return false;
      if (give === get) return false;
      if ((p.resources[give] || 0) < 4) return false;
      p.resources[give] -= 4;
      p.resources[get] += 1;
      return true;
    }

    function adjacentVertices(vIdx) {
      const out = new Set();
      for (const eIdx of state.vertices[vIdx].edges) {
        const e = state.edges[eIdx];
        out.add(e.a === vIdx ? e.b : e.a);
      }
      return [...out];
    }

    function canPlaceSettlement(playerIdx, vIdx, setup = false) {
      const v = state.vertices[vIdx];
      if (v.building) return false;
      for (const n of adjacentVertices(vIdx)) {
        if (state.vertices[n].building) return false;
      }
      if (!setup) {
        // Max 5 settlements (standard Catan piece limit)
        const p = state.players[playerIdx];
        const settlements = (p?.buildings || []).filter(b => b.type === "settlement").length;
        if (settlements >= 5) return false;
        return v.edges.some(eIdx => state.edges[eIdx].owner === playerIdx);
      }
      return true;
    }

    function canPlaceRoad(playerIdx, eIdx, setup = false) {
      const e = state.edges[eIdx];
      if (e.owner !== null) return false;
      // Block pure sea edges (no adjacent land hex). Coastal edges (land+sea) still allow roads.
      if (!e.hexes.some(hi => state.hexes[hi] && state.hexes[hi].type !== "sea")) return false;
      if (setup) {
        if (state.lastSetupVertex === null) return false;
        return e.a === state.lastSetupVertex || e.b === state.lastSetupVertex;
      }
      function endpointConnects(vIdx) {
        const v = state.vertices[vIdx];
        if (v.owner === playerIdx) return true;
        if (v.owner !== null && v.owner !== playerIdx) return false;
        return v.edges.some(x => x !== eIdx && state.edges[x].owner === playerIdx);
      }
      return endpointConnects(e.a) || endpointConnects(e.b);
    }

    function isSeaEdge(eIdx) {
      return state.edges[eIdx].hexes.some(hi => state.hexes[hi] && state.hexes[hi].type === "sea");
    }

    function computeIslandClusters() {
      const seaTypes = new Set(["sea"]);
      const visited = new Set();
      const clusters = [];
      state.hexCluster = {};
      for (const h of state.hexes) {
        if (!h || seaTypes.has(h.type) || visited.has(h.index)) continue;
        const cluster = [];
        const queue = [h.index];
        visited.add(h.index);
        while (queue.length) {
          const hIdx = queue.shift();
          cluster.push(hIdx);
          for (const eIdx of state.hexes[hIdx].edges) {
            for (const adjHIdx of state.edges[eIdx].hexes) {
              if (adjHIdx === hIdx || visited.has(adjHIdx)) continue;
              const adj = state.hexes[adjHIdx];
              if (!adj || seaTypes.has(adj.type)) continue;
              visited.add(adjHIdx);
              queue.push(adjHIdx);
            }
          }
        }
        const cIdx = clusters.length;
        clusters.push(cluster);
        for (const hIdx of cluster) state.hexCluster[hIdx] = cIdx;
      }
      state.islandClusters = clusters;
      state.islandBonusClaimed = {};
      state.islandBonusEnabled = clusters.length > 1;
    }

    function getClusterForVertex(vIdx) {
      const v = state.vertices[vIdx];
      for (const hIdx of v.hexes) {
        if (state.hexCluster[hIdx] !== undefined) return state.hexCluster[hIdx];
      }
      return null;
    }

    function checkIslandBonus(playerIdx, vIdx) {
      if (!state.islandBonusEnabled) return;
      const cIdx = getClusterForVertex(vIdx);
      if (cIdx === null) return;
      if (!state.islandBonusClaimed.hasOwnProperty(cIdx)) {
        state.islandBonusClaimed[cIdx] = playerIdx;
        const p = state.players[playerIdx];
        if (p) {
          p.islandBonusVP = (p.islandBonusVP || 0) + 2;
          showToast(`${pt("islandBonus")} (${p.name})`, 3200, { bottom: 160 });
        }
      }
    }

    function revealFogNear(type, idx) {
      const hexIdxs = type === "edge"
        ? new Set([...state.edges[idx].hexes, ...state.vertices[state.edges[idx].a].hexes, ...state.vertices[state.edges[idx].b].hexes])
        : new Set(state.vertices[idx].hexes);
      const revealed = [...hexIdxs].filter(hi => state.hexes[hi]?.fogHidden);
      if (!revealed.length) return;
      revealed.forEach(hi => {
        state.hexes[hi].fogHidden = false;
        state.hexes[hi]._justRevealed = true;
      });
      const actor = state.players[state.currentPlayer]?.name || "플레이어";
      addActivityLog("build", `${actor} 🌫️ 안개 걷힘 — 타일 ${revealed.length}개 발견`);
      showToast(`🌫️ 안개 걷힘! 새 땅 발견!`, 2200);
    }

    function movePirate(hexIndex, forcedVictim = null) {
      const hex = state.hexes[hexIndex];
      if (!hex || hex.type !== "sea") return { ok: false };
      if (hexIndex === state.pirate) return { ok: false };
      state.pirate = hexIndex;
      const pIdx = state.currentPlayer;
      const victims = new Set();
      for (const vIdx of hex.vertices) {
        for (const eIdx of state.vertices[vIdx].edges) {
          const e = state.edges[eIdx];
          if (e.buildType === "ship" && e.owner !== null && e.owner !== pIdx &&
              totalResourceCount(state.players[e.owner]) > 0) {
            victims.add(e.owner);
          }
        }
      }
      let victimIdx = forcedVictim !== null ? forcedVictim : -1;
      if (victimIdx === -1 && victims.size) {
        const list = [...victims];
        victimIdx = list[Math.floor(Math.random() * list.length)];
      }
      const picked = stealFromVictim(pIdx, victimIdx, null);
      const actorName = state.players[pIdx]?.name || "플레이어";
      const victimName = victimIdx !== -1 ? (state.players[victimIdx]?.name || "상대") : "";
      addActivityLog("robber", picked && victimName
        ? `${actorName} ☠️ 해적 이동 — ${victimName}에게 ${formatStealResourceText(picked)} 강탈`
        : `${actorName} ☠️ 해적 이동`);
      showToast(`☠️ ${actorName} 해적 이동! ${victimName ? victimName + " 자원 강탈!" : ""}`, 2600, { bottom: 150 });
      state.phase = state.phaseBeforeKnight ? "main" : "main";
      state.canEndTurn = true;
      state.phaseBeforeKnight = null;
      return { ok: true };
    }

    function getMovableShips(playerIdx) {
      if (state.movedShipThisTurn) return [];
      const ships = state.players[playerIdx]?.ships || [];
      const movable = [];
      for (const eIdx of ships) {
        const e = state.edges[eIdx];
        for (const vIdx of [e.a, e.b]) {
          const v = state.vertices[vIdx];
          if (v.owner !== null && v.owner !== playerIdx) continue;
          if (v.owner === playerIdx && v.building) continue;
          const ownedHere = v.edges.filter(x => state.edges[x].owner === playerIdx);
          if (ownedHere.length === 1) {
            movable.push(eIdx);
            break;
          }
        }
      }
      return movable;
    }

    function moveShip(playerIdx, fromEIdx, toEIdx) {
      const e = state.edges[fromEIdx];
      if (e.owner !== playerIdx || e.buildType !== "ship") return false;
      e.owner = null;
      e.buildType = undefined;
      const p = state.players[playerIdx];
      p.ships = p.ships.filter(x => x !== fromEIdx);
      if (!canPlaceShip(playerIdx, toEIdx)) {
        e.owner = playerIdx;
        e.buildType = "ship";
        p.ships.push(fromEIdx);
        return false;
      }
      state.edges[toEIdx].owner = playerIdx;
      state.edges[toEIdx].buildType = "ship";
      p.ships.push(toEIdx);
      state.movedShipThisTurn = true;
      recalcLongestRoad();
      return true;
    }

    function canPlaceShip(playerIdx, eIdx, setup = false) {
      const e = state.edges[eIdx];
      if (e.owner !== null) return false;
      if (!isSeaEdge(eIdx)) return false;
      // Block edges adjacent to pirate hex
      if (state.pirate >= 0) {
        const ph = state.hexes[state.pirate];
        if (ph && (ph.edges || []).includes(eIdx)) return false;
      }
      if (setup) {
        if (state.lastSetupVertex === null) return false;
        return e.a === state.lastSetupVertex || e.b === state.lastSetupVertex;
      }
      function endpointConnects(vIdx) {
        const v = state.vertices[vIdx];
        if (v.owner === playerIdx) return true;
        if (v.owner !== null && v.owner !== playerIdx) return false;
        // Empty vertex: only ships chain to ships; roads do not connect to ships without a building
        return v.edges.some(x => x !== eIdx && state.edges[x].owner === playerIdx && state.edges[x].buildType === "ship");
      }
      return endpointConnects(e.a) || endpointConnects(e.b);
    }

    function placeShip(playerIdx, eIdx, free = false) {
      const player = state.players[playerIdx];
      if (!free && !canAfford(player, COST.ship)) return false;
      if (!canPlaceShip(playerIdx, eIdx)) return false;
      if (!free) spend(player, COST.ship);
      state.edges[eIdx].owner = playerIdx;
      state.edges[eIdx].buildType = "ship";
      player.ships.push(eIdx);
      revealFogNear("edge", eIdx);
      recalcLongestRoad();
      return true;
    }

    function validShipsFor(playerIdx) {
      if (!state.hexes.some(h => h.type === "sea")) return [];
      return state.edges.filter(e => canPlaceShip(playerIdx, e.index)).map(e => e.index);
    }

    function canUpgradeCity(playerIdx, vIdx) {
      const v = state.vertices[vIdx];
      if (v.building !== "settlement" || v.owner !== playerIdx) return false;
      const p = state.players[playerIdx];
      const cities = (p?.buildings || []).filter(b => b.type === "city").length;
      return cities < 4;
    }

    function placeSettlement(playerIdx, vIdx, free = false) {
      const player = state.players[playerIdx];
      if (!free && !canAfford(player, COST.settlement)) return false;
      if (!canPlaceSettlement(playerIdx, vIdx, free && (state.phase === "setup1" || state.phase === "setup2"))) return false;
      if (!free) spend(player, COST.settlement);
      state.vertices[vIdx].building = "settlement";
      state.vertices[vIdx].owner = playerIdx;
      state.lastPlacedVertex = vIdx;
      player.buildings.push({ type: "settlement", vertex: vIdx });
      revealFogNear("vertex", vIdx);
      // Island bonus: first non-setup settlement on a new island cluster
      if (!free) checkIslandBonus(playerIdx, vIdx);
      else {
        // During setup: claim the island (no VP), so it's marked as settled
        const cIdx = getClusterForVertex(vIdx);
        if (cIdx !== null && !state.islandBonusClaimed.hasOwnProperty(cIdx)) {
          state.islandBonusClaimed[cIdx] = playerIdx;
        }
      }
      recalcAllVP();
      return true;
    }

    function placeRoad(playerIdx, eIdx, free = false) {
      const player = state.players[playerIdx];
      if (!free && !canAfford(player, COST.road)) return false;
      if (!canPlaceRoad(playerIdx, eIdx, free && (state.phase === "setup1" || state.phase === "setup2"))) return false;
      if (!free) spend(player, COST.road);
      state.edges[eIdx].owner = playerIdx;
      player.roads.push(eIdx);
      revealFogNear("edge", eIdx);
      recalcLongestRoad();
      recalcAllVP();
      return true;
    }

    function upgradeCity(playerIdx, vIdx) {
      const player = state.players[playerIdx];
      if (!canAfford(player, COST.city)) return false;
      if (!canUpgradeCity(playerIdx, vIdx)) return false;
      spend(player, COST.city);
      state.vertices[vIdx].building = "city";
      state.lastPlacedVertex = vIdx;
      const target = player.buildings.find(b => b.vertex === vIdx);
      if (target) target.type = "city";
      recalcAllVP();
      return true;
    }

    function grantSecondSetupResources(playerIdx, vIdx) {
      const player = state.players[playerIdx];
      if (!player) return;
      for (const hIdx of state.vertices[vIdx].hexes) {
        const hex = state.hexes[hIdx];
        const PROD_TYPES = new Set(["brick","lumber","wool","grain","ore"]);
        if (PROD_TYPES.has(hex.type)) {
          player.resources[hex.type] += 1;
        }
        if (hex.type === "gold") {
          if (player.isAI || (isMultiMode() && playerIdx !== localPlayerIndex())) {
            if (player.isAI) {
              const preferred = pickBestAIGoldResource(playerIdx);
              const amount = Math.min(1, bankRemaining(preferred));
              if (amount > 0) player.resources[preferred] += amount;
            }
          } else {
            state._pendingHumanGold += 1;
          }
        }
      }
    }

    function pickBestAIGoldResource(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return "grain";
      return RESOURCES.reduce((best, r) => (p.resources[r] || 0) < (p.resources[best] || 0) ? r : best, "grain");
    }

    function showGainsToast(gains) {
      const humanIdx = localPlayerIndex();
      const parts = [];
      for (const [pidx, res] of Object.entries(gains)) {
        const pi = Number(pidx);
        const name = state.players[pi]?.name || "플레이어";
        const detail = Object.entries(res).map(([r, n]) => `${RESOURCE_ICONS[r] || r}×${n}`).join(" ");
        parts.push(`${name}: ${detail}`);
      }
      if (parts.length > 0) { SFX.resource(); showToast(`🎁\n${parts.join("\n")}`, 4000, { bottom: 150 }); }
    }

    function distributeResources(number) {
      const humanIdx = localPlayerIndex();
      const gains = {};
      state._pendingHumanGold = 0;

      for (const hex of state.hexes) {
        if (hex.number !== number || hex.index === state.robber) continue;
        for (const vIdx of hex.vertices) {
          const v = state.vertices[vIdx];
          if (!v.building || v.owner === null) continue;
          const rawAmount = v.building === "city" ? 2 : 1;
          const owner = state.players[v.owner];

          if (hex.type === "gold") {
            if (owner && !owner.isAI) {
              if (v.owner === humanIdx) {
                state._pendingHumanGold += rawAmount; // deferred to picker
              } else if (isMultiMode() && v.owner !== humanIdx) {
                // Wait for that human client's synced GOLD_CHOICE action.
              } else {
                const preferred = pickBestAIGoldResource(v.owner);
                const amount = Math.min(rawAmount, bankRemaining(preferred));
                if (amount > 0) { owner.resources[preferred] += amount; if (!gains[v.owner]) gains[v.owner] = {}; gains[v.owner][preferred] = (gains[v.owner][preferred] || 0) + amount; }
              }
            } else {
              const preferred = pickBestAIGoldResource(v.owner);
              const amount = Math.min(rawAmount, bankRemaining(preferred));
              if (amount > 0) { owner.resources[preferred] += amount; if (!gains[v.owner]) gains[v.owner] = {}; gains[v.owner][preferred] = (gains[v.owner][preferred] || 0) + amount; }
            }
            continue;
          }

          const produced = resolveProducedResources(hex.type, rawAmount);
          for (const [resource, requested] of Object.entries(produced)) {
            const amount = Math.min(requested, bankRemaining(resource));
            if (amount <= 0) continue;
            owner.resources[resource] += amount;
            if (!gains[v.owner]) gains[v.owner] = {};
            gains[v.owner][resource] = (gains[v.owner][resource] || 0) + amount;
          }
        }
      }

      if (state._pendingHumanGold > 0) {
        state._pendingGains = gains; // toast deferred until picker resolves
      } else {
        showGainsToast(gains);
      }
      if (state.citiesKnights) distributeCommodities(number);
    }

    function rollEventDice() {
      return EVENT_DICE_FACES[Math.floor(Math.random() * EVENT_DICE_FACES.length)];
    }

    function advanceBarbarian() {
      state.barbarianPos = (state.barbarianPos || 0) + 1;
      SFX.barbarianAdvance();
      addActivityLog("ck", `야만인 전진 ${state.barbarianPos}/${BARBARIAN_MAX}`);
      if (state.barbarianPos >= BARBARIAN_MAX) {
        triggerBarbarianAttack();
      } else if (state.barbarianPos >= 5) {
        ckAnnounce("야만인 접근!");
      }
    }

    function triggerBarbarianAttack() {
      let activeKnights = 0;
      let totalCities = 0;
      const knightsByPlayer = {};
      for (let i = 0; i < state.players.length; i++) {
        const p = state.players[i];
        if (!p) continue;
        totalCities += p.buildings.filter(b => b.type === "city").length;
        let ak = 0;
        for (const vIdx of (p.ckKnights || [])) {
          if (state.knightActive[vIdx]) ak++;
        }
        knightsByPlayer[i] = ak;
        activeKnights += ak;
      }
      const countSummary = `기사단${activeKnights} vs 도시${totalCities}`;
      const defended = activeKnights >= totalCities;
      if (defended) {
        let bestPIdx = -1, bestCount = -1;
        for (const [i, cnt] of Object.entries(knightsByPlayer)) {
          if (cnt > bestCount) { bestCount = cnt; bestPIdx = Number(i); }
        }
        SFX.defended();
        if (bestPIdx >= 0 && bestCount > 0) {
          const decks = ["science","trade","politics"];
          drawProgressCard(bestPIdx, decks[Math.floor(Math.random() * decks.length)]);
          showToast(`야만인 격퇴! (${countSummary})\n${state.players[bestPIdx].name} 진보카드 획득`, 3500);
          ckAnnounce("야만인 격퇴! 방어 성공!");
          addActivityLog("ck", `야만인 격퇴 (${countSummary}) — ${state.players[bestPIdx].name} 진보카드 획득`);
        } else {
          showToast(`야만인 격퇴! 방어 성공 (${countSummary})`, 3000);
          ckAnnounce("방어 성공!");
          addActivityLog("ck", `야만인 격퇴 (${countSummary}) — 방어 성공`);
        }
      } else {
        SFX.barbarianAttack();
        ckAnnounce("야만인 공격!");
        let worstPIdx = -1, worstCount = Infinity;
        for (const [i, cnt] of Object.entries(knightsByPlayer)) {
          const p = state.players[Number(i)];
          if (!p || !p.buildings.some(b => b.type === "city")) continue;
          if (cnt < worstCount) { worstCount = cnt; worstPIdx = Number(i); }
        }
        if (worstPIdx >= 0) {
          const p = state.players[worstPIdx];
          const cityBuilding = p.buildings.find(b => b.type === "city");
          if (cityBuilding) {
            cityBuilding.type = "settlement";
            const v = state.vertices[cityBuilding.vertex];
            if (v) v.building = "settlement";
            recalcAllVP();
            showToast(`야만인 공격! (${countSummary})\n${p.name}의 도시 강등`, 4000);
            addActivityLog("ck", `야만인 공격 (${countSummary}) — ${p.name} 도시 강등`);
          }
        } else {
          showToast(`야만인 공격! (${countSummary}) — 강등 대상 없음`, 3000);
          addActivityLog("ck", `야만인 공격 (${countSummary}) — 강등 대상 없음`);
        }
      }
      state.barbarianPos = 0;
      for (const vIdx of Object.keys(state.knightActive)) {
        state.knightActive[vIdx] = false;
      }
    }

    function validCKKnightSpots(pIdx) {
      const result = [];
      for (const v of state.vertices) {
        if (!v) continue;
        if (v.building) continue;
        if (state.knightLevels[v.index] !== undefined) continue;
        const adjOwnedEdge = v.edges.some(eIdx => state.edges[eIdx]?.owner === pIdx);
        if (adjOwnedEdge) result.push(v.index);
      }
      return result;
    }

    function buildCKKnight(pIdx, vIdx) {
      const p = state.players[pIdx];
      if (!p || !canAfford(p, COST_KNIGHT_BUILD)) return false;
      if (state.vertices[vIdx]?.building) return false;
      if (state.knightLevels[vIdx] !== undefined) return false;
      spend(p, COST_KNIGHT_BUILD);
      state.knightLevels[vIdx] = 1;
      state.knightActive[vIdx] = false;
      p.ckKnights = [...(p.ckKnights || []), vIdx];
      SFX.knight();
      addActivityLog("ck", `${state.players[pIdx]?.name || "플레이어"} 기사단 배치`);
      recalcAllVP();
      return true;
    }

    function activateCKKnight(pIdx, vIdx) {
      const p = state.players[pIdx];
      if (!p || !canAfford(p, COST_KNIGHT_ACTIVATE)) return false;
      if (state.knightLevels[vIdx] === undefined) return false;
      if (state.knightActive[vIdx]) return false;
      spend(p, COST_KNIGHT_ACTIVATE);
      state.knightActive[vIdx] = true;
      SFX.knightActivate();
      addActivityLog("ck", `${state.players[pIdx]?.name || "플레이어"} 기사단 활성화`);
      return true;
    }

    function distributeCommodities(number) {
      const gains = {};
      for (const hex of state.hexes) {
        if (hex.number !== number || hex.index === state.robber) continue;
        for (const vIdx of hex.vertices) {
          const v = state.vertices[vIdx];
          if (v.building !== "city" || v.owner === null) continue;
          const owner = state.players[v.owner];
          if (!owner) continue;
          const commodity = Object.entries(COMMODITY_SOURCE).find(([, res]) => res === hex.type)?.[0];
          if (!commodity) continue;
          if (!owner.commodities) owner.commodities = { cloth: 0, coin: 0, paper: 0 };
          owner.commodities[commodity] = (owner.commodities[commodity] || 0) + 1;
          if (!gains[v.owner]) gains[v.owner] = {};
          gains[v.owner][commodity] = (gains[v.owner][commodity] || 0) + 1;
        }
      }
      const humanIdx = localPlayerIndex();
      for (const [pIdxStr, pGains] of Object.entries(gains)) {
        const gainStr = Object.entries(pGains).map(([k,v])=>`${k}×${v}`).join(" ");
        if (!gainStr) continue;
        const pIdx = Number(pIdxStr);
        if (pIdx === humanIdx) { showToast(`🏭 상품 획득: ${gainStr}`, 2000); SFX.commodity(); }
        addActivityLog("ck", `${state.players[pIdx]?.name || "플레이어"} 상품 획득: ${gainStr}`);
      }
    }

    function drawProgressCard(pIdx, deck) {
      const p = state.players[pIdx];
      if (!p) return false;
      const available = PROGRESS_CARD_DECKS_PHASE1[deck] || [];
      if (!available.length) return false;
      const cardType = available[Math.floor(Math.random() * available.length)];
      if (!p.progressCards) p.progressCards = [];
      p.progressCards.push({ deck, type: cardType });
      const deckIcon = { science:"📗", trade:"📘", politics:"📕" }[deck] || "";
      const cardNames = { crane:"크레인", irrigation:"관개", resourceMonopoly:"자원독점", merchantFleet:"상인함대", knightCard:"기사패", spy:"스파이" };
      addActivityLog("ck", `${p.name || "플레이어"} 진보카드 획득: ${deckIcon}${cardNames[cardType]||cardType}`);
      return true;
    }

    function playProgressCard(pIdx, cardType, opts) {
      const p = state.players[pIdx];
      if (!p) return false;
      const idx = (p.progressCards || []).findIndex(c => c.type === cardType);
      if (idx < 0) return false;
      p.progressCards.splice(idx, 1);
      const RES_NAMES = { brick:"벽돌", lumber:"나무", wool:"양털", grain:"밀", ore:"광석" };
      switch (cardType) {
        case "crane": {
          const gained = 2;
          p.resources.ore = (p.resources.ore || 0) + gained;
          showToast(`크레인: 광석 ${gained}개 즉시 획득 (도시 건설 지원)`, 2500);
          break;
        }
        case "irrigation": {
          // 밀 타일에 인접한 내 마을/도시당 밀 2개 획득
          let gained = 0;
          const counted = new Set();
          for (const hex of state.hexes) {
            if (hex.type !== "grain") continue;
            for (const vIdx of (hex.vertices || [])) {
              if (counted.has(vIdx)) continue;
              const v = state.vertices[vIdx];
              if (!v || !v.building || v.owner !== pIdx) continue;
              counted.add(vIdx);
              const amount = v.building === "city" ? 2 : 2;
              p.resources.grain = (p.resources.grain || 0) + amount;
              gained += amount;
            }
          }
          if (gained > 0) showToast(`🌾 관개: 밀 ${gained}개 획득`, 2500);
          else showToast("🌾 관개: 밀 타일에 건물이 없어 획득 없음", 2500);
          break;
        }
        case "resourceMonopoly": {
          const targetRes = opts?.resource;
          if (!targetRes) return false; // must be called with chosen resource
          let gained = 0;
          for (let i = 0; i < state.players.length; i++) {
            if (i === pIdx) continue;
            const opp = state.players[i];
            if ((opp.resources[targetRes] || 0) > 0) {
              opp.resources[targetRes]--;
              p.resources[targetRes] = (p.resources[targetRes] || 0) + 1;
              gained++;
            }
          }
          showToast(`자원 독점: ${RES_NAMES[targetRes]||targetRes} ${gained}장 획득`, 2500);
          break;
        }
        case "merchantFleet":
          state.merchantFleetPlayerIdx = pIdx;
          showToast("상인 함대: 이번 턴 모든 자원 2:1 거래 가능!", 3000);
          render(); // 즉시 버튼 활성화 반영
          break;
        case "knightCard": {
          const myKnight = (p.ckKnights || []).find(vIdx => !state.knightActive[vIdx]);
          if (myKnight !== undefined) {
            state.knightActive[myKnight] = true;
            showToast("기사패: 기사단 즉시 활성화!", 2500);
          } else {
            showToast("기사패: 활성화할 비활성 기사단 없음", 2000);
          }
          break;
        }
        case "spy": {
          let stolen = false;
          for (let i = 0; i < state.players.length; i++) {
            if (i === pIdx) continue;
            const opp = state.players[i];
            if ((opp.progressCards || []).length > 0) {
              const stolen_card = opp.progressCards.splice(Math.floor(Math.random() * opp.progressCards.length), 1)[0];
              p.progressCards.push(stolen_card);
              const cardDeckIcon = { science:"📗", trade:"📘", politics:"📕" };
              const cardNames = { crane:"크레인", irrigation:"관개", resourceMonopoly:"자원독점", merchantFleet:"상인함대", knightCard:"기사패", spy:"스파이" };
              showToast(`🕵️ 스파이: ${opp.name}에게서 ${cardDeckIcon[stolen_card?.deck]||""}${cardNames[stolen_card?.type]||stolen_card?.type} 탈취!`, 3000);
              stolen = true; break;
            }
          }
          if (!stolen) showToast("🕵️ 스파이: 빼앗을 카드 없음", 2000);
          break;
        }
      }
      const _cardNames = { crane:"크레인", irrigation:"관개", resourceMonopoly:"자원독점", merchantFleet:"상인함대", knightCard:"기사패", spy:"스파이" };
      addActivityLog("ck", `${p.name || "플레이어"} 진보카드 사용: ${_cardNames[cardType]||cardType}`);
      recalcAllVP();
      return true;
    }

    function showGoldPicker(amount, currentResources) {
      return new Promise(resolve => {
        const chosen = {}; RESOURCES.forEach(r => chosen[r] = 0);
        let remaining = amount;
        const GOLD_PICKER_TIMEOUT_SECONDS = 20;
        let timeLeft = GOLD_PICKER_TIMEOUT_SECONDS;
        let timerInterval = null;

        const finish = (result) => {
          clearInterval(timerInterval);
          const el = document.getElementById("gold-picker-modal");
          if (el) el.remove();
          delete window._gAdj; delete window._gOK;
          resolve(result);
        };

        const autoChoose = () => {
          const result = {}; RESOURCES.forEach(r => result[r] = chosen[r]);
          let left = remaining;
          while (left > 0) {
            const r = RESOURCES[Math.floor(Math.random() * RESOURCES.length)];
            result[r] = (result[r] || 0) + 1; left--;
          }
          finish(result);
        };

        const render = () => {
          let el = document.getElementById("gold-picker-modal");
          if (!el) { el = document.createElement("div"); el.id = "gold-picker-modal"; document.body.appendChild(el); }
          el.innerHTML = `<div class="gold-picker-overlay"><div class="gold-picker-card">
            <div class="gold-picker-title">💰 금광 수확!</div>
            <div class="gold-picker-remaining">자원 <strong>${remaining}</strong>개 선택 가능 <span style="color:${timeLeft<=3?'#ef4444':'#fbbf24'};font-size:12px;">${timeLeft}초</span></div>
            <div style="font-size:12px;color:var(--muted);text-align:center;margin:-6px 0 8px;">20초 안에 고르지 않으면 랜덤 지급</div>
            ${RESOURCES.map(r => `<div class="gold-picker-row">
              <span class="gold-picker-label">${RESOURCE_ICONS[r]} ${RESOURCE_NAMES[r]}<span style="font-size:12px;opacity:0.68;margin-left:4px;">보유 ${(currentResources&&currentResources[r])||0}개</span></span>
              <div class="gold-picker-controls">
                <button onclick="window._gAdj('${r}',-1)" ${chosen[r]<=0?"disabled":""}>−</button>
                <span class="gold-picker-count">${chosen[r]}</span>
                <button onclick="window._gAdj('${r}',1)" ${remaining<=0?"disabled":""}>+</button>
              </div></div>`).join("")}
            <button style="width:100%;margin-top:14px;padding:10px;border-radius:10px;background:${remaining===0?'var(--accent)':'rgba(255,255,255,0.1)'};border:none;color:#fff;font-size:15px;font-weight:700;cursor:${remaining===0?'pointer':'default'};opacity:${remaining===0?1:0.45};"
              ${remaining!==0?"disabled":""} onclick="window._gOK()">확인</button>
          </div></div>`;
        };

        window._gAdj = (r, d) => {
          if (d < 0 && chosen[r] <= 0) return;
          if (d > 0 && remaining <= 0) return;
          chosen[r] += d; remaining -= d; render();
        };
        window._gOK = () => finish({ ...chosen });

        timerInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) { autoChoose(); return; }
          render();
        }, 1000);

        render();
      });
    }

    function applyGoldChoice(playerId, resources = {}) {
      const pIdx = playerIndexFromAnyId(playerId);
      const player = state.players[pIdx];
      if (pIdx < 0 || !player) return false;
      const gains = {};
      for (const [r, n] of Object.entries(resources || {})) {
        if (!RESOURCES.includes(r)) continue;
        const requested = Math.max(0, Number(n) || 0);
        const amount = Math.min(requested, bankRemaining(r));
        if (amount > 0) {
          player.resources[r] += amount;
          if (!gains[pIdx]) gains[pIdx] = {};
          gains[pIdx][r] = (gains[pIdx][r] || 0) + amount;
        }
      }
      if (Object.keys(gains).length) showGainsToast(gains);
      recalcAllVP();
      return true;
    }

    async function resolveHumanGoldIfNeeded() {
      if (!state._pendingHumanGold) return;
      const humanIdx = localPlayerIndex();
      const human = state.players[humanIdx];
      const chosen = await showGoldPicker(state._pendingHumanGold, human.resources);
      state._pendingHumanGold = 0; state._pendingGains = null;
      if (isMultiMode()) {
        await sendGameAction(ACTION.GOLD_CHOICE, { playerId: human.userId || human.id, resources: chosen });
      } else {
        applyGoldChoice(human.userId || human.id, chosen);
        render();
      }
    }

    const DICE_FACES = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

    function getDiceRevealDelayMs() {
      return 1000;
    }

    function getDiceResultMarkup(d1, d2, sum) {
      return `<span class="dice-pair"><span class="die-face">${DICE_FACES[d1] || "🎲"}</span><span class="die-face">${DICE_FACES[d2] || "🎲"}</span></span><span class="dice-total">${sum}</span>`;
    }

    function renderDiceButtonContent(canRoll) {
      if (state.lastDiceValues && state.lastDiceSum && !canRoll) {
        return getDiceResultMarkup(state.lastDiceValues[0], state.lastDiceValues[1], state.lastDiceSum);
      }
      return `<span class="dice-pair"><span class="die-face">🎲</span><span class="die-face">🎲</span></span><span class="dice-label-small">주사위</span>`;
    }

    async function animateDiceRoll(el, d1, d2, sum) {
      if (!el) return;
      el.classList.remove("dice-animate");
      void el.offsetWidth;
      el.classList.add("dice-animate");
      const started = Date.now();
      const tick = () => {
        const a = 1 + Math.floor(Math.random() * 6);
        const b = 1 + Math.floor(Math.random() * 6);
        el.innerHTML = getDiceResultMarkup(a, b, a + b);
      };
      tick();
      const timer = setInterval(tick, 90);
      if (window.anime) {
        anime({ targets: el, rotate: [{ value: -16 }, { value: 18 }, { value: -10 }, { value: 0 }], scale: [1, 1.18, 0.96, 1.08, 1], duration: getDiceRevealDelayMs(), easing: "easeOutElastic(1, .6)" });
      }
      await new Promise(r => setTimeout(r, Math.max(0, getDiceRevealDelayMs() - (Date.now() - started))));
      clearInterval(timer);
      el.innerHTML = getDiceResultMarkup(d1, d2, sum);
      el.style.animation = "dice-bounce 0.4s ease";
      setTimeout(() => { if (el) el.style.animation = ""; }, 400);
      if (window.anime) {
        if (sum === 7) anime({ targets: el, backgroundColor: ["#1d5c3d", "#b33838", "#1d5c3d"], duration: 500, easing: "easeInOutSine" });
        else if (sum === 6 || sum === 8) anime({ targets: el, backgroundColor: ["#1d5c3d", "#d9a323", "#1d5c3d"], duration: 500, easing: "easeInOutSine" });
      }
    }

    function getHexLabel(hexIndex) {
      const hex = state.hexes?.[hexIndex];
      if (!hex) return "알 수 없는 타일";
      const number = hex.number ? `${hex.number}번 ` : "";
      return `${number}${RESOURCE_NAMES[hex.type] || hex.type}`;
    }

    function formatStealResourceText(resource) {
      const icon = RESOURCE_ICONS[resource] || resource;
      return `${icon} ${resourceName(resource)} 1장`;
    }

    function formatRobberMoveMessage({ actorName, source, hexLabel, victimName, stolenResource }) {
      const sourceParticle = source === "도둑" ? "으로" : "로";
      if (victimName && stolenResource) {
        return `${actorName}가 ${source}${sourceParticle} ${hexLabel}에 도둑을 옮기고 ${victimName}에게서 ${RESOURCE_ICONS[stolenResource]} 1장을 가져갔습니다.`;
      }
