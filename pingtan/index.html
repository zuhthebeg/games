  <style>
    :root {
      --bg: #12324a;
      --panel: #0e2434;
      --panel-2: #152f43;
      --line: #2a4f6d;
      --text: #f4f7fb;
      --muted: #a7bdcf;
      --accent: #4fc27f;
      --danger: #e95b5b;
      --brick: #b46544;
      --lumber: #2f8a4a;
      --wool: #80be6a;
      --grain: #dcbf4d;
      --ore: #6d7382;
      --desert: #cdb687;
      --lake: #1a6b9e;
      --sea: #0d4a72;
      --volcano: #7a2020;
      --gold: #a87200;
      --strait: #0d4a72;
      --pingtan-vh: 100dvh;
      --pingtan-viewport-top: 0px;
      --wallet-bar-height: 52px;
      --turn-banner-height: 60px;
      --app-top-offset: calc(var(--wallet-bar-height) + env(safe-area-inset-top) + var(--pingtan-viewport-top));
    }

    * { box-sizing: border-box; }

    html { overflow: hidden; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 0%, #1c4d71 0%, var(--bg) 50%, #0b2232 100%);
      color: var(--text);
      min-height: var(--pingtan-vh, 100dvh);
      padding-top: var(--app-top-offset);
      overflow: hidden;
    }

    .hidden { display: none !important; }

    #app {
      height: calc(var(--pingtan-vh, 100dvh) - var(--wallet-bar-height) - env(safe-area-inset-top) - var(--pingtan-viewport-top) - env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 2px;
      padding-top: calc(var(--turn-banner-height) + 2px);
      padding-bottom: calc(2px + env(safe-area-inset-bottom));
      overflow: hidden;
    }

    .players-bar {
      display: flex;
      flex-direction: row;
      gap: 4px;
    }

    .player-card {
      flex: 1;
      min-width: 0;
      background: rgba(7, 18, 27, 0.85);
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 11px;
    }

    .player-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .status {
      border: 1px solid var(--line);
      background: rgba(5, 16, 24, 0.7);
      border-radius: 10px;
      padding: 6px;
      font-size: 12px;
      text-align: center;
    }

    .map-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(7, 24, 37, 0.65), rgba(8, 20, 31, 0.9));
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: none;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      cursor: grab;
    }

    .map-wrap.dragging {
      cursor: grabbing;
    }

    .board {
      position: relative;
      width: 900px;
      height: 620px;
      flex: 0 0 auto;
      margin: auto;
    }

    .port-label {
      position: absolute;
      transform: translate(-50%, -50%);
      background: rgba(7, 18, 27, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 6px;
      padding: 2px 5px;
      font-size: 9px;
      pointer-events: none;
      z-index: 5;
      white-space: nowrap;
      color: var(--text);
    }

    .cost-hint {
      font-size: 9px;
      opacity: 0.7;
      display: block;
      line-height: 1.2;
      margin-top: 1px;
    }
    .missing-res {
      color: #e95b5b;
      font-size: 9px;
      display: block;
      margin-top: 1px;
    }
    button:disabled .cost-hint { opacity: 0.45; }

    .hex {
      position: absolute;
      width: calc(78px * var(--zoom, 1));
      height: calc(88px * var(--zoom, 1));
      transform: translate(-50%, -50%);
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: calc(4px * var(--zoom, 1));
      user-select: none;
    }

    .hex.brick { background: var(--brick); }
    .hex.lumber { background: var(--lumber); }
    .hex.wool { background: var(--wool); color: #14240f; }
    .hex.grain { background: var(--grain); color: #2c2408; }
    .hex.ore { background: var(--ore); }
    .hex.desert { background: var(--desert); color: #2a2417; }
    .hex.lake    { background: var(--lake); }
    .hex.sea     { background: var(--sea); }
    .hex.volcano { background: var(--volcano); }
    .hex.gold    { background: var(--gold); }
    .hex.strait  { background: var(--strait); }

    .number {
      width: calc(28px * var(--zoom, 1));
      height: calc(28px * var(--zoom, 1));
      border-radius: 999px;
      background: #f4e8c8;
      color: #272727;
      font-size: calc(14px * var(--zoom, 1));
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(0, 0, 0, 0.35);
    }

    .number.hot { color: #b71616; }
    /* ── Active Player Banner ── */
    #turn-banner {
      position: fixed;
      top: var(--app-top-offset); left: 0; right: 0;
      min-height: var(--turn-banner-height);
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
      align-items: center;
      padding: 5px 10px 6px;
      z-index: 200;
      background: rgba(10, 22, 35, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 13px;
      gap: 3px 8px;
      transition: background 0.3s;
    }
    #turn-banner .player-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }
    #turn-banner .banner-name {
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }
    #turn-banner .banner-action {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      text-align: center;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    #turn-banner .banner-turn-line {
      min-width: 0;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #turn-banner .banner-vps {
      display: flex;
      gap: 4px;
      font-size: 10px;
      flex-shrink: 0;
      flex-wrap: nowrap;
      align-items: center;
    }
    #turn-banner .vp-chip {
      padding: 2px 6px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      white-space: nowrap;
    }
    #turn-banner .vp-chip.active {
      background: rgba(255,255,255,0.18);
      font-weight: 700;
    }
    /* AI thinking pulse */
    @keyframes ai-think {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    #turn-banner.ai-thinking .banner-action {
      animation: ai-think 0.8s ease-in-out infinite;
    }
    /* banner offset handled with shared-wallet safe area */

    @keyframes dice-roll {
      0% { transform: scale(0.5) rotate(0deg); opacity: 0.3; }
      15% { transform: scale(1.4) rotate(90deg); opacity: 1; }
      30% { transform: scale(0.8) rotate(200deg); }
      45% { transform: scale(1.3) rotate(300deg); }
      60% { transform: scale(0.9) rotate(380deg); }
      75% { transform: scale(1.15) rotate(350deg); }
      100% { transform: scale(1) rotate(360deg); opacity: 1; }
    }

    .dice-animate {
      animation: dice-roll 0.7s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    .dice-button {
      min-width: 92px !important;
      padding: 6px 8px !important;
      line-height: 1.05;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.14) inset, 0 8px 18px rgba(0,0,0,0.25);
    }
    .dice-button .dice-pair {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      margin-bottom: 2px;
    }
    .die-face {
      display: inline-grid;
      place-items: center;
      min-width: 24px;
      height: 24px;
      border-radius: 7px;
      background: #f8fafc;
      color: #111827;
      font-size: 19px;
      font-weight: 900;
      box-shadow: 0 2px 0 rgba(0,0,0,0.3), 0 0 0 1px rgba(0,0,0,0.22) inset;
    }
    .dice-total {
      display: block;
      font-size: 18px;
      font-weight: 1000;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.75);
    }
    .dice-label-small {
      display: block;
      font-size: 10px;
      color: rgba(255,255,255,0.72);
      margin-top: 1px;
    }

    @keyframes dice-bounce {
      0%, 100% { transform: translateY(0); }
      30% { transform: translateY(-12px); }
      60% { transform: translateY(-5px); }
    }

    @keyframes robber-appear {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-180deg); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.5) rotate(10deg); opacity: 1; }
      70% { transform: translate(-50%, -50%) scale(0.9) rotate(-5deg); }
      100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    }

    .robber-animate {
      animation: robber-appear 0.6s cubic-bezier(0.2, 0.8, 0.3, 1);
    }

    .big-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      pointer-events: none;
      animation: big-overlay-in 0.3s ease-out;
    }
    @keyframes big-overlay-in {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes big-overlay-out {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(1.5); }
    }
    .big-overlay-content {
      text-align: center;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }
    .big-overlay .big-number {
      font-size: 72px;
      font-weight: 900;
      color: #fff;
    }
    .big-overlay .big-sub {
      font-size: 18px;
      color: rgba(255,255,255,0.8);
      margin-top: 4px;
    }
    .big-overlay.seven .big-number { color: #ef4444; }
    .big-overlay.robber-alert .big-number { font-size: 56px; }

    .gold-picker-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.35);
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 32px; z-index: 9999;
    }
    .gold-picker-card {
      background: rgba(30,24,16,0.82); border: 1px solid rgba(255,215,0,0.4);
      border-radius: 16px; padding: 16px 20px; width: min(340px, 92vw);
      box-shadow: 0 0 24px rgba(200,140,0,0.25); backdrop-filter: blur(6px);
    }
    .gold-picker-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; text-align: center; }
    .gold-picker-remaining { font-size: 13px; color: #fbbf24; text-align: center; margin-bottom: 14px; }
    .gold-picker-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .gold-picker-row:last-of-type { border-bottom: none; }
    .gold-picker-label { font-size: 15px; display: flex; gap: 6px; align-items: center; }
    .gold-picker-controls { display: flex; align-items: center; gap: 8px; }
    .gold-picker-controls button {
      width: 28px; height: 28px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08); color: #fff; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .gold-picker-controls button:disabled { opacity: 0.3; cursor: default; }
    .gold-picker-count { min-width: 20px; text-align: center; font-weight: 700; }

    @keyframes place-building {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      60% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(0.9); }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    .vertex.settlement.just-placed,
    .vertex.city.just-placed {
      animation: place-building 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes robber-pulse {
      0%, 100% { box-shadow: inset 0 0 0 3px rgba(220,50,50,0); }
      50% { box-shadow: inset 0 0 0 3px rgba(220,50,50,0.9), 0 0 20px rgba(220,50,50,0.6); }
    }

    .hex.has-robber {
      animation: robber-pulse 1.2s ease-in-out infinite;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .robber {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      filter: drop-shadow(0 0 6px rgba(255,0,0,0.7));
      z-index: 5;
      pointer-events: none;
    }
    .robber.entering {
      animation: robber-appear 0.6s cubic-bezier(0.2, 0.8, 0.3, 1);
    }
    @keyframes robber-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(255,0,0,0.5)); transform: translate(-50%, -50%) scale(1); }
      50% { filter: drop-shadow(0 0 10px rgba(255,0,0,0.9)); transform: translate(-50%, -50%) scale(1.1); }
    }
    .has-robber .robber {
      animation: robber-pulse 2s ease-in-out infinite;
    }

    .hex-hit {
      filter: drop-shadow(0 0 6px rgba(255,215,0,0.9)) drop-shadow(0 0 12px rgba(255,215,0,0.5)) brightness(1.3);
      z-index: 3 !important;
      animation: hex-hit-glow 1.5s ease-in-out infinite;
    }
    @keyframes hex-hit-glow {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(255,215,0,0.9)) brightness(1.3); }
      50% { filter: drop-shadow(0 0 14px rgba(255,215,0,1)) brightness(1.5); }
    }
    .hex-blocked {
      filter: drop-shadow(0 0 6px rgba(255,50,50,0.8)) brightness(0.7);
      z-index: 3 !important;
      animation: hex-blocked-pulse 1.5s ease-in-out infinite;
    }
    @keyframes hex-blocked-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(255,50,50,0.6)) brightness(0.7); }
      50% { filter: drop-shadow(0 0 10px rgba(255,50,50,0.9)) brightness(0.6); }
    }

    .vertex {
      position: absolute;
      width: calc(16px * var(--zoom, 1));
      height: calc(16px * var(--zoom, 1));
      border-radius: 999px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      z-index: 4;
    }

    .vertex.buildable {
      box-shadow: 0 0 0 6px rgba(79, 194, 127, 0.22);
      background: rgba(79, 194, 127, 0.4);
    }

    .vertex.settlement,
    .vertex.city {
      border: none;
      width: calc(20px * var(--zoom, 1));
      height: calc(20px * var(--zoom, 1));
      border-radius: 50%;
      cursor: default;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(11px * var(--zoom, 1));
      font-weight: 800;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.85), 0 2px 6px rgba(0,0,0,0.4);
      z-index: 5;
      position: absolute;
    }

    .vertex.city {
      width: calc(30px * var(--zoom, 1));
      height: calc(30px * var(--zoom, 1));
      border-radius: 6px;
      font-size: calc(13px * var(--zoom, 1));
      border: 2px solid rgba(255, 255, 255, 0.95);
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.95),
        0 0 0 5px rgba(9, 18, 28, 0.8),
        0 0 14px 3px var(--owner-color, rgba(255,255,255,0.4)),
        0 3px 10px rgba(0,0,0,0.55);
    }

    .vertex.settlement.player-0,
    .vertex.city.player-0 {
      box-shadow: 0 0 0 2.5px #fff, 0 0 10px 3px currentColor, 0 2px 8px rgba(0,0,0,0.4);
      animation: pulse-building 2.5s ease-in-out infinite;
    }

    @keyframes pulse-building {
      0%, 100% { box-shadow: 0 0 0 2.5px #fff, 0 0 10px 3px currentColor, 0 2px 8px rgba(0,0,0,0.4); }
      50% { box-shadow: 0 0 0 2.5px #fff, 0 0 16px 5px currentColor, 0 2px 8px rgba(0,0,0,0.4); }
    }

    .vertex.settlement.city-target::after {
      content: "";
      position: absolute;
      inset: -7px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      animation: city-target-ring 1.05s ease-in-out infinite;
    }

    @keyframes city-target-ring {
      0% { opacity: 0.9; transform: scale(0.86); }
      65% { opacity: 0.15; transform: scale(1.14); }
      100% { opacity: 0.8; transform: scale(0.94); }
    }

    .edge {
      position: absolute;
      height: calc(8px * var(--zoom, 1));
      transform-origin: left center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.35);
      cursor: pointer;
      z-index: 3;
    }

    .edge.buildable {
      background: rgba(79, 194, 127, 0.42);
      border-color: rgba(79, 194, 127, 0.8);
    }

    .edge.road {
      height: calc(10px * var(--zoom, 1));
      border: 1px solid rgba(0, 0, 0, 0.35);
    }

    .game-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .panel-info {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 4px 6px;
      background: rgba(8, 20, 30, 0.86);
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 0 0 auto;
    }

    .panel-action {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 4px 6px;
      background: rgba(8, 20, 30, 0.86);
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 0 0 auto;
    }

    .resources {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
      text-align: center;
    }

    .res {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      padding: 6px 2px;
      font-size: 12px;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 9px;
      padding: 8px 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }

    button.primary { background: #1d5c3d; border-color: #46a975; }
    button.danger { background: #632b2b; border-color: #b24a4a; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .actions button.selected-action {
      background: linear-gradient(180deg, #ffd54a, #f59e0b);
      border-color: #fff1a8;
      color: #1b1300;
      box-shadow: 0 0 0 2px rgba(255,215,0,0.55), 0 0 18px rgba(255,215,0,0.65);
      transform: translateY(-1px) scale(1.03);
    }
    .actions button.selected-action::before {
      content: "✓ ";
      font-weight: 900;
    }
    .actions button.settings-action {
      border-color: rgba(255,255,255,0.28);
      background: rgba(255,255,255,0.08);
    }

    .hint {
      font-size: 12px;
      text-align: center;
      color: var(--muted);
      min-height: 16px;
    }

    .vp-panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.04);
      display: grid;
      gap: 6px;
    }

    .vp-label {
      color: var(--accent);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
    }

    .vp-progress {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .vp-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #7de1a5);
      transition: width 0.2s ease;
    }

    .turn-timer {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.035);
      display: grid;
      gap: 5px;
    }
    .turn-timer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }
    .end-turn-timer-btn {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 7px;
      flex-shrink: 0;
    }

    .turn-timer-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .turn-timer-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      overflow: hidden;
    }

    .turn-timer-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffca66 0%, #ff8f57 50%, #e95b5b 100%);
      transition: width 0.18s linear;
    }

    .trade-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(6, 14, 22, 0.7);
      backdrop-filter: blur(3px);
      z-index: 1200;
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .trade-modal {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(13, 33, 48, 0.98), rgba(10, 24, 36, 0.98));
      padding: 14px;
      display: grid;
      gap: 12px;
      box-shadow: 0 14px 36px rgba(0,0,0,0.44);
    }

    .trade-modal h3 {
      margin: 0;
      font-size: 16px;
      text-align: center;
      color: var(--accent);
    }

    .trade-section {
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      display: grid;
      gap: 8px;
    }

    .trade-section-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
    }

    .trade-options {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .trade-option {
      padding: 6px 9px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .trade-option.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent) inset;
      color: var(--accent);
    }

    .trade-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .turn-toast {
      position: fixed;
      top: calc(52px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(13, 30, 45, 0.95);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 800;
      z-index: 1300;
      pointer-events: none;
      animation: turn-toast-fade 2s ease forwards;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    @keyframes turn-toast-fade {
      0% { opacity: 0; transform: translate(-50%, -8px); }
      12%, 78% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -6px); }
    }

    .lobby-screen {
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      padding: 24px 12px;
      box-sizing: border-box;
    }

    .lobby-screen.mode-screen {
      height: 100%;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(28px + env(safe-area-inset-bottom));
    }

    #app.mode-app {
      padding-top: 0 !important;
      padding-bottom: 0 !important;
      overflow-y: auto;
      gap: 0;
    }

    .lobby-card {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      background: rgba(8, 20, 30, 0.9);
      display: grid;
      gap: 10px;
    }

    .lobby-title {
      margin: 0 0 8px;
      text-align: center;
      font-size: 34px;
      letter-spacing: 2px;
    }

    .multi-options,
    .room-lobby {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      display: grid;
      gap: 8px;
    }

    .multi-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    input, select {
      border: 1px solid var(--line);
      background: #0a1c2b;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
    }

    #playerList {
      display: grid;
      gap: 6px;
    }

    .lobby-player {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .lobby-note {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }


    .pingtan-title-menu {
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      border: 3px solid rgba(255, 221, 87, 0.78);
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 221, 87, 0.22), transparent 28%),
        linear-gradient(180deg, #163f2e 0%, #0f2a28 48%, #24170f 100%);
      box-shadow: 0 22px 0 #120b08, 0 30px 70px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,255,255,0.08);
      padding: 18px;
      display: grid;
      gap: 14px;
      isolation: isolate;
    }

    .pingtan-title-menu::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 20px;
      background-image:
        linear-gradient(30deg, rgba(255,255,255,0.05) 12%, transparent 12.5%, transparent 87%, rgba(255,255,255,0.05) 87.5%, rgba(255,255,255,0.05)),
        linear-gradient(150deg, rgba(255,255,255,0.05) 12%, transparent 12.5%, transparent 87%, rgba(255,255,255,0.05) 87.5%, rgba(255,255,255,0.05));
      background-size: 38px 66px;
      opacity: 0.45;
      pointer-events: none;
      z-index: -1;
    }

    .pingtan-title-menu::after {
      content: "삥! 삥! 삥!";
      position: absolute;
      right: -24px;
      top: 18px;
      transform: rotate(13deg);
      color: rgba(255, 245, 157, 0.16);
      font-weight: 950;
      font-size: 34px;
      letter-spacing: -0.08em;
      pointer-events: none;
    }

    .pingtan-menu-top {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 6px;
      text-align: center;
    }

    .pingtan-menu-eyebrow {
      justify-self: center;
      width: fit-content;
      border: 2px solid rgba(255,255,255,0.24);
      background: #7c2d12;
      color: #fff7ed;
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 5px 0 rgba(0,0,0,0.28);
    }

    .pingtan-menu-title {
      margin: 2px 0 0;
      color: #ffe66d;
      font-size: clamp(54px, 16vw, 96px);
      line-height: 0.82;
      letter-spacing: -0.11em;
      text-shadow: 0 5px 0 #7c2d12, 0 10px 0 #3b1a0f, 0 18px 28px rgba(0,0,0,0.55);
    }

    .pingtan-menu-tagline {
      color: #fef3c7;
      font-size: 18px;
      font-weight: 950;
      text-shadow: 0 2px 0 rgba(0,0,0,0.42);
    }

    .pingtan-menu-subcopy {
      max-width: 430px;
      margin: 0 auto;
      color: #d9f99d;
      font-size: 12px;
      line-height: 1.45;
    }

    .pingtan-board-stage {
      position: relative;
      z-index: 1;
      min-height: 176px;
      border-radius: 22px;
      border: 3px solid #8b5a2b;
      background:
        radial-gradient(circle at 50% 48%, rgba(255,255,255,0.12), transparent 38%),
        linear-gradient(135deg, #3f2a17, #6b3f1d 56%, #2b1b11);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.08), inset 0 -18px 24px rgba(0,0,0,0.22), 0 12px 0 rgba(0,0,0,0.24);
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .pingtan-board-grid {
      display: grid;
      grid-template-columns: repeat(5, 46px);
      grid-auto-rows: 40px;
      gap: 6px;
      transform: rotate(-4deg);
      filter: drop-shadow(0 12px 12px rgba(0,0,0,0.32));
    }

    .pingtan-menu-hex {
      width: 46px;
      height: 40px;
      clip-path: polygon(25% 0, 75% 0, 100% 50%, 75% 100%, 25% 100%, 0 50%);
      display: grid;
      place-items: center;
      border: 2px solid rgba(255,255,255,0.26);
      color: rgba(20, 12, 6, 0.82);
      font-size: 20px;
      box-shadow: inset 0 -8px 0 rgba(0,0,0,0.12);
    }

    .pingtan-menu-hex.brick { background: #d65a31; }
    .pingtan-menu-hex.lumber { background: #2f9e44; }
    .pingtan-menu-hex.wool { background: #a7f3d0; }
    .pingtan-menu-hex.grain { background: #facc15; }
    .pingtan-menu-hex.ore { background: #94a3b8; }
    .pingtan-menu-hex.desert { background: #f4a261; }

    .pingtan-menu-token {
      position: absolute;
      z-index: 2;
      display: grid;
      place-items: center;
      border: 3px solid rgba(255,255,255,0.72);
      box-shadow: 0 8px 0 rgba(0,0,0,0.25), inset 0 -5px 0 rgba(0,0,0,0.14);
      font-weight: 950;
    }

    .pingtan-menu-token.dice,
    .pingtan-menu-dice {
      left: 26px;
      top: 24px;
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: #fff7ed;
      color: #111827;
      font-size: 24px;
      transform: rotate(-12deg);
    }

    .pingtan-menu-token.trade {
      right: 26px;
      bottom: 22px;
      min-width: 78px;
      height: 38px;
      border-radius: 999px;
      background: #2563eb;
      color: #eff6ff;
      font-size: 13px;
      transform: rotate(7deg);
    }

    .pingtan-menu-robber {
      position: absolute;
      z-index: 3;
      right: 42px;
      top: 20px;
      width: 48px;
      height: 66px;
      border-radius: 24px 24px 16px 16px;
      background: linear-gradient(#111827, #030712);
      border: 3px solid rgba(255,255,255,0.2);
      box-shadow: 0 9px 0 rgba(0,0,0,0.34);
      display: grid;
      place-items: center;
      font-size: 24px;
      transform: rotate(10deg);
    }

    .pingtan-menu-cues {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .pingtan-menu-cue {
      border: 2px solid rgba(255,255,255,0.16);
      background: rgba(0,0,0,0.24);
      border-radius: 14px;
      padding: 8px 6px;
      text-align: center;
      font-size: 11px;
      color: #f8fafc;
      font-weight: 800;
    }

    .pingtan-menu-actions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pingtan-mode-button {
      min-height: 80px;
      border-radius: 18px;
      text-align: left;
      padding: 14px 15px;
      display: grid;
      gap: 5px;
      background: #fff7ed;
      color: #3b1a0f;
      border: 3px solid #7c2d12;
      box-shadow: 0 8px 0 #3b1a0f, inset 0 -8px 0 rgba(0,0,0,0.08);
      transform: translateY(0);
    }

    .pingtan-mode-button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 #3b1a0f, inset 0 -8px 0 rgba(0,0,0,0.08);
    }

    .pingtan-mode-button.primary {
      background: linear-gradient(180deg, #fde047, #f97316);
      color: #2b1208;
      border-color: #fff7ad;
    }

    .pingtan-mode-button strong {
      font-size: 18px;
      font-weight: 950;
    }

    .pingtan-mode-button span {
      font-size: 11px;
      line-height: 1.35;
      opacity: 0.82;
    }

    .pingtan-menu-controls {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 2px;
    }

    .pingtan-menu-controls .multi-row { margin: 0 !important; }

    @media (max-width: 420px) {
      .lobby-screen.mode-screen { padding: 4px 10px calc(14px + env(safe-area-inset-bottom)); }
      .pingtan-title-menu { padding: 10px; gap: 9px; border-radius: 18px; box-shadow: 0 10px 0 #120b08, 0 18px 34px rgba(0,0,0,0.42); }
      .pingtan-menu-eyebrow { padding: 4px 10px; font-size: 10px; }
      .pingtan-menu-title { font-size: clamp(44px, 14vw, 72px); text-shadow: 0 4px 0 #7c2d12, 0 8px 0 #3b1a0f, 0 14px 22px rgba(0,0,0,0.5); }
      .pingtan-menu-tagline { font-size: 16px; }
      .pingtan-menu-subcopy { font-size: 11px; line-height: 1.35; }
      .pingtan-board-stage { min-height: 122px; padding: 8px; border-radius: 18px; }
      .pingtan-board-grid { grid-template-columns: repeat(5, 32px); grid-auto-rows: 28px; gap: 3px; }
      .pingtan-menu-hex { width: 32px; height: 28px; font-size: 14px; border-width: 1px; }
      .pingtan-menu-token.dice,
      .pingtan-menu-dice { left: 12px; top: 14px; width: 38px; height: 38px; font-size: 18px; border-width: 2px; }
      .pingtan-menu-token.trade { right: 12px; bottom: 14px; min-width: 56px; height: 30px; font-size: 10px; border-width: 2px; }
      .pingtan-menu-robber { right: 18px; top: 12px; width: 34px; height: 48px; font-size: 18px; }
      .pingtan-menu-cues { grid-template-columns: repeat(2, 1fr); gap: 5px; }
      .pingtan-menu-cue { padding: 6px 4px; font-size: 10px; }
      .pingtan-menu-actions { grid-template-columns: 1fr 1fr; gap: 7px; }
      .pingtan-mode-button { min-height: 62px; padding: 10px; border-width: 2px; border-radius: 14px; box-shadow: 0 5px 0 #3b1a0f, inset 0 -6px 0 rgba(0,0,0,0.08); }
      .pingtan-mode-button strong { font-size: 14px; }
      .pingtan-mode-button span { font-size: 10px; }
      .pingtan-menu-controls { flex-direction: column; align-items: stretch; }
    }

    .activity-status {
      border: 1px solid var(--line);
      background: rgba(5, 16, 24, 0.7);
      border-radius: 10px;
      padding: 5px 7px;
      font-size: 12px;
      text-align: left;
    }
    .activity-status-toggle {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
    }
    .activity-status-latest {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
    }
    .activity-log {
      margin-top: 6px;
      display: grid;
      gap: 5px;
      max-height: 132px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .activity-log-entry {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px;
      align-items: start;
      padding: 5px 6px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      line-height: 1.35;
    }
    .activity-log-entry time { color: var(--muted); font-size: 10px; }

    @media (max-width: 760px) {
      .players-bar { gap: 4px; }
      .player-card { padding: 4px 6px; font-size: 11px; }
      .status { padding: 5px; font-size: 11px; }
      .resources { font-size: 10px; gap: 4px; }
      .res { padding: 4px 1px; }
      .actions { gap: 4px; }
      .actions button { padding: 6px 8px; font-size: 12px; }
      .lobby-title { font-size: 28px; }
    }

    /* ── hint-bar: 맵 하단 오버레이 (세로모드) ── */
    .hint-bar {
      position: relative;
      z-index: 10;
      margin-top: -22px;
      font-size: 12px;
      text-align: center;
      color: rgba(255,255,255,0.9);
      min-height: 22px;
      padding: 3px 12px;
      pointer-events: none;
      background: rgba(5, 16, 24, 0.72);
      border-radius: 0 0 10px 10px;
    }
    .hint-bar:empty { display: none; }
    .panel-hint { display: none; font-size: 10px; color: var(--muted); margin-bottom: 2px; text-align: center; }
    .panel-hint-landscape { display: none; font-size: 10px; color: var(--accent); margin-top: 2px; padding: 3px 4px; background: rgba(79,194,127,0.08); border-radius: 6px; }
    .score-compact { display: none; }
    .score-compact-row { display: flex; justify-content: space-between; font-size: 10px; padding: 1px 2px; color: var(--muted); }
    .score-compact-row.active { color: #4ecca3; font-weight: 700; }

    /* ── 가로모드 레이아웃 ── */
    @media (orientation: landscape) and (max-height: 560px) {
      #turn-banner { top: var(--app-top-offset) !important; }
      #app {
        height: calc(var(--pingtan-vh, 100dvh) - var(--wallet-bar-height) - env(safe-area-inset-top) - var(--pingtan-viewport-top) - env(safe-area-inset-bottom)) !important;
        padding-top: calc(var(--turn-banner-height) + 2px) !important;
        padding-bottom: calc(2px + env(safe-area-inset-bottom)) !important;
        gap: 1px !important;
      }
      .status { display: none; }
      .hint-bar { display: none; }
      .panel-hint { display: none !important; }
      .panel-hint-landscape { display: block; }
      .game-body {
        flex-direction: row;
        align-items: stretch;
        gap: 2px;
      }
      .score-compact { display: block; margin-bottom: 4px; border-bottom: 1px solid var(--line); padding-bottom: 4px; }
      .panel-hint { display: block; }
      .panel-info {
        order: 0;
        width: 130px;
        min-width: 110px;
        flex: 0 0 130px;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 8px;
        padding: 6px 5px;
      }
      .turn-timer-row { flex-direction: column; align-items: stretch; }
      .end-turn-timer-btn { width: 100%; margin-top: 1px; font-size: 10px; }
      .panel-info .resources {
        grid-template-columns: 1fr 1fr;
        gap: 3px;
        font-size: 10px;
      }
      .panel-info .res { padding: 3px 2px; }
      .map-wrap {
        order: 1;
        flex: 1;
        min-width: 0;
        border-radius: 8px;
      }
      .panel-action {
        order: 2;
        width: 145px;
        flex: 0 0 145px;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        border-radius: 8px;
        padding: 6px 5px;
      }
      .panel-action .actions {
        flex-direction: column;
        gap: 3px;
        justify-content: flex-start;
        align-items: stretch;
      }
      .panel-action .actions button {
        width: 100%;
        font-size: 11px;
        padding: 5px 6px;
        border-radius: 7px;
      }
    }

    /* ── 풀스크린 ── */
    :fullscreen body, :-webkit-full-screen body {
      padding-top: env(safe-area-inset-top) !important;
      overflow: hidden !important;
    }
    :fullscreen #app, :-webkit-full-screen #app {
      height: calc(100dvh - env(safe-area-inset-bottom)) !important;
      padding-top: calc(var(--turn-banner-height) + env(safe-area-inset-top)) !important;
    }
    :fullscreen #turn-banner, :-webkit-full-screen #turn-banner {
      top: calc(2px + env(safe-area-inset-top)) !important;
    }
    :fullscreen.pingtan-landscape-fullscreen, :-webkit-full-screen.pingtan-landscape-fullscreen {
      --wallet-bar-height: 0px;
      --app-top-offset: env(safe-area-inset-top);
    }
    :fullscreen.pingtan-landscape-fullscreen #sw-bar, :-webkit-full-screen.pingtan-landscape-fullscreen #sw-bar {
      display: none !important;
    }

    /* ── 맵 선택 카드 그리드 ── */
    .map-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
      gap: 10px;
    }

      p.wasHuman = false;
      p.name = nickname || p.originalName || p.name;
      state.hint = `${p.name} 재접속 완료.`;
      return true;
    }

    function getLobbyAiPlayers() {
      return (mpState.aiPlayers || []).slice(0, 4);
    }

    function getLobbyDisplayPlayers() {
      const humans = (mpState.room?.players || []).map(p => ({ ...p, isAI: false }));
      return humans.concat(getLobbyAiPlayers());
    }

    function buildAiPlayers(existingPlayers = []) {
      const aiCount = Math.max(0, 4 - existingPlayers.length);
      return Array.from({ length: aiCount }, (_, i) => ({
        id: `ai-${i + 1}`,
        userId: `ai-${i + 1}`,
        name: `AI 봇 ${i + 1}`,
        nickname: `AI 봇 ${i + 1}`,
        isAI: true,
        color: PLAYER_COLORS[(existingPlayers.length + i) % PLAYER_COLORS.length]
      }));
    }

    async function syncLobbyAIPlayers() {
      if (!mpState.client || !mpState.isHost) return;
      try {
        await mpState.client.sendAction({
          type: "LOBBY_AI_STATE",
          aiPlayers: getLobbyAiPlayers().map(p => ({ id: p.id, name: p.name, nickname: p.nickname, isAI: true, color: p.color })),
          actionId: `lobby_ai_${Date.now()}_${Math.floor(Math.random() * 1e6)}`
        });
      } catch (e) {
        console.warn("syncLobbyAIPlayers failed:", e);
      }
    }

    async function fillAIPlayers() {
      if (!mpState.isHost) return;
      const humans = mpState.room?.players || [];
      mpState.aiPlayers = buildAiPlayers(humans);
      mpState.waitingMessage = mpState.aiPlayers.length
        ? `AI ${mpState.aiPlayers.length}명으로 빈 자리를 채웠습니다.`
        : "이미 4명입니다.";
      render();
      await syncLobbyAIPlayers();
    }

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = a[i];
        a[i] = a[j];
        a[j] = t;
      }
      return a;
    }

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function isMultiMode() {
      return state.mode === "multi";
    }

    function hasAnyInitialSettlement() {
      return Array.isArray(state.vertices) && state.vertices.some(v => v && v.building === "settlement");
    }

    function canEditGameSettings() {
      if (!isMultiMode()) return true;
      return !!mpState.isHost && state.phase === "setup1" && state.setupStep === "settlement" && !hasAnyInitialSettlement();
    }

    function gameSettingsLockMessage() {
      if (!isMultiMode()) return pt("instantSettingsMessage");
      if (!mpState.isHost) return pt("hostOnlySettingsMessage");
      if (!canEditGameSettings()) return pt("lockedSettingsMessage");
      return pt("preSettlementSettingsMessage");
    }

    function localGameSettingsLabel(prefix = "게임 옵션") {
      return `${prefix}: ${pt("turnSeconds")} ${clampTurnSeconds(state.turnSeconds || 60)}s · ${pt("targetScore")} ${targetScoreForMap(state.selectedMapId)}VP`;
    }

    function localMapLabel() {
      const preset = resolveMapPreset(state.selectedMapId || mpState.mapId || "standard");
      return `${pt("mapLabel")}: ${mapName(preset.id)} — ${mapDescription(preset.id)}`;
    }

    function addGameStartActivityLog() {
      addActivityLog("system", localMapLabel());
      addActivityLog("system", localGameSettingsLabel(pt("gameOptionsLabel")));
    }

    function addGameSettingsChangeLogs(previous, next) {
      const prevTurn = clampTurnSeconds(previous?.turnSeconds || state.turnSeconds || 60);
      const nextTurn = clampTurnSeconds(next?.turnSeconds || state.turnSeconds || 60);
      const prevTarget = clampTargetScore(previous?.targetScore || state.targetScore || targetScoreForMap(state.selectedMapId));
      const nextTarget = clampTargetScore(next?.targetScore || state.targetScore || targetScoreForMap(state.selectedMapId));
      if (prevTurn !== nextTurn) addActivityLog("system", pt("turnTimeChangedLog", { seconds: nextTurn }));
      if (prevTarget !== nextTarget) addActivityLog("system", pt("victoryVpChangedLog", { vp: nextTarget }));
    }

    function localPlayerIndex() {
      if (!isMultiMode()) return 0;
      return state.players.findIndex(p => p.userId === mpState.myUserId);
    }

    function isHumanTurn() {
      const cp = state.players[state.currentPlayer];
      if (cp && cp.isAI) return false;
      const myIdx = localPlayerIndex();
      return myIdx !== -1 && myIdx === state.currentPlayer;
    }

    function currentPlayerUserId() {
      return state.players[state.currentPlayer]?.userId || null;
    }

    function playerIndexFromAnyId(playerId) {
      if (typeof playerId === "number") return playerId;
      if (playerId === null || playerId === undefined) return -1;
      return state.players.findIndex(p => p.userId === playerId || p.id === playerId);
    }

    function initSingleGame(mapId = "standard") {
      resetCoreState();
      state.turnSeconds = 60;
      state.selectedMapId = mapId;
      state.targetScore = defaultTargetScoreForMap(mapId);
      state.targetScoreCustom = false;
      state.turnTimeLeft = state.turnSeconds;
      applyResponsiveDefaults(true);
      setSinglePlayers();
      generateBoard(null, mapId);
      recalcAllVP();
      state.mode = "single";
      state.screen = "game";
      state.hint = pt("initialSettlementHint");
      render();
      maybeAIIntroReaction();
      triggerAITurnIfNeeded();
    }

    function setupOrder() {
      const arr = Array.from({ length: state.players.length }, (_, i) => i);
      return state.phase === "setup1" ? arr : arr.slice().reverse();

    // ────────────────────────────────────────────────────────────────────

    function resolveMapPreset(mapId = "standard") {
      return MAP_PRESETS[mapId] || MAP_PRESETS.standard;
    }

    function describeMapForManual(mapId = state.selectedMapId || "standard") {
      const preset = resolveMapPreset(mapId);
      const behavior = mapBehavior(preset.id);
      return { preset, behavior };
    }

    function renderMapManualSection() {
      const { preset, behavior } = describeMapForManual(state.selectedMapId || mpState.mapId || "standard");
      const vp = targetScoreForMap(preset.id);
      return `<b>🗺️ ${pt("manualCurrentMap")}: ${mapName(preset.id)}</b><br>
          ${mapDescription(preset.id)}<br>
          • ${pt("manualPlayersVpDifficulty", { min: preset.minPlayers || 2, max: preset.maxPlayers || 4, vp, stars: "★".repeat(preset.stars || 1) })}<br>
          • ${pt("manualBehavior")}: ${behavior}<br><br>`;
    }

    function clampTargetScore(value) {
      const n = Number(value) || 10;
      return Math.min(20, Math.max(5, Math.round(n)));
    }

    function targetScoreForMap(mapId = "standard") {
      const requested = mapId || state.selectedMapId || "standard";
      if (state && state.targetScore && requested === state.selectedMapId) return clampTargetScore(state.targetScore);
      const preset = resolveMapPreset(requested);
      return preset.targetScore || preset.vpGoal || preset.clearScore || 10;
    }

    function defaultTargetScoreForMap(mapId = "standard") {
      const preset = resolveMapPreset(mapId || state.selectedMapId || "standard");
      return preset.targetScore || preset.vpGoal || preset.clearScore || 10;
    }

    function victoryPrizeForMap(mapId = state.selectedMapId, targetScore = targetScoreForMap(mapId)) {
      const preset = resolveMapPreset(mapId || "standard");
      const stars = preset.stars || 1;
      const basePrize = stars * 1000000;
      const baseTarget = defaultTargetScoreForMap(mapId);
      const ratio = clampTargetScore(targetScore) / Math.max(1, baseTarget);
      return Math.max(0, Math.round(basePrize * ratio));
    }

    function assignBalancedNumbers(axial, hexTypes, numberConfig) {
      const numbers = numberConfig.pool || [];
      const noAdjacentHot = new Set(numberConfig.noAdjacentHot || []);
      const NON_PROD = new Set(["desert","sea","lake","volcano","strait"]);
      const nonDesert = hexTypes.map((t,i) => ({t,i})).filter(x => !NON_PROD.has(x.t)).map(x => x.i);

      function hexNeighbors(idx) {
        const h = axial[idx];
        const dirs = [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];
        return dirs.map(([dq,dr]) => axial.findIndex(a => a.q === h.q + dq && a.r === h.r + dr)).filter(i => i !== -1);
      }

      for (let attempt = 0; attempt < 50; attempt++) {
        const pool = shuffle([...numbers]);
        const assigned = new Array(hexTypes.length).fill(null);
        for (let j = 0; j < nonDesert.length; j++) assigned[nonDesert[j]] = pool[j];

        let valid = true;
        for (let i = 0; i < axial.length && valid; i++) {
          if (assigned[i] === null) continue;
          for (const ni of hexNeighbors(i)) {
            if (assigned[ni] === null) continue;
            if (numberConfig.noAdjacentSame && assigned[i] === assigned[ni]) { valid = false; break; }
            if (noAdjacentHot.has(assigned[i]) && noAdjacentHot.has(assigned[ni])) { valid = false; break; }
          }
        }
        if (valid) return assigned;
      }

      const pool = shuffle([...numbers]);
      const assigned = new Array(hexTypes.length).fill(null);
      for (let j = 0; j < nonDesert.length; j++) assigned[nonDesert[j]] = pool[j];
      return assigned;
    }

    function resolveProducedResources(tileType, amount, preferredResource = null) {
      if (tileType !== "gold") return { [tileType]: amount };
      const chosen = RESOURCES.includes(preferredResource) ? preferredResource : "brick";
      return { [chosen]: amount };
    }

    function buildHexesFromPreset(mapId = "standard") {
      const preset = resolveMapPreset(mapId);
      const axial = preset.layout.axial.slice();

      // layout의 type은 바다/해협/호수/화산 같은 고정 지형만 고정한다.
      // 자원/사막/숫자는 매 게임 셔플해야 같은 맵도 매번 다르게 열린다.
      const resourcePool = shuffle(preset.resources.pool.slice());
      let pi = 0;
      const types = axial.map(c => c.type !== undefined ? c.type : resourcePool[pi++]);

      const balancedNumbers = assignBalancedNumbers(axial, types, preset.numbers);
      return axial.map((coord, i) => ({
        index: i,
        q: coord.q,
        r: coord.r,
        type: types[i],
        number: balancedNumbers[i],
        robber: false,
        vertices: [],
        edges: []
      }));
    }

    function generateBoard(forcedHexes = null, mapId = "standard") {
      if (Array.isArray(forcedHexes) && forcedHexes.length) {
        state.hexes = forcedHexes.map(h => ({ ...h, robber: !!h.robber, vertices: [], edges: [] }));
      } else {
        state.hexes = buildHexesFromPreset(mapId);
      }

      const { vertices, edges, centers, bounds, size } = buildGraph(state.hexes);
      state.vertices = vertices;
      state.edges = edges;
      state.geometry = { centers, minX: bounds.minX, minY: bounds.minY, maxX: bounds.maxX, maxY: bounds.maxY, size };
      state.robber = state.hexes.findIndex(h => h.type === "desert");
      state.hexes.forEach(h => { h.robber = false; });
      if (state.robber >= 0 && state.hexes[state.robber]) state.hexes[state.robber].robber = true;
      state.ports = generatePorts(mapId);
    }

    function generatePorts(mapId = "standard") {
      const preset = resolveMapPreset(mapId);
      const portCount = preset.ports.pool.length;
      // Official pingtan harbors sit in coves around the sea frame. Model that by
      // choosing evenly spaced perimeter EDGES, not consecutive angle-sorted vertices.
      const outerEdges = state.edges
        .filter(e => e.hexes.length === 1)
        .map(e => {
          const a = state.vertices[e.a];
          const b = state.vertices[e.b];
          const x = (a.x + b.x) / 2;
          const y = (a.y + b.y) / 2;
          return { edge: e, angle: Math.atan2(y, x) };
        })
        .sort((a, b) => a.angle - b.angle);
      if (!outerEdges.length || portCount <= 0) return [];

      const portTypes = shuffle(preset.ports.pool);
      const used = new Set();
      return portTypes.map((pt, i) => {
        let pos = Math.round((i * outerEdges.length) / portCount) % outerEdges.length;
        while (used.has(pos)) pos = (pos + 1) % outerEdges.length;
        used.add(pos);
        const edge = outerEdges[pos].edge;
        return { ...pt, vertices: [edge.a, edge.b] };
      });
    }

    function buildGraph(hexes) {
      const size = 42;
      const sqrt3 = Math.sqrt(3);
      const centers = [];
      const vertices = [];
      const edges = [];
      const vertexKeyMap = new Map();
      const edgeKeyMap = new Map();

      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      function centerFor(q, r) {
        return { x: size * sqrt3 * (q + r / 2), y: size * 1.5 * r };
      }

      function corner(center, i) {
        const angle = (Math.PI / 180) * (60 * i - 30);
        return { x: center.x + size * Math.cos(angle), y: center.y + size * Math.sin(angle) };
      }

      function addVertex(point) {
        const key = `${Math.round(point.x * 1000)}_${Math.round(point.y * 1000)}`;
        if (vertexKeyMap.has(key)) return vertexKeyMap.get(key);
        const idx = vertices.length;
        vertices.push({ index: idx, x: point.x, y: point.y, building: null, owner: null, hexes: [], edges: [] });
        vertexKeyMap.set(key, idx);
        return idx;
      }

      for (const hex of hexes) {
        const c = centerFor(hex.q, hex.r);
        centers.push(c);
        minX = Math.min(minX, c.x - size);
        minY = Math.min(minY, c.y - size);
        maxX = Math.max(maxX, c.x + size);
        maxY = Math.max(maxY, c.y + size);
        const v = [];
        for (let i = 0; i < 6; i += 1) {
          const vi = addVertex(corner(c, i));
          v.push(vi);
          vertices[vi].hexes.push(hex.index);
        }
        hex.vertices = v;
      }

      for (const hex of hexes) {
        for (let i = 0; i < 6; i += 1) {
          const a = hex.vertices[i];
          const b = hex.vertices[(i + 1) % 6];
          const key = a < b ? `${a}_${b}` : `${b}_${a}`;
          let ei = edgeKeyMap.get(key);
          if (ei === undefined) {
            ei = edges.length;
            edges.push({ index: ei, a, b, owner: null, hexes: [] });
            edgeKeyMap.set(key, ei);
            vertices[a].edges.push(ei);
            vertices[b].edges.push(ei);
          }
          edges[ei].hexes.push(hex.index);
          hex.edges.push(ei);
        }
      }
      return { vertices, edges, centers, bounds: { minX, minY, maxX, maxY }, size };
    }

    function getCurrentPlayer() {
      return state.players[state.currentPlayer];
    }

    function totalResourceCount(player) {
      return RESOURCES.reduce((n, r) => n + player.resources[r], 0);
    }

    function canAfford(player, cost) {
      for (const [k, v] of Object.entries(cost)) {
        if ((player.resources[k] || 0) < v) return false;
      }
      return true;
    }

    function spend(player, cost) {
      for (const [k, v] of Object.entries(cost)) player.resources[k] -= v;
    }

    function applyBankTrade(playerIdx, give, get) {
      const p = state.players[playerIdx];
      if (!p) return false;
      if (!RESOURCES.includes(give) || !RESOURCES.includes(get)) return false;
      if (give === get) return false;
      if ((p.resources[give] || 0) < 4) return false;
      p.resources[give] -= 4;
      p.resources[get] += 1;
      return true;
    }

    function adjacentVertices(vIdx) {
      const out = new Set();
      for (const eIdx of state.vertices[vIdx].edges) {
        const e = state.edges[eIdx];
        out.add(e.a === vIdx ? e.b : e.a);
      }
      return [...out];
    }

    function canPlaceSettlement(playerIdx, vIdx, setup = false) {
      const v = state.vertices[vIdx];
      if (v.building) return false;
      for (const n of adjacentVertices(vIdx)) {
        if (state.vertices[n].building) return false;
      }
      if (setup) return true;
      return v.edges.some(eIdx => state.edges[eIdx].owner === playerIdx);
    }

    function canPlaceRoad(playerIdx, eIdx, setup = false) {
      const e = state.edges[eIdx];
      if (e.owner !== null) return false;
      if (setup) {
        if (state.lastSetupVertex === null) return false;
        return e.a === state.lastSetupVertex || e.b === state.lastSetupVertex;
      }
      function endpointConnects(vIdx) {
        const v = state.vertices[vIdx];
        if (v.owner === playerIdx) return true;
        if (v.owner !== null && v.owner !== playerIdx) return false;
        return v.edges.some(x => x !== eIdx && state.edges[x].owner === playerIdx);
      }
      return endpointConnects(e.a) || endpointConnects(e.b);
    }

    function canUpgradeCity(playerIdx, vIdx) {
      const v = state.vertices[vIdx];
      return v.building === "settlement" && v.owner === playerIdx;
    }

    function placeSettlement(playerIdx, vIdx, free = false) {
      const player = state.players[playerIdx];
      if (!free && !canAfford(player, COST.settlement)) return false;
      if (!canPlaceSettlement(playerIdx, vIdx, free && (state.phase === "setup1" || state.phase === "setup2"))) return false;
      if (!free) spend(player, COST.settlement);
      state.vertices[vIdx].building = "settlement";
      state.vertices[vIdx].owner = playerIdx;
      state.lastPlacedVertex = vIdx;
      player.buildings.push({ type: "settlement", vertex: vIdx });
      recalcAllVP();
      return true;
    }

    function placeRoad(playerIdx, eIdx, free = false) {
      const player = state.players[playerIdx];
      if (!free && !canAfford(player, COST.road)) return false;
      if (!canPlaceRoad(playerIdx, eIdx, free && (state.phase === "setup1" || state.phase === "setup2"))) return false;
      if (!free) spend(player, COST.road);
      state.edges[eIdx].owner = playerIdx;
      player.roads.push(eIdx);
      recalcLongestRoad();
      recalcAllVP();
      return true;
    }

    function upgradeCity(playerIdx, vIdx) {
      const player = state.players[playerIdx];
      if (!canAfford(player, COST.city)) return false;
      if (!canUpgradeCity(playerIdx, vIdx)) return false;
      spend(player, COST.city);
      state.vertices[vIdx].building = "city";
      state.lastPlacedVertex = vIdx;
      const target = player.buildings.find(b => b.vertex === vIdx);
      if (target) target.type = "city";
      recalcAllVP();
      return true;
    }

    function grantSecondSetupResources(playerIdx, vIdx) {
      for (const hIdx of state.vertices[vIdx].hexes) {
        const hex = state.hexes[hIdx];
        const PROD_TYPES = new Set(["brick","lumber","wool","grain","ore"]);
        if (PROD_TYPES.has(hex.type)) state.players[playerIdx].resources[hex.type] += 1;
      }
    }

    function pickBestAIGoldResource(playerIdx) {
      const p = state.players[playerIdx];
      if (!p) return "grain";
      return RESOURCES.reduce((best, r) => (p.resources[r] || 0) < (p.resources[best] || 0) ? r : best, "grain");
    }

    function showGainsToast(gains) {
      const humanIdx = localPlayerIndex();
      const parts = [];
      for (const [pidx, res] of Object.entries(gains)) {
        const pi = Number(pidx);
        const name = pi === humanIdx ? "나" : state.players[pi].name;
        const detail = Object.entries(res).map(([r, n]) => `${RESOURCE_ICONS[r] || r}×${n}`).join(" ");
        parts.push(`${name}: ${detail}`);
      }
      if (parts.length > 0) { SFX.resource(); showToast(`🎁\n${parts.join("\n")}`, 4000, { bottom: 150 }); }
    }

    function distributeResources(number) {
      const humanIdx = localPlayerIndex();
      const gains = {};
      state._pendingHumanGold = 0;

      for (const hex of state.hexes) {
        if (hex.number !== number || hex.index === state.robber) continue;
        for (const vIdx of hex.vertices) {
          const v = state.vertices[vIdx];
          if (!v.building || v.owner === null) continue;
          const rawAmount = v.building === "city" ? 2 : 1;
          const owner = state.players[v.owner];

          if (hex.type === "gold") {
            if (owner && !owner.isAI) {
              if (v.owner === humanIdx) {
                state._pendingHumanGold += rawAmount; // deferred to picker
              } else if (isMultiMode() && v.owner !== humanIdx) {
                // Wait for that human client's synced GOLD_CHOICE action.
              } else {
                const preferred = pickBestAIGoldResource(v.owner);
                const amount = Math.min(rawAmount, bankRemaining(preferred));
                if (amount > 0) { owner.resources[preferred] += amount; if (!gains[v.owner]) gains[v.owner] = {}; gains[v.owner][preferred] = (gains[v.owner][preferred] || 0) + amount; }
              }
            } else {
              const preferred = pickBestAIGoldResource(v.owner);
              const amount = Math.min(rawAmount, bankRemaining(preferred));
              if (amount > 0) { owner.resources[preferred] += amount; if (!gains[v.owner]) gains[v.owner] = {}; gains[v.owner][preferred] = (gains[v.owner][preferred] || 0) + amount; }
            }
            continue;
          }

          const produced = resolveProducedResources(hex.type, rawAmount);
          for (const [resource, requested] of Object.entries(produced)) {
            const amount = Math.min(requested, bankRemaining(resource));
            if (amount <= 0) continue;
            owner.resources[resource] += amount;
            if (!gains[v.owner]) gains[v.owner] = {};
            gains[v.owner][resource] = (gains[v.owner][resource] || 0) + amount;
          }
        }
      }

      if (state._pendingHumanGold > 0) {
        state._pendingGains = gains; // toast deferred until picker resolves
      } else {
        showGainsToast(gains);
      }
    }

    function showGoldPicker(amount, currentResources) {
      return new Promise(resolve => {
        const chosen = {}; RESOURCES.forEach(r => chosen[r] = 0);
        let remaining = amount;
        const TIMEOUT = 10;
        let timeLeft = TIMEOUT;
        let timerInterval = null;

        const finish = (result) => {
          clearInterval(timerInterval);
          const el = document.getElementById("gold-picker-modal");
          if (el) el.remove();
          delete window._gAdj; delete window._gOK;
          resolve(result);
        };

        const autoChoose = () => {
          const result = {}; RESOURCES.forEach(r => result[r] = chosen[r]);
          let left = remaining;
          while (left > 0) {
            const r = RESOURCES[Math.floor(Math.random() * RESOURCES.length)];
            result[r] = (result[r] || 0) + 1; left--;
          }
          finish(result);
        };

        const render = () => {
          let el = document.getElementById("gold-picker-modal");
          if (!el) { el = document.createElement("div"); el.id = "gold-picker-modal"; document.body.appendChild(el); }
          el.innerHTML = `<div class="gold-picker-overlay"><div class="gold-picker-card">
            <div class="gold-picker-title">💰 금광 수확!</div>
            <div class="gold-picker-remaining">자원 <strong>${remaining}</strong>개 선택 가능 <span style="color:${timeLeft<=3?'#ef4444':'#fbbf24'};font-size:12px;">${timeLeft}초</span></div>
            <div style="font-size:12px;color:var(--muted);text-align:center;margin:-6px 0 8px;">10초 안에 고르지 않으면 랜덤 지급</div>
            ${RESOURCES.map(r => `<div class="gold-picker-row">
              <span class="gold-picker-label">${RESOURCE_ICONS[r]} ${RESOURCE_NAMES[r]}<span style="font-size:12px;opacity:0.68;margin-left:4px;">보유 ${(currentResources&&currentResources[r])||0}개</span></span>
              <div class="gold-picker-controls">
                <button onclick="window._gAdj('${r}',-1)" ${chosen[r]<=0?"disabled":""}>−</button>
                <span class="gold-picker-count">${chosen[r]}</span>
                <button onclick="window._gAdj('${r}',1)" ${remaining<=0?"disabled":""}>+</button>
              </div></div>`).join("")}
            <button style="width:100%;margin-top:14px;padding:10px;border-radius:10px;background:${remaining===0?'var(--accent)':'rgba(255,255,255,0.1)'};border:none;color:#fff;font-size:15px;font-weight:700;cursor:${remaining===0?'pointer':'default'};opacity:${remaining===0?1:0.45};"
              ${remaining!==0?"disabled":""} onclick="window._gOK()">확인</button>
          </div></div>`;
        };

        window._gAdj = (r, d) => {
          if (d < 0 && chosen[r] <= 0) return;
          if (d > 0 && remaining <= 0) return;
          chosen[r] += d; remaining -= d; render();
        };
        window._gOK = () => finish({ ...chosen });

        timerInterval = setInterval(() => {
          timeLeft--;
          if (timeLeft <= 0) { autoChoose(); return; }
          render();
        }, 1000);

        render();
      });
    }

    function applyGoldChoice(playerId, resources = {}) {
      const pIdx = playerIndexFromAnyId(playerId);
      const player = state.players[pIdx];
      if (pIdx < 0 || !player) return false;
      const gains = {};
      for (const [r, n] of Object.entries(resources || {})) {
        if (!RESOURCES.includes(r)) continue;
        const requested = Math.max(0, Number(n) || 0);
        const amount = Math.min(requested, bankRemaining(r));
        if (amount > 0) {
          player.resources[r] += amount;
          if (!gains[pIdx]) gains[pIdx] = {};
          gains[pIdx][r] = (gains[pIdx][r] || 0) + amount;
        }
      }
      if (Object.keys(gains).length) showGainsToast(gains);
      recalcAllVP();
      return true;
    }

    async function resolveHumanGoldIfNeeded() {
      if (!state._pendingHumanGold) return;
      const humanIdx = localPlayerIndex();
      const human = state.players[humanIdx];
      const chosen = await showGoldPicker(state._pendingHumanGold, human.resources);
      state._pendingHumanGold = 0; state._pendingGains = null;
      if (isMultiMode()) {
        await sendGameAction(ACTION.GOLD_CHOICE, { playerId: human.userId || human.id, resources: chosen });
      } else {
        applyGoldChoice(human.userId || human.id, chosen);
        render();
      }
    }

    const DICE_FACES = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

    function getDiceResultMarkup(d1, d2, sum) {
      return `<span class="dice-pair"><span class="die-face">${DICE_FACES[d1] || "🎲"}</span><span class="die-face">${DICE_FACES[d2] || "🎲"}</span></span><span class="dice-total">${sum}</span>`;

    async function animateDiceRoll(el, d1, d2, sum) {
      if (!el) return;
      el.classList.remove("dice-animate");
      void el.offsetWidth;
      el.classList.add("dice-animate");
      const started = Date.now();
      const tick = () => {
        const a = 1 + Math.floor(Math.random() * 6);
        const b = 1 + Math.floor(Math.random() * 6);
        el.innerHTML = getDiceResultMarkup(a, b, a + b);
      };
      tick();
      const timer = setInterval(tick, 90);
      if (window.anime) {
        anime({ targets: el, rotate: [{ value: -16 }, { value: 18 }, { value: -10 }, { value: 0 }], scale: [1, 1.18, 0.96, 1.08, 1], duration: getDiceRevealDelayMs(), easing: "easeOutElastic(1, .6)" });
      }
      await new Promise(r => setTimeout(r, Math.max(0, getDiceRevealDelayMs() - (Date.now() - started))));
      clearInterval(timer);
      el.innerHTML = getDiceResultMarkup(d1, d2, sum);
      el.style.animation = "dice-bounce 0.4s ease";
      setTimeout(() => { if (el) el.style.animation = ""; }, 400);
      if (window.anime) {
        if (sum === 7) anime({ targets: el, backgroundColor: ["#1d5c3d", "#b33838", "#1d5c3d"], duration: 500, easing: "easeInOutSine" });
        else if (sum === 6 || sum === 8) anime({ targets: el, backgroundColor: ["#1d5c3d", "#d9a323", "#1d5c3d"], duration: 500, easing: "easeInOutSine" });
      }
    }

    function getHexLabel(hexIndex) {

    function formatRobberMoveMessage({ actorName, source, hexLabel, victimName, stolenResource }) {
      const sourceParticle = source === "도둑" ? "으로" : "로";
      if (victimName && stolenResource) {
        return `${actorName}가 ${source}${sourceParticle} ${hexLabel}에 도둑을 옮기고 ${victimName}에게서 ${RESOURCE_ICONS[stolenResource]} 1장을 가져갔습니다.`;
      }

    }

    function handleSeven() {
      SFX.robber();
      showToast(pt("robberToast"), 1600, { bottom: 150 });
      showBigOverlay("🦹", pt("robberAppeared"), "robber-alert", 1200);
