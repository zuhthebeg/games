<style>

  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;color:var(--text);

    transition:transform .14s cubic-bezier(.3,1.4,.5,1),opacity .14s;will-change:transform}
  .cell.sel{box-shadow:inset 0 0 0 3px var(--accent);background:rgba(255,207,77,.18)}
  .cell.hint{animation:hint 1s ease-in-out infinite}
  @keyframes hint{0%,100%{box-shadow:inset 0 0 0 2px rgba(127,255,176,.5);background:rgba(127,255,176,.1)}50%{box-shadow:inset 0 0 0 3px #7fffb0,0 0 14px rgba(127,255,176,.7);background:rgba(127,255,176,.28)}}

  .cell.big{animation:bigpop .26s ease-out forwards;z-index:4}
  @keyframes bigpop{0%{transform:scale(1)}35%{transform:scale(1.5);filter:brightness(1.8) drop-shadow(0 0 10px #fff)}100%{transform:scale(0) rotate(40deg);opacity:0}}
  .boardwrap.flash::after{content:"";position:absolute;inset:0;border-radius:14px;background:radial-gradient(circle,rgba(255,255,255,.55),transparent 70%);animation:flash .36s ease-out;pointer-events:none;z-index:7}
  @keyframes flash{from{opacity:1}to{opacity:0}}
  @keyframes tplus{0%{opacity:0;transform:translateX(-50%) translateY(6px) scale(.7)}25%{opacity:1;transform:translateX(-50%) translateY(-4px) scale(1.1)}100%{opacity:0;transform:translateX(-50%) translateY(-26px) scale(1)}}
  .cell.drop{animation:drop .22s cubic-bezier(.3,1.2,.4,1)}
  @keyframes drop{from{transform:translateY(-18px)}to{transform:translateY(0)}}
  #combo{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);z-index:6;pointer-events:none;
    font-size:2.1rem;font-weight:900;color:#fff;text-shadow:0 3px 12px rgba(0,0,0,.8);opacity:0}
  #combo.on{animation:cb .8s ease-out}
  @keyframes cb{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}25%{opacity:1;transform:translate(-50%,-60%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-82%) scale(1)}}
  .boardwrap.shake{animation:bshake .32s ease-in-out}
  @keyframes bshake{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,2px)}40%{transform:translate(4px,-2px)}60%{transform:translate(-3px,-2px)}80%{transform:translate(3px,2px)}}
  .howto{font-size:.72rem;color:var(--muted);text-align:center}

<body>

<script>
/* ── i18n (한국어 / 繁體中文 / English) — 사전식, 즉시전환 ── */
const I18N={
  ko:{title:'팝매치',restart:'다시',score:'점수',time:'시간',best:'최고',moves:'이동',
      howto:'블록을 드래그해서 3개 이상 맞추세요 · 매치하면 시간 추가!',start:'시작',goalHint:'매치할수록 시간 추가! 콤보·큰 매치로 더 길게 버텨 최고점 도전',
      timeup:'타임 오버!',finalScore:'최종 점수',again:'다시 하기',langBtn:'🌐 繁中',
      combo:(n)=>n+' 콤보!',goldLine:(g)=>'💰 +'+g.toLocaleString()+'G'},
  'zh-TW':{title:'啵啵消',restart:'重來',score:'分數',time:'時間',best:'最佳',moves:'步數',
      howto:'拖曳方塊連成3個以上消除 · 消除可加時間！',start:'開始',goalHint:'消除越多加越多時間！靠連擊·大消除撐更久，挑戰最高分',
      timeup:'時間到！',finalScore:'最終分數',again:'再玩一次',langBtn:'🌐 EN',
      combo:(n)=>n+' 連擊！',goldLine:(g)=>'💰 +'+g.toLocaleString()+'G'},
  en:{title:'Pop Match',restart:'Reset',score:'Score',time:'Time',best:'Best',moves:'Moves',
      howto:'Drag blocks to match 3+ · matching adds time!',start:'Start',goalHint:'Matching adds time! Survive longer with combos & big matches for a high score',
      timeup:"Time's up!",finalScore:'Final score',again:'Play again',langBtn:'🌐 한국어',
      combo:(n)=>n+' Combo!',goldLine:(g)=>'💰 +'+g.toLocaleString()+'G'}};
let LANG=(function(){try{const s=localStorage.getItem('m3-lang');if(s)return s;}catch(e){}
  const n=(navigator.language||'').toLowerCase();return n.startsWith('zh')?'zh-TW':n.startsWith('ko')?'ko':'en';})();
function t(k){return (I18N[LANG]||I18N.ko)[k];}
function applyLang(){
  document.documentElement.lang=LANG==='zh-TW'?'zh-Hant':(LANG==='en'?'en':'ko');
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t(el.dataset.i18n);if(typeof v==='string')el.textContent=v;});
  document.getElementById('langBtn').textContent=t('langBtn');
}
function cycleLang(){LANG=LANG==='ko'?'zh-TW':(LANG==='zh-TW'?'en':'ko');try{localStorage.setItem('m3-lang',LANG);}catch(e){};applyLang();}

/* ── 매치-3 엔진 ── */
const N=7, TYPES=6, FACES=['🍎','🍇','🍋','🍊','🫐','🍓'];
const DUR=60;      // 시작 시간(초). 매치마다 시간 추가, 단 60초 상한
const TMAX=60;     // 시간바 기준 최대(=상한)
let grid=[], cells=[], score=0, timeLeft=DUR, timerId=null, busy=false, playing=false;
let sel=null; // {r,c}

function rnd(n){return Math.floor(Math.random()*n);}
function idx(r,c){return r*N+c;}
function inBounds(r,c){return r>=0&&r<N&&c>=0&&c<N;}

function buildDOM(){
  document.documentElement.style.setProperty('--N',N);
  const b=document.getElementById('board'); b.innerHTML=''; cells=[];
  for(let i=0;i<N*N;i++){
    const d=document.createElement('div'); d.className='cell'; const r=Math.floor(i/N), c=i%N;
    d.addEventListener('pointerdown',e=>onDown(e,r,c));
    b.appendChild(d); cells.push(d);
  }
}
function genGrid(){
  grid=new Array(N*N);
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    let v; let guard=0;
    do{ v=rnd(TYPES); guard++; }while(guard<20 && (
      (c>=2 && grid[idx(r,c-1)]===v && grid[idx(r,c-2)]===v) ||
      (r>=2 && grid[idx(r-1,c)]===v && grid[idx(r-2,c)]===v) ));
    grid[idx(r,c)]=v;
  }
}
function render(){
  for(let i=0;i<N*N;i++){ const v=grid[i]; cells[i].textContent=v==null?'':FACES[v]; }
  document.getElementById('score').textContent=score;
}

/* 매치 찾기 → 제거할 인덱스 Set */
function findMatches(){
  const m=new Set();
  for(let r=0;r<N;r++){ let run=1; for(let c=1;c<=N;c++){ if(c<N && grid[idx(r,c)]===grid[idx(r,c-1)] && grid[idx(r,c)]!=null) run++; else { if(run>=3) for(let k=1;k<=run;k++) m.add(idx(r,c-k)); run=1; } } }
  for(let c=0;c<N;c++){ let run=1; for(let r=1;r<=N;r++){ if(r<N && grid[idx(r,c)]===grid[idx(r-1,c)] && grid[idx(r,c)]!=null) run++; else { if(run>=3) for(let k=1;k<=run;k++) m.add(idx(r-k,c)); run=1; } } }
  return m;
}
function gravity(){
  for(let c=0;c<N;c++){
    let write=N-1;
    for(let r=N-1;r>=0;r--){ if(grid[idx(r,c)]!=null){ grid[idx(write,c)]=grid[idx(r,c)]; if(write!==r)grid[idx(r,c)]=null; write--; } }
    for(let r=write;r>=0;r--){ grid[idx(r,c)]=rnd(TYPES); cells[idx(r,c)].classList.add('drop'); setTimeout(()=>cells[idx(r,c)]&&cells[idx(r,c)].classList.remove('drop'),240); }
  }
}
/* 런 단위 분석 → 매치셀 + 보너스 라인(4+런/크로스) */
function computeClears(){
  const runs=[];
  for(let r=0;r<N;r++){ let run=1; for(let c=1;c<=N;c++){ const same=c<N&&grid[idx(r,c)]!=null&&grid[idx(r,c)]===grid[idx(r,c-1)]; if(same)run++; else { if(run>=3){ const cs=[]; for(let k=1;k<=run;k++)cs.push(idx(r,c-k)); runs.push({o:'h',line:r,len:run,cells:cs}); } run=1; } } }
  for(let c=0;c<N;c++){ let run=1; for(let r=1;r<=N;r++){ const same=r<N&&grid[idx(r,c)]!=null&&grid[idx(r,c)]===grid[idx(r-1,c)]; if(same)run++; else { if(run>=3){ const cs=[]; for(let k=1;k<=run;k++)cs.push(idx(r-k,c)); runs.push({o:'v',line:c,len:run,cells:cs}); } run=1; } } }
  const matched=new Set(), hSet=new Set(), vSet=new Set(); let maxRun=0;
  runs.forEach(rn=>{ maxRun=Math.max(maxRun,rn.len); rn.cells.forEach(i=>{ matched.add(i); (rn.o==='h'?hSet:vSet).add(i); }); });
  const clear=new Set(matched); let cross=false; let five=false;
  // T/크로스(가로·세로 동시) → 그 자리 폭탄: 3×3(9칸) 제거
  matched.forEach(i=>{ if(hSet.has(i)&&vSet.has(i)){ cross=true; const r=Math.floor(i/N),c=i%N;
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){ const nr=r+dr,nc=c+dc; if(inBounds(nr,nc))clear.add(idx(nr,nc)); } } });
  // 5개 일렬 → 그 줄 한 줄 제거 (가로런=행 / 세로런=열). 4개는 그냥 4칸만.
  runs.forEach(rn=>{ if(rn.len>=5){ five=true; if(rn.o==='h'){ for(let c=0;c<N;c++)clear.add(idx(rn.line,c)); } else { for(let r=0;r<N;r++)clear.add(idx(r,rn.line)); } } });
  return {clear,maxRun,cross,five};
}
async function resolve(){
  let chain=0;
  while(true){
    const res=computeClears();
    if(res.clear.size===0) break;
    chain++;
    const big = res.cross || res.five;          // 폭탄/한줄 = 강력 매치
    score += res.clear.size*10*chain + (big?120:0);
    // 시간 가중(짠물): 3개=0초 · 4개=+1 · 5개=+1 · 폭탄(크로스)=+2 · 콤보(2연쇄+)=+1
    let add = res.cross?2 : (res.five?1 : (res.maxRun>=4?1:0)); if(chain>=2) add+=1;
    if(add>0) addTime(add);
    if(chain>=2 || big) showCombo(chain);
    if(big) bigEffect(res.cross);
    res.clear.forEach(i=>{ cells[i].classList.add('pop'); if(big)cells[i].classList.add('big'); });
    sound('pop', chain + (big?2:0));
    await sleep(big?240:190);
    res.clear.forEach(i=>{ grid[i]=null; cells[i].classList.remove('pop','big'); });
    render();
    await sleep(55);
    gravity(); render();
    await sleep(195);
  }
  render();
}
function hasAnyMove(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    for(const [dr,dc] of [[0,1],[1,0]]){ const nr=r+dr,nc=c+dc; if(!inBounds(nr,nc))continue;
      swapG(r,c,nr,nc); const ok=findMatches().size>0; swapG(r,c,nr,nc); if(ok)return true; }
  }
  return false;
}
function swapG(r1,c1,r2,c2){ const a=idx(r1,c1),b=idx(r2,c2); const t=grid[a]; grid[a]=grid[b]; grid[b]=t; }
/* 힌트: 3초간 매치 없으면 가능한 한 수 하이라이트 */
function findHint(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    for(const [dr,dc] of [[0,1],[1,0]]){ const nr=r+dr,nc=c+dc; if(!inBounds(nr,nc))continue;
      swapG(r,c,nr,nc); const ok=findMatches().size>0; swapG(r,c,nr,nc); if(ok)return {a:idx(r,c),b:idx(nr,nc)}; }
  }
  return null;
}
let hintTimer=null, hintCells=[];
function clearHint(){ hintCells.forEach(i=>cells[i]&&cells[i].classList.remove('hint')); hintCells=[]; }
function scheduleHint(){ clearTimeout(hintTimer); clearHint(); if(!playing)return;
  hintTimer=setTimeout(()=>{ if(busy||!playing)return; const mv=findHint(); if(!mv)return; hintCells=[mv.a,mv.b]; hintCells.forEach(i=>cells[i].classList.add('hint')); }, 3000); }

async function trySwap(r1,c1,r2,c2){
  if(busy||!playing) return; if(!inBounds(r2,c2)) return;
  if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1) return; // 인접만
  busy=true; clearSel();
  swapG(r1,c1,r2,c2); render(); sound('swap');
  await sleep(140);
  if(findMatches().size===0){ swapG(r1,c1,r2,c2); render(); sound('bad'); await sleep(140); busy=false; scheduleHint(); return; } // 무효 → 복귀
  await resolve();
  if(!hasAnyMove()){ genGrid(); render(); await resolve(); }
  busy=false; scheduleHint();
}

/* 입력: 드래그(스와이프)로 방향 스왑 — 터치 우선. 짧은 탭은 선택 후 인접 탭으로도 가능 */
let drag=null; // {r,c,x,y,moved}
function cellPx(){ const r=cells[0]&&cells[0].getBoundingClientRect(); return (r&&r.width)||44; }
function onDown(e,r,c){ if(busy||!playing)return; clearTimeout(hintTimer); clearHint();
  // 선택 상태에서 인접 탭 → 즉시 스왑(폴백)
  if(sel && (Math.abs(sel.r-r)+Math.abs(sel.c-c)===1)){ const s=sel; clearSel(); trySwap(s.r,s.c,r,c); return; }
  drag={r,c,x:e.clientX,y:e.clientY,moved:false};
  sel={r,c}; markSel(); try{e.target.setPointerCapture(e.pointerId);}catch(_){}
}
function resetCell(i){ const c=cells[i]; if(c){ c.style.transition=''; c.style.transform=''; c.style.zIndex=''; } }
function resetDrag(d){ if(!d)return; resetCell(idx(d.r,d.c)); if(d.nb) resetCell(idx(d.nb.r,d.nb.c)); }
function onMove(e){ if(busy||!playing||!drag)return;
  const dx=e.clientX-drag.x, dy=e.clientY-drag.y; const cp=cellPx()+3;
  const ax=Math.abs(dx)>Math.abs(dy)?'h':'v'; let off=ax==='h'?dx:dy; const dir=off>0?1:-1;
  const nr=drag.r+(ax==='v'?dir:0), nc=drag.c+(ax==='h'?dir:0);
  off=Math.max(-cp,Math.min(cp,off)); if(!inBounds(nr,nc)) off=Math.max(-cp*0.25,Math.min(cp*0.25,off));
  const cell=cells[idx(drag.r,drag.c)]; cell.style.transition='none'; cell.style.zIndex='5';
  cell.style.transform = ax==='h'?`translateX(${off}px)`:`translateY(${off}px)`;
  if(drag.nb && (drag.nb.r!==nr||drag.nb.c!==nc)){ resetCell(idx(drag.nb.r,drag.nb.c)); drag.nb=null; }
  if(inBounds(nr,nc)){ const nb=cells[idx(nr,nc)]; nb.style.transition='none'; nb.style.transform = ax==='h'?`translateX(${-off}px)`:`translateY(${-off}px)`; drag.nb={r:nr,c:nc}; }
  if(Math.abs(off)>=cp*0.55 && inBounds(nr,nc)){ const d=drag; drag=null; resetDrag(d); clearSel(); trySwap(d.r,d.c,nr,nc); }
}
document.addEventListener('pointermove',onMove,{passive:true});
document.addEventListener('pointerup',()=>{ if(drag){ resetDrag(drag); drag=null; } });
document.addEventListener('pointercancel',()=>{ if(drag){ resetDrag(drag); drag=null; } });
function markSel(){ clearSelVis(); if(sel)cells[idx(sel.r,sel.c)].classList.add('sel'); }
function clearSelVis(){ cells.forEach(c=>c.classList.remove('sel')); }
function clearSel(){ sel=null; clearSelVis(); }

function showCombo(n){ const el=document.getElementById('combo'); el.textContent=t('combo')(n); el.classList.remove('on'); void el.offsetWidth; el.classList.add('on');
  if(n>=3){ const bw=document.querySelector('.boardwrap'); bw.classList.remove('shake'); void bw.offsetWidth; bw.classList.add('shake'); setTimeout(()=>bw.classList.remove('shake'),340); } }

/* ── 사운드(합성) + 진동 ── */
let AC=null;
function soundOn(){ return localStorage.getItem('m3-sound')!=='0'; }
function getAC(){ if(!soundOn())return null; try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended')AC.resume(); return AC; }catch(e){ return null; } }
function vibe(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }
function blip(freq,dur,vol,type,glide){ const c=getAC(); if(!c)return; const t0=c.currentTime;
  const o=c.createOscillator(),g=c.createGain(); o.type=type||'triangle';
  o.frequency.setValueAtTime(freq,t0); if(glide)o.frequency.exponentialRampToValueAtTime(freq*glide,t0+dur*.8);
  g.gain.setValueAtTime(.0001,t0); g.gain.exponentialRampToValueAtTime(vol,t0+.012); g.gain.exponentialRampToValueAtTime(.0008,t0+dur);
  o.connect(g).connect(c.destination); o.start(t0); o.stop(t0+dur+.02); }
function noiseBurst(dur,vol){ const c=getAC(); if(!c)return; const n=Math.floor(c.sampleRate*dur); const buf=c.createBuffer(1,n,c.sampleRate); const d=buf.getChannelData(0); for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2); const s=c.createBufferSource(),g=c.createGain(); s.buffer=buf; g.gain.value=vol; s.connect(g).connect(c.destination); s.start(); }
// 매치/콤보: 체인이 높을수록 음 높고 화려하게 + 진동
function sound(type,chain){ const ch=chain||1;
  if(type==='pop'){ blip(440+ch*120, .14, .2, 'triangle', 1.6); noiseBurst(.05,.08); vibe(ch>=3?[12,20,12]:ch>=2?22:12); if(ch>=3){ setTimeout(()=>blip(880+ch*80,.18,.18,'sine',1.3),60); } }
  else if(type==='swap'){ blip(300,.05,.1,'sine',1.4); vibe(8); }
  else if(type==='bad'){ blip(180,.12,.14,'square',.7); vibe(0); }
  else if(type==='end'){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>blip(f,.18,.2,'triangle'),i*90)); }
}

/* ── 게임 흐름 (시간제 단일 — 매치로 시간 연장) ── */
function newGame(){ closeEnd(); document.getElementById('ovStart').classList.add('on'); }
function startGame(){
  document.getElementById('ovStart').classList.remove('on'); closeEnd();
  score=0; timeLeft=DUR; busy=false; playing=true; sel=null;
  genGrid(); render();
  (async()=>{ busy=true; await resolve(); if(!hasAnyMove()){genGrid();render();} busy=false; scheduleHint(); })();
  updateTime();
  if(timerId)clearInterval(timerId);
  timerId=setInterval(()=>{ timeLeft--; updateTime(); if(timeLeft<=0) endGame(); },1000);
  updateBest();
}
function updateTime(){ const tl=Math.max(0,timeLeft); document.getElementById('time').textContent=tl;
  const f=document.getElementById('timefill'); f.style.width=Math.min(100,tl/TMAX*100)+'%'; f.style.background= tl<=5 ? 'linear-gradient(90deg,#ff5d6c,#ff2d4d)' : 'linear-gradient(90deg,#ffcf4d,#ff7a59)'; }
function addTime(s){ if(!playing||s<=0)return; if(timeLeft>=TMAX){ return; } timeLeft=Math.min(TMAX,timeLeft+s); updateTime(); showTimePlus(s); }
function showTimePlus(s){ let el=document.getElementById('tplus'); if(!el){ el=document.createElement('div'); el.id='tplus'; el.style.cssText='position:fixed;left:50%;top:calc(var(--wallet-bar-h) + 150px);transform:translateX(-50%);z-index:50;pointer-events:none;font-weight:900;font-size:1.5rem;color:#7fffb0;text-shadow:0 2px 10px rgba(0,0,0,.8);opacity:0'; document.body.appendChild(el);} el.textContent='+'+s+'s'; el.style.animation='none'; void el.offsetWidth; el.style.animation='tplus 1s ease-out'; }
function bigEffect(cross){ const bw=document.querySelector('.boardwrap'); bw.classList.remove('flash'); void bw.offsetWidth; bw.classList.add('flash'); setTimeout(()=>bw.classList.remove('flash'),360); vibe(cross?[20,30,20,30]:[15,25,15]); }
function endGame(){
  if(!playing)return; playing=false; if(timerId)clearInterval(timerId);
  clearTimeout(hintTimer); clearHint();
  sound('end');
  const reward=Math.round(score*1000);
  try{ if(typeof SharedWallet!=='undefined'&&SharedWallet._initialized&&reward>0)SharedWallet.addGold(reward); }catch(e){}
  try{ if(typeof GameRankings!=='undefined'&&score>0)GameRankings.submit('match3',{score}); }catch(e){}
  saveBest(score);
  document.getElementById('endTitle').textContent = t('timeup');
  document.getElementById('finalScore').textContent=score;
  document.getElementById('endGold').textContent=reward>0?t('goldLine')(reward):'';
  document.getElementById('ovEnd').classList.add('on');
}
function closeEnd(){ document.getElementById('ovEnd').classList.remove('on'); }
function saveBest(s){ try{ const c=+localStorage.getItem('m3-best')||0; if(s>c)localStorage.setItem('m3-best',s); }catch(e){} updateBest(); }
function updateBest(){ try{ document.getElementById('best').textContent=(+localStorage.getItem('m3-best')||0).toLocaleString(); }catch(e){} }
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

applyLang(); buildDOM(); genGrid(); render(); updateBest();
document.getElementById('ovStart').classList.add('on');
</script>
