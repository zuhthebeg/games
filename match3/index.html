  .cell.big{animation:bigpop .26s ease-out forwards;z-index:4}
  @keyframes bigpop{0%{transform:scale(1)}35%{transform:scale(1.5);filter:brightness(1.8) drop-shadow(0 0 10px #fff)}100%{transform:scale(0) rotate(40deg);opacity:0}}
  .boardwrap.flash::after{content:"";position:absolute;inset:0;border-radius:14px;background:radial-gradient(circle,rgba(255,255,255,.55),transparent 70%);animation:flash .36s ease-out;pointer-events:none;z-index:7}
  @keyframes flash{from{opacity:1}to{opacity:0}}
  @keyframes tplus{0%{opacity:0;transform:translateX(-50%) translateY(6px) scale(.7)}25%{opacity:1;transform:translateX(-50%) translateY(-4px) scale(1.1)}100%{opacity:0;transform:translateX(-50%) translateY(-26px) scale(1)}}

  .juice::before,.juice::after{content:"";position:absolute;left:50%;top:50%;width:8px;height:8px;margin:-4px;border-radius:50%;background:var(--jc);box-shadow:0 0 0 0 var(--jc)}

  .juice::after{animation:drop2 .42s ease-out forwards}
  @keyframes juiceBlob{0%{opacity:.95;transform:translate(-50%,-50%) scale(.4)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)}}

<script>
/* ── i18n (한국어 / 繁體中文 / English) — 사전식, 즉시전환 ── */
const I18N={
  ko:{title:'팝매치',restart:'다시',score:'점수',time:'시간',best:'최고',moves:'이동',
      howto:'블록을 드래그해서 3개 이상 맞추세요',start:'시작',goalHint:'60초 안에 콤보·폭탄·컬러밤으로 최고점 도전!',pickSet:'블록 종류',
      timeup:'타임 오버!',finalScore:'최종 점수',again:'다시 하기',modeSelect:'모드 선택',close:'닫기',langBtn:'🌐 繁中',
      combo:(n)=>n+' 콤보!',comboWords:['굿!','나이스!','대박!','멋져!','파워!','폭발!','미쳤다!','갓!'],bomb:'💥 폭탄!',line:'💫 라인 클리어!',full:'🌟 올클리어!',colorbomb:'🌈 싹쓸이!',goldLine:(g)=>'💰 +'+g.toLocaleString()+'G'},
  'zh-TW':{title:'啵啵消',restart:'重來',score:'分數',time:'時間',best:'最佳',moves:'步數',
      howto:'拖曳方塊連成3個以上消除',start:'開始',goalHint:'60秒內用連擊·炸彈·全消挑戰最高分！',pickSet:'方塊種類',
      timeup:'時間到！',finalScore:'最終分數',again:'再玩一次',modeSelect:'選模式',close:'關閉',langBtn:'🌐 EN',
      combo:(n)=>n+' 連擊！',comboWords:['不錯！','讚！','厲害！','超棒！','爆發！','瘋了！','神！','無敵！'],bomb:'💥 炸彈！',line:'💫 整列消！',full:'🌟 全清！',colorbomb:'🌈 全消！',goldLine:(g)=>'💰 +'+g.toLocaleString()+'G'},
  en:{title:'Pop Match',restart:'Reset',score:'Score',time:'Time',best:'Best',moves:'Moves',
      howto:'Drag blocks to match 3 or more',start:'Start',goalHint:'Score as high as you can in 60s with combos, bombs & color blasts!',pickSet:'Block set',
      timeup:"Time's up!",finalScore:'Final score',again:'Play again',modeSelect:'Mode',close:'Close',langBtn:'🌐 한국어',
      combo:(n)=>n+' Combo!',comboWords:['Good!','Nice!','Great!','Super!','Wild!','Insane!','God!','Unreal!'],bomb:'💥 Bomb!',line:'💫 Line!',full:'🌟 Full Clear!',colorbomb:'🌈 Clear All!',goldLine:(g)=>'💰 +'+g.toLocaleString()+'G'}};
let LANG=(function(){try{const s=localStorage.getItem('m3-lang');if(s)return s;}catch(e){}
  const n=(navigator.language||'').toLowerCase();return n.startsWith('zh')?'zh-TW':n.startsWith('ko')?'ko':'en';})();
function t(k){return (I18N[LANG]||I18N.ko)[k];}
function applyLang(){
  document.documentElement.lang=LANG==='zh-TW'?'zh-Hant':(LANG==='en'?'en':'ko');
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t(el.dataset.i18n);if(typeof v==='string')el.textContent=v;});
  document.getElementById('langBtn').textContent=t('langBtn');
}
function cycleLang(){LANG=LANG==='ko'?'zh-TW':(LANG==='zh-TW'?'en':'ko');try{localStorage.setItem('m3-lang',LANG);}catch(e){};applyLang();}

/* ── 매치-3 엔진 ── */
const N=7, TYPES=6;
// 이모지 세트 — 게임 시작마다 랜덤으로 하나 선택 (과일/동물/공)
const EMOJI_SETS=[
  {name:'fruit',  faces:['🍎','🍇','🍋','🍊','🫐','🍓'], colors:['#ff5d6c','#9b5cff','#ffe14d','#ff9f3c','#5a8cff','#ff6fae']},
  {name:'animal', faces:['🐶','🐱','🐰','🐻','🐼','🦊'], colors:['#f0b27a','#c9a0ec','#ff9fb6','#a9764e','#cfd6dc','#ff8a3c']},
  {name:'ball',   faces:['⚽','🏀','🎾','⚾','🏐','🎱'], colors:['#e8edf2','#ff8a3c','#caf24d','#eef2f5','#4fc3ff','#3a3f55']},
];
let FACES=EMOJI_SETS[0].faces;
const DUR=60;      // 시작 시간(초). 매치마다 시간 추가, 단 60초 상한
const TMAX=60;     // 시간바 기준 최대(=상한)
let grid=[], cells=[], score=0, timeLeft=DUR, timerId=null, busy=false, playing=false;
let sel=null; // {r,c}
let activeTypes=[0,1,2,3,4,5]; // 살아있는 과일 종류(5매치+30초↓면 제거)

let FACE_COLORS=EMOJI_SETS[0].colors; // 과즙 색(종류별, 세트 따라 교체)
function rnd(n){return Math.floor(Math.random()*n);}
// 이모지 세트 = 사용자 선택(기본 과일). localStorage 기억
let setIdx=(function(){ try{ const v=+localStorage.getItem('m3-set'); return (v>=0&&v<EMOJI_SETS.length)?v:0; }catch(e){ return 0; } })();
function applySet(){ const s=EMOJI_SETS[setIdx]||EMOJI_SETS[0]; FACES=s.faces; FACE_COLORS=s.colors; }
function chooseSet(i){ setIdx=i; try{localStorage.setItem('m3-set',i);}catch(e){} applySet(); if(cells.length)render(); updateSetUI(); }
function updateSetUI(){ document.querySelectorAll('.setbtn').forEach((b,i)=>b.classList.toggle('on',i===setIdx)); }
function randType(){ return activeTypes[rnd(activeTypes.length)]; }
function removeTypeTemp(type){ if(!activeTypes.includes(type)||activeTypes.length<=3)return;
  activeTypes=activeTypes.filter(x=>x!==type);
  setTimeout(()=>{ if(playing && !activeTypes.includes(type)){ activeTypes.push(type); activeTypes.sort((a,b)=>a-b); } }, 5000); }
function juiceSplash(i,type){ const cell=cells[i]; if(!cell)return; const r=cell.getBoundingClientRect();
  const sp=document.createElement('div'); sp.className='juice'; sp.style.left=(r.left+r.width/2)+'px'; sp.style.top=(r.top+r.height/2)+'px';
  sp.style.setProperty('--jc', FACE_COLORS[type]||'#fff'); document.body.appendChild(sp); setTimeout(()=>sp.remove(),440); }
function idx(r,c){return r*N+c;}
function inBounds(r,c){return r>=0&&r<N&&c>=0&&c<N;}

function buildDOM(){
  document.documentElement.style.setProperty('--N',N);
  const b=document.getElementById('board'); b.innerHTML=''; cells=[];
  for(let i=0;i<N*N;i++){
    const d=document.createElement('div'); d.className='cell'; const r=Math.floor(i/N), c=i%N;
    d.addEventListener('pointerdown',e=>onDown(e,r,c));
    b.appendChild(d); cells.push(d);
  }
}
function genGrid(){
  grid=new Array(N*N);
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    let v; let guard=0;
    do{ v=randType(); guard++; }while(guard<20 && (
      (c>=2 && grid[idx(r,c-1)]===v && grid[idx(r,c-2)]===v) ||
      (r>=2 && grid[idx(r-1,c)]===v && grid[idx(r-2,c)]===v) ));
    grid[idx(r,c)]=v;
  }
}
function render(){
  for(let i=0;i<N*N;i++){ const v=grid[i]; cells[i].textContent=v==null?'':FACES[v]; }
  document.getElementById('score').textContent=score;
}

/* 매치 찾기 → 제거할 인덱스 Set */
function findMatches(){
  const m=new Set();
  for(let r=0;r<N;r++){ let run=1; for(let c=1;c<=N;c++){ if(c<N && grid[idx(r,c)]===grid[idx(r,c-1)] && grid[idx(r,c)]!=null) run++; else { if(run>=3) for(let k=1;k<=run;k++) m.add(idx(r,c-k)); run=1; } } }
  for(let c=0;c<N;c++){ let run=1; for(let r=1;r<=N;r++){ if(r<N && grid[idx(r,c)]===grid[idx(r-1,c)] && grid[idx(r,c)]!=null) run++; else { if(run>=3) for(let k=1;k<=run;k++) m.add(idx(r-k,c)); run=1; } } }
  return m;
}
function gravity(){
  for(let c=0;c<N;c++){
    let write=N-1;
    for(let r=N-1;r>=0;r--){ if(grid[idx(r,c)]!=null){ grid[idx(write,c)]=grid[idx(r,c)]; if(write!==r)grid[idx(r,c)]=null; write--; } }
    for(let r=write;r>=0;r--){ grid[idx(r,c)]=randType(); cells[idx(r,c)].classList.add("drop"); setTimeout(()=>cells[idx(r,c)]&&cells[idx(r,c)].classList.remove('drop'),240); }
  }
}
/* 런 단위 분석 → 매치셀 + 보너스 라인(4+런/크로스) */
function computeClears(){
  const runs=[];
  for(let r=0;r<N;r++){ let run=1; for(let c=1;c<=N;c++){ const same=c<N&&grid[idx(r,c)]!=null&&grid[idx(r,c)]===grid[idx(r,c-1)]; if(same)run++; else { if(run>=3){ const cs=[]; for(let k=1;k<=run;k++)cs.push(idx(r,c-k)); runs.push({o:'h',line:r,len:run,cells:cs}); } run=1; } } }
  for(let c=0;c<N;c++){ let run=1; for(let r=1;r<=N;r++){ const same=r<N&&grid[idx(r,c)]!=null&&grid[idx(r,c)]===grid[idx(r-1,c)]; if(same)run++; else { if(run>=3){ const cs=[]; for(let k=1;k<=run;k++)cs.push(idx(r-k,c)); runs.push({o:'v',line:c,len:run,cells:cs}); } run=1; } } }

  const hLenAt={}, vLenAt={};

  // T/크로스(가로·세로 동시) → 폭탄. 크기는 교차 런 길이에 비례 (3,3→3×3 / 4,3→4×4 / 4,4→4×4 …)

    for(let dr=-off;dr<=S-1-off;dr++)for(let dc=-off;dc<=S-1-off;dc++){ const nr=r+dr,nc=c+dc; if(inBounds(nr,nc))clear.add(idx(nr,nc)); } } });

  runs.forEach(rn=>{
    const crosses=rn.cells.some(i=>hSet.has(i)&&vSet.has(i));
    if(rn.len>=6){ full=true; for(let i=0;i<N*N;i++)clear.add(i); }
    else if(rn.len===5){ color=true; colorType=grid[rn.cells[0]]; for(let i=0;i<N*N;i++) if(grid[i]===colorType)clear.add(i); }
    else if(rn.len===4 && !crosses){ line=true; if(rn.o==='h'){ for(let c=0;c<N;c++)clear.add(idx(rn.line,c)); } else { for(let r=0;r<N;r++)clear.add(idx(r,rn.line)); } }
  });
  return {clear,maxRun,cross,line,color,full,colorType,bombSide,groups:runs.length};
}
async function resolve(){
  let chain=0;

    const res=computeClears();

    chain++;

    const multi = res.groups>=2;                       // 한 번에 여러 그룹 동시 매치 = 콤보
    const comboN = chain>=2 ? chain : (multi ? res.groups : 1);
    // 콤보 3+ → 콤보 폭탄: 매치 중심에 콤보수만큼 NxN(3×3 ~ 최대 5×5) 추가 폭발

      const cr=Math.round(sr/cnt), cc=Math.round(sc/cnt), S=Math.min(comboN,5), off=Math.floor((S-1)/2);

    score += res.clear.size*10*chain + (res.line?60:0) + (res.cross?120:0) + (res.color?200:0) + (res.full?500:0) + (comboBomb?comboBomb*40:0);

    // 싹쓸이(5): 그 과일 종류를 5초간만 제외(이후 복귀, 최소 3종 유지)

    if(res.full) showCombo(comboN,'full');
    else if(res.color) showCombo(comboN,'color');
    else if(res.cross) showCombo(comboN,'bomb');
    else if(res.line) showCombo(comboN,'line');
    else if(comboN>=2) showCombo(comboN);

    if(big) bigEffect(res.full);
    else if(res.line){ const bw=document.querySelector('.boardwrap'); bw.classList.remove('shake'); void bw.offsetWidth; bw.classList.add('shake'); setTimeout(()=>bw.classList.remove('shake'),340); vibe(22); }
    let _jc=0; res.clear.forEach(i=>{ cells[i].classList.add('pop'); if(strong)cells[i].classList.add('big'); if(_jc<24){ juiceSplash(i,grid[i]); _jc++; } });
    sound('pop', chain + (big?2:0) + (strong?1:0));
    await sleep(strong?250:190);
    res.clear.forEach(i=>{ grid[i]=null; cells[i].classList.remove('pop','big'); });
    render();
    await sleep(55);

    await sleep(195);

}
function hasAnyMove(){

  return false;
}
function swapG(r1,c1,r2,c2){ const a=idx(r1,c1),b=idx(r2,c2); const t=grid[a]; grid[a]=grid[b]; grid[b]=t; }

  for(let c=0;c<N;c++){ let run=1; for(let r=1;r<=N;r++){ if(r<N&&grid[idx(r,c)]!=null&&grid[idx(r,c)]===grid[idx(r-1,c)])run++; else{ if(run>=3){maxRun=Math.max(maxRun,run);total+=run;} run=1; } } }
  return maxRun*100 + total;   // 런 길이 가중 → 4·5·6연쇄(특수) 우선 추천
}
/* 힌트: 3초간 매치 없으면 가능한 수 중 점수 가장 높은 한 수 하이라이트 */
function findHint(){

    for(const [dr,dc] of [[0,1],[1,0]]){ const nr=r+dr,nc=c+dc; if(!inBounds(nr,nc))continue;
      swapG(r,c,nr,nc); const sc=findMatches().size>0?matchPotential():0; swapG(r,c,nr,nc);

async function trySwap(r1,c1,r2,c2){

  busy=true; clearSel();
  swapG(r1,c1,r2,c2); render(); sound('swap');

  if(findMatches().size===0){ swapG(r1,c1,r2,c2); render(); sound('bad'); await sleep(140); busy=false; return; } // 무효 → 복귀(힌트 타이머 리셋 안 함)

  busy=false;
}

  vibe([25,35,25,35]); }
function endGame(){
  if(!playing)return; playing=false; if(timerId)clearInterval(timerId);
  clearHint();
  sound('end');
  const reward=Math.round(score*1000);
  try{ if(typeof SharedWallet!=='undefined'&&SharedWallet._initialized&&reward>0)SharedWallet.addGold(reward); }catch(e){}
  try{ if(typeof GameRankings!=='undefined'&&score>0)GameRankings.submit('match3',{score}); }catch(e){}
  saveBest(score);
  document.getElementById('endTitle').textContent = t('timeup');
  document.getElementById('finalScore').textContent=score;
  document.getElementById('endGold').textContent=reward>0?t('goldLine')(reward):'';
  document.getElementById('ovEnd').classList.add('on');
}
function closeEnd(){ document.getElementById('ovEnd').classList.remove('on'); }
function saveBest(s){ try{ const c=+localStorage.getItem('m3-best')||0; if(s>c)localStorage.setItem('m3-best',s); }catch(e){} updateBest(); }
function updateBest(){ try{ document.getElementById('best').textContent=(+localStorage.getItem('m3-best')||0).toLocaleString(); }catch(e){} }
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

applySet(); applyLang(); buildDOM(); genGrid(); render(); updateBest(); syncAudioBtns(); updateSetUI();
document.getElementById('ovStart').classList.add('on');
</script>
