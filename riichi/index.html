<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>일본 리치마작 · 立直麻雀 — 온라인 마작</title>
<meta name="description" content="일본 리치마작(立直)을 무료로. CPU 3명과 싱글 플레이, 도라·역·점수 계산, 한국어/日本語. 13장 멘젠 리치." />
<meta property="og:title" content="일본 리치마작 · 立直麻雀" />
<meta property="og:description" content="CPU와 즐기는 13장 일본 리치마작. 리치·도라·役 점수계산. 한국어/日本語." />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" />
<script src="/lib/shared-wallet.js?v=20260214"></script>
<style>
:root{
  --bg:#0a1f1a; --felt:#10302a; --felt2:#0c2722; --panel:#13241f; --panel2:#1b332c;
  --text:#eef3ef; --muted:#8fa69d; --line:rgba(238,243,239,.12);
  --gold:#e9c46a; --green:#6ad29a; --red:#e76f63; --blue:#67c1e8; --riichi:#ff5d73;
  --ease:cubic-bezier(.22,.61,.36,1);
  --tz:1; --tile-w:calc(38px * var(--tz)); --wallet-bar-h:calc(52px + env(safe-area-inset-top));
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:radial-gradient(120% 90% at 50% 0%,var(--felt),var(--felt2));color:var(--text);
  font-family:"Noto Sans KR",system-ui,sans-serif;overflow:hidden;user-select:none}
[data-en]{display:none}
body.ja [data-ko]{display:none}
body.ja [data-en]{display:revert}

/* menu */
#menu{position:fixed;top:var(--wallet-bar-h);left:0;right:0;bottom:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  background:radial-gradient(120% 90% at 50% 0%,var(--felt),var(--felt2))}
#menu h1{font-size:2rem;font-weight:800;letter-spacing:.02em}
#menu p{color:var(--muted);font-size:.9rem;text-align:center;margin-top:-6px;line-height:1.5}
.big-btn{width:min(80vw,320px);padding:15px;border:none;border-radius:14px;background:var(--gold);color:#1a160a;
  font-size:1.05rem;font-weight:800;cursor:pointer;transition:.2s var(--ease)}
.big-btn:hover{filter:brightness(1.08)}
.big-btn.sec{background:var(--panel2);color:var(--text);border:1px solid var(--line)}

/* board */
#board{position:fixed;top:var(--wallet-bar-h);left:0;right:0;bottom:0;display:none;flex-direction:column;background:radial-gradient(130% 100% at 50% 35%,var(--felt),var(--felt2))}
.topbar{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:.78rem;color:var(--muted);flex-wrap:wrap}
.topbar .b{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:4px 9px}
.topbar .b b{color:var(--text)}
.topbar .sp{flex:1}
.topbar button{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:5px 9px;font-size:.8rem;cursor:pointer}
.dora-ind{display:flex;gap:2px;align-items:center}
.dora-ind img{width:24px;border-radius:3px;background:#fff}

.table{flex:1;position:relative;display:flex;align-items:center;justify-content:center}
/* opponents */
.opp{position:absolute;text-align:center;color:var(--muted);font-size:.72rem}
.opp .nm{font-weight:700;color:var(--text)}
.opp .nm.turn{color:var(--gold)}
.opp .nm .ri{color:var(--riichi);font-weight:800}
.opp .cnt{font-size:.66rem}
.opp .disc{display:flex;flex-wrap:wrap;gap:1px;max-width:230px;margin:3px auto 0}
.opp .disc img{width:20px;border-radius:2px;background:#fff;opacity:.95}
.opp.top{top:6px;left:50%;transform:translateX(-50%)}
.opp.left{left:6px;top:50%;transform:translateY(-50%);max-width:120px}
.opp.right{right:6px;top:50%;transform:translateY(-50%);max-width:120px}
.opp.left .disc,.opp.right .disc{max-width:118px}

/* center info */
.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--muted);font-size:.7rem;pointer-events:none}
.center .rd{font-size:1.4rem;font-weight:800;color:var(--text)}

/* my discards */
#myDisc{position:absolute;bottom:140px;left:50%;transform:translateX(-50%);display:flex;flex-wrap:wrap;gap:2px;max-width:300px;justify-content:center}
#myDisc img{width:22px;border-radius:2px;background:#fff}

/* hand */
.handzone{padding:8px 6px 12px;background:linear-gradient(transparent,rgba(0,0,0,.35))}
#hand{display:flex;gap:2px;justify-content:safe center;flex-wrap:nowrap;overflow-x:auto;padding:0 6px 4px;scrollbar-width:none}
#hand::-webkit-scrollbar{display:none}
#hand .t{position:relative;flex:0 0 auto;cursor:pointer;transition:transform .12s var(--ease)}
#hand .t img{width:min(var(--tile-w),7vw);border-radius:5px;background:#fff;display:block;box-shadow:0 2px 4px rgba(0,0,0,.4)}
#hand .t.sel{transform:translateY(-12px)}
#hand .t.draw{margin-left:10px}
#hand .t.aka img{box-shadow:0 0 0 2px var(--red),0 2px 4px rgba(0,0,0,.4)}
.actions{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap;min-height:40px}
.act{padding:9px 16px;border:none;border-radius:10px;font-weight:800;font-size:.92rem;cursor:pointer;color:#10201b}
.act:disabled{display:none}
.a-tsumo{background:var(--gold)} .a-ron{background:var(--red);color:#fff} .a-riichi{background:var(--riichi);color:#fff}
.a-kan{background:var(--blue)} .a-discard{background:var(--green)} .a-skip{background:var(--panel2);color:var(--text);border:1px solid var(--line)}

/* overlays */
.ov{position:fixed;inset:0;z-index:40;background:rgba(5,12,10,.82);display:none;align-items:center;justify-content:center;padding:18px}
.ov.show{display:flex}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:460px;width:100%;max-height:88vh;overflow:auto}
.card h2{font-size:1.3rem;margin-bottom:10px}
.yaku-row{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:6px 0;font-size:.9rem}
.yaku-row b{color:var(--gold)}
.score-big{font-size:2rem;font-weight:800;color:var(--gold);text-align:center;margin:12px 0}
.win-tiles{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.win-tiles img{width:30px;border-radius:3px;background:#fff}
.win-tiles img.win{box-shadow:0 0 0 2px var(--gold)}
.card .row{display:flex;justify-content:space-between;align-items:center;margin:8px 0;font-size:.92rem}
.seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{background:transparent;border:none;color:var(--muted);padding:7px 12px;cursor:pointer;font-size:.85rem}
.seg button.on{background:var(--gold);color:#1a160a;font-weight:700}
.card .close{width:100%;margin-top:14px;padding:12px;border:none;border-radius:10px;background:var(--gold);color:#1a160a;font-weight:800;cursor:pointer}
.toast{position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);z-index:50;background:rgba(0,0,0,.8);
  border:2px solid var(--gold);color:#fff;font-size:2rem;font-weight:800;padding:14px 30px;border-radius:14px;display:none;animation:pop .5s var(--ease)}
@keyframes pop{from{transform:translate(-50%,-50%) scale(.7);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
#turnTimer{position:absolute;left:0;right:0;bottom:0;height:3px;background:transparent}
#turnTimer .bar{height:100%;background:var(--gold);width:100%;transform-origin:left;transition:transform .2s linear}
#turnTimer.warn .bar{background:var(--red)}
#tenpaiInfo{text-align:center;font-size:.72rem;color:var(--gold);min-height:24px;display:flex;gap:3px;justify-content:center;align-items:center;flex-wrap:wrap}
#tenpaiInfo img{width:20px;border-radius:2px;background:#fff}
#tenpaiInfo .lab{color:var(--muted)}
/* 애니메이션 */
@keyframes dealIn{from{transform:translateY(-60px) scale(.5) rotate(-12deg);opacity:0}70%{opacity:1}to{transform:none;opacity:1}}
#hand .t.deal-anim{animation:dealIn .42s var(--ease) backwards}
@keyframes discIn{from{transform:translate(var(--dx,0),var(--dy,-30px)) scale(1.3);opacity:0}60%{opacity:1}to{transform:none;opacity:1}}
.disc-anim{animation:discIn .34s var(--ease)}
.disc img.ri,#myDisc img.ri{transform:rotate(90deg);box-shadow:0 0 0 2px var(--riichi)}
.meld{display:flex;align-items:flex-end;margin-left:7px;border-left:2px solid var(--gold);padding-left:4px}
.meld img{width:calc(min(var(--tile-w),7vw)*.82);border-radius:4px;background:#fff;display:block}
.omeld{display:flex;flex-wrap:wrap;gap:1px;justify-content:center;margin-top:1px}
.omeld img{width:16px;border-radius:2px;background:#fff;opacity:.95}
#hand .t.draw img{box-shadow:0 0 0 2px var(--gold),0 2px 6px rgba(0,0,0,.5)}
@keyframes winGlow{0%,100%{box-shadow:0 0 0 2px var(--gold)}50%{box-shadow:0 0 16px 4px var(--gold)}}
.win-tiles img.win{animation:winGlow 1s ease-in-out infinite}
@keyframes winPop{0%{transform:scale(.4);opacity:0}55%{transform:scale(1.15)}72%{transform:scale(.96)}100%{transform:scale(1);opacity:1}}
#result.show .card{animation:winPop .5s var(--ease)}
.confetti{position:fixed;top:-12px;width:9px;height:14px;z-index:60;pointer-events:none;border-radius:2px}
@keyframes cfall{to{transform:translateY(104vh) rotate(640deg);opacity:.85}}
/* 활성 좌석 글로우 */
.opp.turnseat .nm{color:var(--gold)}
.opp.turnseat{filter:drop-shadow(0 0 8px rgba(233,196,106,.5))}
.handzone.myturn{box-shadow:inset 0 3px 0 var(--gold)}
/* 점수칩 */
.scorerow{display:flex;gap:5px;justify-content:center;padding:0 10px 4px;flex-wrap:wrap}
.scorerow .sc{background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:3px 8px;font-size:.7rem;color:var(--muted)}
.scorerow .sc.me{border-color:var(--gold)}
.scorerow .sc.dealer b.w{color:var(--riichi)}
.scorerow .sc b{color:var(--text)}
.scorerow .sc.turnon{box-shadow:0 0 0 1px var(--gold)}
/* 콜 팝업 */
#claimPop{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);z-index:55;display:none;align-items:center;gap:10px;
  background:rgba(0,0,0,.82);border:3px solid var(--gold);border-radius:16px;padding:12px 22px}
#claimPop.show{display:flex;animation:pop .4s var(--ease)}
#claimPop .lbl{font-size:1.8rem;font-weight:900;color:var(--gold)}
#claimPop img{width:38px;border-radius:4px;background:#fff}
</style>
</head>
<body>

<div id="menu">
  <h1>🀄 <span data-ko>일본 리치마작</span><span data-en>立直麻雀</span></h1>
  <p data-ko>13장 · 동풍전 · CPU 3명<br>리치 · 도라 · 役 점수계산</p>
  <p data-en>13 tiles · East round · 3 CPUs<br>Riichi · Dora · Yaku scoring</p>
  <div style="color:var(--gold);font-weight:700;font-size:.95rem" id="menu-gold">💰 -</div>
  <button class="big-btn" onclick="newGame()" data-ko>게임 시작</button><button class="big-btn" onclick="newGame()" data-en>Start</button>
  <div style="display:flex;gap:6px;align-items:center;font-size:.85rem;color:var(--muted)"><span data-ko>판돈</span><span data-en>Bet</span>
    <div class="seg"><button data-bet="1" onclick="setBet(1)">×1</button><button data-bet="5" onclick="setBet(5)">×5</button><button data-bet="10" onclick="setBet(10)">×10</button></div>
  </div>
  <button class="big-btn sec" onclick="show('howto')" data-ko>플레이 방법</button><button class="big-btn sec" onclick="show('howto')" data-en>How to play</button>
  <button class="big-btn sec" onclick="show('settings')">⚙ <span data-ko>설정</span><span data-en>Settings</span></button>
</div>

<div id="board">
  <div class="topbar">
    <span class="b"><span data-ko>국</span><span data-en>Round</span> <b id="t-round">東1</b></span>
    <span class="b"><span data-ko>잔여</span><span data-en>Wall</span> <b id="t-wall">70</b></span>
    <span class="b" title="게임 내 점수(국 진행용). 골드는 결과에 정산"><span data-ko>점</span><span data-en>Pts</span> <b id="t-pts">25000</b></span>
    <span class="b dora-ind"><span data-ko>도라</span><span data-en>Dora</span> <span id="t-dora"></span></span>
    <span class="sp"></span>
    <button onclick="zoomTiles(-1)">🔍−</button><button onclick="zoomTiles(1)">🔍+</button>
    <button onclick="show('settings')">⚙</button>
    <button onclick="quitToMenu()" data-ko>나가기</button><button onclick="quitToMenu()" data-en>Exit</button>
  </div>
  <div class="scorerow" id="scoreRow"></div>
  <div class="table">
    <div class="opp top" id="opp2"></div>
    <div class="opp left" id="opp3"></div>
    <div class="opp right" id="opp1"></div>
    <div class="center"><div class="rd" id="c-round">東</div><div id="c-info"></div></div>
    <div id="myDisc"></div>
    <div id="turnTimer"><div class="bar"></div></div>
  </div>
  <div class="handzone">
    <div id="tenpaiInfo"></div>
    <div id="hand"></div>
    <div class="actions" id="actions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="claimPop"></div>

<!-- result -->
<div class="ov" id="result"><div class="card">
  <h2 id="r-title"></h2>
  <div class="win-tiles" id="r-tiles"></div>
  <div id="r-yaku"></div>
  <div class="score-big" id="r-score"></div>
  <div id="r-detail" style="color:var(--muted);font-size:.82rem;text-align:center"></div>
  <button class="close" onclick="nextHand()" data-ko>다음 국</button><button class="close" onclick="nextHand()" data-en>Next</button>
</div></div>

<!-- settings -->
<div class="ov" id="settings"><div class="card">
  <h2>⚙ <span data-ko>설정</span><span data-en>Settings</span></h2>
  <div class="row"><span data-ko>🌐 언어</span><span data-en>🌐 Language</span>
    <div class="seg"><button data-lang="ko" onclick="setLang('ko')">한국어</button><button data-lang="ja" onclick="setLang('ja')">日本語</button></div></div>
  <div class="row"><span data-ko>🔊 소리</span><span data-en>🔊 Sound</span>
    <div class="seg"><button data-snd="1" onclick="setSnd(1)">ON</button><button data-snd="0" onclick="setSnd(0)">OFF</button></div></div>
  <div class="row"><span data-ko>🎵 배경음</span><span data-en>🎵 BGM</span>
    <div class="seg"><button data-bgm="1" onclick="setBgm(1)">ON</button><button data-bgm="0" onclick="setBgm(0)">OFF</button></div></div>
  <div class="row"><span data-ko>🀅 적도라</span><span data-en>🀅 Red fives</span>
    <div class="seg"><button data-aka="1" onclick="setAka(1)">ON</button><button data-aka="0" onclick="setAka(0)">OFF</button></div></div>
  <div class="row"><span data-ko>⏱ 턴 제한</span><span data-en>⏱ Turn limit</span>
    <div class="seg"><button data-tl="0" onclick="setTL(0)">∞</button><button data-tl="10" onclick="setTL(10)">10s</button><button data-tl="20" onclick="setTL(20)">20s</button></div></div>
  <button class="close" onclick="hide('settings')" data-ko>닫기</button><button class="close" onclick="hide('settings')" data-en>Close</button>
</div></div>

<!-- howto -->
<div class="ov" id="howto"><div class="card">
  <h2 data-ko>플레이 방법</h2><h2 data-en>How to play</h2>
  <div style="font-size:.9rem;line-height:1.7;color:var(--text)" id="howtoBody"></div>
  <button class="close" onclick="hide('howto')" data-ko>닫기</button><button class="close" onclick="hide('howto')" data-en>Close</button>
</div></div>

<script>
/* ===== Riichi Mahjong SP engine v1 (closed-hand) ===== */
const $=id=>document.getElementById(id);
let LANG=localStorage.getItem('riichi_lang')||'ko';
let SND=localStorage.getItem('riichi_snd')!=='0';
let BGM=localStorage.getItem('riichi_bgm')==='1';
let AKA=localStorage.getItem('riichi_aka')!=='0';
let BET=+(localStorage.getItem('riichi_bet')||1);
let TZ=+(localStorage.getItem('riichi_zoom')||1);
let TL=+(localStorage.getItem('riichi_tl')||0);
let _bgmA=null, _turnT=null;
const T=(ko,ja)=>LANG==='ja'?ja:ko;

// tile: 0-8 man, 9-17 pin, 18-26 sou, 27-33 honor(27=E,28=S,29=W,30=N,31=白,32=發,33=中)
function suitOf(t){return t<9?0:t<18?1:t<27?2:3;}
function numOf(t){return t%9+1;} // for suits
function isHonor(t){return t>=27;}
function isTerminalOrHonor(t){return isHonor(t)||numOf(t)===1||numOf(t)===9 && t<27;}
function tileSvg(t,aka){ // aka: red five
  if(t<27){const s=['m','p','s'][suitOf(t)];return 'tiles/'+s+(t%9+1)+'.svg';}
  return 'tiles/z'+(t-26)+'.svg';
}
const HONOR_NAME_KO=['동','남','서','북','백','발','중'];
const HONOR_NAME_JA=['東','南','西','北','白','發','中'];
function tileLabel(t){ if(t<27){const s=['萬','筒','索'][suitOf(t)];return (t%9+1)+s;} return (LANG==='ja'?HONOR_NAME_JA:HONOR_NAME_KO)[t-27]; }
function nextDora(ind){ // dora = tile after indicator
  if(ind<27){const n=ind%9; const base=ind-n; return base+((n+1)%9);}
  if(ind<=30){return 27+((ind-27+1)%4);} // winds E S W N
  return 31+((ind-31+1)%3); // dragons 白發中
}

let G=null; // game state
function newGame(){
  $('menu').style.display='none'; $('board').style.display='flex';
  G={ roundWind:27, hand:0, dealer:0, honba:0, pts:[25000,25000,25000,25000], aka:AKA, riichiSticks:0, kyoku:1 };
  startHand(); applyBgm();
}
function startHand(){
  // build wall 136
  let wall=[]; for(let t=0;t<34;t++)for(let k=0;k<4;k++)wall.push(t);
  // red fives: mark one 5 of each suit as aka (index 4,13,22) — track via Set of positions later; simple: akaSet by tile flag per drawn tile
  for(let i=wall.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[wall[i],wall[j]]=[wall[j],wall[i]];}
  G.wall=wall; G.akaPicked={4:false,13:false,22:false}; // first drawn 5m/5p/5s becomes aka
  G.players=[0,1,2,3].map(i=>({hand:[],discards:[],riichi:false,riichiTile:-1,ippatsu:false,melds:[],seat:(i-G.dealer+4)%4}));
  // seat: 0=E for dealer; seat wind = 27+seat
  // deal 13
  for(let r=0;r<13;r++)for(let p=0;p<4;p++)G.players[p].hand.push(drawWall());
  G.players.forEach(p=>sortHand(p.hand));
  // dead wall dora indicators (take 1 visible + ura)
  G.doraInd=[drawWall()]; G.uraInd=[drawWall()];
  G.live=G.wall.length-14; // approx remaining playable
  G.turn=G.dealer; G.drawn=-1; G.lastDiscard=-1; G.lastDiscardBy=-1; G.over=false; G.firstGoAround=true; G.ptsStart=G.pts.slice();
  G._dealing=true; renderAll(); updateTop(); setTimeout(()=>{G._dealing=false;},900);
  setTimeout(()=>turnLoop(),700);
}
function drawWall(){ return G.wall.shift(); }
function sortHand(h){ h.sort((a,b)=>a-b); }

function turnLoop(){
  if(G.over) return;
  if(G.wall.length<=14){ return drawnGame(); } // exhaustive draw (ryuukyoku)
  const p=G.turn;
  G.players[p]._tempFuriten=false; G._rinshan=false;
  G.drawn=drawWall();
  const pl=G.players[p];
  pl.hand.push(G.drawn);
  updateTop();
  if(p===0){ renderHand(); humanOptions(); }
  else { clearTurnTimer(); $('tenpaiInfo').innerHTML=''; setTimeout(()=>cpuTurn(p),600); }
}

function humanOptions(){
  const pl=G.players[0];
  const acts=$('actions'); acts.innerHTML='';
  // tsumo?
  const full=pl.hand.slice();
  if(canWin(full, true, 0)){ addAct('a-tsumo',T('쯔모','ツモ'),()=>declareWin(0,true,G.drawn)); }
  // riichi?
  if(!pl.riichi && pl.melds.length===0 && G.pts[0]>=1000 && G.wall.length>14){
    const t=tenpaiDiscards(pl.hand);
    if(t.length){ addAct('a-riichi',T('리치','立直'),()=>doRiichi()); }
  }
  // ankan?
  const kanT=ankanCandidates(pl.hand);
  if(kanT.length){ addAct('a-kan',T('안깡','暗槓'),()=>doAnkan(kanT[0])); }
  addAct('a-discard',T('버리기','打牌'),()=>{ if(selIdx>=0) humanDiscard(selIdx); else humanDiscard(pl.hand.length-1); });
  renderHand(); renderTenpai(); startTurnTimer();
}
function addAct(cls,label,fn){ const b=document.createElement('button'); b.className='act '+cls; b.textContent=label; b.onclick=fn; $('actions').appendChild(b); }

let selIdx=-1;
function renderHand(){

function discardTile(p,t){
  const pl=G.players[p];
  if(pl.ippatsu && !pl.pendingRiichi) pl.ippatsu=false;            // 자기 다음 타로 일발 종료
  pl.discards.push(t); pl._newDisc=true;
  G.lastDiscard=t; G.lastDiscardBy=p;
  if(pl.pendingRiichi){ pl.riichi=true; pl.pendingRiichi=false; pl.riichiTile=t; pl.riichiDiscIdx=pl.discards.length-1; pl.ippatsu=true; if(G.firstGoAround&&pl.discards.length===1)pl.doubleRiichi=true; G.pts[p]-=1000; G.riichiSticks=(G.riichiSticks||0)+1; sound('riichi'); showClaimPop(T('리치','リーチ'),t); }
  renderAll(); updateTop();
  // 리치 후 패스했던 패는 영구 후리텐
  const claims=collectClaims(p,t);
  if(claims.human.length){ return showClaimUI(claims,p,t); }

}
function passTurn(p){ G.turn=(p+1)%4; G.firstGoAround = G.firstGoAround && G.turn!==G.dealer; setTimeout(()=>turnLoop(),320); }
function chiOptions(hand,t){ if(t>=27)return []; const has=x=>hand.includes(x); const n=numOf(t); const res=[];
  if(n>=3 && has(t-2)&&has(t-1)) res.push([t-2,t-1]);
  if(n>=2 && n<=8 && has(t-1)&&has(t+1)) res.push([t-1,t+1]);
  if(n<=7 && has(t+1)&&has(t+2)) res.push([t+1,t+2]);
  return res; }
function collectClaims(p,t){
  const human=[], cpu=[];
  for(let k=1;k<4;k++){ const q=(p+k)%4; const pl=G.players[q]; const cnt=pl.hand.filter(x=>x===t).length;
    const test=pl.hand.concat([t]);
    const canRon = canWin(test,false,q) && hasYaku(test,false,q,t) && !isFuriten(pl,t);
    let opts=[];
    if(pl.riichi){ if(canRon)opts.push({type:'ron'}); }
    else {
      if(canRon)opts.push({type:'ron'});
      if(cnt>=3)opts.push({type:'minkan'});
      if(cnt>=2)opts.push({type:'pon'});
      if(q===(p+1)%4){ const ch=chiOptions(pl.hand,t); if(ch.length)opts.push({type:'chi',chis:ch}); }
    }
    if(opts.length){ if(q===0)human.push(...opts); else cpu.push({q,opts}); }
  }
  return {human,cpu};
}
function showClaimUI(claims,p,t){

  claims.human.sort((a,b)=>order.indexOf(a.type)-order.indexOf(b.type));

    addAct(cls,LBL[o.type],()=>{ if(o.type==='ron')return declareWin(0,false,t,p); if(o.type==='chi')return applyCall(0,'chi',t,p,o.chis[0]); return applyCall(0,o.type,t,p); }); });
  addAct('a-skip',T('패스','パス'),()=>{ if(claims.human.some(o=>o.type==='ron')){ const pl0=G.players[0]; pl0._tempFuriten=true; if(pl0.riichi)pl0._riichiFuriten=true; } resolveCpuClaims(claims,p,t); });
  toast(T('호출 가능!','コール可能!'));

  if(TL>0){ if(window._claimTO)clearTimeout(window._claimTO); window._claimTO=setTimeout(()=>{ const sk=$('actions').querySelector('.a-skip'); if(sk)sk.click(); }, (TL+3)*1000); }
}
function resolveCpuClaims(claims,p,t){
  for(const c of claims.cpu){ if(c.opts.some(o=>o.type==='ron')) return declareWin(c.q,false,t,p); }
  let pick=null;
  for(const c of claims.cpu){ const o=c.opts.find(o=>o.type==='minkan'||o.type==='pon'); if(o){ const yh=(t>=31)||(t===G.roundWind)||(t===27+G.players[c.q].seat); if(yh){ pick={q:c.q,type:o.type}; break; } } }
  if(pick) return applyCall(pick.q,pick.type,t,p);
  passTurn(p);
}
function removeN(hand,t,n){ for(let k=0;k<n;k++){ const i=hand.indexOf(t); if(i>=0)hand.splice(i,1); } }
function applyCall(who,type,tile,from,chiPair){
  const pl=G.players[who]; const src=G.players[from];
  if(src.discards.length && src.discards[src.discards.length-1]===tile){ src.discards.pop(); if(src.riichiDiscIdx>=src.discards.length)src.riichiDiscIdx=-1; }
  if(type==='pon'){ removeN(pl.hand,tile,2); pl.melds.push({type:'pon',tiles:[tile,tile,tile],from}); }
  else if(type==='minkan'){ removeN(pl.hand,tile,3); pl.melds.push({type:'minkan',tiles:[tile,tile,tile,tile],from}); }
  else if(type==='chi'){ removeN(pl.hand,chiPair[0],1); removeN(pl.hand,chiPair[1],1); pl.melds.push({type:'chi',tiles:[chiPair[0],chiPair[1],tile].sort((a,b)=>a-b),from}); }
  G.players.forEach(x=>x.ippatsu=false); G.firstGoAround=false;
  const LBL={pon:T('퐁','ポン'),minkan:T('깡','カン'),chi:T('치','チー')};
  showClaimPop(LBL[type]||'',tile); sound('riichi'); try{navigator.vibrate&&navigator.vibrate(25);}catch(e){}
  G.turn=who; G.drawn=-1; selIdx=-1;
  if(type==='minkan'){ G.doraInd.push(drawWall()); G._rinshan=true; if(G.wall.length>0){ G.drawn=drawWall(); pl.hand.push(G.drawn); } }
  sortHand(pl.hand); renderAll(); updateTop();
  if(who===0){ if(type==='minkan') humanOptions(); else humanOptionsAfterCall(); }
  else setTimeout(()=>cpuAfterCall(who, type==='minkan'),700);
}
function humanOptionsAfterCall(){
  const acts=$('actions'); acts.innerHTML='';
  addAct('a-discard',T('버리기','打牌'),()=>{ if(selIdx>=0) humanDiscard(selIdx); else toast(T('버릴 패 선택','打牌選択')); });
  renderHand(); renderTenpai();
}
function cpuAfterCall(who,drew){
  const pl=G.players[who];
  if(drew && canWin(pl.hand,true,who) && hasYaku(pl.hand,true,who,G.drawn)) return declareWin(who,true,G.drawn);
  const t=cpuChooseDiscard(pl.hand); const i=pl.hand.indexOf(t); pl.hand.splice(i,1); sortHand(pl.hand); G.drawn=-1;
  discardTile(who,t);
}
function cpuTurn(p){
  const pl=G.players[p];
  // tsumo?
  if(canWin(pl.hand,true,p) && hasYaku(pl.hand,true,p,G.drawn)){ return declareWin(p,true,G.drawn); }
  // riichi if tenpai & closed & not already
  if(!pl.riichi && pl.melds.length===0 && G.pts[p]>=1000 && G.wall.length>14){
    const t=tenpaiDiscards(pl.hand);
    if(t.length){ pl.pendingRiichi=true; // discard the riichi tile (one that keeps tenpai)
      const disc=t[0].discard; const idx=pl.hand.indexOf(disc); pl.hand.splice(idx,1); sortHand(pl.hand);
      G.drawn=-1; return discardTile(p,disc);
    }
  }
  // riichi locked: must discard drawn
  if(pl.riichi){ const t=pl.hand[pl.hand.length-1]; pl.hand.pop(); sortHand(pl.hand); G.drawn=-1; return discardTile(p,t); }
  // discard: pick least useful (isolated honors/terminals first via simple shanten-ish heuristic)
  const t=cpuChooseDiscard(pl.hand); const idx=pl.hand.indexOf(t); pl.hand.splice(idx,1); sortHand(pl.hand); G.drawn=-1;
  discardTile(p,t);
}
function cpuChooseDiscard(hand){
  // score each tile by how much removing it hurts; prefer discarding isolated tiles
  let best=hand[0],bestScore=-1;
  for(const t of new Set(hand)){
    const cnt=hand.filter(x=>x===t).length;
    let conn=0;
    if(t<27){const n=numOf(t); for(const o of hand){ if(suitOf(o)===suitOf(t)){const d=Math.abs(numOf(o)-n); if(d<=2&&d>0)conn++;}}}
    const useless=(cnt===1?2:0)+(isHonor(t)&&cnt<2?3:0)+(t<27&&(numOf(t)===1||numOf(t)===9)?1:0)-conn-cnt*2;
    if(useless>bestScore){bestScore=useless;best=t;}
  }
  return best;
}

/* ===== win / tenpai / yaku ===== */
function counts(hand){ const c=new Array(34).fill(0); hand.forEach(t=>c[t]++); return c; }
function isWin(hand){ // hand length 14 (incl winning tile), closed
  const c=counts(hand);
  if(isKokushi(c)) return true;
  if(isChiitoi(c)) return true;
  return standardWin(c);
}
function isChiitoi(c){ let pairs=0; for(let i=0;i<34;i++){ if(c[i]===2)pairs++; else if(c[i]!==0)return false;} return pairs===7; }
function isKokushi(c){ const terms=[0,8,9,17,18,26,27,28,29,30,31,32,33]; let pair=false; for(const t of terms){ if(c[t]===0)return false; if(c[t]===2)pair=true; else if(c[t]!==1)return false;} let sum=terms.reduce((a,t)=>a+c[t],0); return pair&&sum===14; }
function standardWin(c){
  // try each pair then check melds
  for(let p=0;p<34;p++){ if(c[p]>=2){ c[p]-=2; if(canMelds(c.slice())){c[p]+=2;return true;} c[p]+=2; } }
  return false;
}
function canMelds(c){
  let i=0; while(i<34&&c[i]===0)i++;
  if(i===34)return true;
  // triplet
  if(c[i]>=3){ c[i]-=3; if(canMelds(c))return true; c[i]+=3; }
  // sequence (suits only, not honor, i num<=7)
  if(i<27 && numOf(i)<=7 && c[i+1]>0 && c[i+2]>0){ c[i]--;c[i+1]--;c[i+2]--; if(canMelds(c))return true; c[i]++;c[i+1]++;c[i+2]++; }
  return false;
}
function canMeldsN(c,need){ let i=0; while(i<34&&c[i]===0)i++; if(i===34)return need===0; if(need<=0)return false;
  if(c[i]>=3){ c[i]-=3; if(canMeldsN(c,need-1))return true; c[i]+=3; }
  if(i<27&&numOf(i)<=7&&c[i+1]>0&&c[i+2]>0){ c[i]--;c[i+1]--;c[i+2]--; if(canMeldsN(c,need-1))return true; c[i]++;c[i+1]++;c[i+2]++; }
  return false; }
function isWinM(concealed,nMeld){ const c=counts(concealed);
  if(nMeld===0){ if(isKokushi(c))return true; if(isChiitoi(c))return true; }
  const need=4-nMeld;
  for(let p=0;p<34;p++){ if(c[p]>=2){ c[p]-=2; let ok; if(need===0){ ok=c.every(x=>x===0); } else { ok=canMeldsN(c.slice(),need); } c[p]+=2; if(ok)return true; } }
  return false; }
function canWin(hand14, tsumo, p){ const m=(G.players[p].melds||[]).length; return hand14.length===14-3*m && isWinM(hand14,m); }

function waits(hand13,nMeld){ nMeld=nMeld||0;
  const res=[]; for(let t=0;t<34;t++){ if(hand13.filter(x=>x===t).length>=4)continue; if(isWinM(hand13.concat([t]),nMeld))res.push(t); } return res;
}
function tenpaiDiscards(hand,nMeld){ nMeld=nMeld||0;
  const res=[]; const seen=new Set();
  for(const d of hand){ if(seen.has(d))continue; seen.add(d); const h=hand.slice(); h.splice(h.indexOf(d),1); const w=waits(h,nMeld); if(w.length)res.push({discard:d,waits:w}); }
  return res;
}
function isFuriten(pl,winTile){
  if(pl._tempFuriten) return true;
  const h=pl.hand.slice(); // hand already has nothing extra here for ron check we pass hand+tile; compute waits of 13
  const h13 = pl.hand.slice();
  const w=waits(h13, pl.melds.length);
  if(pl._riichiFuriten)return true;
  for(const t of w){ if(pl.discards.includes(t))return true; }
  return false;
}

/* yaku */
function decompose(c){ // return list of decompositions: {pair, sets:[{type:'tri'|'seq', t}]}
  const results=[];
  for(let p=0;p<34;p++){ if(c[p]>=2){ const cc=c.slice(); cc[p]-=2; const sets=[]; rec(cc,sets,results,p); } }
  return results;
}
function rec(c,sets,results,pair){
  let i=0; while(i<34&&c[i]===0)i++;
  if(i===34){ results.push({pair,sets:sets.map(s=>({...s}))}); return; }
  if(c[i]>=3){ c[i]-=3; sets.push({type:'tri',t:i}); rec(c,sets,results,pair); sets.pop(); c[i]+=3; }
  if(i<27&&numOf(i)<=7&&c[i+1]>0&&c[i+2]>0){ c[i]--;c[i+1]--;c[i+2]--; sets.push({type:'seq',t:i}); rec(c,sets,results,pair); sets.pop(); c[i]++;c[i+1]++;c[i+2]++; }
}
function akaCount(hand){ return 0; }
function chiitoi0(c){ let pr=0; for(let i=0;i<34;i++){ if(c[i]===2)pr++; else if(c[i])return false; } return pr===7; }
function countDora(hand,inds){ let n=0; for(const ind of inds){ const d=nextDora(ind); n+=hand.filter(x=>x===d).length; } return n; }

function evalYaku(hand14, tsumo, p, winTile){
  const pl=G.players[p]; const melds=pl.melds||[]; const yaku=[]; let han=0; let yakuman=0;
  const menzen = melds.every(m=>m.type==='ankan');                 // 멘젠(암깡만 있어도 멘젠)
  const meldSets = melds.map(m=> m.type==='chi' ? {type:'seq',t:Math.min(...m.tiles),open:true} : {type:'tri',t:m.tiles[0],open:m.type!=='ankan'} );
  const meldTiles = [].concat(...melds.map(m=>m.tiles));
  const all = hand14.concat(meldTiles); const allC=counts(all);
  const c=counts(hand14);
  const roundW=G.roundWind, seatW=27+pl.seat;
  if(menzen && isKokushi(c)){ yaku.push({n:T('국사무쌍','国士無双'),h:13}); yakuman+=13; }
  // 역만 (count 기반)
  if(allC[31]>=3&&allC[32]>=3&&allC[33]>=3){ yaku.push({n:T('대삼원','大三元'),h:13}); yakuman+=13; }
  { const W=[27,28,29,30]; const wt=W.filter(w=>allC[w]>=3).length; const wp=W.some(w=>allC[w]===2);
    if(wt===4){ yaku.push({n:T('대사희','大四喜'),h:26}); yakuman+=26; } else if(wt===3&&wp){ yaku.push({n:T('소사희','小四喜'),h:13}); yakuman+=13; } }
  if(all.length&&all.every(t=>t>=27)){ yaku.push({n:T('자일색','字一色'),h:13}); yakuman+=13; }
  if(all.length&&all.every(t=>t<27&&(numOf(t)===1||numOf(t)===9))){ yaku.push({n:T('청노두','清老頭'),h:13}); yakuman+=13; }
  { const GR=new Set([19,20,21,23,25,32]); if(all.length&&all.every(t=>GR.has(t))){ yaku.push({n:T('녹일색','緑一色'),h:13}); yakuman+=13; } }
  if(menzen && !chiitoi0(c)){ const ds=decompose(c); if(ds.some(d=>{const tr=d.sets.filter(s=>s.type==='tri'); return tr.length===4;})){ yaku.push({n:T('스안커','四暗刻'),h:13}); yakuman+=13; } }
  const chiitoi = menzen && isChiitoi(c);
  const wc=G._winCtx||{};
  if(pl.riichi){ const dbl=pl.doubleRiichi; yaku.push({n:dbl?T('더블리치','ダブル立直'):T('리치','立直'),h:dbl?2:1}); han+=dbl?2:1; if(pl.ippatsu){ yaku.push({n:T('일발','一発'),h:1}); han++; } }
  if(wc.rinshan){ yaku.push({n:T('영상개화','嶺上開花'),h:1}); han++; }
  if(wc.haitei){ yaku.push({n:T('해저로월','海底摸月'),h:1}); han++; }
  if(wc.houtei){ yaku.push({n:T('하저로어','河底撈魚'),h:1}); han++; }
  if(tsumo&&menzen){ yaku.push({n:T('멘젠쯔모','門前清自摸'),h:1}); han++; }
  if(all.every(t=>t<27&&numOf(t)>=2&&numOf(t)<=8)){ yaku.push({n:T('탕야오','断么九'),h:1}); han++; }
  [31,32,33].forEach((d,k)=>{ if(allC[d]>=3){ yaku.push({n:T('역패 '+HONOR_NAME_KO[4+k],'役牌 '+HONOR_NAME_JA[4+k]),h:1}); han++; } });
  if(allC[roundW]>=3){ yaku.push({n:T('장풍','場風'),h:1}); han++; }
  if(allC[seatW]>=3 && seatW!==roundW){ yaku.push({n:T('자풍','自風'),h:1}); han++; }
  const suits=new Set(all.filter(t=>t<27).map(t=>suitOf(t))); const hasHonor=all.some(t=>t>=27);
  if(suits.size===1 && !hasHonor){ const h=menzen?6:5; yaku.push({n:T('청일색','清一色'),h}); han+=h; }
  else if(suits.size===1 && hasHonor){ const h=menzen?3:2; yaku.push({n:T('혼일색','混一色'),h}); han+=h; }
  if(chiitoi){ yaku.push({n:T('치또이쯔','七対子'),h:2}); han+=2; }
  if(!chiitoi && yakuman===0){
    const decs=decompose(c); let best=0,bestList=[];
    for(const dec of decs){
      const sets=meldSets.concat(dec.sets); if(sets.length!==4)continue;
      let h=0; const list=[];
      const seqs=sets.filter(s=>s.type==='seq'); const tris=sets.filter(s=>s.type==='tri');
      if(menzen && seqs.length===4){ const pr=dec.pair; const yk=(pr>=31)||pr===roundW||pr===seatW; if(!yk){ h++; list.push({n:T('핑후','平和'),h:1}); } }
      if(menzen){ const ks=seqs.map(s=>s.t).sort((a,b)=>a-b); for(let k=0;k<ks.length-1;k++)if(ks[k]===ks[k+1]){ h++; list.push({n:T('이페코','一盃口'),h:1}); break; } }
      if(tris.length===4){ h+=2; list.push({n:T('또이또이','対々和'),h:2}); }
      if(menzen && tris.filter(t=>!t.open).length>=3){ h+=2; list.push({n:T('산안커','三暗刻'),h:2}); }
      const ss=seqs.map(s=>s.t);
      for(let n=0;n<=6;n++){ if(ss.includes(n)&&ss.includes(n+9)&&ss.includes(n+18)){ const hh=menzen?2:1; h+=hh; list.push({n:T('삼색동순','三色同順'),h:hh}); break; } }
      for(let st=0;st<3;st++){ const b=st*9; if(ss.includes(b)&&ss.includes(b+3)&&ss.includes(b+6)){ const hh=menzen?2:1; h+=hh; list.push({n:T('일기통관','一気通貫'),h:hh}); break; } }
      // 찬타/준찬타 (모든 멘쯔+머리가 끝수/자패 포함)
      const outer=sets.every(st2=> st2.type==='seq' ? (numOf(st2.t)===1||numOf(st2.t)===7) : (isHonor(st2.t)||numOf(st2.t)===1||numOf(st2.t)===9)) && (dec.pair>=27||numOf(dec.pair)===1||numOf(dec.pair)===9);
      if(outer){ const hasHonor=sets.some(st2=>st2.type==='tri'&&isHonor(st2.t))||dec.pair>=27;
        if(hasHonor){ const hh=menzen?2:1; h+=hh; list.push({n:T('찬타','混全帯么'),h:hh}); } else { const hh=menzen?3:2; h+=hh; list.push({n:T('준찬타','純全帯么'),h:hh}); } }
      // 삼색동각
      for(let nn=0;nn<9;nn++){ if([0,1,2].every(su=>tris.some(st2=>st2.t<27&&Math.floor(st2.t/9)===su&&st2.t%9===nn))){ h+=2; list.push({n:T('삼색동각','三色同刻'),h:2}); break; } }
      if(h>best){ best=h; bestList=list; }
    }
    han+=best; yaku.push(...bestList);
  }
  { const dr=[31,32,33]; const dt=dr.filter(d=>allC[d]>=3).length; const dp=dr.some(d=>allC[d]===2); if(dt===2&&dp){ yaku.push({n:T('소삼원','小三元'),h:2}); han+=2; } }
  if(all.length&&yakuman===0&&all.every(t=>t>=27||(t<27&&(numOf(t)===1||numOf(t)===9)))){ yaku.push({n:T('혼노두','混老頭'),h:2}); han+=2; }
  const doraN=countDora(all,G.doraInd); if(doraN){ yaku.push({n:T('도라','ドラ'),h:doraN}); han+=doraN; }
  const akaN=akaCount(all); if(akaN){ yaku.push({n:T('적도라','赤ドラ'),h:akaN}); han+=akaN; }
  if(pl.riichi){ const uraN=countDora(all,G.uraInd); if(uraN){ yaku.push({n:T('우라도라','裏ドラ'),h:uraN}); han+=uraN; } }
  if(yakuman>0){ return {yaku:yaku.filter(y=>y.h>=13||/도라|ドラ/.test(y.n)),han:0,yakuman}; }
  return {yaku,han,yakuman:0};
}
function hasYaku(hand14,tsumo,p,winTile){ const r=evalYaku(hand14,tsumo,p,winTile); if(r.yakuman>0)return true; const nd=r.yaku.filter(y=>!/도라|ドラ/.test(y.n)).reduce((a,y)=>a+y.h,0); return nd>0; }

function calcFu(hand14,tsumo,p,winTile){
  const pl=G.players[p]; const melds=pl.melds||[];
  const menzen=melds.every(m=>m.type==='ankan');
  const c=counts(hand14);
  if(menzen && isChiitoi(c)) return 25;
  const roundW=G.roundWind, seatW=27+pl.seat;
  const meldFu=melds.reduce((a,m)=>{ const t=m.tiles[0]; const term=isHonor(t)||numOf(t)===1||numOf(t)===9;
    if(m.type==='pon')return a+(term?4:2); if(m.type==='minkan')return a+(term?16:8); if(m.type==='ankan')return a+(term?32:16); return a; },0);
  const decs=decompose(c); let bestFu=20+meldFu, pinfu=false;
  for(const dec of decs){
    let fu=20+meldFu;
    if((dec.pair>=31)||dec.pair===roundW||dec.pair===seatW) fu+=2;
    let allSeq=(melds.every(m=>m.type==='chi'));
    for(const st of dec.sets){ if(st.type==='seq')continue; allSeq=false;
      const term=isHonor(st.t)||numOf(st.t)===1||numOf(st.t)===9;
      let concealed=true; if(!tsumo && st.t===winTile && c[winTile]>=3)concealed=false;  // 론으로 완성된 커쯔
      fu+= concealed?(term?8:4):(term?4:2);
    }
    let waitFu=0; if(winTile===dec.pair)waitFu=2; fu+=waitFu;
    if(menzen && allSeq && !((dec.pair>=31)||dec.pair===roundW||dec.pair===seatW) && waitFu===0)pinfu=true;
    if(fu>bestFu)bestFu=fu;
  }
  if(pinfu) return tsumo?20:30;
  let fu=bestFu;
  if(!tsumo && menzen)fu+=10;
  if(tsumo)fu+=2;
  fu=Math.ceil(fu/10)*10;
  if(!tsumo && fu<30)fu=30; if(fu<20)fu=20;
  return fu;
}
function scorePoints(han,fu,dealer,tsumo){
  let base;
  if(han>=13)base=8000; else if(han>=11)base=6000; else if(han>=8)base=4000; else if(han>=6)base=3000;
  else if(han>=5)base=2000; else { base=fu*Math.pow(2,2+han); if(base>2000)base=2000; }
  const r=v=>Math.ceil(v/100)*100;
  if(tsumo){ if(dealer){ const e=r(base*2); return {total:e*3, each:e, label:e+' all'}; } else { const nd=r(base), d=r(base*2); return {total:nd*2+d, nondealer:nd, dealer:d, label:nd+'/'+d}; } }
  else { const pay=r(base*(dealer?6:4)); return {total:pay, label:''+pay}; }
}

let WIN_TILE=-1;
function declareWin(p,tsumo,winTile,from){
  if(G.over)return; G.over=true; WIN_TILE=winTile; clearTurnTimer();
  const pl=G.players[p];
  const hand14 = pl.hand.slice(); if(tsumo){ /* drawn already in hand */ } else { hand14.push(winTile); }
  sortHand(hand14);
  G._winCtx={ haitei: tsumo&&G.wall.length<=14, houtei: !tsumo&&G.wall.length<=14, rinshan: !!G._rinshan };
  const ev=evalYaku(hand14,tsumo,p,winTile);
  G._rinshan=false;
  const fu=calcFu(hand14,tsumo,p,winTile);
  const dealer=(p===G.dealer);
  let han=ev.yakuman>0?ev.yakuman:ev.han;
  let sc=ev.yakuman>0?scorePoints(13,fu,dealer,tsumo):scorePoints(han,fu,dealer,tsumo);
  // apply points
  const hb=G.honba||0;
  if(tsumo){ for(let q=0;q<4;q++){ if(q===p)continue; const isD=(q===G.dealer); let pay=(dealer?sc.each:(isD?sc.dealer:sc.nondealer))+hb*100; G.pts[q]-=pay; G.pts[p]+=pay; } }
  else { const tot=sc.total+hb*300; G.pts[from]-=tot; G.pts[p]+=tot; }
  G._result={winner:p, dealerWin:(p===G.dealer), draw:false};
  if(G.riichiSticks){ G.pts[p]+=G.riichiSticks*1000; G.riichiSticks=0; }
  sound(tsumo?'tsumo':'ron'); try{navigator.vibrate&&navigator.vibrate(p===0?[40,40,80]:30);}catch(e){}
  settleGold();
  showResult(p,tsumo,hand14,winTile,ev,fu,han,sc,from);
}
function showResult(p,tsumo,hand14,winTile,ev,fu,han,sc,from){
  const who=p===0?T('나','あなた'):'CPU '+p;
  $('r-title').textContent=who+' — '+(tsumo?T('쯔모','ツモ'):T('론','ロン'))+(ev.yakuman?' · '+T('역만','役満'):'');
  $('r-tiles').innerHTML=hand14.map(t=>`<img class="${t===winTile?'win':''}" src="${tileSvg(t)}">`).join('');
  $('r-yaku').innerHTML=ev.yaku.map(y=>`<div class="yaku-row"><span>${y.n}</span><b>${y.h}${T('판','飜')}</b></div>`).join('')||`<div class="yaku-row"><span>${T('역 없음','役なし')}</span></div>`;
  $('r-score').textContent = (ev.yakuman?T('역만 ','役満 '):han+T('판 ','飜 '))+(ev.yakuman?'':fu+T('부 ','符 '))+'· '+sc.total.toLocaleString()+T('점','点');
  const _gd=G._lastGoldDelta||0; const _gl=_gd?(`<div style="color:var(--gold);margin-top:5px">💰 ${T('지갑','財布')} ${_gd>0?'+':''}${_gd.toLocaleString()}G${BET>1?(' (×'+BET+')'):''}</div>`):'';
  $('r-detail').innerHTML = (tsumo?(T('쯔모 ','ツモ ')+sc.label):(T('론 ','ロン ')+'+'+sc.total))+_gl;
  show('result'); if(p===0)spawnConfetti();
}
function spawnConfetti(){ const cols=['#e9c46a','#6ad29a','#67c1e8','#ff5d73','#fff']; for(let i=0;i<70;i++){ const c=document.createElement('div'); c.className='confetti'; c.style.left=Math.random()*100+'vw'; c.style.background=cols[i%cols.length]; c.style.animation='cfall '+(1.6+Math.random()*1.4)+'s linear '+(Math.random()*0.5)+'s forwards'; document.body.appendChild(c); setTimeout(()=>c.remove(),3600); } }
function showClaimPop(label,t){ const el=$('claimPop'); if(!el)return; el.innerHTML='<span class="lbl">'+label+'</span>'+(t!=null&&t>=0?'<img src="'+tileSvg(t)+'">':''); el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1100); }
function drawnGame(){ // ryuukyoku
  if(G.over)return; G.over=true; clearTurnTimer();
  const tenpai=G.players.map(pl=> waits(pl.hand.length%3===1?pl.hand:pl.hand.slice(0,pl.hand.length-1), pl.melds.length).length>0 );
  const nT=tenpai.filter(Boolean).length;
  if(nT>0 && nT<4){ const get=Math.floor(3000/nT), pay=Math.floor(3000/(4-nT));
    for(let i=0;i<4;i++){ if(tenpai[i])G.pts[i]+=get; else G.pts[i]-=pay; } }
  G._result={draw:true, dealerTenpai:tenpai[G.dealer]};
  settleGold();
  $('r-title').textContent=T('유국 (황패)','流局');
  $('r-tiles').innerHTML='';
  $('r-yaku').innerHTML=G.players.map((pl,i)=>`<div class="yaku-row"><span>${i===0?T('나','あなた'):'CPU '+i}</span><b>${tenpai[i]?T('텐파이','聴牌'):T('노텐','不聴')}</b></div>`).join('');
  $('r-score').textContent= nT>0&&nT<4 ? T('노텐벌부 정산','不聴罰符') : T('유국','流局');
  const _gd=G._lastGoldDelta||0; $('r-detail').innerHTML = _gd?(`<div style="color:var(--gold)">💰 ${T('지갑','財布')} ${_gd>0?'+':''}${_gd.toLocaleString()}G</div>`):'';
  show('result');
}
function nextHand(){
  hide('result');
  const res=G._result||{}; let advance;
  if(res.draw){ G.honba=(G.honba||0)+1; advance=!res.dealerTenpai; }
  else { if(res.dealerWin){ G.honba=(G.honba||0)+1; advance=false; } else { G.honba=0; advance=true; } }
  if(advance){ G.dealer=(G.dealer+1)%4; G.kyoku=(G.kyoku||1)+1; }
  G._result=null;
  if((G.kyoku||1)>4){ endGame(); return; }
  startHand();
}
function endGame(){
  const order=[0,1,2,3].sort((a,b)=>G.pts[b]-G.pts[a]);
  const rank=order.indexOf(0)+1;
  $('r-title').textContent=T('게임 종료','終局');
  $('r-tiles').innerHTML='';
  $('r-yaku').innerHTML=order.map((i,idx)=>`<div class="yaku-row"><span>${idx+1}위 · ${i===0?T('나','あなた'):'CPU '+i}</span><b>${G.pts[i].toLocaleString()}</b></div>`).join('');
  $('r-score').textContent=T('내 순위 ','順位 ')+rank+T('위','位');
  $('r-detail').textContent='';
  $('#result .close')&&($('#result .close').textContent=T('메뉴','メニュー'));
  document.querySelectorAll('#result .close').forEach(b=>b.onclick=quitToMenu);
  show('result');
}

/* render */
function renderAll(){ renderHand(); renderOpps(); renderMyDisc(); renderScores(); const hz=document.querySelector('.handzone'); if(hz)hz.classList.toggle('myturn',G&&G.turn===0&&!G.over); }
function renderScores(){ const el=$('scoreRow'); if(!el||!G)return; const wind=(LANG==='ja'?HONOR_NAME_JA:HONOR_NAME_KO);
  el.innerHTML=[0,1,2,3].map(i=>{ const pl=G.players[i]; const me=i===0; const dlr=i===G.dealer;
    return `<div class="sc ${me?'me':''} ${dlr?'dealer':''} ${G.turn===i?'turnon':''}">${me?T('나','私'):'CPU'+i} <span style="color:var(--gold)">${wind[pl.seat]}</span>${dlr?' <b class="w">'+T('친','親')+'</b>':''} <b>${G.pts[i].toLocaleString()}</b>${pl.riichi?' <span style="color:var(--riichi)">●</span>':''}</div>`;
  }).join(''); }
function renderOpps(){
  for(let i=1;i<4;i++){ const pl=G.players[i]; const el=$('opp'+i); el.classList.toggle('turnseat',G.turn===i);
    const seatN=(LANG==='ja'?HONOR_NAME_JA:HONOR_NAME_KO)[pl.seat];
    el.innerHTML=`<div class="nm ${G.turn===i?'turn':''}">CPU ${i} <span style="color:var(--muted)">${seatN}</span>${pl.riichi?' <span class="ri">'+T('리치','リーチ')+'</span>':''}</div>`+
      `<div class="cnt">${pl.hand.length}${T('장','枚')} · ${G.pts[i].toLocaleString()}</div>`+`<div class="omeld">${(pl.melds||[]).map(m=>m.tiles.map(t=>`<img src="${tileSvg(t)}">`).join('')+'&nbsp;').join('')}</div>`+
      `<div class="disc">${discHTML(pl)}</div>`;
  }
}
function discHTML(pl){ const h=pl.discards.map((t,i)=>{ const last=i===pl.discards.length-1; const cls=((last&&pl._newDisc)?'disc-anim ':'')+((i===pl.riichiDiscIdx)?'ri':''); return `<img class="${cls.trim()}" src="${tileSvg(t)}">`; }).join(''); pl._newDisc=false; return h; }
function renderMyDisc(){ $('myDisc').innerHTML=discHTML(G.players[0]); }
function renderTenpai(){ const el=$('tenpaiInfo'); if(!el||!G)return; const pl=G.players[0]; const wset=new Set();
  if(pl.hand.length%3===2){ tenpaiDiscards(pl.hand).forEach(o=>o.waits.forEach(w=>wset.add(w))); }
  else { waits(pl.hand).forEach(w=>wset.add(w)); }
  el.innerHTML = wset.size ? ('<span class="lab">'+T('대기','待ち')+'</span>'+[...wset].sort((a,b)=>a-b).map(t=>`<img src="${tileSvg(t)}">`).join('')) : ''; }
function updateTop(){
  $('t-round').textContent='東'+(G.kyoku||1)+((G.honba||0)?(' '+G.honba+T('본','本')):'');
  $('c-round').textContent='東';
  $('t-wall').textContent=Math.max(0,G.wall.length-14);
  $('t-pts').textContent=G.pts[0].toLocaleString();
  $('t-dora').innerHTML=G.doraInd.map(t=>`<img src="${tileSvg(t)}">`).join('');
}

/* ui helpers */
function show(id){ $(id).classList.add('show'); }
function hide(id){ $(id).classList.remove('show'); }
function quitToMenu(){ clearTurnTimer(); if(_bgmA)_bgmA.pause(); hide('result'); $('board').style.display='none'; $('menu').style.display='flex'; document.querySelectorAll('#result .close').forEach(b=>b.onclick=nextHand); refreshMenuGold(); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',1200); }
function doRiichi(){ const pl=G.players[0]; const t=tenpaiDiscards(pl.hand); if(!t.length)return; pl.pendingRiichi=true; toast(T('리치! 버릴 패 선택','リーチ！打牌選択')); humanOptions2(); }
function humanOptions2(){ const acts=$('actions'); acts.innerHTML=''; addAct('a-discard',T('버리기','打牌'),()=>{ if(selIdx>=0){ // ensure discard keeps tenpai
  const pl=G.players[0]; const h=pl.hand.slice(); h.splice(selIdx,1); if(waits(h).length===0){ toast(T('텐파이 유지 안됨','聴牌維持不可')); return; } humanDiscard(selIdx);} else toast(T('패 선택','選択')); }); }
function doAnkan(t){ const pl=G.players[0]; for(let k=0;k<4;k++){const i=pl.hand.indexOf(t);pl.hand.splice(i,1);} pl.melds.push({type:'ankan',t}); // new dora + draw replacement
  G.doraInd.push(drawWall()); G._rinshan=true; G.drawn=drawWall(); pl.hand.push(G.drawn); sortHand(pl.hand); updateTop(); renderHand(); humanOptions(); }
function ankanCandidates(hand){ const c=counts(hand); const r=[]; for(let t=0;t<34;t++)if(c[t]===4)r.push(t); return r; }
function setLang(l){ LANG=l; localStorage.setItem('riichi_lang',l); document.body.classList.toggle('ja',l==='ja'); document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('on',b.dataset.lang===l)); if(G)renderAll(); }
function setSnd(s){ SND=!!s; localStorage.setItem('riichi_snd',s?'1':'0'); document.querySelectorAll('[data-snd]').forEach(b=>b.classList.toggle('on',+b.dataset.snd===(s?1:0))); }
function sound(n){ if(!SND)return; const map={tsumo:'win',ron:'win',riichi:'claim'}; const fn=map[n]||'tile'; try{ const a=new Audio('sounds/'+fn+'.mp3'); a.volume=.5; a.play().catch(()=>{}); }catch(e){} }
function settleGold(){ if(!G||!G.ptsStart)return; const d=Math.round((G.pts[0]-G.ptsStart[0])*BET); G._lastGoldDelta=d; G.ptsStart=G.pts.slice(); if(!d)return; try{ if(typeof SharedWallet!=='undefined'&&SharedWallet._initialized){ d>0?SharedWallet.addGold(d):SharedWallet.removeGold(-d);} }catch(e){} }
function refreshMenuGold(){ try{ if(typeof SharedWallet!=='undefined'){ $('menu-gold').textContent='💰 '+(SharedWallet.gold||0).toLocaleString(); } }catch(e){} }
function setBet(n){ BET=n; localStorage.setItem('riichi_bet',n); document.querySelectorAll('[data-bet]').forEach(b=>b.classList.toggle('on',+b.dataset.bet===n)); }
function setAka(v){ AKA=!!v; localStorage.setItem('riichi_aka',v?'1':'0'); document.querySelectorAll('[data-aka]').forEach(b=>b.classList.toggle('on',+b.dataset.aka===(v?1:0))); }
function setTL(v){ TL=v; localStorage.setItem('riichi_tl',v); document.querySelectorAll('[data-tl]').forEach(b=>b.classList.toggle('on',+b.dataset.tl===v)); }
function setBgm(v){ BGM=!!v; localStorage.setItem('riichi_bgm',v?'1':'0'); document.querySelectorAll('[data-bgm]').forEach(b=>b.classList.toggle('on',+b.dataset.bgm===(v?1:0))); applyBgm(); }
function applyBgm(){ try{ if(BGM && G && !G.over){ if(!_bgmA){ _bgmA=new Audio('sounds/bgm.mp3'); _bgmA.loop=true; _bgmA.volume=.25; } _bgmA.play().catch(()=>{}); } else if(_bgmA){ _bgmA.pause(); } }catch(e){} }
function applyZoom(){ TZ=Math.max(.8,Math.min(1.7,TZ||1)); document.documentElement.style.setProperty('--tz',TZ); }
function zoomTiles(d){ TZ=Math.round((TZ+d*0.12)*100)/100; applyZoom(); localStorage.setItem('riichi_zoom',TZ); }
// 턴 타이머
function clearTurnTimer(){ if(_turnT){ clearInterval(_turnT.iv); _turnT=null; } const w=$('turnTimer'); if(w){ w.classList.remove('warn'); w.querySelector('.bar').style.transform='scaleX(1)'; } }
function startTurnTimer(){ clearTurnTimer(); if(!TL||TL<=0)return; const w=$('turnTimer'); const bar=w.querySelector('.bar'); let left=TL*1000; const t0=Date.now(); _turnT={iv:setInterval(()=>{ left=TL*1000-(Date.now()-t0); const f=Math.max(0,left/(TL*1000)); bar.style.transform='scaleX('+f+')'; w.classList.toggle('warn',f<0.34); if(left<=0){ clearTurnTimer(); onTurnTimeout(); } },120)}; }
function onTurnTimeout(){ if(G.turn!==0||G.over)return; const pl=G.players[0]; // 쯔모기리 자동
  const i=pl.hand.length-1; humanDiscard(i>=0?i:0); }

$('howtoBody').innerHTML = T(
 '• 13장으로 4몸통+머리(또는 치또이쯔/국사무쌍)를 완성하면 화료.<br>• 화료엔 <b>役</b>이 최소 1개 필요(리치·탕야오·역패 등).<br>• 텐파이면 <b>리치</b> 선언(1000점), 이후 뽑은 패만 버림.<br>• <b>쯔모</b>=자기 뽑기 화료, <b>론</b>=남의 버린패 화료.<br>• <b>도라</b>(표시패 다음 패)는 보너스 판.<br>• <b>폰</b>(같은패2)·<b>치</b>(상가 순자)·<b>깡</b>·<b>론</b> 호출 가능 — 내 차례에 버튼 등장.<br>• 동풍전 4국(친 화료/텐파이 시 렌찬·혼바), 점수 높은 사람 승.<br>• 점수는 지갑 골드와 연동(판돈 ×N).',
 '• Complete 4 sets + a pair (or chiitoitsu / kokushi) with 13 tiles to win.<br>• A win needs at least one <b>yaku</b> (riichi, tanyao, yakuhai…).<br>• When tenpai, declare <b>Riichi</b> (1000 pts); afterwards discard only drawn tiles.<br>• <b>Tsumo</b>=self-draw win, <b>Ron</b>=win on a discard.<br>• <b>Dora</b> (tile after the indicator) gives bonus han.<br>• Call <b>pon/chi/kan/ron</b> on discards — buttons appear on your turn.<br>• East round (dealer repeats on win/tenpai, honba). Gold-linked (bet ×N).'
);
setLang(LANG); setSnd(SND?1:0); setBet(BET); setAka(AKA?1:0); setTL(TL); setBgm(BGM?1:0); applyZoom();
try{ if(typeof SharedWallet!=='undefined'&&SharedWallet._initPromise){ SharedWallet._initPromise.then(refreshMenuGold);} else { setTimeout(refreshMenuGold,800);} }catch(e){}
</script>
