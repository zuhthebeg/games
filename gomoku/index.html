<meta property="og:title" content="오목">
<meta property="og:description" content="실시간 1:1 오목 대결">
<meta property="og:type" content="website">

    <style>
        :root {
            --bg: #1a1a2e;
            --board: #dcb35c;
            --board-line: #8b6914;
            --text: #eee;
            --accent: #4ecca3;
            --danger: #ff6b6b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        #app {
            min-height: 100vh;
        }

        /* Game Screen */
        .game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            padding-top: 60px; /* SharedWallet 바 공간 */
            min-height: 100vh;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-bottom: 12px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .player-info.active {
            background: var(--accent);
            color: #000;
            transform: scale(1.05);
        }

        .player-info .stone {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .stone.black { background: #111; }
        .stone.white { background: #f5f5f5; border: 1px solid #999; }

        .turn-banner {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 8px;
            transition: all 0.3s;
        }
        .turn-banner.my-turn {
            background: var(--accent);
            color: #000;
            animation: pulse-bg 1s ease-in-out 2;
        }
        .turn-banner.opp-turn {
            background: rgba(255,255,255,0.08);
            color: #999;
        }
        .turn-banner.game-over-banner {
            background: rgba(255,255,255,0.05);
            color: #888;
        }
        @keyframes pulse-bg {
            50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(78,204,163,0.4); }
        }

        .board-zoom-container {
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            border-radius: 12px;
            position: relative;
            touch-action: none;
        }
        .board-wrapper {
            width: 100%;
            aspect-ratio: 1;
            background: var(--board);
            padding: 3%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transform-origin: center center;
            transition: transform 0.2s;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 100%;
            height: 100%;
        }

        .zoom-controls {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .zoom-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: var(--text);
            font-size: 1.1rem;
            cursor: pointer;
        }
        .zoom-btn:active { background: rgba(255,255,255,0.2); }

        .cell {
            position: relative;
            cursor: pointer;
        }

        /* Grid lines */
        .cell::before, .cell::after {
            content: '';
            position: absolute;
            background: var(--board-line);
        }

        /* Horizontal line */
        .cell::before {
            left: 0; right: 0;
            top: 50%; height: 1px;
        }
        .cell[data-col="0"]::before { left: 50%; }
        .cell[data-col="14"]::before { right: 50%; }

        /* Vertical line */
        .cell::after {
            top: 0; bottom: 0;
            left: 50%; width: 1px;
        }
        .cell[data-row="0"]::after { top: 50%; }
        .cell[data-row="14"]::after { bottom: 50%; }

        /* Star points - separate element, not ::before */
        .star-dot {
            position: absolute;
            width: 8px; height: 8px;
            background: var(--board-line);
            border-radius: 50%;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        .cell .placed-stone {
            position: absolute;
            width: 85%; height: 85%;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: place 0.2s ease-out;
        }

        @keyframes place {
            from { transform: translate(-50%, -50%) scale(0); }
            to { transform: translate(-50%, -50%) scale(1); }
        }

        .placed-stone.black {
            background: radial-gradient(circle at 30% 30%, #444, #111);
        }

        .placed-stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 1px solid #bbb;
        }

        .placed-stone.last {
            box-shadow: 0 0 0 3px var(--danger);
        }

        .placed-stone.win {
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            to { transform: translate(-50%, -50%) scale(1.1); }
        }

        .game-status {
            text-align: center;
            padding: 16px;
            font-size: 1.1rem;
            color: var(--text);
        }

        .timer-bar {
            width: 100%;
            max-width: 400px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }
        .timer-bar .fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s linear, background 0.3s;
        }
        .timer-text {
            font-size: 0.9rem;
            font-weight: bold;
            min-width: 40px;
            text-align: center;
        }

        .game-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: var(--text);
            transition: all 0.2s;
        }

        .btn:hover { background: rgba(255,255,255,0.2); }
        .btn.primary { background: var(--accent); color: #000; }

        .preview-stone {
            position: absolute;
            width: 85%; height: 85%;
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            opacity: 0.4;
            pointer-events: none;
        }

        .confirm-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .confirm-box {
            background: #2a2a3e;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            min-width: 240px;
        }
        .confirm-box p { margin-bottom: 16px; font-size: 1.1rem; }
        .confirm-box .btns { display: flex; gap: 10px; justify-content: center; }

        .settings-row {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.85rem; color: #aaa;
        }
        .settings-row input[type=checkbox] {
            width: 18px; height: 18px; accent-color: var(--accent);
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV8KQGJF" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <div id="app"></div>

    <script src="/lib/multiplayer.js?v=20260618match"></script>
    <script src="/lib/multiplayer-ui.js?v=20260605a"></script>
    <script src="/lib/shared-wallet.js?v=20260605a"></script>
    <script>
        // ===== 공용 재화 시스템 =====
        let sharedGold = 0;
        let cloudSyncEnabled = false;
        const WIN_REWARD = 1000000;  // 승리 보상 (100만G)
        const LOSE_PENALTY = 100; // 패배 페널티
        
        // ===== Sound Effects =====
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new AudioCtx();
            return audioCtx;
        }
        function playSound(freq, duration = 0.1, type = 'sine') {
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }
        function sfxPlace() { playSound(800, 0.06, 'triangle'); }
        function sfxWin() {
            [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playSound(f, 0.2, 'sine'), i * 120));
        }
        function sfxLose() { playSound(200, 0.4, 'sawtooth'); }
        
        async function loadSharedGold() {
            const localData = localStorage.getItem('enhance_game_v3');
            if (localData) {
                const parsed = JSON.parse(localData);
                sharedGold = parsed.gold || 0;
            }
            
            const token = localStorage.getItem('cocy_auth_token');
            if (!token) return;
            
            try {
                const parts = token.split('.');
                if (parts.length !== 3) return;
                const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));
                
                if (payload.sub) {
                    cloudSyncEnabled = true;
                    const res = await fetch('https://relay.cocy.io/api/user/data', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        if (data.gold !== undefined) sharedGold = data.gold;
                    }
                }
            } catch (e) { console.log('Cloud sync failed:', e); }
        }
        
        async function saveSharedGold() {
            // SharedWallet 사용
            if (typeof SharedWallet !== 'undefined') {
                SharedWallet.setGold(sharedGold);
            } else {
                const localData = localStorage.getItem('enhance_game_v3');
                const parsed = localData ? JSON.parse(localData) : { gold: 0 };
                parsed.gold = sharedGold;
                localStorage.setItem('enhance_game_v3', JSON.stringify(parsed));
            }
        }
        
        // ===== Game State =====
        const BOARD_SIZE = 15;
        const STAR_POINTS = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
        
        let board = [];
        let currentPlayer = 'black';
        let gameOver = false;
        let myColor = null;
        let isMultiplayer = false;
        let mpUI = null;
        let doClient = null;   // ?relay=do DO/WS 경로의 MultiplayerWSClient (REST mpUI와 배타)
        
        // Settings
        let confirmBeforePlace = localStorage.getItem('gomoku_confirm') === 'true';
        let pendingMove = null; // {row, col}
        let zoomLevel = 1;
        
        // Timer
        const TURN_TIME = 30;
        let turnTimer = null;
        let timeLeft = TURN_TIME;
        
        function startTimer() {
            clearTimer();
            timeLeft = TURN_TIME;
            updateTimerUI();
            turnTimer = setInterval(() => {
                timeLeft--;
                updateTimerUI();
                if (timeLeft <= 0) {
                    clearTimer();
                    onTimeout();
                }
            }, 1000);
        }
        
        function clearTimer() {
            if (turnTimer) { clearInterval(turnTimer); turnTimer = null; }
        }
        
        function updateTimerUI() {
            const bar = document.getElementById('timerFill');
            const text = document.getElementById('timerText');
            if (bar) {
                const pct = (timeLeft / TURN_TIME) * 100;
                bar.style.width = pct + '%';
                bar.style.background = timeLeft <= 5 ? '#ff6b6b' : timeLeft <= 10 ? '#eab308' : 'var(--accent)';
            }
            if (text) {
                text.textContent = timeLeft + '초';
                text.style.color = timeLeft <= 5 ? '#ff6b6b' : 'var(--text)';
            }
        }
        
        function onTimeout() {
            if (gameOver) return;
            if (isMultiplayer) {
                const isMyTurn = myColor === currentPlayer;
                if (isMyTurn) {
                    // 내 턴에 시간 초과 → 랜덤 위치에 놓기
                    const empty = [];
                    for (let r = 0; r < BOARD_SIZE; r++)
                        for (let c = 0; c < BOARD_SIZE; c++)
                            if (!board[r][c]) empty.push([r, c]);
                    if (empty.length > 0) {
                        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
                        showToast('시간 초과! 자동 착수');
                        sendMove(r, c);
                    }
                }
            } else {
                // 로컬: 턴 넘기기
                showToast('시간 초과! 턴 넘김');
                currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
                startTimer();
                renderGame();
            }
        }

        // ===== Initialize =====
        function init() {
            // 공용 재화 로드 (SharedWallet에서)
            if (typeof SharedWallet !== 'undefined') {
                SharedWallet.init().then(() => {
                    sharedGold = SharedWallet.gold;
                    cloudSyncEnabled = SharedWallet.cloudSyncEnabled;
                });
            } else {
                loadSharedGold();
            }

            // DO/WS 실시간 경로(?relay=do): REST MultiplayerUI 대신 공용 WSClient 직접 사용.
            if (new URLSearchParams(location.search).get('relay') === 'do') { startGomokuDO(); return; }

            mpUI = new MultiplayerUI({
                gameType: 'gomoku',
                gameName: '⚫⚪ 오목',
                container: document.getElementById('app'),
                maxPlayers: 2,
                onGameStart: handleGameStart,
                onGameEvent: handleGameEvent,
                onLeave: () => { isMultiplayer = false; }
            });

            // Check URL for room code
            const roomCode = MultiplayerUI.checkUrlRoom();
            if (roomCode) {
                mpUI._renderLobby();
                setTimeout(() => {
                    document.getElementById('mp-room-code').value = roomCode;
                }, 100);
            } else {
                mpUI.show();
            }
        }

        // ===== DO/WS 실시간 경로 (?relay=do) =====
        // gostop do-v8과 동일 인프라(공용 MultiplayerWSClient + generic RoomDO). gameType=gomoku로 서버가 plugin 선택.
        // 닉네임 해석: 로그인 닉 > relay 공용 닉 > 게임 로컬 닉 > 게스트
        function resolveNick() {
            try {
                if (typeof SharedWallet !== 'undefined' && SharedWallet.isLoggedIn && SharedWallet.user?.nickname) {
                    return SharedWallet.user.nickname;
                }
            } catch (e) {}
            try {
                const rn = localStorage.getItem('relay_nickname'); if (rn && rn.trim()) return rn.trim();
                const gn = localStorage.getItem('gomoku_nick'); if (gn && gn.trim()) return gn.trim();
            } catch (e) {}
            return '게스트' + Math.floor(Math.random() * 9000 + 1000);
        }

        async function startGomokuDO() {
            const P = new URLSearchParams(location.search);
            const WORKER = 'wss://relay-do-poc.zuhejbeg.workers.dev';
            let nick = resolveNick();
            try { localStorage.setItem('gomoku_nick', nick); } catch (e) {}
            // 같은 브라우저 2탭 테스트용: URL u= 로 uid 분리 가능(없으면 localStorage 영속 uid).
            const uid = P.get('u') || undefined;

            // ?room= 있으면(공유링크/2탭 테스트) 바로 그 방에 연결. 없으면 사전선택 화면.
            const explicit = P.get('room');
            if (explicit && explicit.trim()) {
                connectGomokuDO(explicit.trim().toUpperCase(), false, WORKER, uid, nick);
            } else {
                gomokuDOChooser(WORKER, uid, nick);
            }
        }

        // ===== 사전선택 화면 (코디네이터 매칭 UI): 빠른대전 / 공개방 목록 / 새 방 / 코드입장 =====
        function gomokuDOChooser(WORKER, uid, nick) {
            const pick = (room, created) => {
                try { const u = new URL(location.href); u.searchParams.set('room', room); history.replaceState(null, '', u); } catch (e) {}
                const c = document.getElementById('do-chooser'); if (c) c.remove();
                connectGomokuDO(room, created, WORKER, uid, nick);
            };
            const ch = document.createElement('div');
            ch.id = 'do-chooser';
            ch.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#fff;z-index:9999;text-align:center;font-family:sans-serif';
            ch.innerHTML = '<div style="padding:24px;max-width:360px;width:90%">'
                + '<h2 style="margin:0 0 4px">⚫⚪ 오목 · 온라인 대전</h2>'
                + '<p style="font-size:11px;color:#7CFC9A;margin:0 0 14px">DO 실시간 · 빠른매칭</p>'
                + '<button id="ch-quick" style="display:block;width:100%;padding:14px;margin:0 0 8px;font-size:16px;background:#23c552;border:0;border-radius:10px;color:#0a1a12;font-weight:700">⚡ 빠른 대전</button>'
                + '<button id="ch-new" style="display:block;width:100%;padding:12px;margin:0 0 8px;font-size:15px;background:#2d3a66;border:0;border-radius:10px;color:#fff">+ 새 방 만들기</button>'
                + '<div style="display:flex;gap:6px;margin:0 0 12px"><input id="ch-code" placeholder="방 코드" maxlength="8" style="flex:1;min-width:0;padding:11px;border-radius:10px;border:1px solid #444;background:#0f1530;color:#fff;text-transform:uppercase"><button id="ch-join" style="padding:11px 16px;font-size:14px;background:#3a4a8c;border:0;border-radius:10px;color:#fff">입장</button></div>'
                + '<div style="display:flex;align-items:center;justify-content:space-between;margin:14px 0 6px"><span style="font-size:13px;opacity:.8">📋 공개방</span><button id="ch-refresh" style="font-size:12px;background:none;border:1px solid #444;border-radius:8px;color:#9fb3ff;padding:4px 10px;cursor:pointer">새로고침</button></div>'
                + '<div id="ch-rooms" style="max-height:180px;overflow:auto;text-align:left;font-size:13px"><p style="opacity:.6;text-align:center">불러오는 중…</p></div>'
                + '</div>';
            document.body.appendChild(ch);

            async function loadRooms() {
                const box = document.getElementById('ch-rooms');
                if (box) box.innerHTML = '<p style="opacity:.6;text-align:center">불러오는 중…</p>';
                const rooms = await MultiplayerWSClient.listRooms('gomoku', WORKER);
                if (!box) return;
                if (!rooms.length) { box.innerHTML = '<p style="opacity:.5;text-align:center">열린 방이 없습니다 — 빠른 대전이나 새 방을 만드세요</p>'; return; }
                box.innerHTML = rooms.map(r =>
                    '<div class="ch-room" data-room="' + r.roomId + '" style="display:flex;justify-content:space-between;align-items:center;padding:10px;margin:0 0 6px;background:#0f1530;border-radius:8px;cursor:pointer"><b>' + r.roomId + '</b><span style="opacity:.7">' + r.players + '/' + r.max + '명</span></div>'
                ).join('');
                box.querySelectorAll('.ch-room').forEach(el => el.onclick = () => pick(el.getAttribute('data-room'), false));
            }
            document.getElementById('ch-quick').onclick = async () => {
                const r = await MultiplayerWSClient.resolveEntryRoom('gomoku', null, WORKER);
                pick(r.room, r.created);
            };
            document.getElementById('ch-new').onclick = () => pick(MultiplayerWSClient.genRoomCode(), true);
            document.getElementById('ch-join').onclick = () => {
                const v = (document.getElementById('ch-code').value || '').trim().toUpperCase();
                if (v) pick(v, false);
            };
            document.getElementById('ch-refresh').onclick = loadRooms;
            loadRooms();
        }

        function connectGomokuDO(room, created, WORKER, uid, nick) {
            const ws = new MultiplayerWSClient({ workerBase: WORKER, room, userId: uid, nickname: nick, gameType: 'gomoku' });
            doClient = ws;
            let entered = false;

            const lob = document.createElement('div');
            lob.id = 'do-lobby';
            lob.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#1a1a2e;color:#fff;z-index:9999;text-align:center;font-family:sans-serif';
            lob.innerHTML = '<div style="padding:24px;max-width:340px">'
                + '<h2 style="margin:0 0 4px">⚫⚪ 오목 · DO 실시간</h2>'
                + '<p style="font-size:11px;color:#7CFC9A;margin:0 0 10px">build do-v1 · 공용 WSClient · gameType=gomoku</p>'
                + '<p>방코드 <b>' + room + '</b> · 나 ' + (nick || uid || '익명') + '</p>'
                + '<p style="font-size:12px;color:#7CFC9A;margin:0 0 6px">' + (created ? '새 방 — 친구에게 이 URL/방코드 공유' : '매칭된 방에 합류') + '</p>'
                + '<p id="do-conns" style="font-size:13px;opacity:.75;margin:6px 0">접속자: 1</p>'
                + '<p id="do-status" style="font-size:13px;color:#ffd76a;margin:6px 0">연결 중…</p>'
                + '<p style="font-size:12px;opacity:.6;margin:8px 0">상대도 같은 URL(접속자:2)이면 시작</p>'
                + '<button id="do-start" style="padding:12px 30px;font-size:16px;background:#23c552;border:0;border-radius:10px;color:#0a1a12;font-weight:700">시작</button></div>';
            document.body.appendChild(lob);
            const setS = (t) => { const e = document.getElementById('do-status'); if (e) e.textContent = t; };
            const connBanner = (msg) => { /* 진행 중 끊김 표시: 상단 토스트 재사용 */ if (msg) showToast(msg); };

            ws.onOpen = () => setS('연결됨 ✓');
            ws.onPresence = (n) => { const e = document.getElementById('do-conns'); if (e) e.textContent = '접속자: ' + n; };
            ws.onPreStartFail = (k) => setS(k === 'error' ? '⚠️ 연결 오류 — 새로고침' : '연결 끊김 — 새로고침');
            ws.onReconnecting = (t) => connBanner('🔌 연결 끊김 — 재접속 중… (' + t + ')');
            ws.onReconnected = () => { if (entered) showToast('재접속됨 ✓'); };
            ws.onStateChange = (view) => {
                if (!entered) {
                    entered = true;
                    isMultiplayer = true;
                    myColor = view.myColor;
                    const l = document.getElementById('do-lobby'); if (l) l.remove();
                }
                updateFromState({ gameState: view });
            };
            const sb = document.getElementById('do-start');
            if (sb) sb.onclick = () => { ws.start({}); setS('시작 요청 보냄 → 서버 응답 대기…'); };
        }

        // ===== Game Start Handler =====
        function handleGameStart(state) {
            if (state.mode === 'local') {
                startLocalGame();
            } else {
                startMultiplayerGame(state);
            }
        }

        function startLocalGame() {
            isMultiplayer = false;
            myColor = null;
            initBoard();
            renderGame();
        }

        function startMultiplayerGame(state) {
            isMultiplayer = true;
            
            const gs = state.gameState;
            const myId = mpUI.getClient().getMyUserId();
            const me = gs.players.find(p => p.id === myId);
            
            myColor = me?.color;
            currentPlayer = gs.players.find(p => p.id === gs.currentPlayer)?.color || 'black';
            
            // Restore board from state
            board = gs.board.map(row => row.map(cell => {
                if (!cell) return null;
                const p = gs.players.find(pl => pl.id === cell);
                return p?.color || null;
            }));
            
            gameOver = !!gs.winner;
            
            renderGame(gs);
            
            // Setup realtime updates
            mpUI.getClient().onStateChange = (newState) => {
                if (newState.status === 'playing' || newState.status === 'finished') {
                    updateFromState(newState);
                }
            };
            
            if (!gameOver) startTimer();
            showToast(`게임 시작! 당신은 ${myColor === 'black' ? '흑' : '백'}입니다`);
        }

        // ===== Board Logic =====
        function initBoard() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(null));
            currentPlayer = 'black';
            gameOver = false;
            startTimer();
        }

        function handleCellClick(row, col) {
            if (gameOver || board[row][col]) return;
            
            if (isMultiplayer && myColor !== currentPlayer) {
                showToast('상대 차례입니다');
                return;
            }
            
            if (confirmBeforePlace) {
                pendingMove = { row, col };
                showConfirmDialog(row, col);
                return;
            }
            
            executeMove(row, col);
        }
        
        function executeMove(row, col) {
            pendingMove = null;
            removeConfirmDialog();
            
            if (isMultiplayer) {
                sendMove(row, col);
            } else {
                placeStone(row, col, currentPlayer);
                checkGameEnd(row, col);
                if (!gameOver) {
                    currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
                    startTimer();
                } else {
                    clearTimer();
                }
                renderGame();
            }
        }
        
        function showConfirmDialog(row, col) {
            removeConfirmDialog();
            // Show preview stone
            const cells = document.querySelectorAll('.cell');
            const idx = row * BOARD_SIZE + col;
            if (cells[idx] && !board[row][col]) {
                const preview = document.createElement('div');
                preview.className = `preview-stone ${isMultiplayer ? myColor : currentPlayer}`;
                cells[idx].appendChild(preview);
            }
            // Show confirm overlay
            const overlay = document.createElement('div');
            overlay.className = 'confirm-overlay';
            overlay.id = 'confirmOverlay';
            overlay.innerHTML = `
                <div class="confirm-box">
                    <p>이 위치에 두시겠습니까?<br><small style="color:#888">(${row+1}, ${col+1})</small></p>
                    <div class="btns">
                        <button class="btn" onclick="cancelMove()">취소</button>
                        <button class="btn primary" onclick="executeMove(${row},${col})">확인</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
        }
        
        function cancelMove() {
            pendingMove = null;
            removeConfirmDialog();
            // Remove preview stones
            document.querySelectorAll('.preview-stone').forEach(e => e.remove());
        }
        
        function removeConfirmDialog() {
            const el = document.getElementById('confirmOverlay');
            if (el) el.remove();
        }
        
        function toggleConfirm(cb) {
            confirmBeforePlace = cb.checked;
            localStorage.setItem('gomoku_confirm', confirmBeforePlace);
        }
        
        // Zoom
        function setZoom(level) {
            zoomLevel = Math.max(1, Math.min(3, level));
            const wrapper = document.querySelector('.board-wrapper');
            if (wrapper) {
                wrapper.style.transform = `scale(${zoomLevel})`;
            }
        }
        function zoomIn() { setZoom(zoomLevel + 0.5); }
        function zoomOut() { setZoom(zoomLevel - 0.5); }
        function zoomReset() { setZoom(1); }

        function placeStone(row, col, color) {
            board[row][col] = color;
            sfxPlace();
        }

        async function sendMove(row, col) {
            // DO 경로: 서버 권위 → 낙관적 배치 없이 액션만 전송, state echo로 렌더.
            if (doClient) {
                try { await doClient.sendAction({ type: 'place', payload: { row, col } }); }
                catch (e) { showToast('실패: ' + e.message); }
                return;
            }
            try {
                await mpUI.sendAction({ type: 'place', payload: { row, col } });
                placeStone(row, col, myColor);
                startTimer();
                renderGame({ lastMove: { row, col } });
            } catch (e) {
                showToast('실패: ' + e.message);
            }
        }

        function updateFromState(state) {
            const gs = state.gameState;
            
            board = gs.board.map(row => row.map(cell => {
                if (!cell) return null;
                const p = gs.players.find(pl => pl.id === cell);
                return p?.color || null;
            }));
            
            if (gs.currentPlayer) {
                const cp = gs.players.find(p => p.id === gs.currentPlayer);
                currentPlayer = cp?.color || 'black';
            }
            
            const wasGameOver = gameOver;
            gameOver = !!gs.winner;
            
            if (gameOver) clearTimer();
            else if (!wasGameOver) startTimer();
            
            renderGame(gs);
            
            // 새로 게임이 끝났을 때만 결과 표시 (중복 방지)
            if (gameOver && !wasGameOver && gs.winner && gs.winner !== 'draw') {
                const winnerColor = gs.players.find(p => p.id === gs.winner)?.color;
                showResult(winnerColor);
            } else if (gameOver && !wasGameOver && gs.winner === 'draw') {
                showResult(null);
            }
        }

        function checkGameEnd(row, col) {
            const color = board[row][col];
            const directions = [[0,1],[1,0],[1,1],[1,-1]];
            
            for (const [dr, dc] of directions) {
                let count = 1;
                for (let i = 1; i < 5; i++) {
                    const r = row + dr*i, c = col + dc*i;
                    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === color) count++;
                    else break;
                }
                for (let i = 1; i < 5; i++) {
                    const r = row - dr*i, c = col - dc*i;
                    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === color) count++;
                    else break;
                }
                if (count >= 5) {
                    gameOver = true;
                    setTimeout(() => showResult(color), 300);
                    return;
                }
            }
        }

        function showResult(winner) {
            let goldChange = 0;
            let goldText = '';
            
            if (isMultiplayer) {
                const isWin = winner === myColor;
                if (isWin) sfxWin(); else sfxLose();
                goldChange = isWin ? WIN_REWARD : -LOSE_PENALTY;
                sharedGold = Math.max(0, sharedGold + goldChange);
                saveSharedGold();
                
                goldText = goldChange > 0 
                    ? `<span style="color:#4ecca3">+${goldChange}G</span>` 
                    : `<span style="color:#ff6b6b">${goldChange}G</span>`;
                
                mpUI.showResult({
                    title: isWin ? '🎉 승리!' : '😢 패배',
                    detail: `${(winner === 'black' ? '흑' : '백')} 승리 ${goldText}`,
                    isWin: isWin,
                    actions: [
                        { label: '🔄 다시 한 판', primary: true, handler: async () => {
                            try {
                                const pd = mpUI.getPlayerData ? mpUI.getPlayerData() : null;
                                await mpUI.getClient().rematch(pd);
                                mpUI.goToWaitingRoom();
                            } catch(e) { alert('리매치 실패: ' + e.message); }
                        }},
                        { label: '나가기', primary: false, handler: () => {
                            if (mpUI.getClient()) { mpUI.getClient().leaveRoom().catch(()=>{}); MultiplayerClient.resetInstance(); }
                            location.reload();
                        }}
                    ]
                });
            } else {
                // 싱글플레이 (로컬 2인)는 보상 없음
                mpUI.showResult({
                    title: (winner === 'black' ? '⚫ 흑' : '⚪ 백') + ' 승리!',
                    isWin: null,
                    showRematch: false
                });
            }
        }

        // ===== Event Handler =====
        function handleGameEvent(type, data) {
            if (type === 'place' && isMultiplayer) {
                const myId = mpUI.getClient().getMyUserId();
                if (data.playerId !== myId) {
                    const { row, col, color } = data.payload || {};
                    if (row !== undefined) {
                        placeStone(row, col, color);
                        currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
                        renderGame({ lastMove: { row, col } });
                    }
                }
            }
        }

        // ===== Rendering =====
        function renderGame(gs = {}) {
            const blackName = gs.players?.find(p => p.color === 'black')?.nickname || 'P1';
            const whiteName = gs.players?.find(p => p.color === 'white')?.nickname || 'P2';
            const myId = mpUI?.getClient()?.getMyUserId() || doClient?.getMyUserId();
            
            document.getElementById('app').innerHTML = `
                <div class="game-screen">
                    <div class="game-header">
                        <div class="player-info ${currentPlayer === 'black' && !gameOver ? 'active' : ''}">
                            <div class="stone black"></div>
                            <span>${isMultiplayer ? blackName : '흑'}${gs.players?.find(p => p.color === 'black')?.id === myId ? ' (나)' : ''}</span>
                        </div>
                        <div class="player-info ${currentPlayer === 'white' && !gameOver ? 'active' : ''}">
                            <div class="stone white"></div>
                            <span>${isMultiplayer ? whiteName : '백'}${gs.players?.find(p => p.color === 'white')?.id === myId ? ' (나)' : ''}</span>
                        </div>
                    </div>
                    
                    ${(() => {
                        if (gameOver) return '<div class="turn-banner game-over-banner">게임 종료</div>';
                        const isMyTurn = isMultiplayer ? myColor === currentPlayer : true;
                        const turnColor = currentPlayer === 'black' ? '⚫' : '⚪';
                        if (isMultiplayer) {
                            return isMyTurn
                                ? `<div class="turn-banner my-turn">${turnColor} 내 차례! 돌을 놓으세요</div>`
                                : `<div class="turn-banner opp-turn">${turnColor} 상대 차례... 기다리세요</div>`;
                        }
                        return `<div class="turn-banner my-turn">${turnColor} ${currentPlayer === 'black' ? '흑' : '백'}의 차례</div>`;
                    })()}
                    
                    ${!gameOver ? `
                    <div style="display:flex;align-items:center;gap:8px;width:100%;max-width:400px">
                        <span class="timer-text" id="timerText">${timeLeft}초</span>
                        <div class="timer-bar"><div class="fill" id="timerFill" style="width:${(timeLeft/TURN_TIME)*100}%;background:var(--accent)"></div></div>
                    </div>` : ''}
                    
                    <div class="board-zoom-container">
                        <div class="board-wrapper" style="transform:scale(${zoomLevel})">
                            <div class="board" id="board"></div>
                        </div>
                    </div>
                    
                    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;max-width:400px;margin-top:8px">
                        <div class="zoom-controls">
                            <button class="zoom-btn" onclick="zoomOut()">−</button>
                            <button class="zoom-btn" onclick="zoomReset()">1:1</button>
                            <button class="zoom-btn" onclick="zoomIn()">+</button>
                        </div>
                        <div class="settings-row">
                            <input type="checkbox" id="confirmToggle" ${confirmBeforePlace ? 'checked' : ''} onchange="toggleConfirm(this)">
                            <label for="confirmToggle">착수 확인</label>
                        </div>
                    </div>
                    
                    <div class="game-actions">
                        ${!isMultiplayer ? '<button class="btn" onclick="restartGame()">새 게임</button>' : ''}
                        <button class="btn" onclick="exitGame()">나가기</button>
                    </div>
                </div>
            `;
            
            renderBoard(gs.lastMove, gs.winLine);
        }

        function renderBoard(lastMove, winLine) {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    if (STAR_POINTS.some(([r,c]) => r === row && c === col) && !board[row][col]) {
                        const dot = document.createElement('div');
                        dot.className = 'star-dot';
                        cell.appendChild(dot);
                    }
                    
                    if (board[row][col]) {
                        const stone = document.createElement('div');
                        stone.className = `placed-stone ${board[row][col]}`;
                        
                        if (lastMove && lastMove.row === row && lastMove.col === col) {
                            stone.classList.add('last');
                        }
                        
                        if (winLine?.some(p => p.row === row && p.col === col)) {
                            stone.classList.add('win');
                        }
                        
                        cell.appendChild(stone);
                    }
                    
                    cell.onclick = () => handleCellClick(row, col);
                    boardEl.appendChild(cell);
                }
            }
        }

        function restartGame() {
            initBoard();
            renderGame();
        }

        function exitGame() {
            clearTimer();
            if (isMultiplayer && mpUI.getClient()) {
                if (confirm('게임을 나가시겠습니까?')) {
                    mpUI.getClient().leaveRoom().catch(() => {});
                    MultiplayerClient.resetInstance();
                    isMultiplayer = false;
                    mpUI.show();
                }
            } else {
                mpUI.show();
            }
        }

        function showToast(msg) {
            const existing = document.querySelector('.mp-toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'mp-toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Start
        init();
    </script>
    <script src="/lib/site-meta.js"></script>
    <script>
      SiteMeta.init({
        title: '오목 - game.cocy.io',
        description: '5목을 먼저 완성하는 오목 보드게임',
        url: 'https://game.cocy.io/gomoku/'
      });
    </script>
</body>
</html>
