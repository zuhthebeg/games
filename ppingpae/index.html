function startReplay(newTileIds) {
  if (!newTileIds || newTileIds.length === 0) return;
  state.replayTiles = [...newTileIds];
  // 각 타일 200ms 간격으로 등장 → 전체 윈도우 + 600ms 후 해제
  const duration = newTileIds.length * 200 + 700;
  setTimeout(() => {
    state.replayTiles = null;
    render();
  }, duration);
}

function mpStartGameFromServer(room) {
  const wasActive = mpState.active;
  mpState.active = true;
  if (!wasActive) mpState.wasMyTurn = false;
  const rb = document.getElementById('btn-react');
  if (rb) rb.style.display = '';  // 멀티에서만 리액션 버튼 노출(액션바, 손패 안 가림)
  if (!wasActive) {
    showScreen('screen-game');
    boardView.scale = 1.0;
    setTimeout(() => { bindBoardPinch(); applyBoardZoom(); }, 50);
  }
  mpApplyServerView(room.gameState, room.myView);
}

function mpApplyServerView(publicState, myView) {
  if (!publicState) return;
  // 이전 스냅샷 (diff용)
  const prevBoardIds = new Set(state.board.flatMap(g => g.tileIds));
  const prevHandIds = (mpState.mySeat >= 0 && state.players[mpState.mySeat])
    ? new Set(state.players[mpState.mySeat].handIds) : new Set();
  const prevTurn = state.currentPlayer;

  // tileMap: 보드와 내 손패 타일을 통합해서 채움
  state.tileMap = {};
  for (const grp of (publicState.board || [])) {
    for (const t of (grp.tiles || [])) state.tileMap[t.id] = t;
  }
  for (const t of (myView?.myHand || [])) state.tileMap[t.id] = t;

  // 보드
  state.board = (publicState.board || []).map(g => ({ gid: g.gid, tileIds: g.tiles.map(t => t.id) }));
  state.gidCounter = state.board.reduce((m, g) => Math.max(m, g.gid), 0);

  // 플레이어 목록 (멀티)
  state.players = (publicState.players || []).map(p => ({
    name: p.nickname,
    handIds: [], // 다른 플레이어 손패는 비공개. 내 손패는 아래서 덮어씀
    hasInitialMeld: p.hasInitialMeld,
    isAI: p.id?.startsWith('ai-') || false,
    score: p.score,
    handCount: p.handCount,
    userId: p.id,
  }));
  // 내 손패 채우기
  mpState.mySeat = state.players.findIndex(p => p.userId === mpState.myUserId);
  if (mpState.mySeat >= 0 && myView?.myHandIds) {
    state.players[mpState.mySeat].handIds = [...myView.myHandIds];
  }

  state.currentPlayer = publicState.currentTurn;
  state.viewPlayerIndex = mpState.mySeat;
  state.drawPile = new Array(publicState.drawPileCount || 0); // 카운트만 추적
  state.consecutivePasses = publicState.consecutivePasses || 0;
  state.timeLimit = publicState.config?.timeLimit || 60;

  // 내 턴이면 turnState 세팅, 아니면 잠금
  const isMyTurn = mpState.mySeat === state.currentPlayer;
  state.actionLocked = !isMyTurn || publicState.finished;
  if (isMyTurn && !publicState.finished) {
    const me = state.players[mpState.mySeat];
    state.turnState = {
      workingBoard: deepCloneBoard(state.board),
      workingHand: [...me.handIds],
      boardSnapshot: deepCloneBoard(state.board),
      handSnapshot: [...me.handIds],
      playedCount: 0,
    };
    state.actionHistory = [];
  }
  state.selected = null;
  state.selectedIds.clear(); state.boardSelectedIds.clear();
  state.activeGid = null;

  // diff: 보드에 새로 등장한 타일 → 상대 무브 단계별 재생
  const newOnBoard = state.board.flatMap(g => g.tileIds).filter(id => !prevBoardIds.has(id));
  // diff: 내 손패에 새로 들어온 타일 → 드로우 강조 (내가 PASS 했을 때)
  const newInHand = mpState.mySeat >= 0
    ? (state.players[mpState.mySeat]?.handIds || []).filter(id => !prevHandIds.has(id))
    : [];

  // 상대 턴이 끝났거나 게임이 시작될 때 + 보드에 새 타일이 생겼다면 재생
  const turnChanged = prevTurn !== state.currentPlayer || publicState.finished;
  const isFromOpponent = turnChanged && newOnBoard.length > 0 && (
    // 직전 턴이 내가 아니었거나 (= 상대가 이번에 커밋)
    prevTurn !== mpState.mySeat ||
    // 또는 prevTurn이 의미 없는 경우 (게임 시작 등)
    prevBoardIds.size === 0
  );
  if (isFromOpponent && newOnBoard.length > 0 && prevBoardIds.size > 0) {
    startReplay(newOnBoard);
  }
  if (newInHand.length === 1) {
    markJustDrawn(newInHand[0]);
  }

  render();
  // 내 턴 진입 알림(팝업+소리) — 상대턴→내턴 전환 시 1회만
  if (isMyTurn && !publicState.finished && !mpState.wasMyTurn) showMyTurnCue();
  mpState.wasMyTurn = isMyTurn && !publicState.finished;
  // 남의 턴에도 동일 제한시간 카운트다운 표시(동기화는 아님, 턴 넘어가면 리셋). 자동 액션은 내 턴에서만.
  if (!publicState.finished) startTimer(); else stopTimer();

  // 게임 종료 처리
  if (publicState.finished && !document.getElementById('gameover-modal')) {
    mpShowResult(publicState);
  }
}

function mpShowResult(publicState) {
  stopTimer();
  const winner = publicState.players.find(p => p.id === publicState.winnerId);
  // 내가 승자면 다른 플레이어들의 -점수 합 × 10000 골드
  const isMyWin = !!winner && winner.id === mpState.myUserId;
  if (isMyWin) SFX.win(); else SFX.lose();
  const oppNegSum = publicState.players
    .filter(p => p.id !== mpState.myUserId)
    .reduce((s, p) => s + Math.max(0, -p.score), 0);
  const prizeGold = isMyWin ? oppNegSum * 10000 : 0;
  if (prizeGold > 0 && !mpState._doMode && typeof SharedWallet !== 'undefined' && SharedWallet.addGold) {
    try { SharedWallet.addGold(prizeGold); } catch (_) {}
  }
  // 멀티 승리 → 랭킹 등록(SP와 동일 지표: 상대 잔여점 합)
  if (isMyWin && oppNegSum > 0 && typeof GameRankings !== 'undefined') {
    try { GameRankings.submit('ppingpae', { score: oppNegSum }); } catch (_) {}
  }

  const modal = document.createElement('div');
  modal.id = 'gameover-modal';
  modal.innerHTML = `
    <div class="gameover-card">
      <div class="gameover-title">${winner ? `🏆 ${escapeHtml(winner.nickname)} 승리!` : '🤝 게임 종료'}</div>
      <div style="font-size:13px;color:var(--muted);">${escapeHtml(publicState.endReason || '')}${prizeGold > 0 ? ` · 💰 ${prizeGold.toLocaleString()}골드` : ''}</div>
      <div style="border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:6px;">
        ${publicState.players.map(p => `<div class="score-row"><span class="name">${escapeHtml(p.nickname)}</span><span class="pts">${p.score >= 0 ? '+' : ''}${p.score}점</span></div>`).join('')}
      </div>
      <button class="btn-start" onclick="location.reload()" style="margin-top:4px;">메뉴로</button>
    </div>`;
  document.body.appendChild(modal);
}

async function mpSendCompleteTurn() {
  if (mpState.busy) return;
  if (mpState.mySeat !== state.currentPlayer) { showToast('당신의 턴이 아닙니다'); return; }
  const me = state.players[mpState.mySeat];
  // 사전 검증 (서버 거절 줄이기)
  if (me.handIds.length === state.turnState.handSnapshot.length) {
    showToast('최소 1장 이상 내야 합니다');
    return;
  }
  if (!state.board.every(g => g.tileIds.length === 0 || isValidSet(g.tileIds.map(id => state.tileMap[id])))) {
    showToast('⚠️ 유효하지 않은 조합이 있습니다');
    return;
  }
  mpState.busy = true;
  state.actionLocked = true;
  stopTimer();
  try {
    const payload = {
      board: state.board.filter(g => g.tileIds.length > 0).map(g => ({ gid: g.gid, tileIds: [...g.tileIds] })),
      handIds: [...me.handIds],
    };
    const res = await mpState.client.sendAction({ type: 'COMPLETE_TURN', payload });
    if (!res.success) {
      showToast('서버 거절: ' + (res.error || ''));
      state.actionLocked = false;
      startTimer();
    } else if (res.gameState) {
      mpApplyServerView(res.gameState, res.myView);
    }
  } catch (e) {
    showToast('전송 실패: ' + (e.message || e));
    state.actionLocked = false;
  } finally {
    mpState.busy = false;
  }
}

async function mpSendPass() {
  if (mpState.busy) return;
  if (mpState.mySeat !== state.currentPlayer) { showToast('당신의 턴이 아닙니다'); return; }
  mpState.busy = true;
  state.actionLocked = true;
  stopTimer();
  try {
    // 보드는 원복하지 않음 — 서버가 PASS 시 보드 변경 없음. 그래도 로컬 잔여 변경 되돌리기:
    const ts = state.turnState;
    if (ts) {
      state.board = deepCloneBoard(ts.boardSnapshot);
      state.players[mpState.mySeat].handIds = [...ts.handSnapshot];
    }
    const res = await mpState.client.sendAction({ type: 'PASS' });
    if (!res.success) {
      showToast('패스 실패: ' + (res.error || ''));
      state.actionLocked = false;
      startTimer();
    } else if (res.gameState) {
      mpApplyServerView(res.gameState, res.myView);
    }
  } catch (e) {
    showToast('전송 실패: ' + (e.message || e));
    state.actionLocked = false;
  } finally {
    mpState.busy = false;
  }
}
