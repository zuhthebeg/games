    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({"gtm.start":new Date().getTime(),event:"gtm.js"});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!="dataLayer"?"&l="+l:"";j.async=true;j.src="https://www.googletagmanager.com/gtm.js?id="+i+dl;f.parentNode.insertBefore(j,f)})(window,document,"script","dataLayer","GTM-MV8KQGJF");</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐍 스네이크</title>
    <link rel="icon" href="icon.svg">
    <script src="/lib/shared-wallet.js?v=20260312a"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #151515;
            --border: #2a2a2a;
            --snake: #4ecca3;
            --snake-head: #00ff88;
            --food: #ff6b6b;
            --gold: #ffd700;
            --text: #eee;
            --muted: #777;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 16px 16px;
            overflow: hidden;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            font-weight: 700;
        }

        .score-value { color: var(--snake); }
        .earned-value { color: var(--gold); }
        .level-value { color: #8be9fd; }
        .next-value { color: var(--muted); font-size: 0.9rem; }

        #game-container {
            position: relative;
            border: 3px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: var(--card);
            touch-action: none;
        }

        #canvas {
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .overlay.hidden { display: none; }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 16px;
        }

        .overlay p {
            font-size: 1.1rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .gold-earned {
            font-size: 1.4rem;
            color: var(--gold);
            margin: 16px 0;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .btn {
            padding: 14px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--snake), #2ecc71);
            color: #000;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.5);
        }

        .controls-hint {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 12px;
        }

        /* Gold popup animation */
        .gold-popup {
            position: absolute;
            color: var(--gold);
            font-weight: 700;
            font-size: 1rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
        }

        .level-banner {
            position: absolute;
            left: 50%;
            top: 48%;
            transform: translate(-50%, -50%);
            padding: 14px 24px;
            border: 2px solid rgba(139, 233, 253, 0.75);
            border-radius: 16px;
            background: rgba(0,0,0,0.78);
            color: #8be9fd;
            font-weight: 900;
            font-size: 1.35rem;
            letter-spacing: 0.08em;
            text-shadow: 0 0 14px rgba(139, 233, 253, 0.8);
            pointer-events: none;
            animation: levelFlash 0.85s ease-out forwards;
        }

        @keyframes levelFlash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            18% { opacity: 1; transform: translate(-50%, -50%) scale(1.06); }
            74% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -62%) scale(0.96); }
        }

        /* Mobile controls */
        .mobile-controls {
            display: none;
            margin-top: 16px;
            gap: 8px;
        }

        .d-pad {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 6px;
        }

        .d-btn {
            width: 60px;
            height: 60px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.1s;
        }

        .d-btn:active {
            background: var(--snake);
            border-color: var(--snake);
            color: #000;
        }

        .d-btn.up { grid-area: up; }
        .d-btn.down { grid-area: down; }
        .d-btn.left { grid-area: left; }
        .d-btn.right { grid-area: right; }

        @media (max-width: 600px) {
            .mobile-controls { display: flex; }
            .controls-hint { display: none; }
        }

        @media (pointer: coarse) {
            .mobile-controls { display: flex; }
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MV8KQGJF" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <h1>🐍 스네이크</h1>
    
    <div class="stats">
        <div class="stat">
            <span>🍎 점수:</span>
            <span class="stat-value score-value" id="score">0</span>
        </div>
        <div class="stat">
            <span>💰 획득:</span>
            <span class="stat-value earned-value" id="earned">0G</span>
        </div>
        <div class="stat">
            <span>🧭 레벨:</span>
            <span class="stat-value level-value" id="level">1</span>
            <span class="next-value" id="next-level">다음 5</span>
        </div>
    </div>

    <div id="game-container">
        <canvas id="canvas"></canvas>
        
        <div class="overlay" id="start-overlay">
            <h2>🐍 스네이크</h2>
            <p>5점마다 레벨업. 장애물, 움직이는 가시, 황금 먹이가 등장합니다.</p>
            <p>먹이를 먹을 때마다 골드 2배! (100→200→400...)</p>
            <button class="btn btn-primary" onclick="startGame()">게임 시작</button>
            <p class="controls-hint">방향키 또는 WASD로 조작</p>
        </div>
        
        <div class="overlay hidden" id="gameover-overlay">
            <h2>💀 게임 오버</h2>
            <p>점수: <span id="final-score">0</span></p>
            <div class="gold-earned" id="gold-earned">+0G 획득!</div>
            <button class="btn btn-primary" onclick="startGame()">다시 하기</button>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="d-pad">
            <button class="d-btn up" onclick="setDirection(0, -1)">▲</button>
            <button class="d-btn left" onclick="setDirection(-1, 0)">◀</button>
            <button class="d-btn right" onclick="setDirection(1, 0)">▶</button>
            <button class="d-btn down" onclick="setDirection(0, 1)">▼</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        
        // Responsive sizing
        const CELL_COUNT = 20;
        let CELL_SIZE, WIDTH, HEIGHT;
        
        function resize() {
            const maxSize = Math.min(window.innerWidth - 32, window.innerHeight - 280, 500);
            CELL_SIZE = Math.floor(maxSize / CELL_COUNT);
            WIDTH = CELL_COUNT * CELL_SIZE;
            HEIGHT = CELL_COUNT * CELL_SIZE;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
            container.style.width = WIDTH + 'px';
            container.style.height = HEIGHT + 'px';
        }
        resize();
        window.addEventListener('resize', resize);
        
        // Game state
        let snake = [];
        let food = null;
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let goldEarned = 0;
        let goldPerFood = 100;  // 2배씩 증가하되 먹이 1개당 최대 1,000,000G
        const MAX_GOLD_PER_FOOD = 1000000;
        const LEVEL_SCORE_STEP = 5;
        const LEVEL_CONFIGS = [
            { name: '기본장', speed: 120, moving: false, golden: false },
            { name: '돌기둥', speed: 114, moving: false, golden: false },
            { name: '벽 복도', speed: 108, moving: false, golden: true },
            { name: '움직이는 가시', speed: 102, moving: true, golden: true },
            { name: '황금 사냥', speed: 96, moving: true, golden: true },
            { name: '좁아지는 외곽', speed: 90, moving: true, golden: true }
        ];
        let level = 1;
        let obstacles = [];
        let movingObstacles = [];
        let goldenFood = null;
        let goldenFoodTicks = 0;
        let gameLoop = null;
        let gameRunning = false;

        // 사운드
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playEatSound(combo) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            // 콤보가 올라갈수록 피치 높아짐
            o.frequency.value = 440 + Math.min(combo, 12) * 80;
            o.type = 'sine';
            g.gain.value = 0.15;
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
            o.start(); o.stop(audioCtx.currentTime + 0.15);
        }
        function playDeathSound() {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.frequency.value = 200;
            o.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.4);
            o.type = 'sawtooth';
            g.gain.value = 0.12;
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            o.start(); o.stop(audioCtx.currentTime + 0.4);
        }
        
        function startGame() {
            document.getElementById('start-overlay').classList.add('hidden');
            document.getElementById('gameover-overlay').classList.add('hidden');
            
            // Reset state
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            goldEarned = 0;
            goldPerFood = 100;
            level = 1;
            obstacles = buildLevelObstacles(level);
            movingObstacles = buildMovingObstacles(level);
            goldenFood = null;
            goldenFoodTicks = 0;
            updateStats();
            
            spawnFood();
            gameRunning = true;
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, currentSpeed());
        }
        
        function currentSpeed() {
            return LEVEL_CONFIGS[Math.min(level, LEVEL_CONFIGS.length) - 1].speed;
        }

        function currentLevelConfig() {
            return LEVEL_CONFIGS[Math.min(level, LEVEL_CONFIGS.length) - 1];
        }

        function buildLevelObstacles(level) {
            const mid = Math.floor(CELL_COUNT / 2);
            let cells = [];
            if (level >= 2) {
                cells.push(
                    { x: mid - 3, y: mid - 3, kind: 'rock' }, { x: mid + 3, y: mid - 3, kind: 'rock' },
                    { x: mid - 3, y: mid + 3, kind: 'rock' }, { x: mid + 3, y: mid + 3, kind: 'rock' }
                );
            }
            if (level >= 3) {
                for (let i = 3; i <= 7; i++) cells.push({ x: i, y: 5, kind: 'wall' }, { x: CELL_COUNT - 1 - i, y: 14, kind: 'wall' });
                for (let i = 7; i <= 12; i++) cells.push({ x: 5, y: i, kind: 'wall' }, { x: 14, y: CELL_COUNT - 1 - i, kind: 'wall' });
            }
            if (level >= 6) {
                for (let i = 0; i < CELL_COUNT; i++) {
                    cells.push({ x: i, y: 0, kind: 'danger' }, { x: i, y: CELL_COUNT - 1, kind: 'danger' });
                    cells.push({ x: 0, y: i, kind: 'danger' }, { x: CELL_COUNT - 1, y: i, kind: 'danger' });
                }
            }
            const seen = new Set();
            return cells.filter(c => {
                const key = `${c.x},${c.y}`;
                if (seen.has(key)) return false;
                seen.add(key);
                return !snake.some(s => s.x === c.x && s.y === c.y);
            });
        }

        function buildMovingObstacles(level) {
            if (level < 4) return [];
            const movers = [{ x: 2, y: 9, dx: 1, dy: 0, minX: 2, maxX: 17, minY: 9, maxY: 9, kind: 'spike' }];
            if (level >= 5) movers.push({ x: 10, y: 2, dx: 0, dy: 1, minX: 10, maxX: 10, minY: 2, maxY: 17, kind: 'spike' });
            return movers;
        }

        function isBlockedCell(x, y) {
            return obstacles.some(o => o.x === x && o.y === y) || movingObstacles.some(o => o.x === x && o.y === y);
        }

        function randomEmptyCell() {
            const empty = [];
            for (let x = 0; x < CELL_COUNT; x++) {
                for (let y = 0; y < CELL_COUNT; y++) {
                    const occupied = snake.some(s => s.x === x && s.y === y)
                        || isBlockedCell(x, y)
                        || (food && food.x === x && food.y === y)
                        || (goldenFood && goldenFood.x === x && goldenFood.y === y);
                    if (!occupied) empty.push({ x, y });
                }
            }
            return empty[Math.floor(Math.random() * empty.length)] || null;
        }

        function spawnFood(kind = 'normal') {
            const cell = randomEmptyCell();
            if (kind === 'golden') {
                goldenFood = cell;
                goldenFoodTicks = cell ? 70 : 0;
                return;
            }
            food = cell;
        }

        function maybeSpawnGoldenFood() {
            const cfg = currentLevelConfig();
            if (!cfg.golden || goldenFood || score < LEVEL_SCORE_STEP * 2) return;
            if (score % 4 === 0) spawnFood('golden');
        }

        function updateLevelProgress() {
            const nextLevel = Math.min(LEVEL_CONFIGS.length, Math.floor(score / LEVEL_SCORE_STEP) + 1);
            if (nextLevel <= level) return;
            level = nextLevel;
            obstacles = buildLevelObstacles(level);
            movingObstacles = buildMovingObstacles(level);
            showLevelBanner(`LEVEL UP ${level}: ${currentLevelConfig().name}`);
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = setInterval(update, currentSpeed());
            }
        }

        function updateMovingObstacles() {
            if (!movingObstacles.length) return;
            movingObstacles.forEach(o => {
                const nx = o.x + o.dx;
                const ny = o.y + o.dy;
                if (nx < o.minX || nx > o.maxX || ny < o.minY || ny > o.maxY) {
                    o.dx *= -1;
                    o.dy *= -1;
                }
                o.x += o.dx;
                o.y += o.dy;
            });
        }
        
        function update() {
            if (!gameRunning) return;
            
            direction = { ...nextDirection };
            updateMovingObstacles();
            if (snake.some(s => isBlockedCell(s.x, s.y))) {
                gameOver();
                return;
            }
            if (goldenFoodTicks > 0) {
                goldenFoodTicks--;
                if (goldenFoodTicks === 0) goldenFood = null;
            }
            
            // Move snake
            const head = { 
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            // Wall collision
            if (head.x < 0 || head.x >= CELL_COUNT || head.y < 0 || head.y >= CELL_COUNT) {
                gameOver();
                return;
            }
            
            // Self / obstacle collision
            if (snake.some(s => s.x === head.x && s.y === head.y) || isBlockedCell(head.x, head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            const ateGolden = goldenFood && head.x === goldenFood.x && head.y === goldenFood.y;
            const ateNormal = food && head.x === food.x && head.y === food.y;
            if (ateGolden || ateNormal) {
                score += ateGolden ? 2 : 1;
                const multiplier = ateGolden ? 5 : 1;
                const earnedGold = Math.min(goldPerFood, MAX_GOLD_PER_FOOD);
                const payoutGold = Math.min(earnedGold * multiplier, MAX_GOLD_PER_FOOD);
                goldEarned += payoutGold;
                SharedWallet.addGold(payoutGold);
                showGoldPopup(head.x * CELL_SIZE + CELL_SIZE/2, head.y * CELL_SIZE, payoutGold);
                playEatSound(score + (ateGolden ? 4 : 0));
                if (ateGolden) {
                    goldenFood = null;
                    goldenFoodTicks = 0;
                } else {
                    goldPerFood = Math.min(goldPerFood * 2, MAX_GOLD_PER_FOOD);  // 다음 먹이는 2배, 최대 100만원
                    spawnFood();
                }
                updateLevelProgress();
                maybeSpawnGoldenFood();
                updateStats();
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function draw() {
            // Clear
            ctx.fillStyle = '#151515';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // Grid lines (subtle)
            ctx.strokeStyle = '#1f1f1f';
            ctx.lineWidth = 1;
            for (let i = 0; i <= CELL_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, HEIGHT);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(WIDTH, i * CELL_SIZE);
                ctx.stroke();
            }
            
            drawObstacles();
            drawGoldenFood();
            
            // Food
            if (food) {
                ctx.fillStyle = '#ff6b6b';
                ctx.shadowColor = '#ff6b6b';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(
                    food.x * CELL_SIZE + CELL_SIZE / 2,
                    food.y * CELL_SIZE + CELL_SIZE / 2,
                    CELL_SIZE / 2 - 3,
                    0, Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            // Snake
            snake.forEach((segment, i) => {
                const isHead = i === 0;
                
                // Gradient from head to tail
                const ratio = i / snake.length;
                const r = Math.floor(0 + (78 - 0) * ratio);
                const g = Math.floor(255 + (204 - 255) * ratio);
                const b = Math.floor(136 + (163 - 136) * ratio);
                
                ctx.fillStyle = isHead ? '#00ff88' : `rgb(${r}, ${g}, ${b})`;
                
                if (isHead) {
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 10;
                }
                
                const padding = 2;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * CELL_SIZE + padding,
                    segment.y * CELL_SIZE + padding,
                    CELL_SIZE - padding * 2,
                    CELL_SIZE - padding * 2,
                    isHead ? 6 : 4
                );
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }
        
        function drawObstacles() {
            [...obstacles, ...movingObstacles].forEach(o => {
                const cx = o.x * CELL_SIZE;
                const cy = o.y * CELL_SIZE;
                const pad = o.kind === 'spike' ? 4 : 3;
                ctx.save();
                ctx.shadowBlur = o.kind === 'spike' ? 10 : 0;
                ctx.shadowColor = '#ff3b55';
                if (o.kind === 'spike') {
                    ctx.fillStyle = '#ff3b55';
                    ctx.beginPath();
                    ctx.moveTo(cx + CELL_SIZE / 2, cy + pad);
                    ctx.lineTo(cx + CELL_SIZE - pad, cy + CELL_SIZE - pad);
                    ctx.lineTo(cx + pad, cy + CELL_SIZE - pad);
                    ctx.closePath();
                    ctx.fill();
                } else {
                    ctx.fillStyle = o.kind === 'danger' ? '#3f1d24' : '#565f6b';
                    ctx.strokeStyle = o.kind === 'danger' ? '#ff3b55' : '#8b949e';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(cx + pad, cy + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2, 5);
                    ctx.fill();
                    ctx.stroke();
                }
                ctx.restore();
            });
        }

        function drawGoldenFood() {
            if (!goldenFood) return;
            const pulse = 0.75 + 0.25 * Math.sin(Date.now() / 90);
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 18;
            ctx.beginPath();
            ctx.arc(
                goldenFood.x * CELL_SIZE + CELL_SIZE / 2,
                goldenFood.y * CELL_SIZE + CELL_SIZE / 2,
                (CELL_SIZE / 2 - 2) * pulse,
                0, Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function showLevelBanner(text) {
            const banner = document.createElement('div');
            banner.className = 'level-banner';
            banner.textContent = text;
            container.appendChild(banner);
            setTimeout(() => banner.remove(), 900);
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            playDeathSound();
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('gold-earned').textContent = `+${goldEarned.toLocaleString()}G 획득!`;
            document.getElementById('gameover-overlay').classList.remove('hidden');
        }
        
        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('earned').textContent = goldEarned.toLocaleString() + 'G';
            document.getElementById('level').textContent = level;
            const next = level >= LEVEL_CONFIGS.length ? 'MAX' : `다음 ${level * LEVEL_SCORE_STEP}`;
            document.getElementById('next-level').textContent = `${currentLevelConfig().name} · ${next}`;
        }
        
        function showGoldPopup(x, y, amount) {
            const popup = document.createElement('div');
            popup.className = 'gold-popup';
            popup.textContent = `+${(amount||100).toLocaleString()}G`;
            // 금액 클수록 글자 커짐
            const scale = Math.min(2, 1 + Math.log2(Math.max(1, (amount||100) / 100)) * 0.15);
            popup.style.fontSize = scale + 'rem';
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            container.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }
        
        function setDirection(dx, dy) {
            // Prevent reversing
            if (direction.x === -dx && direction.y === -dy) return;
            if (direction.x === dx && direction.y === dy) return;
            nextDirection = { x: dx, y: dy };
        }

        function rotateDirection(clockwise = true) {
            const base = { ...nextDirection };
            const rotated = clockwise
                ? { x: -base.y, y: base.x }
                : { x: base.y, y: -base.x };
            setDirection(rotated.x, rotated.y);
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    setDirection(0, -1);
                    e.preventDefault();
                    break;
                case 'ArrowDown': case 's': case 'S':
                    setDirection(0, 1);
                    e.preventDefault();
                    break;
                case 'ArrowLeft': case 'a': case 'A': case 'q': case 'Q':
                    rotateDirection(false);
                    e.preventDefault();
                    break;
                case 'ArrowRight': case 'd': case 'D': case 'e': case 'E':
                    rotateDirection(true);
                    e.preventDefault();
                    break;
                case ' ':
                    if (!gameRunning) startGame();
                    else rotateDirection(true);
                    e.preventDefault();
                    break;
            }
        });
        
        // Drag/tap controls: drag maps to absolute up/down/left/right when legal, short tap rotates clockwise.
        const SWIPE_THRESHOLD = 24;
        let pointerStartX = null;
        let pointerStartY = null;
        
        container.addEventListener('pointerdown', (e) => {
            pointerStartX = e.clientX;
            pointerStartY = e.clientY;
            container.setPointerCapture?.(e.pointerId);
        }, { passive: true });
        
        function directionFromDrag(dx, dy) {
            if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) return null;
            if (Math.abs(dx) >= Math.abs(dy)) return { x: dx > 0 ? 1 : -1, y: 0 };
            return { x: 0, y: dy > 0 ? 1 : -1 };
        }

        container.addEventListener('pointerup', (e) => {
            if (pointerStartX === null || pointerStartY === null) return;
            
            const dx = e.clientX - pointerStartX;
            const dy = e.clientY - pointerStartY;
            const dragDir = directionFromDrag(dx, dy);
            
            if (!dragDir) {
                rotateDirection(true);
            } else {
                setDirection(dragDir.x, dragDir.y);
            }
            
            pointerStartX = null;
            pointerStartY = null;
        }, { passive: true });
        
        // Initial draw
        draw();
    </script>
